<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Stream anime online in HD. Watch trending, top rated, airing, and upcoming anime series.">
<meta property="og:title" content="AnimeStream - Watch Anime Online">
<meta property="og:description" content="Stream anime online in HD quality">
<meta property="og:type" content="website">
<title>AnimeStream - Watch Anime Online</title>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg: #0a0a0f;
  --bg-elevated: #12121a;
  --bg-card: #1a1a2e;
  --bg-glass: rgba(26,26,46,0.85);
  --primary: #a855f7;
  --primary-light: #c084fc;
  --primary-dark: #7e22ce;
  --accent: #f472b6;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --border: rgba(168,85,247,0.15);
  --border-glow: rgba(168,85,247,0.3);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 20px rgba(168,85,247,0.2);
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
  --header-height: clamp(56px, 8vh, 72px);
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100%; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }
ul, ol { list-style: none; }
input, textarea { font-family: inherit; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ===== SKELETON LOADING ===== */
.skeleton {
  background: linear-gradient(90deg, var(--bg-card) 25%, #252545 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: skeleton 1.5s infinite;
  border-radius: var(--radius-sm);
}
@keyframes skeleton {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-height);
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 24px);
  transition: var(--transition-normal);
}
.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: clamp(8px, 2vw, 16px);
  flex-shrink: 0;
}
.header-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
}
.logo {
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }
.menu-btn, .search-btn {
  width: clamp(36px, 5vw, 44px);
  height: clamp(36px, 5vw, 44px);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  transition: var(--transition-fast);
  flex-shrink: 0;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.menu-btn:hover, .search-btn:hover, .menu-btn:focus, .search-btn:focus {
  background: var(--primary-dark);
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
  outline: none;
}
.menu-btn svg, .search-btn svg {
  width: clamp(18px, 2.5vw, 22px);
  height: clamp(18px, 2.5vw, 22px);
}

/* ===== MOBILE SIDEBAR ===== */
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1001;
  opacity: 0;
  visibility: hidden;
  transition: var(--transition-normal);
}
.sidebar-overlay.active { opacity: 1; visibility: visible; }
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: min(280px, 80vw);
  height: 100vh;
  height: 100dvh;
  background: var(--bg-elevated);
  border-right: 1px solid var(--border);
  z-index: 1002;
  transform: translateX(-100%);
  transition: transform var(--transition-normal);
  overflow-y: auto;
  padding: var(--header-height) 0 var(--safe-bottom) 0;
}
.sidebar.active { transform: translateX(0); }
.sidebar-nav { padding: 16px; }
.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-md);
  color: var(--text-muted);
  font-size: 0.95rem;
  transition: var(--transition-fast);
  margin-bottom: 4px;
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  background: var(--bg-card);
  color: var(--primary-light);
}
.sidebar-nav svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ===== SEARCH OVERLAY ===== */
.search-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,10,15,0.97);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  z-index: 1003;
  opacity: 0;
  visibility: hidden;
  transition: var(--transition-normal);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--header-height) clamp(12px, 3vw, 24px) 24px;
  max-width: 100%;
  overflow-x: hidden;
}
.search-overlay.active { opacity: 1; visibility: visible; }
.search-container {
  width: 100%;
  max-width: min(700px, 100%);
  position: relative;
}
.search-input-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: clamp(10px, 2vw, 14px) clamp(16px, 3vw, 24px);
  transition: var(--transition-fast);
  width: 100%;
}
.search-input-wrap:focus-within {
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}
.search-input-wrap svg { width: 20px; height: 20px; color: var(--text-muted); flex-shrink: 0; }
.search-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-size: clamp(0.95rem, 2vw, 1.1rem);
  outline: none;
  min-width: 0;
}
.search-input::placeholder { color: var(--text-dim); }
.search-close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--bg-elevated);
  color: var(--text-muted);
  flex-shrink: 0;
  transition: var(--transition-fast);
}
.search-close:hover { background: var(--primary-dark); color: var(--text); }
.search-results {
  width: 100%;
  max-width: min(700px, 100%);
  margin-top: 16px;
  max-height: calc(100dvh - var(--header-height) - 100px);
  overflow-y: auto;
  overflow-x: hidden;
  border-radius: var(--radius-lg);
}
.search-suggestion {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: var(--transition-fast);
  overflow: hidden;
}
.search-suggestion:hover { background: var(--bg-card); }
.search-suggestion img {
  width: 40px; height: 56px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg-card);
}
.search-suggestion-info { min-width: 0; }
.search-suggestion-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-suggestion-meta {
  font-size: 0.75rem;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-empty, .search-loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}

/* ===== HERO SLIDER ===== */
.hero {
  position: relative;
  width: 100%;
  height: clamp(380px, 60vh, 700px);
  overflow: hidden;
  margin-top: var(--header-height);
}
.hero-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity var(--transition-slow);
  display: flex;
  align-items: flex-end;
}
.hero-slide.active { opacity: 1; z-index: 2; }
.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center top;
  transition: transform 8s ease;
}
.hero-slide.active .hero-bg { transform: scale(1.05); }
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, var(--bg) 0%, rgba(10,10,15,0.7) 40%, rgba(10,10,15,0.3) 70%, transparent 100%);
}
.hero-content {
  position: relative;
  z-index: 3;
  padding: clamp(20px, 5vw, 60px) clamp(16px, 4vw, 48px);
  max-width: min(800px, 90vw);
  width: 100%;
}
.hero-title {
  font-size: clamp(1.5rem, 4vw, 3rem);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 12px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease 0.2s;
}
.hero-slide.active .hero-title { opacity: 1; transform: translateY(0); }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: clamp(6px, 1.5vw, 12px);
  margin-bottom: 14px;
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.6s ease 0.35s;
}
.hero-slide.active .hero-meta { opacity: 1; transform: translateY(0); }
.hero-score {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(0,0,0,0.5);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: clamp(0.75rem, 1.2vw, 0.85rem);
  font-weight: 700;
  color: #fbbf24;
}
.hero-genre {
  background: rgba(168,85,247,0.2);
  color: var(--primary-light);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: clamp(0.7rem, 1.1vw, 0.8rem);
  border: 1px solid var(--border);
}
.hero-synopsis {
  font-size: clamp(0.8rem, 1.3vw, 0.95rem);
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 20px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.6s ease 0.5s;
}
.hero-slide.active .hero-synopsis { opacity: 1; transform: translateY(0); }
.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.6s ease 0.65s;
}
.hero-slide.active .hero-buttons { opacity: 1; transform: translateY(0); }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: clamp(10px, 1.5vw, 14px) clamp(20px, 3vw, 28px);
  border-radius: var(--radius-xl);
  font-size: clamp(0.85rem, 1.2vw, 0.95rem);
  font-weight: 600;
  transition: var(--transition-fast);
  white-space: nowrap;
  touch-action: manipulation;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 15px rgba(168,85,247,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(168,85,247,0.4); }
.btn-secondary {
  background: var(--bg-glass);
  color: var(--text);
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
}
.btn-secondary:hover { background: var(--bg-card); border-color: var(--primary); }
.btn svg { width: 18px; height: 18px; }

.hero-dots {
  position: absolute;
  bottom: clamp(16px, 3vw, 24px);
  right: clamp(16px, 4vw, 48px);
  display: flex;
  gap: 8px;
  z-index: 4;
}
.hero-dot {
  width: clamp(8px, 1.2vw, 10px);
  height: clamp(8px, 1.2vw, 10px);
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: var(--transition-fast);
  border: none;
}
.hero-dot.active { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
.hero-arrows {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: center;
  width: clamp(36px, 4vw, 48px);
  height: clamp(36px, 4vw, 48px);
  border-radius: 50%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: var(--transition-fast);
  opacity: 0;
}
.hero:hover .hero-arrows { opacity: 1; }
.hero-arrow-prev { left: clamp(8px, 2vw, 16px); }
.hero-arrow-next { right: clamp(8px, 2vw, 16px); }
.hero-arrows:hover { background: rgba(168,85,247,0.3); border-color: var(--primary); }
.hero-arrows svg { width: 20px; height: 20px; }

/* ===== WIDGET SECTIONS ===== */
.section {
  padding: clamp(24px, 4vw, 40px) clamp(12px, 3vw, 24px);
  max-width: 100%;
  overflow-x: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: clamp(16px, 2.5vw, 24px);
  flex-wrap: wrap;
  gap: 8px;
}
.section-title {
  font-size: clamp(1.1rem, 2.2vw, 1.4rem);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title svg {
  width: clamp(20px, 2.5vw, 24px);
  height: clamp(20px, 2.5vw, 24px);
  color: var(--primary);
}
.section-link {
  font-size: clamp(0.8rem, 1.2vw, 0.9rem);
  color: var(--primary-light);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: var(--transition-fast);
  white-space: nowrap;
}
.section-link:hover { color: var(--accent); }
.section-link svg { width: 16px; height: 16px; }

/* ===== UNIVERSAL SLIDER ===== */
.slider-wrap {
  position: relative;
  width: 100%;
  overflow: hidden;
}
.slider {
  display: flex;
  gap: clamp(10px, 1.5vw, 16px);
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 4px 0;
}
.slider::-webkit-scrollbar { display: none; }
.slider-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 5;
  width: clamp(32px, 4vw, 40px);
  height: clamp(32px, 4vw, 40px);
  border-radius: 50%;
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(10px);
  color: var(--text);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition-fast);
  opacity: 0;
  pointer-events: none;
}
.slider-wrap:hover .slider-arrow { opacity: 1; pointer-events: all; }
.slider-arrow:hover { background: var(--primary-dark); border-color: var(--primary); }
.slider-arrow-prev { left: 4px; }
.slider-arrow-next { right: 4px; }
.slider-arrow svg { width: 18px; height: 18px; }

/* ===== ANIME CARD ===== */
.anime-card {
  flex: 0 0 auto;
  width: clamp(140px, 18vw, 180px);
  scroll-snap-align: start;
  position: relative;
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--bg-card);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  cursor: pointer;
}
.anime-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-glow); }
.anime-card-img {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
}
.anime-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform var(--transition-slow);
}
.anime-card:hover .anime-card-img img { transform: scale(1.08); }
.anime-card-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10,10,15,0.9) 0%, transparent 50%);
  pointer-events: none;
}
.anime-card-badges {
  position: absolute;
  top: 8px;
  left: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  z-index: 2;
}
.badge {
  font-size: clamp(0.6rem, 0.9vw, 0.7rem);
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-score { background: rgba(251,191,36,0.9); color: #000; }
.badge-hd { background: rgba(168,85,247,0.9); color: white; }
.badge-ep { background: rgba(59,130,246,0.9); color: white; }
.badge-type { background: rgba(16,185,129,0.9); color: white; }
.anime-card-info {
  padding: clamp(8px, 1.2vw, 12px);
}
.anime-card-title {
  font-size: clamp(0.78rem, 1.1vw, 0.9rem);
  font-weight: 600;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
}
.anime-card-sub {
  font-size: clamp(0.68rem, 0.9vw, 0.78rem);
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== FOOTER ===== */
.footer {
  border-top: 1px solid var(--border);
  padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 24px);
  text-align: center;
  margin-top: clamp(20px, 4vw, 40px);
}
.footer-text {
  font-size: clamp(0.8rem, 1.2vw, 0.9rem);
  color: var(--text-dim);
  margin-bottom: 12px;
}
.footer-social {
  display: flex;
  justify-content: center;
  gap: 16px;
}
.footer-social a {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: var(--transition-fast);
}
.footer-social a:hover { background: var(--primary-dark); color: var(--text); border-color: var(--primary); }
.footer-social svg { width: 18px; height: 18px; }

/* ===== ERROR FALLBACK ===== */
.error-fallback {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.error-fallback svg {
  width: 48px; height: 48px;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.error-fallback p { font-size: 0.9rem; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hero-arrows { display: none; }
  .slider-arrow { display: none; }
  .hero { height: clamp(320px, 50vh, 450px); }
  .hero-content { max-width: 100%; padding-bottom: 50px; }
  .hero-synopsis { -webkit-line-clamp: 2; }
}
@media (max-width: 480px) {
  .anime-card { width: clamp(120px, 42vw, 150px); }
  .hero-dots { right: 50%; transform: translateX(50%); }
  .btn { padding: 10px 18px; font-size: 0.85rem; }
}
@media (min-width: 1400px) {
  .section { padding-left: max(24px, calc((100vw - 1400px) / 2 + 24px)); padding-right: max(24px, calc((100vw - 1400px) / 2 + 24px)); }
  .hero-content { max-width: 900px; }
}
@media (hover: none) {
  .slider-arrow { display: none; }
  .hero-arrows { display: none; }
}
</style>
<base target="_blank">

<body>

<!-- HEADER -->
<header class="header" id="header">

<script>
/* ===== CONFIG ===== */
const CONFIG = {
  API_BASE: 'https://api.jikan.moe/v4',
  CACHE_TTL: 5 * 60 * 1000, // 5 minutes
  RETRY_ATTEMPTS: 3,
  RETRY_DELAY: 1000,
  REQUEST_TIMEOUT: 8000,
  DEBOUNCE_DELAY: 350,
  HERO_SLIDE_INTERVAL: 6000,
  HERO_SLIDE_COUNT: 10,
  WIDGET_CARD_COUNT: 15,
};

/* ===== UTILITIES ===== */
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));
const sleep = ms => new Promise(r => setTimeout(r, ms));

function debounce(fn, delay) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), delay);
  };
}

function getCache(key) {
  try {
    const item = localStorage.getItem('animestream_' + key);
    if (!item) return null;
    const { data, ts } = JSON.parse(item);
    if (Date.now() - ts > CONFIG.CACHE_TTL) { localStorage.removeItem('animestream_' + key); return null; }
    return data;
  } catch { return null; }
}

function setCache(key, data) {
  try { localStorage.setItem('animestream_' + key, JSON.stringify({ data, ts: Date.now() })); } catch {}
}

async function fetchWithRetry(url, options={}, attempt=1) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    clearTimeout(timeout);
    if (attempt < CONFIG.RETRY_ATTEMPTS) {
      await sleep(CONFIG.RETRY_DELAY * attempt);
      return fetchWithRetry(url, options, attempt + 1);
    }
    throw err;
  }
}

async function fetchJikan(endpoint, params='') {
  const cacheKey = endpoint + params;
  const cached = getCache(cacheKey);
  if (cached) return cached;
  const url = `${CONFIG.API_BASE}${endpoint}${params}`;
  const data = await fetchWithRetry(url);
  setCache(cacheKey, data);
  return data;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',''':'&#39;'}[m]));
}

function getImageUrl(images, fallback='') {
  if (!images) return fallback;
  return images.webp?.large_image_url || images.webp?.image_url || images.jpg?.large_image_url || images.jpg?.image_url || fallback;
}

/* ===== CARD BUILDER ===== */
function buildCard(anime) {
  if (!anime) return '';
  const img = getImageUrl(anime.images);
  const score = anime.score ? anime.score.toFixed(1) : 'N/A';
  const episodes = anime.episodes || '?';
  const type = anime.type || 'TV';
  const status = anime.status || '';
  const year = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '');
  return `<div class="anime-card" onclick="location.href='anime.html?id=${anime.mal_id}'" role="link" tabindex="0">
    <div class="anime-card-img">
      <img src="${escapeHtml(img)}" alt="${escapeHtml(anime.title || 'Anime')}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22150%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2364748b%22 font-size=%2212%22%3ENo Image%3C/text%3E%3C/svg%3E'">
      <div class="anime-card-gradient"></div>
      <div class="anime-card-badges">
        <span class="badge badge-score">${escapeHtml(score)}</span>
        <span class="badge badge-hd">HD</span>
        ${episodes !== '?' ? `<span class="badge badge-ep">EP ${escapeHtml(String(episodes))}</span>` : ''}
        <span class="badge badge-type">${escapeHtml(type)}</span>
      </div>
    </div>
    <div class="anime-card-info">
      <div class="anime-card-title">${escapeHtml(anime.title || 'Unknown')}</div>
      <div class="anime-card-sub">${escapeHtml([status, year].filter(Boolean).join(' • '))}</div>
    </div>
  </div>`;
}

function buildSkeletonCard() {
  return `<div class="anime-card"><div class="anime-card-img skeleton" style="aspect-ratio:2/3"></div><div class="anime-card-info"><div class="skeleton" style="height:14px;margin-bottom:6px;border-radius:4px"></div><div class="skeleton" style="height:10px;width:60%;border-radius:4px"></div></div></div>`;
}

function renderSkeletons(containerId, count=12) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = Array(count).fill(0).map(() => buildSkeletonCard()).join('');
}

function renderError(containerId, msg='Failed to load content') {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `<div class="error-fallback" style="flex:0 0 100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${escapeHtml(msg)}</p></div>`;
}

/* ===== SLIDER SYSTEM ===== */
const sliderState = new Map();

function initSlider(sliderId) {
  const slider = document.getElementById(sliderId);
  if (!slider) return;
  if (sliderState.has(sliderId)) return; // prevent duplicate init

  let isDown = false, startX, scrollLeft;

  slider.addEventListener('mousedown', (e) => {
    isDown = true;
    slider.classList.add('active');
    startX = e.pageX - slider.offsetLeft;
    scrollLeft = slider.scrollLeft;
  });
  slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('active'); });
  slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('active'); });
  slider.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - slider.offsetLeft;
    const walk = (x - startX) * 2;
    slider.scrollLeft = scrollLeft - walk;
  });

  // Touch support
  slider.addEventListener('touchstart', (e) => {
    isDown = true;
    startX = e.touches[0].pageX - slider.offsetLeft;
    scrollLeft = slider.scrollLeft;
  }, { passive: true });
  slider.addEventListener('touchend', () => { isDown = false; });
  slider.addEventListener('touchmove', (e) => {
    if (!isDown) return;
    const x = e.touches[0].pageX - slider.offsetLeft;
    const walk = (x - startX) * 2;
    slider.scrollLeft = scrollLeft - walk;
  }, { passive: true });

  // Wheel scroll
  slider.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      e.preventDefault();
      slider.scrollLeft += e.deltaY;
    }
  }, { passive: false });

  sliderState.set(sliderId, true);
}

function setupSliderArrows() {
  $$('.slider-arrow').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      if (!target) return;
      const card = target.querySelector('.anime-card');
      const scrollAmount = card ? (card.offsetWidth + 16) * 4 : 600;
      target.scrollBy({ left: btn.classList.contains('slider-arrow-prev') ? -scrollAmount : scrollAmount, behavior: 'smooth' });
    });
  });
}

/* ===== HERO SLIDER ===== */
let heroInterval, heroData = [], heroIndex = 0;
let heroTouchStartX = 0;

function renderHero(data) {
  const container = document.getElementById('heroSlides');
  const dots = document.getElementById('heroDots');
  if (!container || !dots) return;

  const items = data.slice(0, CONFIG.HERO_SLIDE_COUNT);
  if (!items.length) {
    container.innerHTML = `<div class="hero-slide active"><div class="hero-bg" style="background:linear-gradient(135deg,var(--primary-dark),var(--bg))"></div><div class="hero-overlay"></div><div class="hero-content"><h1 class="hero-title">Welcome to AnimeStream</h1><p class="hero-synopsis">Discover the best anime series. Trending, top rated, and more.</p></div></div>`;
    return;
  }

  container.innerHTML = items.map((anime, i) => {
    const img = getImageUrl(anime.images);
    const genres = (anime.genres || []).slice(0, 3).map(g => g.name).join(', ');
    const synopsis = anime.synopsis || 'No synopsis available.';
    return `<div class="hero-slide ${i===0?'active':''}" data-index="${i}">
      <div class="hero-bg" style="background-image:url('${escapeHtml(img)}')"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 class="hero-title">${escapeHtml(anime.title || 'Unknown')}</h1>
        <div class="hero-meta">
          <span class="hero-score"><svg width="14" height="14" viewBox="0 0 24 24" fill="#fbbf24" stroke="#fbbf24" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${anime.score ? anime.score.toFixed(1) : 'N/A'}</span>
          ${genres ? `<span class="hero-genre">${escapeHtml(genres)}</span>` : ''}
          <span class="hero-genre">${escapeHtml(anime.type || 'TV')}</span>
        </div>
        <p class="hero-synopsis">${escapeHtml(synopsis.substring(0, 280))}${synopsis.length > 280 ? '...' : ''}</p>
        <div class="hero-buttons">
          <a href="watch.html?id=${anime.mal_id}&ep=1" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Watch Now</a>
          <a href="anime.html?id=${anime.mal_id}" class="btn btn-secondary">Details</a>
        </div>
      </div>
    </div>`;
  }).join('');

  dots.innerHTML = items.map((_, i) => `<button class="hero-dot ${i===0?'active':''}" data-index="${i}" aria-label="Go to slide ${i+1}"></button>`).join('');

  heroData = items;
  heroIndex = 0;
  startHeroAuto();
}

function goToHeroSlide(index) {
  const slides = $$('.hero-slide');
  const dots = $$('.hero-dot');
  if (!slides.length) return;
  slides.forEach((s, i) => s.classList.toggle('active', i === index));
  dots.forEach((d, i) => d.classList.toggle('active', i === index));
  heroIndex = index;
}

function nextHero() { goToHeroSlide((heroIndex + 1) % heroData.length); }
function prevHero() { goToHeroSlide((heroIndex - 1 + heroData.length) % heroData.length); }
function startHeroAuto() {
  clearInterval(heroInterval);
  if (heroData.length > 1) heroInterval = setInterval(nextHero, CONFIG.HERO_SLIDE_INTERVAL);
}

function setupHeroEvents() {
  const hero = document.getElementById('hero');
  if (!hero) return;

  $('#heroPrev')?.addEventListener('click', () => { prevHero(); startHeroAuto(); });
  $('#heroNext')?.addEventListener('click', () => { nextHero(); startHeroAuto(); });

  hero.addEventListener('touchstart', e => { heroTouchStartX = e.touches[0].clientX; }, { passive: true });
  hero.addEventListener('touchend', e => {
    const diff = heroTouchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { diff > 0 ? nextHero() : prevHero(); startHeroAuto(); }
  }, { passive: true });

  document.getElementById('heroDots')?.addEventListener('click', e => {
    if (e.target.classList.contains('hero-dot')) {
      goToHeroSlide(parseInt(e.target.dataset.index));
      startHeroAuto();
    }
  });
}

/* ===== WIDGET LOADER ===== */
async function loadWidget(endpoint, params, sliderId, titleFallback='') {
  renderSkeletons(sliderId, CONFIG.WIDGET_CARD_COUNT);
  try {
    const data = await fetchJikan(endpoint, params);
    const items = data?.data || [];
    const slider = document.getElementById(sliderId);
    if (!slider) return;
    if (!items.length) {
      renderError(sliderId, 'No anime found');
      return;
    }
    slider.innerHTML = items.slice(0, CONFIG.WIDGET_CARD_COUNT).map(buildCard).join('');
    initSlider(sliderId);
  } catch (err) {
    console.error('Widget load error:', err);
    renderError(sliderId, 'Could not load ' + titleFallback);
  }
}

/* ===== SEARCH ===== */
let searchController = null;

async function doSearch(query) {
  const results = document.getElementById('searchResults');
  if (!results) return;
  if (!query.trim()) { results.innerHTML = ''; return; }

  if (searchController) searchController.abort();
  searchController = new AbortController();

  results.innerHTML = `<div class="search-loading"><div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:8px"></div><div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:8px"></div><div class="skeleton" style="height:60px;border-radius:8px"></div></div>`;

  try {
    const data = await fetchWithRetry(`${CONFIG.API_BASE}/anime?q=${encodeURIComponent(query)}&limit=10`, { signal: searchController.signal });
    const items = data?.data || [];
    if (!items.length) {
      results.innerHTML = `<div class="search-empty">No results found for "${escapeHtml(query)}"</div>`;
      return;
    }
    results.innerHTML = items.map(anime => {
      const img = getImageUrl(anime.images);
      const meta = [anime.type, anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '', anime.score ? `Score: ${anime.score}` : ''].filter(Boolean).join(' • ');
      return `<div class="search-suggestion" onclick="location.href='anime.html?id=${anime.mal_id}'">
        <img src="${escapeHtml(img)}" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="search-suggestion-info">
          <div class="search-suggestion-title">${escapeHtml(anime.title)}</div>
          <div class="search-suggestion-meta">${escapeHtml(meta)}</div>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    if (err.name !== 'AbortError') {
      results.innerHTML = `<div class="search-empty">Search failed. Please try again.</div>`;
    }
  }
}

const debouncedSearch = debounce(doSearch, CONFIG.DEBOUNCE_DELAY);

function setupSearch() {
  const overlay = document.getElementById('searchOverlay');
  const input = document.getElementById('searchInput');
  const btn = document.getElementById('searchBtn');
  const close = document.getElementById('searchClose');

  if (!overlay || !input || !btn) return;

  const open = () => {
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    setTimeout(() => input.focus(), 100);
  };
  const closeFn = () => {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    input.value = '';
    document.getElementById('searchResults').innerHTML = '';
  };

  btn.addEventListener('click', open);
  close?.addEventListener('click', closeFn);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeFn(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('active')) closeFn();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); open(); }
  });
  input.addEventListener('input', e => debouncedSearch(e.target.value));
}

/* ===== SIDEBAR ===== */
function setupSidebar() {
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (!menuBtn || !sidebar || !overlay) return;

  const open = () => { sidebar.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; };
  const close = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; };

  menuBtn.addEventListener('click', open);
  overlay.addEventListener('click', close);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
}

/* ===== INIT ===== */
async function init() {
  setupSidebar();
  setupSearch();
  setupSliderArrows();
  setupHeroEvents();

  // Load hero
  try {
    const trending = await fetchJikan('/top/anime', '?filter=airing&limit=15');
    renderHero(trending?.data || []);
  } catch (e) {
    console.error('Hero error:', e);
    renderHero([]);
  }

  // Load widgets in parallel
  const widgets = [
    { ep: '/top/anime', params: '?filter=airing&limit=15', id: 'recentlyUpdatedSlider', fallback: 'Recently Updated' },
    { ep: '/top/anime', params: '?filter=bypopularity&limit=15', id: 'trendingNowSlider', fallback: 'Trending Now' },
    { ep: '/top/anime', params: '?limit=15', id: 'topRatedSlider', fallback: 'Top Rated' },
    { ep: '/top/anime', params: '?filter=airing&limit=15', id: 'topAiringSlider', fallback: 'Top Airing' },
    { ep: '/top/anime', params: '?filter=upcoming&limit=15', id: 'upcomingSlider', fallback: 'Upcoming' },
    { ep: '/top/anime', params: '?filter=completed&limit=15', id: 'completedSlider', fallback: 'Completed' },
  ];

  await Promise.allSettled(widgets.map(w => loadWidget(w.ep, w.params, w.id, w.fallback)));
}

// Prevent duplicate init
document.addEventListener('DOMContentLoaded', init, { once: true });

// Reinit on resize safely
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    sliderState.clear();
    $$('.slider').forEach(s => initSlider(s.id));
  }, 300);
});
</script>
