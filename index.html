<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnimeHub - Premium Anime Streaming Platform. Watch thousands of anime with high quality video streaming.">
    <meta name="keywords" content="anime, streaming, watch anime, anime series, manga">
    <meta property="og:title" content="AnimeHub - Premium Anime Streaming">
    <meta property="og:description" content="Watch your favorite anime with premium quality streaming">
    <meta property="og:type" content="website">
    <title>AnimeHub - Premium Anime Streaming Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0a0e27;
            --secondary-bg: #1a1f3a;
            --tertiary-bg: #252d47;
            --primary-color: #7c3aed;
            --secondary-color: #a855f7;
            --accent-color: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #b0b3c1;
            --border-color: #2d3748;
            --success-color: #10b981;
            --error-color: #ef4444;
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ==================== HEADER & NAVIGATION ==================== */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95) 0%, rgba(26, 31, 58, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .header-container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 0 clamp(1rem, 5vw, 3rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: all var(--transition-normal);
            white-space: nowrap;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .search-container {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all var(--transition-fast);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 2.5px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all var(--transition-fast);
        }

        .sidebar {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--secondary-bg);
            border-right: 1px solid var(--border-color);
            z-index: 999;
            overflow-y: auto;
            padding-top: 4rem;
        }

        .sidebar.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .sidebar-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .sidebar nav a {
            padding: 1rem 1.5rem;
            color: var(--text-primary);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all var(--transition-fast);
        }

        .sidebar nav a:hover {
            background: var(--tertiary-bg);
            border-left-color: var(--primary-color);
            color: var(--primary-color);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }

        .overlay.active {
            display: block;
        }

        /* ==================== HERO SLIDER ==================== */
        .hero-section {
            position: relative;
            height: clamp(300px, 60vh, 600px);
            margin-top: 4rem;
            overflow: hidden;
            border-radius: 12px;
        }

        .hero-slider {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        .hero-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity var(--transition-slow);
        }

        .hero-slide.active {
            opacity: 1;
        }

        .hero-slide-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.5) contrast(1.1);
        }

        .hero-slide-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: clamp(2rem, 5vw, 4rem);
            background: linear-gradient(180deg, transparent 0%, rgba(10, 14, 39, 0.9) 100%);
        }

        .hero-title {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            animation: slideUp 0.6s ease;
        }

        .hero-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .hero-score {
            background: var(--success-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .hero-badge {
            background: var(--primary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .hero-synopsis {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 1.5rem;
            max-width: 500px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: clamp(0.7rem, 2vw, 1rem) clamp(1.5rem, 3vw, 2.5rem);
            border: none;
            border-radius: 8px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background: var(--primary-color);
            transform: translateY(-2px);
        }

        .hero-controls {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 5;
        }

        .hero-arrow {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(124, 58, 237, 0.8);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .hero-arrow:hover {
            background: var(--primary-color);
            transform: scale(1.1);
        }

        .hero-dots {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 5;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .dot.active {
            background: var(--primary-color);
            width: 30px;
            border-radius: 5px;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ==================== WIDGETS/SLIDERS ==================== */
        .widgets-section {
            max-width: 1920px;
            margin: 0 auto;
            padding: clamp(2rem, 5vw, 4rem);
            display: flex;
            flex-direction: column;
            gap: clamp(3rem, 5vw, 5rem);
        }

        .widget {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .widget-title {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .slider-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .slider {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 0.5rem 0;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .slider::-webkit-scrollbar {
            height: 6px;
        }

        .slider::-webkit-scrollbar-track {
            background: var(--secondary-bg);
            border-radius: 10px;
        }

        .slider::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        .slider::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-color);
        }

        .anime-card {
            flex: 0 0 calc(100% / 6 - 1.25rem);
            scroll-snap-align: start;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all var(--transition-normal);
            group: anime-card;
        }

        @media (max-width: 1800px) {
            .anime-card {
                flex: 0 0 calc(100% / 5 - 1.2rem);
            }
        }

        @media (max-width: 1400px) {
            .anime-card {
                flex: 0 0 calc(100% / 4 - 1.2rem);
            }
        }

        @media (max-width: 1024px) {
            .anime-card {
                flex: 0 0 calc(100% / 3 - 1.2rem);
            }
        }

        @media (max-width: 768px) {
            .anime-card {
                flex: 0 0 calc(100% / 2.5 - 1rem);
            }
        }

        @media (max-width: 480px) {
            .anime-card {
                flex: 0 0 calc(100% / 2 - 0.75rem);
            }
        }

        .anime-card-image {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: var(--secondary-bg);
            transition: all var(--transition-normal);
        }

        .anime-card:hover .anime-card-image {
            transform: scale(1.08);
        }

        .anime-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.8), rgba(168, 85, 247, 0.6));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            opacity: 0;
            transition: opacity var(--transition-normal);
            border-radius: 12px;
        }

        .anime-card:hover .anime-card-overlay {
            opacity: 1;
        }

        .anime-card-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .anime-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .anime-card-score {
            background: var(--success-color);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-weight: 600;
        }

        .anime-card-type {
            background: var(--primary-color);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .anime-card-btn {
            width: 100%;
            padding: 0.7rem;
            background: white;
            color: var(--primary-color);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .anime-card-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
            transition: all var(--transition-fast);
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-container:hover .slider-arrow {
            opacity: 1;
        }

        .slider-arrow:hover {
            background: var(--secondary-color);
            transform: translateY(-50%) scale(1.1);
        }

        .slider-arrow.prev {
            left: 1rem;
        }

        .slider-arrow.next {
            right: 1rem;
        }

        /* ==================== SKELETON LOADING ==================== */
        .skeleton {
            background: linear-gradient(90deg, var(--secondary-bg) 0%, var(--tertiary-bg) 50%, var(--secondary-bg) 100%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .skeleton-card {
            flex: 0 0 calc(100% / 5 - 1.2rem);
            aspect-ratio: 2/3;
            border-radius: 12px;
        }

        .loading-container {
            display: flex;
            gap: 1.5rem;
            overflow: hidden;
        }

        /* ==================== FOOTER ==================== */
        footer {
            background: var(--secondary-bg);
            border-top: 1px solid var(--border-color);
            padding: clamp(2rem, 5vw, 3rem);
            text-align: center;
        }

        .footer-content {
            max-width: 1920px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .footer-socials {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .footer-socials a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--tertiary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            text-decoration: none;
            transition: all var(--transition-fast);
            border: 1px solid var(--primary-color);
        }

        .footer-socials a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
        }

        /* ==================== RESPONSIVE DESIGN ==================== */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .search-container {
                max-width: none;
            }

            .hero-controls {
                bottom: 1rem;
                right: 1rem;
            }

            .hero-arrow {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .slider-arrow {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .anime-card-overlay {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            .header-container {
                gap: 1rem;
            }

            .nav-right {
                gap: 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .hero-section {
                height: clamp(250px, 50vh, 400px);
                margin-top: 3.5rem;
            }

            .hero-controls {
                gap: 0.5rem;
            }

            .hero-buttons {
                gap: 0.75rem;
            }

            .btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.85rem;
            }

            .widgets-section {
                padding: 1.5rem;
                gap: 2.5rem;
            }

            .widget-title {
                font-size: 1.3rem;
            }

            .slider {
                gap: 1rem;
            }

            .slider-arrow {
                opacity: 0;
                pointer-events: none;
            }

            footer {
                padding: 1.5rem;
            }
        }

        /* ==================== ERROR STATE ==================== */
        .error-message {
            background: var(--error-color);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ==================== UTILITY CLASSES ==================== */
        .hidden {
            display: none !important;
        }

        .overflow-hidden {
            overflow: hidden !important;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

                <input type="text" class="search-input" id="searchInput" placeholder="Search anime...">
            </div>

                <button class="icon-btn" onclick="toggleSearch()">🔍</button>

    <!-- SIDEBAR NAVIGATION -->
    <div class="overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="anime.html">📺 Anime List</a>
            <a href="search.html">🔍 Search</a>
            <a href="schedule.html">📅 Schedule</a>

                <a href="#" title="GitHub">🐙</a>

                <a href="#" title="Discord">💬</a>
            </div>
        </div>

    <script>
        // ==================== CONFIGURATION ==================== //
        const CONFIG = {
            API_BASE: 'https://api.jikan.moe/v4',
            CACHE_DURATION: 3600000, // 1 hour
            REQUEST_TIMEOUT: 8000,
            RETRY_ATTEMPTS: 3,
            RETRY_DELAY: 1000,
        };

        // ==================== CACHE SYSTEM ==================== //
        const CacheManager = {
            set(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify({
                        data,
                        timestamp: Date.now()
                    }));
                } catch (e) {
                    console.warn('Cache set failed:', e);
                }
            },

            get(key) {
                try {
                    const item = localStorage.getItem(key);
                    if (!item) return null;
                    
                    const { data, timestamp } = JSON.parse(item);
                    if (Date.now() - timestamp > CONFIG.CACHE_DURATION) {
                        localStorage.removeItem(key);
                        return null;
                    }
                    return data;
                } catch (e) {
                    console.warn('Cache get failed:', e);
                    return null;
                }
            },

            clear() {
                try {
                    localStorage.clear();
                } catch (e) {
                    console.warn('Cache clear failed:', e);
                }
            }
        };

        // ==================== FETCH SYSTEM ==================== //
        async function fetchWithRetry(url, options = {}) {
            const maxRetries = options.retries || CONFIG.RETRY_ATTEMPTS;
            let lastError;

            for (let attempt = 0; attempt < maxRetries; attempt++) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT);

                    const response = await fetch(url, {
                        ...options,
                        signal: controller.signal
                    });

                    clearTimeout(timeout);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    return data;
                } catch (error) {
                    lastError = error;
                    if (attempt < maxRetries - 1) {
                        await new Promise(r => setTimeout(r, CONFIG.RETRY_DELAY * (attempt + 1)));
                    }
                }
            }

            throw lastError || new Error('Max retries exceeded');
        }

        // ==================== API FUNCTIONS ==================== //
        const AnimeAPI = {
            async getTrending() {
                const cacheKey = 'trending_anime';
                const cached = CacheManager.get(cacheKey);

        // ==================== UI COMPONENTS ==================== //
        function createAnimeCard(anime) {
            if (!anime || !anime.mal_id) return '';

            const score = anime.score ? anime.score.toFixed(1) : 'N/A';
            const type = anime.type || 'Unknown';
            const imageUrl = anime.images?.jpg?.image_url || 'https://via.placeholder.com/200x300?text=No+Image';

            return `
                <div class="anime-card" onclick="goToAnime(${anime.mal_id})">
                    <img class="anime-card-image" src="${imageUrl}" alt="${anime.title}" loading="lazy">
                    <div class="anime-card-overlay">
                        <div class="anime-card-title">${anime.title || 'Unknown'}</div>
                        <div class="anime-card-meta">
                            <span class="anime-card-score">⭐ ${score}</span>
                            <span class="anime-card-type">${type}</span>
                        </div>
                        <button class="anime-card-btn">Watch Now</button>
                    </div>
                </div>
            `;
        }

        function createSkeletonCard() {
            return `<div class="anime-card skeleton skeleton-card"></div>`;
        }

        // ==================== SLIDER SYSTEM ==================== //
        class SliderManager {
            constructor(containerId, isHero = false) {
                this.container = document.getElementById(containerId);
                this.isHero = isHero;
                this.currentIndex = 0;
                this.autoPlayInterval = null;
                this.isInitialized = false;
                this.touchStartX = 0;
                this.touchEndX = 0;
            }

            async init() {
                if (this.isInitialized) return;
                
                await this.wait(100);
                
                if (!this.container) {
                    console.warn(`Container ${this.container} not found`);
                    return;
                }

                this.attachEventListeners();
                this.isInitialized = true;

                if (this.isHero) {
                    this.autoPlay();
                }
            }

            wait(ms) {
                return new Promise(r => setTimeout(r, ms));
            }

            attachEventListeners() {
                const slider = this.container.querySelector('.slider') || this.container;
                if (!slider) return;

                slider.addEventListener('touchstart', (e) => this.handleTouchStart(e), false);
                slider.addEventListener('touchend', (e) => this.handleTouchEnd(e), false);
                slider.addEventListener('wheel', (e) => this.handleWheel(e), { passive: true });
            }

            handleTouchStart(e) {
                this.touchStartX = e.changedTouches[0].screenX;
            }

            handleTouchEnd(e) {
                this.touchEndX = e.changedTouches[0].screenX;
                this.handleSwipe();
            }

            handleSwipe() {
                if (Math.abs(this.touchStartX - this.touchEndX) < 50) return;

                if (this.touchStartX > this.touchEndX) {
                    this.next();
                } else {
                    this.prev();
                }
            }

            handleWheel(e) {
                const slider = this.container.querySelector('.slider') || this.container;
                if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) return;

                if (e.deltaX > 0) {
                    this.next();
                } else {
                    this.prev();
                }
            }

            next() {
                const slider = this.container.querySelector('.slider') || this.container;
                if (!slider) return;

                if (this.isHero) {
                    this.currentIndex = (this.currentIndex + 1) % this.getTotalSlides();
                    this.showHeroSlide();
                } else {
                    const cardWidth = slider.querySelector('.anime-card')?.offsetWidth || 200;
                    const gap = 24;
                    slider.scrollBy({ left: cardWidth + gap, behavior: 'smooth' });
                }
            }

            prev() {
                const slider = this.container.querySelector('.slider') || this.container;
                if (!slider) return;

                if (this.isHero) {
                    this.currentIndex = (this.currentIndex - 1 + this.getTotalSlides()) % this.getTotalSlides();
                    this.showHeroSlide();
                } else {
                    const cardWidth = slider.querySelector('.anime-card')?.offsetWidth || 200;
                    const gap = 24;
                    slider.scrollBy({ left: -(cardWidth + gap), behavior: 'smooth' });
                }
            }

            getTotalSlides() {
                return this.container.querySelectorAll('.hero-slide').length || 0;
            }

            showHeroSlide() {
                const slides = this.container.querySelectorAll('.hero-slide');
                const dots = document.querySelectorAll('.dot');

                slides.forEach((slide, index) => {
                    slide.classList.toggle('active', index === this.currentIndex);
                });

                dots.forEach((dot, index) => {
                    dot.classList.toggle('active', index === this.currentIndex);
                });
            }

            autoPlay() {
                if (this.autoPlayInterval) clearInterval(this.autoPlayInterval);
                
                this.autoPlayInterval = setInterval(() => {
                    this.next();
                }, 6000);
            }

            stopAutoPlay() {
                if (this.autoPlayInterval) {
                    clearInterval(this.autoPlayInterval);
                    this.autoPlayInterval = null;
                }
            }

            destroy() {
                this.stopAutoPlay();
                this.isInitialized = false;
            }
        }

        const heroSlider = new SliderManager('heroSlider', true);

        // ==================== PAGE INITIALIZATION ==================== //
        async function initHomePage() {
            try {
                await renderHeroSlider();
                await renderWidgets();
            } catch (error) {
                console.error('Home page init failed:', error);
            }
        }

        async function renderHeroSlider() {
            const container = document.getElementById('heroSlider');
            const dotsContainer = document.getElementById('heroDots');

            if (!container || !dotsContainer) return;

            container.innerHTML = Array(5).fill(0).map(() => createSkeletonCard()).join('');

            try {
                const trendingAnime = await AnimeAPI.getTrending();
                const heroAnime = trendingAnime.slice(0, 10);

                if (heroAnime.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1/-1; padding: 2rem; text-align: center; color: var(--text-secondary);">No anime data available</div>';
                    return;
                }

                container.innerHTML = heroAnime.map((anime, index) => {
                    const imageUrl = anime.images?.jpg?.image_url || 'https://via.placeholder.com/1920x600?text=No+Image';
                    const score = anime.score ? anime.score.toFixed(1) : 'N/A';

                    return `
                        <div class="hero-slide ${index === 0 ? 'active' : ''}">
                            <div class="hero-slide-bg" style="background-image: url('${imageUrl}')"></div>
                            <div class="hero-slide-content">
                                <h1 class="hero-title">${anime.title || 'Unknown'}</h1>
                                <div class="hero-meta">
                                    <div class="hero-score">⭐ ${score}</div>
                                    <div class="hero-badge">${anime.type || 'N/A'}</div>
                                    <div class="hero-badge">${anime.status || 'N/A'}</div>
                                </div>
                                <p class="hero-synopsis">${anime.synopsis || 'No synopsis available'}</p>
                                <div class="hero-buttons">
                                    <button class="btn btn-primary" onclick="goToWatch(${anime.mal_id})">▶ Watch Now</button>
                                    <button class="btn btn-secondary" onclick="goToAnime(${anime.mal_id})">📖 Details</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                dotsContainer.innerHTML = heroAnime.map((_, index) => 
                    `<div class="dot ${index === 0 ? 'active' : ''}" onclick="heroSlider.currentIndex=${index}; heroSlider.showHeroSlide()"></div>`
                ).join('');

                await heroSlider.init();
            } catch (error) {
                console.error('Hero slider render failed:', error);
                container.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-secondary);">Failed to load hero slider</div>';
            }
        }

        async function renderWidgets() {
            const section = document.getElementById('widgetsSection');
            if (!section) return;

            const widgets = [
                { title: 'Trending Now', apiFunc: AnimeAPI.getTrending },
                { title: 'Top Rated', apiFunc: AnimeAPI.getTopRated },
                { title: 'Top Airing', apiFunc: AnimeAPI.getTopAiring },
                { title: 'Upcoming', apiFunc: AnimeAPI.getUpcoming },
                { title: 'Completed', apiFunc: AnimeAPI.getCompleted }
            ];

            section.innerHTML = widgets.map((widget, idx) => `
                <div class="widget" id="widget-${idx}">
                    <h2 class="widget-title">${widget.title}</h2>
                    <div class="slider-container">
                        <div class="slider" id="slider-${idx}">
                            ${Array(6).fill(0).map(() => createSkeletonCard()).join('')}
                        </div>
                        <button class="slider-arrow prev" onclick="sliderManagers[${idx}].prev()">❮</button>
                        <button class="slider-arrow next" onclick="sliderManagers[${idx}].next()">❯</button>
                    </div>
                </div>
            `).join('');

            const sliderManagers = [];

            for (let i = 0; i < widgets.length; i++) {
                const manager = new SliderManager(`slider-${i}`, false);
                sliderManagers.push(manager);

                try {
                    const animeData = await widgets[i].apiFunc();
                    const sliderElement = document.getElementById(`slider-${i}`);

                    if (sliderElement && animeData && animeData.length > 0) {
                        sliderElement.innerHTML = animeData.slice(0, 20).map(anime => createAnimeCard(anime)).join('');
                        await manager.init();
                    } else if (sliderElement) {
                        sliderElement.innerHTML = '<div style="padding: 2rem; color: var(--text-secondary);">No anime available</div>';
                    }
                } catch (error) {
                    console.error(`Widget ${i} render failed:`, error);
                    const sliderElement = document.getElementById(`slider-${i}`);
                    if (sliderElement) {
                        sliderElement.innerHTML = '<div style="padding: 2rem; color: var(--text-secondary);">Failed to load anime</div>';
                    }
                }
            }

            window.sliderManagers = sliderManagers;
        }

        // ==================== NAVIGATION ==================== //
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');

            if (sidebar.classList.contains('active')) {
                document.body.classList.add('overflow-hidden');
            } else {
                document.body.classList.remove('overflow-hidden');
            }
        }

        function toggleSearch() {
            const input = document.getElementById('searchInput');
            input.focus();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen request failed:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function goToAnime(id) {
            window.location.href = `anime.html?id=${id}`;
        }

        function goToWatch(id) {
            window.location.href = `watch.html?id=${id}&ep=1`;
        }

        document.getElementById('hamburger')?.addEventListener('click', toggleSidebar);
        document.getElementById('overlay')?.addEventListener('click', toggleSidebar);

        // ==================== INITIALIZE ==================== //
        document.addEventListener('DOMContentLoaded', initHomePage);
    </script>
