<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="AniVerse - Premium Anime Streaming Platform. Watch the latest anime online in HD.">
<meta property="og:title" content="AniVerse - Watch Anime Online">
<meta property="og:description" content="Stream the latest and greatest anime in HD quality.">
<meta property="og:type" content="website">
<title>AniVerse - Premium Anime Streaming</title>
<style>
/* ============================================
   ANIVERSE - PREMIUM ANIME STREAMING
   Global Styles + Home Page
   ============================================ */

:root {
  --bg-primary: #060610;
  --bg-secondary: #0d0d20;
  --bg-card: #111128;
  --bg-card-hover: #16163a;
  --accent: #7c3aed;
  --accent-bright: #9d5bff;
  --accent-glow: rgba(124, 58, 237, 0.4);
  --accent-secondary: #e040fb;
  --text-primary: #f0f0ff;
  --text-secondary: #9090c0;
  --text-muted: #5050a0;
  --border: rgba(124, 58, 237, 0.2);
  --border-bright: rgba(124, 58, 237, 0.5);
  --gradient-hero: linear-gradient(135deg, #060610 0%, #100f2e 50%, #1a0a2e 100%);
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.06);
  --header-h: 64px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-card: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px var(--accent-glow);
  --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  overflow-x: hidden;
  max-width: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-display);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  max-width: 100%;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; outline: none; background: none; font-family: inherit; }

/* ============================================
   SCROLLBAR
   ============================================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

/* ============================================
   HEADER
   ============================================ */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 clamp(12px, 3vw, 24px);
  gap: 12px;
  background: rgba(6, 6, 16, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
  max-width: 100%;
  overflow: visible;
}

#header.scrolled {
  background: rgba(6, 6, 16, 0.98);
  box-shadow: 0 2px 20px rgba(0,0,0,0.6);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 8px;
  border-radius: 8px;
  transition: background 0.2s;
  flex-shrink: 0;
}
.hamburger:hover { background: var(--glass-border); }
.hamburger span {
  display: block;
  width: 22px; height: 2px;
  background: var(--text-primary);
  border-radius: 2px;
  transition: 0.3s;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: clamp(16px, 2.5vw, 22px);
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text-primary);
  white-space: nowrap;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.logo span { color: var(--accent-bright); }

.header-nav {
  display: flex;
  align-items: center;
  gap: clamp(4px, 1.5vw, 20px);
  margin-left: clamp(8px, 2vw, 24px);
}
.header-nav a {
  font-size: clamp(12px, 1.2vw, 14px);
  color: var(--text-secondary);
  font-weight: 500;
  padding: 4px 8px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
  white-space: nowrap;
}
.header-nav a:hover, .header-nav a.active {
  color: var(--text-primary);
  background: var(--glass-border);
}

@media (max-width: 768px) {
  .header-nav { display: none; }
}

.header-spacer { flex: 1; }

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.icon-btn {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 18px;
  transition: all 0.2s;
  flex-shrink: 0;
  min-width: 40px;
}
.icon-btn:hover {
  color: var(--text-primary);
  background: var(--glass-border);
}

/* ============================================
   SEARCH OVERLAY - FULLY RESPONSIVE
   ============================================ */
#search-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(6, 6, 16, 0.95);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(60px, 10vh, 100px) clamp(12px, 5vw, 40px) 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  overflow-y: auto;
  overflow-x: hidden;
  max-width: 100vw;
  max-height: 100vh;
}
#search-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.search-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--glass-border);
  color: var(--text-secondary);
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  min-width: 44px; /* touch target */
}
.search-close:hover {
  color: var(--text-primary);
  background: var(--accent);
}

.search-box-wrap {
  width: 100%;
  max-width: min(700px, calc(100vw - 24px));
  position: relative;
  margin-bottom: 24px;
}

.search-input-main {
  width: 100%;
  max-width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid var(--border-bright);
  border-radius: 16px;
  padding: clamp(12px, 2vw, 18px) clamp(16px, 3vw, 24px);
  padding-right: 56px;
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-primary);
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-sizing: border-box;
}
.search-input-main:focus {
  border-color: var(--accent-bright);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-input-main::placeholder { color: var(--text-muted); }

.search-go-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.search-go-btn:hover { background: var(--accent-bright); }

#search-suggestions {
  width: 100%;
  max-width: min(700px, calc(100vw - 24px));
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(160px, 45vw), 1fr));
  gap: 12px;
  max-height: 60vh;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 4px;
}

.sugg-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: all 0.2s;
}
.sugg-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow-glow);
}
.sugg-card img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
}
.sugg-info {
  padding: 8px;
}
.sugg-title {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-primary);
}
.sugg-score {
  font-size: 11px;
  color: var(--accent-bright);
  margin-top: 2px;
}

/* ============================================
   MOBILE SIDEBAR
   ============================================ */
#sidebar {
  position: fixed;
  top: 0; left: -280px;
  width: min(280px, 85vw);
  height: 100%;
  z-index: 1500;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  transition: left 0.35s cubic-bezier(0.4,0,0.2,1);
  padding: 80px 20px 20px;
  overflow-y: auto;
  overflow-x: hidden;
}
#sidebar.open { left: 0; }

#sidebar-overlay {
  position: fixed;
  inset: 0;
  z-index: 1400;
  background: rgba(0,0,0,0.6);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
#sidebar-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 15px;
  font-weight: 500;
  transition: all 0.2s;
}
.sidebar-nav a:hover {
  color: var(--text-primary);
  background: var(--glass-border);
}
.sidebar-nav a .nav-icon { font-size: 18px; width: 24px; text-align: center; }

/* ============================================
   SKELETON LOADING
   ============================================ */
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius);
}

/* ============================================
   HERO SLIDER
   ============================================ */
#hero {
  position: relative;
  width: 100%;
  max-width: 100%;
  height: clamp(480px, 75vh, 780px);
  overflow: hidden;
  margin-top: var(--header-h);
}

.hero-slides {
  display: flex;
  width: 100%;
  height: 100%;
  transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
}

.hero-slide {
  min-width: 100%;
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.hero-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  transition: transform 0.7s ease;
}
.hero-slide.active .hero-bg { transform: scale(1.03); }

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(6,6,16,0.95) 0%,
    rgba(6,6,16,0.75) 40%,
    rgba(6,6,16,0.2) 70%,
    rgba(6,6,16,0.05) 100%
  ),
  linear-gradient(
    to top,
    rgba(6,6,16,0.9) 0%,
    transparent 50%
  );
}

.hero-content {
  position: absolute;
  left: clamp(20px, 5vw, 80px);
  bottom: clamp(60px, 8vh, 100px);
  max-width: min(560px, calc(100% - 40px));
  z-index: 2;
}

.hero-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.badge-score {
  background: rgba(250, 200, 0, 0.15);
  color: #fac800;
  border: 1px solid rgba(250, 200, 0, 0.3);
}
.badge-type {
  background: rgba(124, 58, 237, 0.2);
  color: var(--accent-bright);
  border: 1px solid var(--border-bright);
}
.badge-genre {
  background: var(--glass-border);
  color: var(--text-secondary);
  border: 1px solid var(--glass-border);
}

.hero-title {
  font-size: clamp(22px, 4.5vw, 52px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  word-break: break-word;
}

.hero-synopsis {
  font-size: clamp(13px, 1.5vw, 15px);
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 24px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.btn-watch {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: clamp(10px, 1.5vw, 14px) clamp(20px, 3vw, 32px);
  background: linear-gradient(135deg, var(--accent), #5b1fd4);
  border-radius: 50px;
  font-size: clamp(13px, 1.3vw, 15px);
  font-weight: 700;
  color: white;
  transition: all 0.3s;
  box-shadow: 0 4px 20px var(--accent-glow);
  white-space: nowrap;
}
.btn-watch:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

.btn-details {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: clamp(10px, 1.5vw, 14px) clamp(20px, 3vw, 32px);
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  font-size: clamp(13px, 1.3vw, 15px);
  font-weight: 600;
  color: var(--text-primary);
  transition: all 0.3s;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
.btn-details:hover {
  background: rgba(255,255,255,0.12);
  border-color: var(--accent);
  box-shadow: var(--shadow-glow);
}

.hero-dots {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 3;
}
.hero-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 0.3s;
}
.hero-dot.active {
  width: 24px;
  border-radius: 4px;
  background: var(--accent-bright);
}

.hero-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: clamp(36px, 5vw, 48px);
  height: clamp(36px, 5vw, 48px);
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-primary);
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.hero-arrow:hover {
  background: var(--accent);
  border-color: var(--accent);
}
.hero-arrow.prev { left: clamp(10px, 2vw, 24px); }
.hero-arrow.next { right: clamp(10px, 2vw, 24px); }

/* Hero skeleton */
.hero-skeleton {
  width: 100%;
  height: 100%;
  background: var(--bg-secondary);
  animation: shimmer 2s infinite;
  background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-card) 50%, var(--bg-secondary) 75%);
  background-size: 800px 100%;
}

/* ============================================
   MAIN CONTENT
   ============================================ */
main {
  max-width: 100%;
  overflow-x: hidden;
  padding-bottom: 60px;
}

/* ============================================
   SECTION / WIDGET
   ============================================ */
.section {
  padding: clamp(24px, 4vw, 48px) clamp(16px, 3vw, 32px);
  max-width: 100%;
  overflow: hidden;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}

.section-title {
  font-size: clamp(16px, 2.5vw, 22px);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.section-title::before {
  content: '';
  display: block;
  width: 4px;
  height: 20px;
  background: linear-gradient(to bottom, var(--accent), var(--accent-secondary));
  border-radius: 2px;
  flex-shrink: 0;
}

.section-more {
  font-size: 13px;
  color: var(--accent-bright);
  font-weight: 500;
  white-space: nowrap;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-bright);
  transition: all 0.2s;
  flex-shrink: 0;
}
.section-more:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* ============================================
   SLIDER CONTAINER
   ============================================ */
.slider-wrap {
  position: relative;
  max-width: 100%;
  overflow: hidden;
}

.slider-track {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
  cursor: grab;
  user-select: none;
  max-width: 100%;
}
.slider-track::-webkit-scrollbar { display: none; }
.slider-track.dragging { cursor: grabbing; scroll-behavior: auto; }

.slider-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(13, 13, 32, 0.9);
  border: 1px solid var(--border-bright);
  color: var(--text-primary);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  pointer-events: all;
}
.slider-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: var(--shadow-glow);
}
.slider-btn.left { left: 0; }
.slider-btn.right { right: 0; }
.slider-btn.hidden { opacity: 0; pointer-events: none; }

/* ============================================
   ANIME CARD
   ============================================ */
.anime-card {
  flex: 0 0 clamp(130px, 15vw, 180px);
  width: clamp(130px, 15vw, 180px);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  max-width: 180px;
}
.anime-card:hover {
  transform: translateY(-6px) scale(1.02);
  border-color: var(--accent);
  box-shadow: var(--shadow-glow), var(--shadow-card);
}

.card-poster {
  position: relative;
  aspect-ratio: 3/4;
  overflow: hidden;
  background: var(--bg-secondary);
}
.card-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}
.anime-card:hover .card-poster img { transform: scale(1.07); }

.card-poster-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(6,6,16,0.95) 0%, rgba(6,6,16,0) 50%);
  opacity: 0;
  transition: opacity 0.3s;
}
.anime-card:hover .card-poster-overlay { opacity: 1; }

.card-play-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(124, 58, 237, 0.85);
  color: white;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all 0.3s;
  backdrop-filter: blur(4px);
}
.anime-card:hover .card-play-btn {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.card-badges {
  position: absolute;
  top: 8px; left: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card-badge {
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  max-width: 60px;
  text-overflow: ellipsis;
  overflow: hidden;
  white-space: nowrap;
}
.cb-score {
  background: rgba(250,200,0,0.9);
  color: #1a1a00;
}
.cb-ep {
  background: rgba(124,58,237,0.9);
  color: white;
}
.cb-hd {
  background: rgba(64,224,208,0.9);
  color: #002020;
}
.cb-type {
  background: rgba(240,64,251,0.85);
  color: white;
}

.card-info {
  padding: 10px 10px 12px;
}
.card-title {
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 600;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--text-primary);

/* Card skeleton */

<script>
/* ============================================
   ANIVERSE - HOME PAGE JAVASCRIPT
   Production-ready with full error handling
   ============================================ */

'use strict';

/* ─────────────────────────────────────────────
   CONFIG & CONSTANTS
   ───────────────────────────────────────────── */
const API_BASE = 'https://api.jikan.moe/v4';
const CACHE_TTL = 10 * 60 * 1000; // 10 min
const FETCH_TIMEOUT = 12000;
const MAX_RETRIES = 2;
const RETRY_DELAY = 1500;
const SLIDE_INTERVAL = 5500;

/* ─────────────────────────────────────────────
   CACHE SYSTEM (localStorage)
   ───────────────────────────────────────────── */
const Cache = {
  get(key) {
    try {
      const raw = localStorage.getItem('av_' + key);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem('av_' + key); return null; }
      return data;
    } catch { return null; }
  },
  set(key, data) {
    try { localStorage.setItem('av_' + key, JSON.stringify({ ts: Date.now(), data })); } catch {}
  }
};

/* ─────────────────────────────────────────────
   FETCH UTILITY — retry + timeout + cache
   ───────────────────────────────────────────── */
async function apiFetch(endpoint, cacheKey) {
  if (cacheKey) {
    const cached = Cache.get(cacheKey);
    if (cached) return cached;
  }

  let lastErr;
  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, RETRY_DELAY * attempt));
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT);
      const res = await fetch(API_BASE + endpoint, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const result = json?.data ?? null;
      if (result !== null && cacheKey) Cache.set(cacheKey, result);
      return result;
    } catch (e) {
      lastErr = e;
    }
  }
  console.warn('API failed:', endpoint, lastErr?.message);
  return null;
}

/* ─────────────────────────────────────────────
   RATE-LIMITED API QUEUE
   (Jikan has 3 req/sec limit)
   ───────────────────────────────────────────── */
const apiQueue = {
  queue: [],
  running: false,
  delay: 400,
  add(fn) {
    return new Promise((resolve, reject) => {
      this.queue.push({ fn, resolve, reject });
      if (!this.running) this.run();
    });
  },
  async run() {
    this.running = true;
    while (this.queue.length > 0) {
      const { fn, resolve, reject } = this.queue.shift();
      try { resolve(await fn()); } catch (e) { reject(e); }
      await new Promise(r => setTimeout(r, this.delay));
    }
    this.running = false;
  }
};

function queueFetch(endpoint, cacheKey) {
  return apiQueue.add(() => apiFetch(endpoint, cacheKey));
}

/* ─────────────────────────────────────────────
   SKELETON CARDS
   ───────────────────────────────────────────── */
function renderSkeletons(trackEl, count = 10) {
  if (!trackEl) return;
  trackEl.innerHTML = Array.from({ length: count }, () => `
    <div class="card-skeleton" aria-hidden="true">
      <div class="poster-sk skeleton"></div>
      <div class="title-sk skeleton"></div>
      <div class="meta-sk skeleton"></div>
    </div>
  `).join('');
}

/* ─────────────────────────────────────────────
   BUILD ANIME CARD HTML
   ───────────────────────────────────────────── */
function buildCard(anime) {
  if (!anime) return '';
  const id = anime.mal_id || 0;
  const title = (anime.title_english || anime.title || 'Unknown').replace(/"/g, '&quot;');
  const poster = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
  const score = anime.score ? anime.score.toFixed(1) : null;
  const eps = anime.episodes || anime.airing_start ? (anime.episodes || '?') : null;
  const type = anime.type || '';
  const year = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '');

  const badgesHtml = `
    <div class="card-badges">
      ${score ? `<span class="card-badge cb-score">★ ${score}</span>` : ''}
      ${eps ? `<span class="card-badge cb-ep">EP ${eps}</span>` : ''}
      ${type ? `<span class="card-badge cb-type">${type}</span>` : ''}
    </div>
  `;

  return `
    <article class="anime-card" role="listitem" tabindex="0"
      data-id="${id}"
      onclick="goTo('anime.html?id=${id}')"
      onkeydown="if(event.key==='Enter')goTo('anime.html?id=${id}')"
      aria-label="${title}"
    >
      <div class="card-poster">
        ${poster ? `<img src="${poster}" alt="${title}" loading="lazy" onerror="this.style.display='none'">` : ''}
        <div class="card-poster-overlay"></div>
        ${badgesHtml}
        <div class="card-play-btn" aria-hidden="true">▶</div>
      </div>
      <div class="card-info">
        <div class="card-title">${title}</div>
        <div class="card-meta">${[type, year].filter(Boolean).join(' · ')}</div>
      </div>
    </article>
  `;
}

function goTo(url) { window.location.href = url; }

/* ─────────────────────────────────────────────
   POPULATE SLIDER TRACK
   ───────────────────────────────────────────── */
function populateTrack(trackId, items) {
  const track = document.getElementById(trackId);
  if (!track) return;
  if (!items || items.length === 0) {
    track.innerHTML = '<div class="error-msg">No data available. Try refreshing.</div>';
    return;
  }
  track.innerHTML = items.map(buildCard).filter(Boolean).join('');
  initSliderDrag(track);
}

/* ─────────────────────────────────────────────
   SLIDER DRAG & SCROLL
   ───────────────────────────────────────────── */
function initSliderDrag(track) {
  if (!track || track._dragInit) return;
  track._dragInit = true;

  let isDown = false, startX = 0, scrollL = 0;

  const onDown = e => {
    isDown = true;
    startX = (e.touches ? e.touches[0].pageX : e.pageX) - track.offsetLeft;
    scrollL = track.scrollLeft;
    track.classList.add('dragging');
  };
  const onUp = () => { isDown = false; track.classList.remove('dragging'); };
  const onMove = e => {
    if (!isDown) return;
    e.preventDefault();
    const x = (e.touches ? e.touches[0].pageX : e.pageX) - track.offsetLeft;
    track.scrollLeft = scrollL - (x - startX);
  };

  track.addEventListener('mousedown', onDown);
  track.addEventListener('mouseleave', onUp);
  track.addEventListener('mouseup', onUp);
  track.addEventListener('mousemove', onMove, { passive: false });
  track.addEventListener('touchstart', onDown, { passive: true });
  track.addEventListener('touchend', onUp);
  track.addEventListener('touchmove', onMove, { passive: false });
}

/* ─────────────────────────────────────────────
   SLIDER ARROW BUTTONS
   ───────────────────────────────────────────── */
function initSliderButtons() {
  document.querySelectorAll('.slider-btn').forEach(btn => {
    if (btn._init) return;
    btn._init = true;
    btn.addEventListener('click', () => {
      const trackId = btn.dataset.target;
      const track = document.getElementById(trackId);
      if (!track) return;
      const cardW = track.querySelector('.anime-card')?.offsetWidth || 180;
      const scroll = (cardW + 14) * 3 * parseInt(btn.dataset.dir || '1');
      track.scrollBy({ left: scroll, behavior: 'smooth' });
    });
  });
}

/* ─────────────────────────────────────────────
   HERO SLIDER
   ───────────────────────────────────────────── */
let heroData = [];
let heroIdx = 0;
let heroTimer = null;
let heroTouchStart = 0;
let heroDragging = false;
let heroMouseStartX = 0;

function buildHeroSlide(anime) {
  const id = anime.mal_id || 0;
  const title = anime.title_english || anime.title || 'Unknown';
  const synopsis = anime.synopsis ? anime.synopsis.replace(/<[^>]*>/g, '').substring(0, 220) + '…' : '';
  const score = anime.score ? anime.score.toFixed(1) : 'N/A';
  const genres = (anime.genres || []).slice(0, 3).map(g => g.name).join(', ');
  const type = anime.type || 'TV';
  const banner = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';

  return `
    <div class="hero-slide" role="group" aria-label="${title.replace(/"/g,'&quot;')}">
      ${banner ? `<img class="hero-bg" src="${banner}" alt="${title.replace(/"/g,'&quot;')}" loading="lazy">` : '<div class="hero-bg" style="background:var(--bg-secondary)"></div>'}
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-badges">
          <span class="badge badge-score">★ ${score}</span>
          <span class="badge badge-type">${type}</span>
          ${genres ? `<span class="badge badge-genre">${genres}</span>` : ''}
        </div>
        <h1 class="hero-title">${title}</h1>
        <p class="hero-synopsis">${synopsis}</p>
        <div class="hero-actions">
          <a class="btn-watch" href="watch.html?id=${id}&ep=1">▶ Watch Now</a>
          <a class="btn-details" href="anime.html?id=${id}">ℹ Details</a>
        </div>
      </div>
    </div>
  `;
}

function renderHero(data) {
  const container = document.getElementById('hero-slides');
  const dotsContainer = document.getElementById('hero-dots');
  if (!container || !data || data.length === 0) return;

  heroData = data.slice(0, 12);
  container.innerHTML = heroData.map(buildHeroSlide).join('');
  dotsContainer.innerHTML = heroData.map((_, i) =>
    `<button class="hero-dot${i === 0 ? ' active' : ''}" data-i="${i}" aria-label="Slide ${i+1}"></button>`
  ).join('');

  // Dot clicks
  dotsContainer.querySelectorAll('.hero-dot').forEach(dot => {
    dot.addEventListener('click', () => goHeroTo(parseInt(dot.dataset.i)));
  });

  goHeroTo(0);
  startHeroAuto();
  initHeroTouch();
}

function goHeroTo(idx) {
  const slides = document.getElementById('hero-slides');
  const dots = document.getElementById('hero-dots');
  if (!slides) return;

  const slideEls = slides.querySelectorAll('.hero-slide');
  heroIdx = ((idx % heroData.length) + heroData.length) % heroData.length;

  slides.style.transform = `translateX(-${heroIdx * 100}%)`;

  slideEls.forEach((s, i) => {
    s.classList.toggle('active', i === heroIdx);
  });

  if (dots) {
    dots.querySelectorAll('.hero-dot').forEach((d, i) => {
      d.classList.toggle('active', i === heroIdx);
    });
  }
}

function startHeroAuto() {
  stopHeroAuto();
  heroTimer = setInterval(() => goHeroTo(heroIdx + 1), SLIDE_INTERVAL);
}
function stopHeroAuto() {
  if (heroTimer) { clearInterval(heroTimer); heroTimer = null; }
}

function initHeroTouch() {
  const hero = document.getElementById('hero');
  if (!hero || hero._touchInit) return;
  hero._touchInit = true;

  hero.addEventListener('touchstart', e => {
    heroTouchStart = e.touches[0].clientX;
    stopHeroAuto();
  }, { passive: true });
  hero.addEventListener('touchend', e => {
    const diff = heroTouchStart - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) goHeroTo(heroIdx + (diff > 0 ? 1 : -1));
    startHeroAuto();
  }, { passive: true });

  hero.addEventListener('mousedown', e => {
    heroMouseStartX = e.clientX;
    heroDragging = true;
    stopHeroAuto();
  });
  hero.addEventListener('mouseup', e => {
    if (!heroDragging) return;
    heroDragging = false;
    const diff = heroMouseStartX - e.clientX;
    if (Math.abs(diff) > 50) goHeroTo(heroIdx + (diff > 0 ? 1 : -1));
    startHeroAuto();
  });
  hero.addEventListener('mouseleave', () => { heroDragging = false; });
}

document.getElementById('hero-prev')?.addEventListener('click', () => {
  stopHeroAuto();
  goHeroTo(heroIdx - 1);
  startHeroAuto();
});
document.getElementById('hero-next')?.addEventListener('click', () => {
  stopHeroAuto();
  goHeroTo(heroIdx + 1);
  startHeroAuto();
});

/* ─────────────────────────────────────────────
   LOAD ALL SECTIONS
   ───────────────────────────────────────────── */
const sections = [
  { id: 'track-trending', endpoint: '/top/anime?filter=bypopularity&limit=24', cacheKey: 'trending' },
  { id: 'track-top',      endpoint: '/top/anime?filter=byrank&limit=24',        cacheKey: 'toprated' },
  { id: 'track-airing',   endpoint: '/top/anime?filter=airing&limit=24',        cacheKey: 'airing' },
  { id: 'track-upcoming', endpoint: '/top/anime?filter=upcoming&limit=24',      cacheKey: 'upcoming' },
  { id: 'track-completed',endpoint: '/top/anime?filter=complete&limit=24',      cacheKey: 'completed' },
  { id: 'track-recent',   endpoint: '/top/anime?filter=airing&page=2&limit=24', cacheKey: 'recent' },
];

async function loadAllSections() {
  // Show skeletons
  sections.forEach(s => renderSkeletons(document.getElementById(s.id)));
  initSliderButtons();

  // Load all with Promise.allSettled — no section blocks another
  const results = await Promise.allSettled(
    sections.map(s => queueFetch(s.endpoint, s.cacheKey))
  );

  results.forEach((result, i) => {
    const s = sections[i];
    const data = result.status === 'fulfilled' ? result.value : null;
    populateTrack(s.id, data);
  });
}

async function loadHero() {
  const cached = Cache.get('hero_data');
  if (cached) { renderHero(cached); return; }

  const data = await apiFetch('/top/anime?filter=bypopularity&limit=15', null);
  if (data && data.length > 0) {
    Cache.set('hero_data', data);
    renderHero(data);
  } else {
    // Retry with different endpoint
    const fallback = await apiFetch('/top/anime?limit=15', null);
    if (fallback) renderHero(fallback);
  }
}

/* ─────────────────────────────────────────────
   SEARCH SYSTEM
   ───────────────────────────────────────────── */
const searchOverlay = document.getElementById('search-overlay');
const searchInput = document.getElementById('search-input-main');
const searchSugg = document.getElementById('search-suggestions');

function openSearch() {
  searchOverlay?.classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => searchInput?.focus(), 100);
}
function closeSearch() {
  searchOverlay?.classList.remove('open');
  document.body.style.overflow = '';
  if (searchInput) { searchInput.value = ''; }
  if (searchSugg) { searchSugg.innerHTML = ''; }
}

document.getElementById('search-open-btn')?.addEventListener('click', openSearch);
document.getElementById('search-close-btn')?.addEventListener('click', closeSearch);

document.getElementById('search-go-btn')?.addEventListener('click', () => {
  const q = searchInput?.value?.trim();
  if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`;
});

searchOverlay?.addEventListener('click', e => {
  if (e.target === searchOverlay) closeSearch();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && searchOverlay?.classList.contains('open')) closeSearch();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});

// Debounced live search
let searchTimer = null;
searchInput?.addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { searchSugg.innerHTML = ''; return; }
  if (q.length < 2) return;
  searchTimer = setTimeout(() => doLiveSearch(q), 350);
});

searchInput?.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = searchInput.value.trim();
    if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`;
  }
});

async function doLiveSearch(query) {
  if (!searchSugg) return;
  searchSugg.innerHTML = Array.from({ length: 6 }, () => `
    <div class="card-skeleton">
      <div class="poster-sk skeleton" style="aspect-ratio:3/4"></div>
      <div class="title-sk skeleton" style="height:10px;margin:8px;border-radius:4px"></div>
    </div>
  `).join('');

  const data = await apiFetch(`/anime?q=${encodeURIComponent(query)}&limit=12&sfw=true`, null);
  if (!data || data.length === 0) {
    searchSugg.innerHTML = '<div class="error-msg" style="grid-column:1/-1">No results found.</div>';
    return;
  }

  searchSugg.innerHTML = data.map(anime => {
    const id = anime.mal_id;
    const title = (anime.title_english || anime.title || 'Unknown').replace(/"/g,'&quot;');
    const img = anime.images?.jpg?.image_url || '';
    const score = anime.score ? `★ ${anime.score.toFixed(1)}` : '';
    return `
      <div class="sugg-card" role="option" tabindex="0"
        onclick="window.location.href='anime.html?id=${id}'"
        onkeydown="if(event.key==='Enter')window.location.href='anime.html?id=${id}'"
        aria-label="${title}">
        ${img ? `<img src="${img}" alt="${title}" loading="lazy" onerror="this.style.display='none'">` : ''}
        <div class="sugg-info">
          <div class="sugg-title">${title}</div>
          ${score ? `<div class="sugg-score">${score}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

/* ─────────────────────────────────────────────
   HAMBURGER / SIDEBAR
   ───────────────────────────────────────────── */
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const hamburger = document.getElementById('hamburger-btn');

function openSidebar() {
  sidebar?.classList.add('open');
  sidebarOverlay?.classList.add('open');
  document.body.style.overflow = 'hidden';
  hamburger?.setAttribute('aria-expanded', 'true');
}
function closeSidebar() {
  sidebar?.classList.remove('open');
  sidebarOverlay?.classList.remove('open');
  document.body.style.overflow = '';
  hamburger?.setAttribute('aria-expanded', 'false');
}

hamburger?.addEventListener('click', () => {
  if (sidebar?.classList.contains('open')) closeSidebar();
  else openSidebar();
});
sidebarOverlay?.addEventListener('click', closeSidebar);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && sidebar?.classList.contains('open')) closeSidebar();
});

/* ─────────────────────────────────────────────
   HEADER SCROLL EFFECT
   ───────────────────────────────────────────── */
const header = document.getElementById('header');
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const s = window.scrollY;
  header?.classList.toggle('scrolled', s > 60);
  lastScroll = s;
}, { passive: true });

/* ─────────────────────────────────────────────
   RESIZE / ORIENTATION
   ───────────────────────────────────────────── */
let resizeTimer = null;
const resizeObs = typeof ResizeObserver !== 'undefined'
  ? new ResizeObserver(() => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        document.querySelectorAll('.slider-track').forEach(initSliderDrag);
      }, 200);
    })
  : null;
if (resizeObs) resizeObs.observe(document.body);

window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    document.querySelectorAll('.slider-track').forEach(initSliderDrag);
  }, 500);
});

/* ─────────────────────────────────────────────
   INIT
   ───────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  // Fire both in parallel — hero & sections don't block each other
  loadHero();
  loadAllSections();
});
</script>
</body>
