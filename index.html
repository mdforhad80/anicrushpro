<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AnimeStream — Watch Anime Online Free</title>

  <style>
    :root{
      --bg:#050505;
      --bg-elevated:#0f0f0f;
      --surface:rgba(255,255,255,0.04);
      --surface-hover:rgba(255,255,255,0.08);
      --border:rgba(255,255,255,0.06);
      --text:#f0f0f0;
      --text-secondary:#8b8b8b;
      --accent:#a855f7;
      --accent-light:#c084fc;
      --accent-glow:rgba(168,85,247,0.35);
      --warning:#f59e0b;
      --radius:16px;
      --radius-sm:8px;
      --transition:all .3s cubic-bezier(.4,0,.2,1);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:Segoe UI,system-ui,sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      display:block;
      max-width:100%;
    }

    /* HEADER */

    .header{
      position:sticky;
      top:0;
      z-index:100;
      height:70px;
      background:rgba(5,5,5,.85);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 20px;
    }

    .logo{
      font-size:1.5rem;
      font-weight:800;

      background:linear-gradient(
        135deg,
        var(--accent),
        var(--accent-light)
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .nav-right{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .icon-btn{
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid var(--border);

      background:var(--surface);

      display:flex;
      align-items:center;
      justify-content:center;

      cursor:pointer;

      color:var(--text);

      transition:var(--transition);
    }

    .icon-btn:hover{
      background:var(--accent);
      border-color:var(--accent);
    }

    /* SIDEBAR */

    .sidebar{
      position:fixed;
      top:0;
      left:-300px;

      width:280px;
      height:100vh;

      background:var(--bg-elevated);

      border-right:1px solid var(--border);

      z-index:200;

      transition:.35s ease;

      padding:24px 18px;
    }

    .sidebar.open{
      left:0;
    }

    .sidebar-overlay{
      position:fixed;
      inset:0;

      background:rgba(0,0,0,.6);

      backdrop-filter:blur(6px);

      opacity:0;
      pointer-events:none;

      z-index:199;

      transition:.35s ease;
    }

    .sidebar-overlay.open{
      opacity:1;
      pointer-events:all;
    }

    .sidebar-title{
      font-size:1.1rem;
      font-weight:700;
      margin-bottom:20px;
      color:var(--accent-light);
    }

    .sidebar-link{
      display:block;
      padding:12px;
      border-radius:10px;
      margin-bottom:6px;
      transition:var(--transition);
    }

    .sidebar-link:hover{
      background:var(--surface);
      color:var(--accent-light);
    }

    /* SEARCH */

    .search-overlay{
      position:fixed;
      inset:0;
      z-index:150;

      background:rgba(5,5,5,.96);

      backdrop-filter:blur(20px);

      padding-top:12vh;

      opacity:0;
      pointer-events:none;

      transition:.35s ease;
    }

    .search-overlay.open{
      opacity:1;
      pointer-events:all;
    }

    .search-box{
      width:92%;
      max-width:720px;
      margin:auto;
      position:relative;
    }

    .search-box input{
      width:100%;
      padding:18px 54px 18px 22px;

      border-radius:100px;
      border:1px solid var(--border);

      background:var(--surface);

      color:var(--text);

      outline:none;

      font-size:1rem;
    }

    .search-box input:focus{
      border-color:var(--accent);
      box-shadow:0 0 24px var(--accent-glow);
    }

    .close-search{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);

      width:36px;
      height:36px;

      border:none;
      border-radius:50%;

      background:transparent;

      cursor:pointer;

      color:var(--text-secondary);
    }

    .search-suggestions{
      margin-top:14px;

      background:var(--bg-elevated);

      border:1px solid var(--border);

      border-radius:16px;

      overflow:hidden;

      display:none;
    }

    .search-suggestions.open{
      display:block;
    }

    .suggestion-item{
      display:flex;
      gap:12px;
      align-items:center;

      padding:12px;

      border-bottom:1px solid var(--border);

      transition:var(--transition);
    }

    .suggestion-item:hover{
      background:var(--surface);
    }

    .suggestion-item img{
      width:42px;
      height:58px;
      border-radius:6px;
      object-fit:cover;
    }

    .suggestion-title{
      font-size:.92rem;
      font-weight:600;
    }

    .suggestion-meta{
      font-size:.78rem;
      color:var(--text-secondary);
      margin-top:2px;
    }

    /* HERO */

    .hero{
      position:relative;
      height:88vh;
      min-height:600px;
      overflow:hidden;
    }

    .hero-slide{
      position:absolute;
      inset:0;

      opacity:0;

      transition:opacity .8s ease;

      display:flex;
      align-items:flex-end;
    }

    .hero-slide.active{
      opacity:1;
    }

    .hero-bg{
      position:absolute;
      inset:0;

      background-size:cover;
      background-position:center;
    }

    .hero-bg::after{
      content:'';
      position:absolute;
      inset:0;

      background:
      linear-gradient(
        to top,
        var(--bg) 0%,
        rgba(5,5,5,.25) 50%,
        rgba(5,5,5,.55) 100%
      );
    }

    .hero-content{
      position:relative;
      z-index:2;

      max-width:780px;

      padding:0 4vw 90px;
    }

    .hero-title{
      font-size:3.2rem;
      line-height:1.05;
      font-weight:800;
      margin-bottom:14px;
    }

    .hero-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }

    .hero-badge{
      padding:5px 12px;
      border-radius:100px;
      background:rgba(0,0,0,.45);
      border:1px solid var(--border);
      font-size:.78rem;
      font-weight:700;
    }

    .hero-synopsis{
      color:var(--text-secondary);
      margin-bottom:24px;

      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .hero-btns{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:100px;
      padding:12px 24px;

      display:inline-flex;
      align-items:center;
      gap:8px;

      font-weight:600;

      cursor:pointer;

      transition:var(--transition);
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-secondary{
      background:var(--surface);
      color:var(--text);
      border:1px solid var(--border);
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .hero-arrows{
      position:absolute;
      top:50%;
      transform:translateY(-50%);

      width:42px;
      height:42px;

      border-radius:50%;
      border:1px solid var(--border);

      background:rgba(0,0,0,.4);

      display:flex;
      align-items:center;
      justify-content:center;

      cursor:pointer;

      z-index:5;
      color:#fff;
    }

    .hero-prev{
      left:10px;
    }

    .hero-next{
      right:10px;
    }

    .hero-dots{
      position:absolute;
      bottom:28px;
      left:50%;
      transform:translateX(-50%);

      display:flex;
      gap:8px;

      z-index:10;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(255,255,255,.25);
      cursor:pointer;
      transition:var(--transition);
    }

    .dot.active{
      width:30px;
      border-radius:20px;
      background:var(--accent);
    }

    /* SECTIONS */

    .section{
      padding:42px 4vw;
    }

    .section-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .section-title{
      font-size:1.3rem;
      font-weight:700;

      display:flex;
      align-items:center;
      gap:12px;
    }

    .section-title::before{
      content:'';
      width:4px;
      height:22px;
      border-radius:3px;
      background:var(--accent);
    }

    .view-all{
      color:var(--text-secondary);
      font-size:.85rem;
    }

    .scroll-container{
      display:flex;
      gap:18px;
      overflow-x:auto;
      padding-bottom:14px;
    }

    .scroll-container::-webkit-scrollbar{
      height:6px;
    }

    .scroll-container::-webkit-scrollbar-thumb{
      background:var(--accent);
      border-radius:10px;
    }

    /* CARD */

    .card{
      flex:0 0 auto;
      width:175px;

      background:var(--bg-elevated);

      border-radius:10px;

      overflow:hidden;

      position:relative;

      transition:var(--transition);
    }

    .card:hover{
      transform:translateY(-7px);
    }

    .card-img{
      width:100%;
      height:245px;
      object-fit:cover;
    }

    .card-badge{
      position:absolute;
      top:8px;

      padding:4px 8px;

      border-radius:4px;

      font-size:.7rem;
      font-weight:700;
    }

    .badge-hd{
      left:8px;
      background:var(--accent);
      color:#fff;
    }

    .badge-ep{
      right:8px;
      background:rgba(0,0,0,.65);
      color:#fff;
    }

    .card-score{
      position:absolute;
      bottom:72px;
      right:8px;

      background:rgba(0,0,0,.65);

      color:var(--warning);

      padding:4px 8px;

      border-radius:4px;

      font-size:.75rem;
      font-weight:700;
    }

    .card-info{
      position:absolute;
      bottom:0;
      left:0;
      right:0;

      padding:12px;

      background:
      linear-gradient(
        transparent,
        rgba(0,0,0,.94)
      );
    }

    .card-title{
      font-size:.86rem;
      font-weight:600;

      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;

      overflow:hidden;
    }

    /* FOOTER */

    .footer{
      border-top:1px solid var(--border);
      padding:30px 20px;
      text-align:center;
      color:var(--text-secondary);
      font-size:.85rem;
      margin-top:30px;
    }

    /* BACK TO TOP */

    .back-to-top{
      position:fixed;
      bottom:24px;
      right:24px;

      width:46px;
      height:46px;

      border:none;
      border-radius:50%;

      background:var(--accent);
      color:#fff;

      display:flex;
      align-items:center;
      justify-content:center;

      cursor:pointer;

      opacity:0;

      transition:var(--transition);

      z-index:100;
    }

    .back-to-top.visible{
      opacity:1;
    }

    /* SKELETON */

    .skeleton{
      background:
      linear-gradient(
        90deg,
        var(--surface) 25%,
        var(--surface-hover) 50%,
        var(--surface) 75%
      );

      background-size:200% 100%;

      animation:shimmer 1.5s infinite;
    }

    @keyframes shimmer{
      0%{
        background-position:200% 0;
      }
      100%{
        background-position:-200% 0;
      }
    }

    /* MOBILE */

    @media(max-width:768px){

      .hero{
        height:72vh;
        min-height:420px;
      }

      .hero-title{
        font-size:2rem;
      }

      .hero-content{
        padding-bottom:70px;
      }

      .card{
        width:145px;
      }

      .card-img{
        height:205px;
      }

      .section{
        padding:30px 4vw;
      }
    }

  </style>
</head>
<body>

  <!-- HEADER -->

  <header class="header">

    <button class="icon-btn" id="menuBtn">
      ☰
    </button>

    <a href="#" class="logo">
      AnimeStream
    </a>

    <div class="nav-right">

      <button class="icon-btn" id="searchBtn">
        🔍
      </button>

    </div>

  </header>

  <!-- SIDEBAR -->

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <nav class="sidebar" id="sidebar">

    <div class="sidebar-title">
      Menu
    </div>

    <a href="#" class="sidebar-link">🏠 Home</a>
    <a href="#" class="sidebar-link">🔍 Search</a>
    <a href="#" class="sidebar-link">📅 Schedule</a>

  </nav>

  <!-- SEARCH -->

  <div class="search-overlay" id="searchOverlay">

    <div class="search-box">

      <input
        type="text"
        id="searchInput"
        placeholder="Search anime..."
      >

      <button class="close-search" id="closeSearch">
        ✕
      </button>

      <div
        class="search-suggestions"
        id="searchSuggestions">
      </div>

    </div>

  </div>

  <!-- HERO -->

  <section class="hero">

    <div id="heroSlider">

      <div
        class="skeleton"
        style="
        width:100%;
        height:100%;
        position:absolute;
        inset:0;
        ">
      </div>

    </div>

    <button class="hero-arrows hero-prev" id="heroPrev">
      ❮
    </button>

    <button class="hero-arrows hero-next" id="heroNext">
      ❯
    </button>

    <div class="hero-dots" id="heroDots"></div>

  </section>

  <!-- CONTINUE -->

  <section
    class="section"
    id="continueSection"
    style="display:none;"
  >

    <div class="section-header">
      <h2 class="section-title">
        Continue Watching
      </h2>
    </div>

    <div
      class="scroll-container"
      id="continueGrid">
    </div>

  </section>

  <!-- SECTIONS -->

  <section class="section">

    <div class="section-header">
      <h2 class="section-title">
        Recently Updated
      </h2>
    </div>

    <div
      class="scroll-container"
      id="recentlyUpdated">
    </div>

  </section>

  <section class="section">

    <div class="section-header">
      <h2 class="section-title">
        Trending Now
      </h2>
    </div>

    <div
      class="scroll-container"
      id="trending">
    </div>

  </section>

  <section class="section">

    <div class="section-header">
      <h2 class="section-title">
        Top Rated
      </h2>
    </div>

    <div
      class="scroll-container"
      id="topRated">
    </div>

  </section>

  <section class="section">

    <div class="section-header">
      <h2 class="section-title">
        Top Airing
      </h2>
    </div>

    <div
      class="scroll-container"
      id="topAiring">
    </div>

  </section>

  <section class="section">

    <div class="section-header">
      <h2 class="section-title">
        Upcoming
      </h2>
    </div>

    <div
      class="scroll-container"
      id="upcoming">
    </div>

  </section>

  <section class="section">

    <div class="section-header">
      <h2 class="section-title">
        Completed
      </h2>
    </div>

    <div
      class="scroll-container"
      id="completed">
    </div>

  </section>

  <!-- FOOTER -->

  <footer class="footer">
    © 2026 AnimeStream • Built with Jikan API
  </footer>

  <!-- BACK TO TOP -->

  <button
    class="back-to-top"
    id="backToTop">
    ↑
  </button>

  <script>

    const API = 'https://api.jikan.moe/v4';

    const cache = new Map();

    async function fetchJikan(endpoint,retries=3){

      try{

        if(cache.has(endpoint)){
          return cache.get(endpoint);
        }

        await new Promise(r=>setTimeout(r,1200));

        const response = await fetch(API + endpoint);

        if(response.status===429 && retries>0){

          await new Promise(r=>setTimeout(r,2500));

          return fetchJikan(
            endpoint,
            retries-1
          );
        }

        if(!response.ok){
          throw new Error(response.status);
        }

        const json = await response.json();

        if(!json || !json.data){
          return [];
        }

        cache.set(endpoint,json.data);

        return json.data;

      }catch(err){

        console.error(err);

        return [];
      }
    }

    /* SIDEBAR */

    const sidebar =
    document.getElementById('sidebar');

    const sidebarOverlay =
    document.getElementById('sidebarOverlay');

    function toggleSidebar(){

      sidebar.classList.toggle('open');

      sidebarOverlay.classList.toggle('open');
    }

    document
    .getElementById('menuBtn')
    .addEventListener('click',toggleSidebar);

    sidebarOverlay
    .addEventListener('click',toggleSidebar);

    /* SEARCH */

    const searchOverlay =
    document.getElementById('searchOverlay');

    const searchInput =
    document.getElementById('searchInput');

    const searchSuggestions =
    document.getElementById('searchSuggestions');

    function toggleSearch(){

      searchOverlay.classList.toggle('open');

      if(searchOverlay.classList.contains('open')){

        searchInput.focus();

        searchInput.value='';

        searchSuggestions.classList.remove('open');
      }
    }

    document
    .getElementById('searchBtn')
    .addEventListener('click',toggleSearch);

    document
    .getElementById('closeSearch')
    .addEventListener('click',toggleSearch);

    let searchTimeout;

    searchInput.addEventListener('input',e=>{

      clearTimeout(searchTimeout);

      const q = e.target.value.trim();

      if(!q){

        searchSuggestions.classList.remove('open');

        return;
      }

      searchTimeout = setTimeout(()=>{

        doSearchSuggest(q);

      },450);
    });

    async function doSearchSuggest(q){

      const data = await fetchJikan(
        `/anime?q=${encodeURIComponent(q)}&limit=8`
      );

      if(!data.length){

        searchSuggestions.innerHTML=`
          <div style="
          padding:20px;
          color:var(--text-secondary);
          text-align:center;
          ">
            No results found
          </div>
        `;

        searchSuggestions.classList.add('open');

        return;
      }

      searchSuggestions.innerHTML = data.map(a=>`

        <a
          href="#"
          class="suggestion-item"
        >

          <img
            src="${a.images.jpg.image_url}"
          >

          <div>

            <div class="suggestion-title">
              ${a.title}
            </div>

            <div class="suggestion-meta">
              ${a.type || 'Anime'}
              •
              Score ${a.score || 'N/A'}
            </div>

          </div>

        </a>

      `).join('');

      searchSuggestions.classList.add('open');
    }

    /* HERO */

    let heroSlides=[];
    let heroIndex=0;
    let heroInterval;

    async function loadHero(){

      const data = await fetchJikan(
        '/top/anime?filter=airing&limit=10'
      );

      const container =
      document.getElementById('heroSlider');

      if(!data.length){

        container.innerHTML=`
          <div style="
          display:flex;
          align-items:center;
          justify-content:center;
          height:100%;
          color:var(--text-secondary);
          ">
            Failed to load featured anime
          </div>
        `;

        return;
      }

      heroSlides=data;

      document.getElementById('heroDots').innerHTML=
      heroSlides.map((_,i)=>`
        <div
          class="dot ${i===0?'active':''}"
          onclick="goHero(${i})">
        </div>
      `).join('');

      renderHero();

      clearInterval(heroInterval);

      heroInterval=setInterval(()=>{

        heroIndex++;

        if(heroIndex>=heroSlides.length){
          heroIndex=0;
        }

        renderHero();

      },6000);
    }

    function renderHero(){

      const container =
      document.getElementById('heroSlider');

      if(!heroSlides.length)return;

      container.innerHTML=
      heroSlides.map((a,i)=>`

        <div class="
        hero-slide
        ${i===heroIndex?'active':''}
        ">

          <div
            class="hero-bg"
            style="
            background-image:url(
            '${a.images.jpg.large_image_url}'
            );
            ">
          </div>

          <div class="hero-content">

            <h1 class="hero-title">
              ${a.title}
            </h1>

            <div class="hero-meta">

              <span class="hero-badge">
                ${a.type || 'Anime'}
              </span>

              <span class="hero-badge">
                ★ ${a.score || 'N/A'}
              </span>

              <span class="hero-badge">
                ${a.episodes || '?'} EPS
              </span>

            </div>

            <p class="hero-synopsis">
              ${a.synopsis || ''}
            </p>

            <div class="hero-btns">

              <a href="#" class="btn btn-primary">
                ▶ Watch Now
              </a>

              <a href="#" class="btn btn-secondary">
                Details
              </a>

            </div>

          </div>

        </div>

      `).join('');

      document
      .querySelectorAll('.dot')
      .forEach((d,i)=>{

        d.classList.toggle(
          'active',
          i===heroIndex
        );
      });
    }

    window.goHero=i=>{

      heroIndex=i;

      renderHero();
    };

    document
    .getElementById('heroPrev')
    .addEventListener('click',()=>{

      if(!heroSlides.length)return;

      heroIndex--;

      if(heroIndex<0){
        heroIndex=heroSlides.length-1;
      }

      renderHero();
    });

    document
    .getElementById('heroNext')
    .addEventListener('click',()=>{

      if(!heroSlides.length)return;

      heroIndex++;

      if(heroIndex>=heroSlides.length){
        heroIndex=0;
      }

      renderHero();
    });

    /* CARD */

    function createCard(a){

      return `
        <a href="#" class="card">

          <img
            class="card-img"
            src="${a.images.jpg.large_image_url}"
          >

          ${
            a.type==='TV'
            ?'<span class="card-badge badge-hd">HD</span>'
            :''
          }

          <span class="card-badge badge-ep">
            ${a.episodes || '?'} EPS
          </span>

          <span class="card-score">
            ★ ${a.score || 'N/A'}
          </span>

          <div class="card-info">

            <div class="card-title">
              ${a.title}
            </div>

          </div>

        </a>
      `;
    }

    async function loadSection(endpoint,id){

      const container =
      document.getElementById(id);

      container.innerHTML=`
        <div
          class="skeleton"
          style="
          width:175px;
          height:245px;
          border-radius:10px;
          flex:0 0 auto;
          ">
        </div>
      `;

      const data = await fetchJikan(endpoint);

      if(!data.length){

        container.innerHTML=`
          <div style="
          padding:20px;
          color:var(--text-secondary);
          ">
            Unable to load anime.
          </div>
        `;

        return;
      }

      container.innerHTML=
      data.map(createCard).join('');
    }

    /* CONTINUE */

    function loadContinue(){

      const history = JSON.parse(
        localStorage.getItem('watchHistory')
        || '[]'
      );

      if(!history.length)return;

      const section =
      document.getElementById('continueSection');

      const grid =
      document.getElementById('continueGrid');

      grid.innerHTML=
      history.slice(0,10).map(h=>`

        <a href="#" class="card">

          <img
            class="card-img"
            src="${h.image}"
          >

          <span class="card-badge badge-ep">
            EP ${h.ep}
          </span>

          <div class="card-info">

            <div class="card-title">
              ${h.title}
            </div>

          </div>

        </a>

      `).join('');

      section.style.display='block';
    }

    /* INITIALIZE */

    async function initializeHome(){

      await loadHero();

      await loadSection(
        '/top/anime?filter=airing&limit=25',
        'recentlyUpdated'
      );

      await loadSection(
        '/top/anime?filter=bypopularity&limit=25',
        'trending'
      );

      await loadSection(
        '/top/anime?limit=25',
        'topRated'
      );

      await loadSection(
        '/seasons/now?limit=25',
        'topAiring'
      );

      await loadSection(
        '/seasons/upcoming?limit=25',
        'upcoming'
      );

      await loadSection(
        '/anime?status=complete&order_by=score&sort=desc&limit=25',
        'completed'
      );

      loadContinue();
    }

    initializeHome();

    /* BACK TO TOP */

    const btt =
    document.getElementById('backToTop');

    window.addEventListener('scroll',()=>{

      btt.classList.toggle(
        'visible',
        window.scrollY>500
      );
    });

    btt.addEventListener('click',()=>{

      window.scrollTo({
        top:0,
        behavior:'smooth'
      });
    });

  </script>

</body>
</html>
