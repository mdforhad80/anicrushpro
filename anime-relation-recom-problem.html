<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Anime details, episodes, characters, and streaming links.">
<meta name="theme-color" content="#050505">
<title>Anime Details - AnimeStream</title>
<style>
/* ==================== VARIABLES & RESET ==================== */
:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --primary: #8b5cf6;
  --primary-glow: rgba(139,92,246,0.35);
  --secondary: #a78bfa;
  --text: #f3f4f6;
  --text-muted: #9ca3af;
  --border: rgba(255,255,255,0.08);
  --radius: 12px;
  --radius-lg: 16px;
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-x: hidden;
  max-width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
ul, ol { list-style: none; }

/* ==================== UTILITIES ==================== */
.glass {
  background: rgba(17,17,17,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
}
.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
.text-gradient {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.clamp-2 {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.clamp-3 {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ==================== HEADER ==================== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px);
  transition: var(--transition);
}
.header.scrolled {
  background: rgba(5,5,5,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.menu-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.menu-btn:hover { background: var(--surface-2); }
.menu-btn svg { width: 22px; height: 22px; stroke: var(--text); }
.logo {
  font-size: clamp(1.1rem, 2vw, 1.5rem);
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #fff; font-size: 14px;
}
.search-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.search-btn:hover { background: var(--surface-2); }
.search-btn svg { width: 20px; height: 20px; stroke: var(--text); }

/* ==================== SIDEBAR ==================== */
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(280px, 80vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 1101;
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  padding: 20px;
}
.sidebar.active { transform: translateX(0); }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.sidebar-close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.sidebar-close:hover { background: var(--surface-2); }
.sidebar-close svg { width: 20px; height: 20px; stroke: var(--text); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-muted);
  transition: var(--transition);
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  background: rgba(139,92,246,0.12);
  color: var(--primary);
}
.sidebar-nav a svg { width: 20px; height: 20px; stroke: currentColor; flex-shrink: 0; }

/* ==================== SEARCH OVERLAY ==================== */
.search-overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,5,0.95);
  backdrop-filter: blur(20px);
  z-index: 1200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  display: flex; flex-direction: column;
  padding: clamp(16px, 4vw, 48px);
}
.search-overlay.active { opacity: 1; pointer-events: all; }
.search-top {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
}
.search-input-wrap { flex: 1; position: relative; }
.search-input-wrap svg {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; stroke: var(--text-muted); pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 14px 16px 14px 48px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: var(--transition);
}
.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.search-close {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  background: var(--surface-2);
}
.search-close:hover { background: var(--surface-3); }
.search-close svg { width: 22px; height: 22px; stroke: var(--text); }
.search-suggestions {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  overflow-y: auto;
  padding-bottom: 40px;
}
.search-empty { text-align: center; color: var(--text-muted); padding: 48px 16px; font-size: 1rem; }

/* ==================== ANIME BANNER ==================== */
.anime-banner {
  position: relative;
  width: 100%;
  height: clamp(300px, 45vh, 550px);
  overflow: hidden;
}
.anime-banner-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center 20%;
  filter: blur(2px) brightness(0.5);
}
.anime-banner-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(5,5,5,0.3) 0%, var(--bg) 100%);
}

/* ==================== ANIME DETAILS GRID ==================== */
.anime-details {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: clamp(20px, 3vw, 40px);
  padding: 0 clamp(16px, 3vw, 32px);
  max-width: 1200px;
  margin: -120px auto 0;
  position: relative;
  z-index: 2;
}
@media (max-width: 768px) {
  .anime-details {
    grid-template-columns: 1fr;
    margin-top: -80px;
  }
}

/* Poster */
.anime-poster-wrap {
  width: clamp(160px, 22vw, 260px);
  flex-shrink: 0;
}
@media (max-width: 768px) {
  .anime-poster-wrap {
    width: min(200px, 60vw);
    margin: 0 auto;
  }
}
.anime-poster {
  width: 100%;
  aspect-ratio: 2/3;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  background: var(--surface-2);
}
.anime-poster img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.anime-actions {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 16px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 700;
  transition: var(--transition);
  white-space: nowrap;
  width: 100%;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff;
  box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--primary-glow);
}
.btn-secondary {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-secondary:hover { background: rgba(255,255,255,0.14); }

/* Info */
.anime-info {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}
.anime-title {
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  font-weight: 800;
  line-height: 1.15;
}
.anime-alt-title {
  font-size: clamp(0.85rem, 1.2vw, 1rem);
  color: var(--text-muted);
  font-weight: 500;
}
.anime-meta-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  font-size: 0.9rem;
}
.anime-score {
  display: flex; align-items: center; gap: 6px;
  background: rgba(251,191,36,0.12);
  padding: 6px 12px;
  border-radius: 8px;
  color: #fbbf24;
  font-weight: 800;
  font-size: 1rem;
}
.anime-score svg { width: 18px; height: 18px; fill: #fbbf24; }
.anime-meta-row .dot { width: 4px; height: 4px; background: var(--text-muted); border-radius: 50%; }
.anime-genres {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.anime-genre {
  padding: 5px 12px;
  background: rgba(139,92,246,0.12);
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--secondary);
}
.anime-synopsis {
  font-size: clamp(0.85rem, 1vw + 0.2rem, 1rem);
  color: var(--text-muted);
  line-height: 1.7;
  max-width: 100%;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.anime-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}
.stat-box {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  text-align: center;
}
.stat-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.stat-value {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}

/* ==================== TABS ==================== */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
  transition: var(--transition);
  flex-shrink: 0;
}
.tab-btn:hover { color: var(--text); background: var(--surface-2); }
.tab-btn.active {
  color: var(--primary);
  background: rgba(139,92,246,0.1);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.3s ease; }

/* ==================== EPISODE LIST ==================== */
.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
@media (max-width: 640px) {
  .episode-grid { grid-template-columns: 1fr; }
}
.episode-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: var(--transition);
  cursor: pointer;
}
.episode-card:hover {
  background: var(--surface-3);
  border-color: var(--primary);
  transform: translateX(4px);
}
.episode-num {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: var(--primary);
  color: #fff;
  border-radius: 10px;
  font-weight: 800;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.episode-info { flex: 1; min-width: 0; }
.episode-title {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 2px;
}
.episode-date {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.episode-play {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(139,92,246,0.15);
  color: var(--primary);
  flex-shrink: 0;
}
.episode-play svg { width: 16px; height: 16px; fill: currentColor; }

/* ==================== CHARACTER CARDS ==================== */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 16px;
}
.char-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}
.char-card:hover {
  transform: translateY(-4px);
  border-color: var(--primary);
}
.char-img {
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--surface-3);
}
.char-img img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.char-name {
  padding: 10px;
  font-size: 0.8rem;
  font-weight: 600;
  text-align: center;
  color: var(--text);
}
.char-role {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
  padding-bottom: 10px;
}

/* ==================== RELATIONS / RECOMMENDATIONS ==================== */
.slider-wrap {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-lg);
}
.slider-track {
  display: flex;
  gap: clamp(12px, 1.5vw, 20px);
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 4px 0 16px;
  touch-action: pan-y;
  -webkit-overflow-scrolling: touch;
}
.slider-track::-webkit-scrollbar { display: none; }
.slider-track.dragging { scroll-behavior: auto; cursor: grabbing; }

.slider-arrow {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.2s ease;
  color: #fff;
}
.slider-wrap:hover .slider-arrow { opacity: 1; }
.slider-arrow:hover { transform: translateY(-50%) scale(1.1); background: rgba(0,0,0,0.8); }
.slider-arrow.prev { left: 8px; }
.slider-arrow.next { right: 8px; }
.slider-arrow svg { width: 18px; height: 18px; stroke: currentColor; }
@media (max-width: 768px) {
  .slider-arrow { display: none; }
}

.anime-card {
  flex: 0 0 auto;
  width: clamp(140px, 18vw, 200px);
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface-2);
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  cursor: pointer;
}
.anime-card:hover {
  transform: scale(1.05) translateY(-4px);
  box-shadow: 0 20px 40px rgba(139,92,246,0.18);
}
.anime-card .card-img-wrap {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
  background: var(--surface-3);
}
.anime-card .card-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.anime-card:hover .card-img-wrap img { transform: scale(1.1); }
.anime-card .card-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
  pointer-events: none;
}
.anime-card .card-badges {
  position: absolute;
  top: 8px; left: 8px;
  display: flex; flex-wrap: wrap; gap: 4px;
  z-index: 2;
}
.anime-card .badge {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-hd { background: #ef4444; color: #fff; }
.badge-score { background: rgba(0,0,0,0.6); color: #fbbf24; backdrop-filter: blur(4px); }
.badge-ep { background: var(--primary); color: #fff; }
.badge-type { background: rgba(255,255,255,0.15); color: #fff; }
.anime-card .card-info {
  padding: 10px 12px 14px;
}
.anime-card .card-title {
  font-size: 0.85rem;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 4px;
  color: var(--text);
}
.anime-card .card-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.anime-card .card-meta .dot { width: 3px; height: 3px; background: var(--text-muted); border-radius: 50%; }

/* Trailer */
.trailer-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface-2);
}
.trailer-wrap iframe {
  width: 100%; height: 100%;
  border: none;
}

/* ==================== FOOTER ==================== */
.footer {
  border-top: 1px solid var(--border);
  padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 32px);
  text-align: center;
  margin-top: 40px;
}
.footer-text {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.footer-social {
  display: flex; justify-content: center; gap: 16px;
}
.footer-social a {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.footer-social a:hover {
  background: var(--primary);
  border-color: var(--primary);
  transform: translateY(-2px);
}
.footer-social a svg { width: 16px; height: 16px; stroke: var(--text-muted); }
.footer-social a:hover svg { stroke: #fff; }

/* ==================== RESPONSIVE ==================== */
@media (max-width: 768px) {
  .anime-banner { height: 250px; }
  .anime-stats { grid-template-columns: repeat(2, 1fr); }
  .char-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 480px) {
  .char-grid { grid-template-columns: repeat(2, 1fr); }
  .anime-stats { grid-template-columns: repeat(2, 1fr); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
<base target="_blank">
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header class="header" id="header">
  <div class="header-left">
    <button class="menu-btn" id="menuBtn" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="index.html" class="logo">
      <div class="logo-icon">A</div>
      <span class="text-gradient">AnimeStream</span>
    </a>
  </div>
  <div class="header-right">
    <button class="search-btn" id="searchBtn" aria-label="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</header>

<!-- ==================== SIDEBAR ==================== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ==================== SCRIPTS ==================== -->
<script>
(function() {
  'use strict';

  const API_BASE = 'https://api.jikan.moe/v4';
  const CACHE_TTL = 5 * 60 * 1000;
  const RATE_DELAY = 400;

  const ApiEngine = {
    cache: {}, lastRequest: 0,
    getCacheKey(url) { return 'cache_' + url; },
    getCached(url) {
      const key = this.getCacheKey(url);
      const item = this.cache[key];
      if (!item) {
        try {
          const raw = localStorage.getItem(key);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Date.now() - parsed.time < CACHE_TTL) { this.cache[key] = parsed; return parsed.data; }
          }
        } catch(e) {}
        return null;
      }
      if (Date.now() - item.time < CACHE_TTL) return item.data;
      return null;
    },
    setCache(url, data) {
      const key = this.getCacheKey(url);
      const payload = { data, time: Date.now() };
      this.cache[key] = payload;
      try { localStorage.setItem(key, JSON.stringify(payload)); } catch(e) {}
    },
    async fetchWithTimeout(url, timeout = 10000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (e) { clearTimeout(id); throw e; }
    },
    async fetch(url, retries = 3) {
      const cached = this.getCached(url);
      if (cached) return cached;
      const now = Date.now();
      const wait = Math.max(0, this.lastRequest + RATE_DELAY - now);
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      this.lastRequest = Date.now();
      let lastError;
      for (let i = 0; i < retries; i++) {
        try {
          if (i > 0) await new Promise(r => setTimeout(r, 1200 * i));
          const response = await this.fetchWithTimeout(url);
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const json = await response.json();
          if (!json || !json.data) throw new Error('Invalid response');
          this.setCache(url, json);
          return json;
        } catch (e) { lastError = e; }
      }
      throw lastError;
    },
    async fetchSafe(url, fallbackData = null) {
      try { return await this.fetch(url); }
      catch (e) { console.warn('API fetch failed:', url, e.message); return { data: fallbackData }; }
    }
  };

  function getParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function sanitize(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getTitle(anime) {
    return sanitize(anime.title_english || anime.title || 'Unknown');
  }

  function getImage(anime) {
    if (!anime.images || !anime.images.jpg) return '';
    return anime.images.jpg.large_image_url || anime.images.jpg.image_url || '';
  }

  function getPoster(anime) {
    if (!anime.images || !anime.images.jpg) return '';
    return anime.images.jpg.image_url || anime.images.jpg.small_image_url || '';
  }

  // ==================== SLIDER ====================
  const SliderRegistry = new Map();
  function initSlider(trackId) {
    const track = document.getElementById(trackId);
    if (!track || SliderRegistry.has(trackId)) return;
    let isDown = false, startX, scrollLeft;
    function onMouseDown(e) {
      if (e.target.closest('.anime-card')) return;
      isDown = true;
      track.classList.add('dragging');
      startX = e.pageX - track.offsetLeft;
      scrollLeft = track.scrollLeft;
    }
    function onMouseLeave() { isDown = false; track.classList.remove('dragging'); }
    function onMouseUp() { isDown = false; track.classList.remove('dragging'); }
    function onMouseMove(e) {
      if (!isDown) return;
      const x = e.pageX - track.offsetLeft;
      const walk = (x - startX) * 1.5;
      track.scrollLeft = scrollLeft - walk;
    }
    function onWheel(e) { if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) { e.preventDefault(); track.scrollLeft += e.deltaY; } }
    track.addEventListener('mousedown', onMouseDown);
    track.addEventListener('mouseleave', onMouseLeave);
    track.addEventListener('mouseup', onMouseUp);
    track.addEventListener('mousemove', onMouseMove);
    track.addEventListener('wheel', onWheel, { passive: false });
    let touchStartX = 0, touchScrollLeft = 0, touchOnCard = false;
    track.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchScrollLeft = track.scrollLeft;
      touchOnCard = !!(e.target && e.target.closest('.anime-card'));
    }, { passive: true });
    track.addEventListener('touchmove', (e) => {
      if (touchOnCard) return;
      const touchX = e.touches[0].clientX;
      const diff = touchStartX - touchX;
      track.scrollLeft = touchScrollLeft + diff;
    }, { passive: true });
    SliderRegistry.set(trackId, { track });
  }
  function slideTrack(trackId, direction) {
    const track = document.getElementById(trackId);
    if (!track) return;
    const card = track.querySelector('.anime-card');
    const scrollAmount = card ? (card.offsetWidth + 16) * 4 : 600;
    track.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
  }
  document.querySelectorAll('.slider-arrow').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.target;
      const direction = btn.classList.contains('prev') ? -1 : 1;
      slideTrack('slider-' + target, direction);
    });
  });

  // ==================== RENDER CARD ====================
  function renderAnimeCard(anime) {
    const malId = anime.mal_id || 0;
    const img = getImage(anime) || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
    const title = getTitle(anime);
    const score = anime.score ? anime.score.toFixed(1) : '';
    const episodes = anime.episodes || (anime.type === 'Movie' ? '1' : '?');
    const type = sanitize(anime.type || 'TV');
    return `
      <a href="anime.html?id=${malId}" class="anime-card fade-in">
        <div class="card-img-wrap">
          <img src="${img}" alt="${title}" loading="lazy">
          <div class="card-gradient"></div>
          <div class="card-badges">
            <span class="badge badge-hd">HD</span>
            ${score ? `<span class="badge badge-score">${score}</span>` : ''}
            ${episodes ? `<span class="badge badge-ep">EP ${episodes}</span>` : ''}
            <span class="badge badge-type">${type}</span>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title clamp-2">${title}</div>
        </div>
      </a>
    `;
  }

  // ==================== LOAD ANIME DETAILS ====================
  async function loadAnimeDetails() {
    const malId = getParam('id');
    if (!malId) {
      document.getElementById('animeInfo').innerHTML = '<div class="search-empty">No anime ID provided.</div>';
      return;
    }

    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/full`);
      const anime = (res && res.data) ? res.data : null;
      if (!anime) {
        document.getElementById('animeInfo').innerHTML = '<div class="search-empty">Anime not found.</div>';
        return;
      }

      // Banner
      const bannerBg = document.getElementById('bannerBg');
      const bannerImg = getImage(anime);
      if (bannerBg && bannerImg) bannerBg.style.backgroundImage = `url('${bannerImg}')`;

      // Poster
      const posterEl = document.getElementById('animePoster');
      const posterImg = getPoster(anime);
      if (posterEl && posterImg) posterEl.innerHTML = `<img src="${posterImg}" alt="${getTitle(anime)}">`;

      // Watch button
      const watchBtn = document.getElementById('watchBtn');
      if (watchBtn) watchBtn.href = `watch.html?id=${malId}&ep=1`;

      // Info
      const infoEl = document.getElementById('animeInfo');
      const title = getTitle(anime);
      const altTitle = sanitize(anime.title_japanese || '');
      const genres = (anime.genres || []).map(g => `<span class="anime-genre">${sanitize(g.name)}</span>`).join('');
      const studios = (anime.studios || []).map(s => sanitize(s.name)).join(', ') || 'Unknown';
      const score = anime.score ? anime.score.toFixed(2) : 'N/A';
      const episodes = anime.episodes || '?';
      const status = sanitize(anime.status || 'Unknown');
      const duration = sanitize(anime.duration || 'Unknown');
      const rating = sanitize(anime.rating || 'Unknown');
      const synopsis = sanitize(anime.synopsis || 'No synopsis available.');
      const year = anime.year || (anime.aired && anime.aired.from ? new Date(anime.aired.from).getFullYear() : '');
      const season = sanitize(anime.season || '') + (anime.year ? ' ' + anime.year : '');

      infoEl.innerHTML = `
        <h1 class="anime-title">${title}</h1>
        ${altTitle ? `<div class="anime-alt-title">${altTitle}</div>` : ''}
        <div class="anime-meta-row">
          <span class="anime-score">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            ${score}
          </span>
          <span class="dot"></span>
          <span>${episodes} Episodes</span>
          <span class="dot"></span>
          <span>${status}</span>
          <span class="dot"></span>
          <span>${duration}</span>
        </div>
        <div class="anime-genres">${genres}</div>
        <p class="anime-synopsis">${synopsis}</p>
        <div class="anime-stats">
          <div class="stat-box"><div class="stat-label">Type</div><div class="stat-value">${sanitize(anime.type || 'TV')}</div></div>
          <div class="stat-box"><div class="stat-label">Studio</div><div class="stat-value">${studios}</div></div>
          <div class="stat-box"><div class="stat-label">Season</div><div class="stat-value">${season || 'Unknown'}</div></div>
          <div class="stat-box"><div class="stat-label">Rating</div><div class="stat-value">${rating}</div></div>
          <div class="stat-box"><div class="stat-label">Rank</div><div class="stat-value">#${anime.rank || '?'}</div></div>
          <div class="stat-box"><div class="stat-label">Popularity</div><div class="stat-value">#${anime.popularity || '?'}</div></div>
        </div>
      `;

      // Trailer
      const trailerWrap = document.getElementById('trailerWrap');
      const trailerBtn = document.getElementById('trailerBtn');
      const trailerUrl = anime.trailer && anime.trailer.embed_url ? anime.trailer.embed_url : null;
      if (trailerUrl && trailerWrap) {
        trailerWrap.innerHTML = `<iframe src="${trailerUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
        if (trailerBtn) {
          trailerBtn.addEventListener('click', () => {
            document.querySelector('[data-tab="trailer"]').click();
            trailerWrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        }
      } else {
        if (trailerWrap) trailerWrap.innerHTML = '<div class="search-empty">No trailer available.</div>';
        if (trailerBtn) trailerBtn.style.display = 'none';
      }

      // Load other data in parallel
      loadEpisodes(malId, anime.episodes);
      loadCharacters(malId);
      loadRelations(malId);
      loadRecommendations(malId);

    } catch (e) {
      console.error(e);
      document.getElementById('animeInfo').innerHTML = '<div class="search-empty">Failed to load anime details.</div>';
    }
  }

  async function loadEpisodes(malId, totalEps) {
    const container = document.getElementById('episodesList');
    if (!container) return;
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/episodes`);
      const episodes = (res && res.data) ? res.data : [];
      if (episodes && episodes.length) {
        container.innerHTML = episodes.map(ep => `
          <a href="watch.html?id=${malId}&ep=${ep.mal_id || ep.episode || 1}" class="episode-card fade-in">
            <div class="episode-num">${ep.mal_id || ep.episode || 1}</div>
            <div class="episode-info">
              <div class="episode-title clamp-2">${sanitize(ep.title || 'Episode ' + (ep.mal_id || ep.episode || 1))}</div>
              <div class="episode-date">${sanitize(ep.aired || '')}</div>
            </div>
            <div class="episode-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
          </a>
        `).join('');
      } else {
        // Generate generic episodes if API returns none
        const count = totalEps || 12;
        const max = Math.min(count, 24);
        let html = '';
        for (let i = 1; i <= max; i++) {
          html += `
            <a href="watch.html?id=${malId}&ep=${i}" class="episode-card fade-in">
              <div class="episode-num">${i}</div>
              <div class="episode-info">
                <div class="episode-title">Episode ${i}</div>
              </div>
              <div class="episode-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
            </a>
          `;
        }
        container.innerHTML = html;
      }
    } catch (e) {
      const count = totalEps || 12;
      const max = Math.min(count, 24);
      let html = '';
      for (let i = 1; i <= max; i++) {
        html += `
          <a href="watch.html?id=${malId}&ep=${i}" class="episode-card fade-in">
            <div class="episode-num">${i}</div>
            <div class="episode-info"><div class="episode-title">Episode ${i}</div></div>
            <div class="episode-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
          </a>
        `;
      }
      container.innerHTML = html;
    }
  }

  async function loadCharacters(malId) {
    const container = document.getElementById('charGrid');
    if (!container) return;
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/characters`);
      const chars = (res && res.data) ? res.data.slice(0, 12) : [];
      if (!chars.length) {
        container.innerHTML = '<div class="search-empty">No character data available.</div>';
        return;
      }
      container.innerHTML = chars.map(c => {
        const char = c.character || {};
        const img = char.images && char.images.jpg ? char.images.jpg.image_url : '';
        const name = sanitize(char.name || 'Unknown');
        const role = sanitize(c.role || '');
        return `
          <div class="char-card fade-in">
            <div class="char-img"><img src="${img}" alt="${name}" loading="lazy"></div>
            <div class="char-name clamp-2">${name}</div>
            <div class="char-role">${role}</div>
          </div>
        `;
      }).join('');
    } catch (e) {
      container.innerHTML = '<div class="search-empty">Failed to load characters.</div>';
    }
  }

  async function loadRelations(malId) {
    const container = document.getElementById('slider-relations');
    if (!container) return;
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/relations`);
      const data = (res && res.data) ? res.data : [];
      let items = [];
      data.forEach(group => {
        (group.entry || []).forEach(entry => {
          if (entry.type === 'anime') items.push({ mal_id: entry.mal_id, title: entry.name, type: group.relation || 'Related' });
        });
      });
      if (!items.length) {
        container.innerHTML = '<div class="search-empty">No relations found.</div>';
        return;
      }
      // Fetch basic details for first 10 to get images (batch)
      const batch = items.slice(0, 10);
      const enriched = await Promise.allSettled(batch.map(async (item) => {
        try {
          const detail = await ApiEngine.fetchSafe(`${API_BASE}/anime/${item.mal_id}`);
          const anime = detail.data;
          return anime || { mal_id: item.mal_id, title: item.title, images: { jpg: { image_url: '' } }, type: 'TV', score: 0, status: item.type };
        } catch (e) { return { mal_id: item.mal_id, title: item.title, images: { jpg: { image_url: '' } }, type: 'TV', score: 0, status: item.type }; }
      }));
      const results = enriched.map(r => r.status === 'fulfilled' ? r.value : null).filter(Boolean);
      container.innerHTML = results.map(renderAnimeCard).join('');
      initSlider('slider-relations');
    } catch (e) {
      container.innerHTML = '<div class="search-empty">Failed to load relations.</div>';
    }
  }

  async function loadRecommendations(malId) {
    const container = document.getElementById('slider-recommendations');
    if (!container) return;
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/recommendations`);
      const data = (res && res.data) ? res.data.slice(0, 12) : [];
      if (!data.length) {
        container.innerHTML = '<div class="search-empty">No recommendations found.</div>';
        return;
      }
      const enriched = await Promise.allSettled(data.map(async (rec) => {
        try {
          const detail = await ApiEngine.fetchSafe(`${API_BASE}/anime/${rec.entry.mal_id}`);
          return detail.data || rec.entry;
        } catch (e) { return rec.entry; }
      }));
      const results = enriched.map(r => r.status === 'fulfilled' ? r.value : null).filter(Boolean);
      container.innerHTML = results.map(renderAnimeCard).join('');
      initSlider('slider-recommendations');
    } catch (e) {
      container.innerHTML = '<div class="search-empty">Failed to load recommendations.</div>';
    }
  }

  // ==================== TABS ====================
  function initTabs() {
    const tabs = document.getElementById('tabs');
    if (!tabs) return;
    tabs.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const panel = document.getElementById('tab-' + tabId);
        if (panel) panel.classList.add('active');
      });
    });
  }

  // ==================== SEARCH OVERLAY ====================
  const SearchOverlay = {
    overlay: document.getElementById('searchOverlay'),
    input: document.getElementById('searchInput'),
    suggestions: document.getElementById('searchSuggestions'),
    debounceTimer: null,
    open() { this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; setTimeout(() => this.input.focus(), 100); },
    close() { this.overlay.classList.remove('active'); document.body.style.overflow = ''; this.input.value = ''; this.suggestions.innerHTML = ''; },
    async search(query) {
      if (!query || query.length < 2) { this.suggestions.innerHTML = '<div class="search-empty">Type at least 2 characters to search</div>'; return; }
      this.suggestions.innerHTML = '<div class="search-empty">Searching...</div>';
      try {
        const res = await ApiEngine.fetchSafe(`${API_BASE}/anime?q=${encodeURIComponent(query)}&limit=12`);
        const data = (res && res.data) ? res.data : [];
        if (!data.length) { this.suggestions.innerHTML = '<div class="search-empty">No results found.</div>'; return; }
        this.suggestions.innerHTML = data.map(anime => renderAnimeCard(anime)).join('');
      } catch (e) { this.suggestions.innerHTML = '<div class="search-empty">Search failed. Try again.</div>'; }
    },
    init() {
      document.getElementById('searchBtn').addEventListener('click', () => this.open());
      document.getElementById('searchClose').addEventListener('click', () => this.close());
      this.overlay.addEventListener('click', (e) => { if (e.target === this.overlay) this.close(); });
      this.input.addEventListener('input', (e) => { clearTimeout(this.debounceTimer); this.debounceTimer = setTimeout(() => this.search(e.target.value.trim()), 400); });
      this.input.addEventListener('keydown', (e) => { if (e.key === 'Escape') this.close(); });
    }
  };

  // ==================== MOBILE NAV ====================
  const MobileNav = {
    sidebar: document.getElementById('sidebar'),
    overlay: document.getElementById('sidebarOverlay'),
    open() { this.sidebar.classList.add('active'); this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; },
    close() { this.sidebar.classList.remove('active'); this.overlay.classList.remove('active'); document.body.style.overflow = ''; },
    init() {
      document.getElementById('menuBtn').addEventListener('click', () => this.open());
      document.getElementById('sidebarClose').addEventListener('click', () => this.close());
      this.overlay.addEventListener('click', () => this.close());
    }
  };

  function initHeaderScroll() {
    const header = document.getElementById('header');
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { header.classList.toggle('scrolled', window.scrollY > 40); ticking = false; });
        ticking = true;
      }
    }, { passive: true });
  }

  // ==================== APP INIT ====================
  async function initApp() {
    initHeaderScroll();
    MobileNav.init();
    SearchOverlay.init();
    initTabs();
    await loadAnimeDetails();
  }

  if (!window.__appInitialized) {
    window.__appInitialized = true;
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  }
})();
</script>
</body>
</html>
