<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Anime — AnimeStream</title>
  <meta name="description" content="Advanced anime search with filters and infinite scroll.">
  <style>
    :root {
      --bg: #050505; --bg-elevated: #0f0f0f; --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08); --border: rgba(255,255,255,0.06);
      --text: #f0f0f0; --text-secondary: #888; --accent: #a855f7; --accent-light: #c084fc;
      --accent-glow: rgba(168,85,247,0.35); --radius: 16px; --radius-sm: 8px;
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height:1.5; }
    a { color:inherit; text-decoration:none; }
    img { max-width:100%; display:block; }

    /* Header */
    .header { position:sticky; top:0; z-index:100; height:70px; background: rgba(5,5,5,0.85); backdrop-filter: blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 4vw; }
    .logo { font-size:1.6rem; font-weight:800; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-right { display:flex; gap:16px; align-items:center; }
    .icon-btn { width:40px; height:40px; border-radius:50%; background: var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text); transition:var(--transition); }
    .icon-btn:hover { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

    /* Sidebar */
    .sidebar { position:fixed; top:0; left:-300px; width:300px; height:100vh; background: var(--bg-elevated); z-index:200; border-right:1px solid var(--border); transition: left 0.35s ease; padding:28px 20px; }
    .sidebar.open { left:0; }
    .sidebar-overlay { position:fixed; inset:0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index:199; opacity:0; pointer-events:none; transition: opacity 0.35s; }
    .sidebar-overlay.open { opacity:1; pointer-events:all; }
    .sidebar-title { font-size:1.2rem; font-weight:700; margin-bottom:20px; color:var(--accent-light); }
    .sidebar-link { display:block; padding:12px 14px; border-radius: var(--radius-sm); margin-bottom:6px; font-weight:500; transition:var(--transition); }
    .sidebar-link:hover { background: var(--surface); color: var(--accent-light); }

    /* Search Hero */
    .search-hero { padding: 50px 4vw 30px; max-width:900px; margin:0 auto; text-align:center; }
    .search-big {
      width:100%; padding:18px 24px; font-size:1.2rem; background: var(--surface);
      border:1px solid var(--border); border-radius: 100px; color: var(--text); outline:none;
      transition: var(--transition); margin-bottom:20px;
    }
    .search-big:focus { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }

    /* Filters */
    .filters { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:24px; }
    .filter-select {
      padding: 10px 14px; border-radius: var(--radius-sm); background: var(--surface);
      border:1px solid var(--border); color: var(--text); font-size:0.9rem; outline:none;
      transition: var(--transition); cursor:pointer;
    }
    .filter-select:focus { border-color: var(--accent); }

    /* Grid */
    .results-grid {
      display:grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap:20px; max-width:1400px; margin:0 auto; padding: 0 4vw 40px;
    }
    .card {
      position:relative; border-radius: var(--radius-sm); overflow:hidden;
      cursor:pointer; transition: var(--transition); background: var(--bg-elevated);
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 12px 36px rgba(168,85,247,0.22); }
    .card-img { width:100%; height:250px; object-fit:cover; }
    .card-badge {
      position:absolute; top:8px; left:8px; padding:4px 8px; border-radius:4px;
      font-size:0.7rem; font-weight:700; background: var(--accent); color:#fff;
    }
    .card-score {
      position:absolute; top:8px; right:8px; background: rgba(0,0,0,0.65); color: var(--warning);
      padding:4px 8px; border-radius:4px; font-size:0.75rem; font-weight:700; backdrop-filter: blur(4px);
    }
    .card-info {
      position:absolute; bottom:0; left:0; right:0;
      padding:12px; background: linear-gradient(transparent, rgba(0,0,0,0.92));
    }
    .card-title { font-size:0.85rem; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    /* Sentinel */
    .sentinel { height:60px; display:flex; align-items:center; justify-content:center; color: var(--text-secondary); font-size:0.9rem; padding-bottom:40px; }

    /* Footer */
    .footer { border-top:1px solid var(--border); padding: 50px 4vw 30px; background: var(--bg-elevated); }
    .footer-bottom { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; color: var(--text-secondary); font-size:0.82rem; }

    @media (max-width: 640px) {
      .results-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:14px; }
      .card-img { height:200px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <a href="index.html" class="logo">AnimeStream</a>
    <div class="nav-right">
      <a href="index.html" class="icon-btn" aria-label="Home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      </a>
    </div>
  </header>

  <!-- Sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">Menu</div>
    <a href="index.html" class="sidebar-link">🏠 Home</a>
    <a href="schedule.html" class="sidebar-link">📅 Schedule</a>
    <a href="creator.html" class="sidebar-link">👤 Creator</a>
  </nav>

  <!-- Search -->
  <div class="search-hero">
    <input type="text" class="search-big" id="searchInput" placeholder="Search anime by title..." autocomplete="off">
    <div class="filters">
      <select class="filter-select" id="filterGenre"><option value="">All Genres</option></select>
      <select class="filter-select" id="filterType">
        <option value="">All Types</option><option value="tv">TV</option><option value="movie">Movie</option>
        <option value="ova">OVA</option><option value="ona">ONA</option><option value="special">Special</option>
      </select>
      <select class="filter-select" id="filterStatus">
        <option value="">All Status</option><option value="airing">Airing</option><option value="complete">Complete</option><option value="upcoming">Upcoming</option>
      </select>
      <select class="filter-select" id="filterSeason">
        <option value="">All Seasons</option><option value="winter">Winter</option><option value="spring">Spring</option><option value="summer">Summer</option><option value="fall">Fall</option>
      </select>
      <input type="number" class="filter-select" id="filterYear" placeholder="Year" style="width:100px;">
      <select class="filter-select" id="filterSort">
        <option value="popularity">Popularity</option><option value="score">Score</option><option value="members">Members</option><option value="start_date">Newest</option>
      </select>
    </div>
  </div>

  <!-- Results -->
  <div class="results-grid" id="results"></div>
  <div class="sentinel" id="sentinel">Scroll to load more...</div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-bottom">
      <span>© 2026 AnimeStream. All rights reserved.</span>
      <span>Built with Jikan API</span>
    </div>
  </footer>

  <script>
    const API = 'https://api.jikan.moe/v4';
    let page = 1, hasMore = true, isLoading = false;
    let currentQuery = '';

    async function fetchJikan(endpoint) {
      try { await new Promise(r=>setTimeout(r,350)); const res=await fetch(API+endpoint); if(!res.ok) throw new Error(res.status); const j=await res.json(); return {data:j.data, pagination:j.pagination}; }
      catch(e){ console.error(e); return null; }
    }

    /* Sidebar */
    const sidebar=document.getElementById('sidebar'), sidebarOverlay=document.getElementById('sidebarOverlay');
    function toggleSidebar(){ sidebar.classList.toggle('open'); sidebarOverlay.classList.toggle('open'); }
    document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    /* Genre Filter Populate */
    async function loadGenres() {
      const data = await fetchJikan('/genres/anime');
      if (!data || !data.data) return;
      const sel = document.getElementById('filterGenre');
      data.data.forEach(g => { const o=document.createElement('option'); o.value=g.mal_id; o.textContent=g.name; sel.appendChild(o); });
    }

    /* Search Logic */
    const results = document.getElementById('results');
    const sentinel = document.getElementById('sentinel');

    function getFilters() {
      const g = document.getElementById('filterGenre').value;
      const t = document.getElementById('filterType').value;
      const s = document.getElementById('filterStatus').value;
      const se = document.getElementById('filterSeason').value;
      const y = document.getElementById('filterYear').value;
      const so = document.getElementById('filterSort').value;
      let qs = `?page=${page}&limit=24`;
      if (currentQuery) qs += `&q=${encodeURIComponent(currentQuery)}`;
      if (g) qs += `&genres=${g}`;
      if (t) qs += `&type=${t}`;
      if (s) qs += `&status=${s}`;
      if (se) qs += `&season=${se}`;
      if (y) qs += `&start_date=${y}-01-01&end_date=${y}-12-31`;
      if (so) qs += `&order_by=${so}&sort=desc`;
      return qs;
    }

    function createCard(a) {
      return `
        <a href="anime.html?id=${a.mal_id}" class="card">
          <img class="card-img" src="${a.images.jpg.large_image_url}" alt="${a.title}" loading="lazy">
          <span class="card-badge">${a.type||''}</span>
          <span class="card-score">★ ${a.score||'N/A'}</span>
          <div class="card-info"><div class="card-title">${a.title}</div></div>
        </a>
      `;
    }

    async function doSearch(reset=false) {
      if (isLoading) return;
      if (reset) { page=1; hasMore=true; results.innerHTML=''; }
      if (!hasMore) return;
      isLoading = true;
      sentinel.textContent = 'Loading...';
      const data = await fetchJikan('/anime' + getFilters());
      isLoading = false;
      if (!data || !data.data) { sentinel.textContent = 'Error loading.'; return; }
      if (data.data.length === 0) { hasMore = false; sentinel.textContent = 'No more results.'; return; }
      results.innerHTML += data.data.map(createCard).join('');
      hasMore = data.pagination && data.pagination.has_next_page;
      sentinel.textContent = hasMore ? 'Scroll to load more...' : 'End of results.';
      page++;
    }

    /* Debounced input */
    let timeout;
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(timeout);
      currentQuery = e.target.value.trim();
      timeout = setTimeout(() => doSearch(true), 500);
    });

    /* Filter changes */
    ['filterGenre','filterType','filterStatus','filterSeason','filterYear','filterSort'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => doSearch(true));
    });

    /* Infinite Scroll */
    const observer = new IntersectionObserver(entries => { if (entries[0].isIntersecting) doSearch(); }, { rootMargin: '200px' });
    observer.observe(sentinel);

    /* Restore last query */
    const lastQ = localStorage.getItem('lastSearchQuery');
    if (lastQ) { document.getElementById('searchInput').value = lastQ; currentQuery = lastQ; }
    window.addEventListener('beforeunload', () => localStorage.setItem('lastSearchQuery', currentQuery));

    loadGenres();
    doSearch(true);
  </script>
</body>
</html>
