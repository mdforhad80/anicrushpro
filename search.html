<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Search and filter anime by genre, season, year, and more.">
<title>Search Anime - AnimeStream</title>
<style>
:root {
  --bg: #0a0a0f; --bg-elevated: #12121a; --bg-card: #1a1a2e; --bg-glass: rgba(26,26,46,0.85);
  --primary: #a855f7; --primary-light: #c084fc; --primary-dark: #7e22ce; --accent: #f472b6;
  --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
  --border: rgba(168,85,247,0.15); --border-glow: rgba(168,85,247,0.3);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3); --shadow-md: 0 4px 20px rgba(0,0,0,0.4); --shadow-glow: 0 0 20px rgba(168,85,247,0.2);
  --transition-fast: 0.2s ease; --transition-normal: 0.3s ease; --transition-slow: 0.5s ease;
  --header-height: clamp(56px, 8vh, 72px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100%; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }
ul, ol { list-style: none; }
input, select { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 3px; }
.skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, #252545 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Header */
.header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); background: rgba(10,10,15,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(12px, 3vw, 24px); }
.header-left, .header-right { display: flex; align-items: center; gap: clamp(8px, 2vw, 16px); flex-shrink: 0; }
.header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
.logo { font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; letter-spacing: -0.5px; }
.logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }
.menu-btn, .search-btn { width: clamp(36px, 5vw, 44px); height: clamp(36px, 5vw, 44px); display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); background: var(--bg-card); border: 1px solid var(--border); color: var(--text); transition: var(--transition-fast); flex-shrink: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.menu-btn:hover, .search-btn:hover { background: var(--primary-dark); border-color: var(--primary); box-shadow: var(--shadow-glow); }
.menu-btn svg, .search-btn svg { width: clamp(18px, 2.5vw, 22px); height: clamp(18px, 2.5vw, 22px); }

/* Sidebar */
.sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1001; opacity: 0; visibility: hidden; transition: var(--transition-normal); }
.sidebar-overlay.active { opacity: 1; visibility: visible; }
.sidebar { position: fixed; top: 0; left: 0; width: min(280px, 80vw); height: 100vh; height: 100dvh; background: var(--bg-elevated); border-right: 1px solid var(--border); z-index: 1002; transform: translateX(-100%); transition: transform var(--transition-normal); overflow-y: auto; padding: var(--header-height) 0 0 0; }
.sidebar.active { transform: translateX(0); }
.sidebar-nav { padding: 16px; }
.sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-md); color: var(--text-muted); font-size: 0.95rem; transition: var(--transition-fast); margin-bottom: 4px; }
.sidebar-nav a:hover, .sidebar-nav a.active { background: var(--bg-card); color: var(--primary-light); }
.sidebar-nav svg { width: 20px; height: 20px; flex-shrink: 0; }

/* Search Overlay */
.search-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.97); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 1003; opacity: 0; visibility: hidden; transition: var(--transition-normal); display: flex; flex-direction: column; align-items: center; padding: var(--header-height) clamp(12px, 3vw, 24px) 24px; max-width: 100%; overflow-x: hidden; }
.search-overlay.active { opacity: 1; visibility: visible; }
.search-container { width: 100%; max-width: min(700px, 100%); position: relative; }
.search-input-wrap { display: flex; align-items: center; gap: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: clamp(10px, 2vw, 14px) clamp(16px, 3vw, 24px); transition: var(--transition-fast); width: 100%; }
.search-input-wrap:focus-within { border-color: var(--primary); box-shadow: var(--shadow-glow); }
.search-input-wrap svg { width: 20px; height: 20px; color: var(--text-muted); flex-shrink: 0; }
.search-input { flex: 1; background: none; border: none; color: var(--text); font-size: clamp(0.95rem, 2vw, 1.1rem); outline: none; min-width: 0; }
.search-input::placeholder { color: var(--text-dim); }
.search-close { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--bg-elevated); color: var(--text-muted); flex-shrink: 0; transition: var(--transition-fast); }
.search-close:hover { background: var(--primary-dark); color: var(--text); }
.search-results { width: 100%; max-width: min(700px, 100%); margin-top: 16px; max-height: calc(100dvh - var(--header-height) - 100px); overflow-y: auto; overflow-x: hidden; border-radius: var(--radius-lg); }
.search-suggestion { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition-fast); overflow: hidden; }
.search-suggestion:hover { background: var(--bg-card); }
.search-suggestion img { width: 40px; height: 56px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; }
.search-suggestion-info { min-width: 0; }
.search-suggestion-title { font-size: 0.9rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-suggestion-meta { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-empty, .search-loading { text-align: center; padding: 40px 20px; color: var(--text-muted); }

/* Search Page Content */
.search-page { margin-top: var(--header-height); padding: clamp(20px, 3vw, 32px) clamp(12px, 3vw, 24px); max-width: 1400px; margin-left: auto; margin-right: auto; }
.search-page-title { font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: 800; margin-bottom: 20px; }

/* Filters */
.filters { display: flex; flex-wrap: wrap; gap: clamp(8px, 1.5vw, 12px); margin-bottom: clamp(20px, 3vw, 28px); }
.filter-group { display: flex; flex-direction: column; gap: 6px; }
.filter-label { font-size: clamp(0.7rem, 1vw, 0.8rem); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.filter-select, .filter-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  color: var(--text);
  font-size: clamp(0.85rem, 1.2vw, 0.9rem);
  outline: none;
  min-width: clamp(120px, 15vw, 160px);
  transition: var(--transition-fast);
  appearance: none;
  -webkit-appearance: none;
}
.filter-select:focus, .filter-input:focus { border-color: var(--primary); box-shadow: var(--shadow-glow); }
.filter-input { min-width: clamp(160px, 20vw, 240px); }

/* Search Grid */
.search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(140px, 18vw, 190px), 1fr)); gap: clamp(12px, 2vw, 18px); }
.anime-card {
  position: relative;
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--bg-card);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  cursor: pointer;
}
.anime-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-glow); }
.anime-card-img {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
}
.anime-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform var(--transition-slow);
}
.anime-card:hover .anime-card-img img { transform: scale(1.08); }
.anime-card-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10,10,15,0.9) 0%, transparent 50%);
  pointer-events: none;
}
.anime-card-badges {
  position: absolute;
  top: 8px;
  left: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  z-index: 2;
}
.badge {
  font-size: clamp(0.6rem, 0.9vw, 0.7rem);
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-score { background: rgba(251,191,36,0.9); color: #000; }
.badge-hd { background: rgba(168,85,247,0.9); color: white; }
.badge-ep { background: rgba(59,130,246,0.9); color: white; }
.badge-type { background: rgba(16,185,129,0.9); color: white; }
.anime-card-info {
  padding: clamp(8px, 1.2vw, 12px);
}
.anime-card-title {
  font-size: clamp(0.78rem, 1.1vw, 0.9rem);
  font-weight: 600;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
}
.anime-card-sub {
  font-size: clamp(0.68rem, 0.9vw, 0.78rem);
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Load More */
.load-more { text-align: center; margin-top: clamp(24px, 4vw, 40px); }
.load-more-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: clamp(10px, 1.5vw, 14px) clamp(24px, 3vw, 36px);
  border-radius: var(--radius-xl);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  font-size: clamp(0.85rem, 1.2vw, 0.95rem);
  font-weight: 600;
  transition: var(--transition-fast);
  box-shadow: 0 4px 15px rgba(168,85,247,0.3);
}
.load-more-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(168,85,247,0.4); }
.load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Footer */
.footer { border-top: 1px solid var(--border); padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 24px); text-align: center; margin-top: clamp(20px, 4vw, 40px); }
.footer-text { font-size: clamp(0.8rem, 1.2vw, 0.9rem); color: var(--text-dim); margin-bottom: 12px; }
.footer-social { display: flex; justify-content: center; gap: 16px; }
.footer-social a { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); transition: var(--transition-fast); }
.footer-social a:hover { background: var(--primary-dark); color: var(--text); border-color: var(--primary); }
.footer-social svg { width: 18px; height: 18px; }

/* Error */
.error-fallback { text-align: center; padding: 40px 20px; color: var(--text-muted); grid-column: 1 / -1; }
</style>

<script>
const CONFIG = { API_BASE: 'https://api.jikan.moe/v4', CACHE_TTL: 5*60*1000, RETRY_ATTEMPTS: 3, RETRY_DELAY: 1000, REQUEST_TIMEOUT: 8000, DEBOUNCE_DELAY: 350, PAGE_SIZE: 24 };
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));
const sleep = ms => new Promise(r => setTimeout(r, ms));
function debounce(fn, delay) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); }; }
function getCache(key) { try { const item = localStorage.getItem('animestream_' + key); if (!item) return null; const {data,ts} = JSON.parse(item); if (Date.now()-ts > CONFIG.CACHE_TTL) { localStorage.removeItem('animestream_' + key); return null; } return data; } catch { return null; } }
function setCache(key, data) { try { localStorage.setItem('animestream_' + key, JSON.stringify({data, ts: Date.now()})); } catch {} }
async function fetchWithRetry(url, options={}, attempt=1) { const controller = new AbortController(); const timeout = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT); try { const res = await fetch(url, {...options, signal: controller.signal}); clearTimeout(timeout); if (!res.ok) throw new Error(`HTTP ${res.status}`); return await res.json(); } catch(err) { clearTimeout(timeout); if (attempt < CONFIG.RETRY_ATTEMPTS) { await sleep(CONFIG.RETRY_DELAY*attempt); return fetchWithRetry(url, options, attempt+1); } throw err; } }
async function fetchJikan(endpoint, params='') { const cacheKey = endpoint+params; const cached = getCache(cacheKey); if (cached) return cached; const url = `${CONFIG.API_BASE}${endpoint}${params}`; const data = await fetchWithRetry(url); setCache(cacheKey, data); return data; }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',''':'&#39;'}[m])); }
function getImageUrl(images, fallback='') { if (!images) return fallback; return images.webp?.large_image_url || images.webp?.image_url || images.jpg?.large_image_url || images.jpg?.image_url || fallback; }

let currentPage = 1;
let isLoading = false;
let hasMore = true;

function buildCard(anime) {
  if (!anime) return '';
  const img = getImageUrl(anime.images);
  const score = anime.score ? anime.score.toFixed(1) : 'N/A';
  const episodes = anime.episodes || '?';
  const type = anime.type || 'TV';
  const year = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '');
  return `<div class="anime-card" onclick="location.href='anime.html?id=${anime.mal_id}'" role="link" tabindex="0">
    <div class="anime-card-img">
      <img src="${escapeHtml(img)}" alt="${escapeHtml(anime.title || 'Anime')}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22150%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2364748b%22 font-size=%2212%22%3ENo Image%3C/text%3E%3C/svg%3E'">
      <div class="anime-card-gradient"></div>
      <div class="anime-card-badges">
        <span class="badge badge-score">${escapeHtml(score)}</span>
        <span class="badge badge-hd">HD</span>
        ${episodes !== '?' ? `<span class="badge badge-ep">EP ${escapeHtml(String(episodes))}</span>` : ''}
        <span class="badge badge-type">${escapeHtml(type)}</span>
      </div>
    </div>
    <div class="anime-card-info">
      <div class="anime-card-title">${escapeHtml(anime.title || 'Unknown')}</div>
      <div class="anime-card-sub">${escapeHtml([year].filter(Boolean).join(' • '))}</div>
    </div>
  </div>`;
}

function buildSkeletonCard() {
  return `<div class="anime-card"><div class="anime-card-img skeleton" style="aspect-ratio:2/3"></div><div class="anime-card-info"><div class="skeleton" style="height:14px;margin-bottom:6px;border-radius:4px"></div><div class="skeleton" style="height:10px;width:60%;border-radius:4px"></div></div></div>`;
}

function renderSkeletons(count=CONFIG.PAGE_SIZE) {
  const grid = $('#searchGrid');
  grid.innerHTML = Array(count).fill(0).map(() => buildSkeletonCard()).join('');
}

function getFilterParams() {
  const params = new URLSearchParams();
  const q = $('#filterQuery').value.trim();
  if (q) params.append('q', q);
  const genre = $('#filterGenre').value;
  if (genre) params.append('genres', genre);
  const type = $('#filterType').value;
  if (type) params.append('type', type);
  const status = $('#filterStatus').value;
  if (status) params.append('status', status);
  const season = $('#filterSeason').value;
  if (season) params.append('season', season);
  const year = $('#filterYear').value;
  if (year) params.append('start_date', year + '-01-01');
  const sort = $('#filterSort').value;
  if (sort) params.append('order_by', sort);
  params.append('limit', CONFIG.PAGE_SIZE);
  params.append('page', currentPage);
  return '?' + params.toString();
}

async function loadResults(append=false) {
  if (isLoading) return;
  isLoading = true;
  const grid = $('#searchGrid');
  const btn = $('#loadMoreBtn');
  if (!append) { currentPage = 1; hasMore = true; renderSkeletons(); }
  if (btn) btn.disabled = true;

  try {
    const data = await fetchJikan('/anime', getFilterParams());
    const items = data?.data || [];
    const pagination = data?.pagination || {};
    hasMore = pagination.has_next_page || false;

    if (!append) grid.innerHTML = '';
    if (!items.length && !append) {
      grid.innerHTML = '<div class="error-fallback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48" style="margin-bottom:12px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>No anime found matching your filters.</p></div>';
      $('#loadMoreWrap').style.display = 'none';
      isLoading = false;
      return;
    }

    const html = items.map(buildCard).join('');
    if (append) grid.insertAdjacentHTML('beforeend', html);
    else grid.innerHTML = html;

    $('#loadMoreWrap').style.display = hasMore ? 'block' : 'none';
  } catch (e) {
    console.error(e);
    if (!append) grid.innerHTML = '<div class="error-fallback"><p>Failed to load results. Please try again.</p></div>';
  } finally {
    isLoading = false;
    if (btn) btn.disabled = false;
  }
}

function setupFilters() {
  const years = [];
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= 1970; y--) years.push(`<option value="${y}">${y}</option>`);
  $('#filterYear').insertAdjacentHTML('beforeend', years.join(''));

  $$('.filter-select, .filter-input').forEach(el => {
    el.addEventListener('change', () => { currentPage = 1; loadResults(false); });
    if (el.tagName === 'INPUT') {
      el.addEventListener('input', debounce(() => { currentPage = 1; loadResults(false); }, CONFIG.DEBOUNCE_DELAY));
    }
  });

  $('#loadMoreBtn')?.addEventListener('click', () => { currentPage++; loadResults(true); });
}

async function loadGenres() {
  try {
    const data = await fetchJikan('/genres/anime');
    const genres = data?.data || [];
    const select = $('#filterGenre');
    genres.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g.mal_id;
      opt.textContent = g.name;
      select.appendChild(opt);
    });
  } catch (e) { console.error('Failed to load genres', e); }
}

/* Infinite scroll */
function setupInfiniteScroll() {
  const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && hasMore && !isLoading) {
      currentPage++;
      loadResults(true);
    }
  }, { rootMargin: '200px' });
  observer.observe($('#loadMoreWrap'));
}

/* Search Overlay */
let searchController = null;
async function doSearch(query) {
  const results = $('#searchResults');
  if (!results) return;
  if (!query.trim()) { results.innerHTML = ''; return; }
  if (searchController) searchController.abort();
  searchController = new AbortController();
  results.innerHTML = `<div class="search-loading"><div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:8px"></div><div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:8px"></div><div class="skeleton" style="height:60px;border-radius:8px"></div></div>`;
  try {
    const data = await fetchWithRetry(`${CONFIG.API_BASE}/anime?q=${encodeURIComponent(query)}&limit=10`, { signal: searchController.signal });
    const items = data?.data || [];
    if (!items.length) { results.innerHTML = `<div class="search-empty">No results found for "${escapeHtml(query)}"</div>`; return; }
    results.innerHTML = items.map(anime => {
      const img = getImageUrl(anime.images);
      const meta = [anime.type, anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '', anime.score ? `Score: ${anime.score}` : ''].filter(Boolean).join(' • ');
      return `<div class="search-suggestion" onclick="location.href='anime.html?id=${anime.mal_id}'"><img src="${escapeHtml(img)}" alt="" loading="lazy" onerror="this.style.display='none'"><div class="search-suggestion-info"><div class="search-suggestion-title">${escapeHtml(anime.title)}</div><div class="search-suggestion-meta">${escapeHtml(meta)}</div></div></div>`;
    }).join('');
  } catch (err) { if (err.name !== 'AbortError') results.innerHTML = `<div class="search-empty">Search failed. Please try again.</div>`; }
}
const debouncedSearch = debounce(doSearch, CONFIG.DEBOUNCE_DELAY);

function setupSearch() {
  const overlay = $('#searchOverlay');
  const input = $('#searchInput');
  const btn = $('#searchBtn');
  const close = $('#searchClose');
  if (!overlay || !input || !btn) return;
  const open = () => { overlay.classList.add('active'); document.body.style.overflow = 'hidden'; setTimeout(() => input.focus(), 100); };
  const closeFn = () => { overlay.classList.remove('active'); document.body.style.overflow = ''; input.value = ''; $('#searchResults').innerHTML = ''; };
  btn.addEventListener('click', open);
  close?.addEventListener('click', closeFn);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeFn(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('active')) closeFn(); if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); open(); } });
  input.addEventListener('input', e => debouncedSearch(e.target.value));
}

function setupSidebar() {
  const menuBtn = $('#menuBtn');
  const sidebar = $('#sidebar');
  const overlay = $('#sidebarOverlay');
  if (!menuBtn || !sidebar || !overlay) return;
  const open = () => { sidebar.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; };
  const close = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; };
  menuBtn.addEventListener('click', open);
  overlay.addEventListener('click', close);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
}

document.addEventListener('DOMContentLoaded', () => {
  setupSidebar();
  setupSearch();
  setupFilters();
  loadGenres().then(() => loadResults(false));
  setupInfiniteScroll();
}, { once: true });
</script>
</body>
</html>
