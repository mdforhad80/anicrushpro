<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Search and filter anime by genre, season, year, type, and sort options.">
<meta name="theme-color" content="#050505">
<title>Search Anime - AnimeStream</title>
<style>
/* ==================== VARIABLES & RESET ==================== */
:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --primary: #8b5cf6;
  --primary-glow: rgba(139,92,246,0.35);
  --secondary: #a78bfa;
  --text: #f3f4f6;
  --text-muted: #9ca3af;
  --border: rgba(255,255,255,0.08);
  --radius: 12px;
  --radius-lg: 16px;
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-x: hidden;
  max-width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
ul, ol { list-style: none; }

/* ==================== UTILITIES ==================== */
.glass {
  background: rgba(17,17,17,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
}
.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
.text-gradient {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ==================== HEADER ==================== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px);
  transition: var(--transition);
}
.header.scrolled {
  background: rgba(5,5,5,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.menu-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.menu-btn:hover { background: var(--surface-2); }
.menu-btn svg { width: 22px; height: 22px; stroke: var(--text); }
.logo {
  font-size: clamp(1.1rem, 2vw, 1.5rem);
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #fff; font-size: 14px;
}

/* ==================== SIDEBAR ==================== */
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(280px, 80vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 1101;
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  padding: 20px;
}
.sidebar.active { transform: translateX(0); }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.sidebar-close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.sidebar-close:hover { background: var(--surface-2); }
.sidebar-close svg { width: 20px; height: 20px; stroke: var(--text); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-muted);
  transition: var(--transition);
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  background: rgba(139,92,246,0.12);
  color: var(--primary);
}
.sidebar-nav a svg { width: 20px; height: 20px; stroke: currentColor; flex-shrink: 0; }

/* ==================== SEARCH HERO ==================== */
.search-hero {
  padding: clamp(80px, 12vh, 140px) clamp(16px, 3vw, 32px) clamp(24px, 4vh, 48px);
  text-align: center;
  max-width: 800px;
  margin: 0 auto;
}
.search-hero h1 {
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  font-weight: 800;
  margin-bottom: 20px;
}
.search-bar-wrap {
  position: relative;
  max-width: 600px;
  margin: 0 auto 24px;
}
.search-bar-wrap svg {
  position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; stroke: var(--text-muted); pointer-events: none;
}
.search-bar {
  width: 100%;
  padding: 16px 20px 16px 52px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: var(--transition);
}
.search-bar:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px var(--primary-glow);
}

/* ==================== FILTERS ==================== */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  max-width: 900px;
  margin: 0 auto 32px;
  padding: 0 clamp(12px, 3vw, 32px);
}
.filter-select {
  padding: 10px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
  transition: var(--transition);
  min-width: 120px;
}
.filter-select:focus { border-color: var(--primary); }
.filter-select option { background: var(--surface-2); color: var(--text); }

/* ==================== RESULTS GRID ==================== */
.results-section {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 clamp(12px, 3vw, 32px);
}
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: clamp(16px, 2vw, 24px);
}
@media (max-width: 480px) {
  .results-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
}
@media (min-width: 481px) and (max-width: 768px) {
  .results-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
}
@media (min-width: 769px) and (max-width: 1024px) {
  .results-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
}
@media (min-width: 1025px) and (max-width: 1400px) {
  .results-grid { grid-template-columns: repeat(5, 1fr); gap: 20px; }
}
@media (min-width: 1401px) {
  .results-grid { grid-template-columns: repeat(6, 1fr); gap: 24px; }
}

/* ==================== ANIME CARD ==================== */
.anime-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface-2);
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  cursor: pointer;
}
.anime-card:hover {
  transform: scale(1.04) translateY(-4px);
  box-shadow: 0 20px 40px rgba(139,92,246,0.18);
}
.anime-card .card-img-wrap {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
  background: var(--surface-3);
}
.anime-card .card-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.anime-card:hover .card-img-wrap img { transform: scale(1.1); }
.anime-card .card-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
  pointer-events: none;
}
.anime-card .card-badges {
  position: absolute;
  top: 8px; left: 8px;
  display: flex; flex-wrap: wrap; gap: 4px;
  z-index: 2;
}
.anime-card .badge {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-hd { background: #ef4444; color: #fff; }
.badge-score { background: rgba(0,0,0,0.6); color: #fbbf24; backdrop-filter: blur(4px); }
.badge-ep { background: var(--primary); color: #fff; }
.badge-type { background: rgba(255,255,255,0.15); color: #fff; }
.anime-card .card-info {
  padding: 10px 12px 14px;
}
.anime-card .card-title {
  font-size: 0.85rem;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 4px;
  color: var(--text);
}
.anime-card .card-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.anime-card .card-meta .dot { width: 3px; height: 3px; background: var(--text-muted); border-radius: 50%; }

/* ==================== LOADING / EMPTY ==================== */
.load-more {
  display: flex;
  justify-content: center;
  padding: 32px;
}
.load-more-btn {
  padding: 12px 32px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 0.9rem;
  transition: var(--transition);
}
.load-more-btn:hover { background: #7c3aed; transform: translateY(-2px); }
.load-more-btn:disabled {
  background: var(--surface-3);
  color: var(--text-muted);
  cursor: not-allowed;
  transform: none;
}
.results-empty {
  text-align: center;
  padding: 64px 16px;
  color: var(--text-muted);
  font-size: 1rem;
}

/* ==================== FOOTER ==================== */
.footer {
  border-top: 1px solid var(--border);
  padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 32px);
  text-align: center;
  margin-top: 40px;
}
.footer-text {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.footer-social {
  display: flex; justify-content: center; gap: 16px;
}
.footer-social a {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.footer-social a:hover {
  background: var(--primary);
  border-color: var(--primary);
  transform: translateY(-2px);
}
.footer-social a svg { width: 16px; height: 16px; stroke: var(--text-muted); }
.footer-social a:hover svg { stroke: #fff; }

/* ==================== RESPONSIVE ==================== */
@media (max-width: 640px) {
  .filters { gap: 8px; }
  .filter-select { padding: 8px 10px; font-size: 0.8rem; min-width: 100px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<script>
(function() {
  'use strict';

  const API_BASE = 'https://api.jikan.moe/v4';
  const CACHE_TTL = 5 * 60 * 1000;
  const RATE_DELAY = 400;

  const ApiEngine = {
    cache: {}, lastRequest: 0,
    getCacheKey(url) { return 'cache_' + url; },
    getCached(url) {
      const key = this.getCacheKey(url);
      const item = this.cache[key];
      if (!item) {
        try {
          const raw = localStorage.getItem(key);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Date.now() - parsed.time < CACHE_TTL) { this.cache[key] = parsed; return parsed.data; }
          }
        } catch(e) {}
        return null;
      }
      if (Date.now() - item.time < CACHE_TTL) return item.data;
      return null;
    },
    setCache(url, data) {
      const key = this.getCacheKey(url);
      const payload = { data, time: Date.now() };
      this.cache[key] = payload;
      try { localStorage.setItem(key, JSON.stringify(payload)); } catch(e) {}
    },
    async fetchWithTimeout(url, timeout = 10000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (e) { clearTimeout(id); throw e; }
    },
    async fetch(url, retries = 3) {
      const cached = this.getCached(url);
      if (cached) return cached;
      const now = Date.now();
      const wait = Math.max(0, this.lastRequest + RATE_DELAY - now);
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      this.lastRequest = Date.now();
      let lastError;
      for (let i = 0; i < retries; i++) {
        try {
          if (i > 0) await new Promise(r => setTimeout(r, 1200 * i));
          const response = await this.fetchWithTimeout(url);
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const json = await response.json();
          if (!json || !json.data) throw new Error('Invalid response');
          this.setCache(url, json);
          return json;
        } catch (e) { lastError = e; }
      }
      throw lastError;
    },
    async fetchSafe(url, fallbackData = null) {
      try { return await this.fetch(url); }
      catch (e) { console.warn('API fetch failed:', url, e.message); return { data: fallbackData }; }
    }
  };

  function sanitize(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getTitle(anime) {
    return sanitize(anime.title_english || anime.title || 'Unknown');
  }

  function getImage(anime) {
    if (!anime.images || !anime.images.jpg) return '';
    return anime.images.jpg.large_image_url || anime.images.jpg.image_url || '';
  }

  // ==================== STATE ====================
  const state = {
    query: '',
    page: 1,
    loading: false,
    hasMore: true,
    filters: {
      type: '',
      status: '',
      genre: '',
      year: '',
      season: '',
      sort: ''
    }
  };

  // ==================== RENDER CARD ====================
  function renderAnimeCard(anime) {
    const malId = anime.mal_id || 0;
    const img = getImage(anime) || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
    const title = getTitle(anime);
    const score = anime.score ? anime.score.toFixed(1) : '';
    const episodes = anime.episodes || (anime.type === 'Movie' ? '1' : '?');
    const type = sanitize(anime.type || 'TV');
    const status = sanitize(anime.status || '');
    const year = anime.year || (anime.aired && anime.aired.string ? anime.aired.string.split(' ').pop() : '');
    return `
      <a href="anime.html?id=${malId}" class="anime-card fade-in">
        <div class="card-img-wrap">
          <img src="${img}" alt="${title}" loading="lazy">
          <div class="card-gradient"></div>
          <div class="card-badges">
            <span class="badge badge-hd">HD</span>
            ${score ? `<span class="badge badge-score">${score}</span>` : ''}
            ${episodes ? `<span class="badge badge-ep">EP ${episodes}</span>` : ''}
            <span class="badge badge-type">${type}</span>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title clamp-2">${title}</div>
          <div class="card-meta">
            <span>${status}</span>
            ${year ? `<span class="dot"></span><span>${year}</span>` : ''}
          </div>
        </div>
      </a>
    `;
  }

  // ==================== BUILD URL ====================
  function buildUrl(resetPage = false) {
    if (resetPage) state.page = 1;
    const params = new URLSearchParams();
    params.set('page', state.page);
    params.set('limit', '24');
    if (state.query) params.set('q', state.query);
    if (state.filters.type) params.set('type', state.filters.type);
    if (state.filters.status) params.set('status', state.filters.status);
    if (state.filters.genre) params.set('genres', state.filters.genre);
    if (state.filters.year) {
      params.set('start_date', state.filters.year + '-01-01');
      params.set('end_date', state.filters.year + '-12-31');
    }
    if (state.filters.season) params.set('season', state.filters.season);
    if (state.filters.sort) {
      params.set('order_by', state.filters.sort);
      params.set('sort', 'desc');
    }
    return `${API_BASE}/anime?${params.toString()}`;
  }

  // ==================== SEARCH ====================
  async function performSearch(reset = false) {
    if (state.loading) return;
    state.loading = true;
    const grid = document.getElementById('resultsGrid');
    const btn = document.getElementById('loadMoreBtn');
    if (btn) btn.disabled = true;

    if (reset) {
      grid.innerHTML = '';
      state.hasMore = true;
      for (let i = 0; i < 6; i++) {
        grid.innerHTML += '<div class="skeleton" style="aspect-ratio:2/3;"></div>';
      }
    }

    try {
      const res = await ApiEngine.fetchSafe(buildUrl(reset));
      const data = (res && res.data) ? res.data : [];
      const pagination = (res && res.pagination) ? res.pagination : {};

      if (reset) grid.innerHTML = '';

      if (!data.length && state.page === 1) {
        grid.innerHTML = '<div class="results-empty">No anime found matching your criteria.</div>';
        state.hasMore = false;
      } else {
        data.forEach(anime => {
          if (anime) grid.insertAdjacentHTML('beforeend', renderAnimeCard(anime));
        });
        state.hasMore = pagination.has_next_page !== false && data.length === 24;
      }

      state.page += 1;
    } catch (e) {
      console.error(e);
      if (state.page === 1) {
        grid.innerHTML = '<div class="results-empty">Failed to load results. Please try again.</div>';
      }
      state.hasMore = false;
    } finally {
      state.loading = false;
      if (btn) {
        btn.disabled = false;
        btn.style.display = state.hasMore ? 'inline-flex' : 'none';
      }
    }
  }

  // ==================== EVENT LISTENERS ====================
  function initFilters() {
    const searchBar = document.getElementById('searchBar');
    let debounceTimer;
    searchBar.addEventListener('input', (e) => {
      state.query = e.target.value.trim();
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => performSearch(true), 400);
    });

    ['filterType', 'filterStatus', 'filterGenre', 'filterYear', 'filterSeason', 'filterSort'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('change', () => {
        const key = id.replace('filter', '').toLowerCase();
        state.filters[key] = el.value;
        performSearch(true);
      });
    });

    document.getElementById('loadMoreBtn').addEventListener('click', () => performSearch(false));

    // Infinite scroll
    let scrollTimer;
    window.addEventListener('scroll', () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        if (!state.hasMore || state.loading) return;
        const scrollBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 800;
        if (scrollBottom) performSearch(false);
      }, 200);
    }, { passive: true });
  }

  // ==================== MOBILE NAV ====================
  const MobileNav = {
    sidebar: document.getElementById('sidebar'),
    overlay: document.getElementById('sidebarOverlay'),
    open() { this.sidebar.classList.add('active'); this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; },
    close() { this.sidebar.classList.remove('active'); this.overlay.classList.remove('active'); document.body.style.overflow = ''; },
    init() {
      document.getElementById('menuBtn').addEventListener('click', () => this.open());
      document.getElementById('sidebarClose').addEventListener('click', () => this.close());
      this.overlay.addEventListener('click', () => this.close());
    }
  };

  function initHeaderScroll() {
    const header = document.getElementById('header');
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { header.classList.toggle('scrolled', window.scrollY > 40); ticking = false; });
        ticking = true;
      }
    }, { passive: true });
  }

  // ==================== APP INIT ====================
  async function initApp() {
    initHeaderScroll();
    MobileNav.init();
    initFilters();
    await performSearch(true);
  }

  if (!window.__appInitialized) {
    window.__appInitialized = true;
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  }
})();
</script>
</body>
</html>
