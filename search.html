<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
<title>Search Anime - AniVerse</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;max-width:100%;scroll-behavior:smooth}
body{overflow-x:hidden;max-width:100%;background:#0a0a0f;color:#e8e8f0;font-family:'Nunito',sans-serif;min-height:100vh}
:root{
  --bg:#0a0a0f;--bg2:#0f0f1a;--card:#12121e;--card2:#1a1a2e;
  --accent:#7c3aed;--accent2:#a855f7;--accent3:#c084fc;
  --gold:#fbbf24;--green:#22c55e;--text:#e8e8f0;--text2:#a0a0b8;--text3:#6b6b88;
  --border:rgba(124,58,237,0.2);--glass:rgba(255,255,255,0.04);
  --glow:0 0 20px rgba(124,58,237,0.4);--radius:12px;--radius2:8px;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);--header-h:70px;
}
::-webkit-scrollbar{width:6px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.4s ease both}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-h);display:flex;align-items:center;padding:0 clamp(12px,3vw,28px);gap:clamp(8px,2vw,20px);background:rgba(10,10,15,0.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.h-left{display:flex;align-items:center;gap:12px;flex-shrink:0}
.hamburger{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:var(--transition)}
.hamburger:hover span{background:var(--accent2)}
.h-center{flex:1;display:flex;justify-content:center;min-width:0}
.logo{font-family:'Rajdhani',sans-serif;font-size:clamp(20px,4vw,28px);font-weight:700;text-decoration:none;color:var(--text);letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--accent2)}
.h-right{display:flex;align-items:center;gap:clamp(6px,1.5vw,14px);flex-shrink:0}
.h-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:8px;border-radius:8px;transition:var(--transition);display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px}
.h-btn:hover{color:var(--accent2);background:var(--glass)}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;padding:6px 10px;border-radius:6px;transition:var(--transition);white-space:nowrap}
.nav-link:hover,.nav-link.active{color:var(--accent2)}
@media(max-width:768px){.nav-links{display:none}}

/* SIDEBAR */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:min(280px,85vw);background:var(--bg2);border-right:1px solid var(--border);z-index:1500;transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);overflow-y:auto}
#sidebar.open{transform:translateX(0)}
#sideOverlay{position:fixed;inset:0;z-index:1400;background:rgba(0,0,0,0.7);opacity:0;pointer-events:none;transition:opacity 0.3s}
#sideOverlay.open{opacity:1;pointer-events:all}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.sidebar-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px;border-radius:6px}
.sidebar-nav{padding:16px 12px}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius2);color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;transition:var(--transition);margin-bottom:4px}
.sidebar-link:hover,.sidebar-link.active{color:var(--text);background:var(--glass);border-left:3px solid var(--accent2)}

main{padding-top:var(--header-h);min-height:100vh;overflow-x:hidden}

/* SEARCH HERO */
.search-hero{padding:clamp(28px,5vw,56px) clamp(12px,4vw,32px) clamp(16px,3vw,32px);text-align:center;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%)}
.search-hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(24px,5vw,40px);font-weight:700;margin-bottom:16px}
.search-hero h1 span{color:var(--accent2)}
.search-main-box{position:relative;width:100%;max-width:min(600px,calc(100vw - 24px));margin:0 auto}
.search-main-input{width:100%;background:var(--card2);border:2px solid var(--border);border-radius:50px;padding:clamp(12px,2vw,16px) clamp(50px,8vw,64px) clamp(12px,2vw,16px) clamp(16px,3vw,24px);font-size:clamp(14px,2vw,16px);font-family:'Nunito',sans-serif;color:var(--text);outline:none;transition:var(--transition)}
.search-main-input:focus{border-color:var(--accent2);box-shadow:var(--glow)}
.search-main-input::placeholder{color:var(--text3)}
.search-main-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;border-radius:50px;padding:10px 20px;color:#fff;font-weight:700;font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;transition:var(--transition);white-space:nowrap}
.search-main-btn:hover{background:var(--accent2)}

/* LAYOUT */
.search-layout{display:grid;grid-template-columns:min(260px,30vw) 1fr;gap:clamp(12px,2vw,24px);padding:clamp(12px,3vw,24px) clamp(12px,3vw,24px);max-width:100%;overflow:hidden}
@media(max-width:768px){.search-layout{grid-template-columns:1fr}}

/* FILTERS */
.filter-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(12px,2vw,20px);height:fit-content;position:sticky;top:calc(var(--header-h) + 12px);overflow:hidden}
@media(max-width:768px){.filter-panel{position:static}}
.filter-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.filter-group{margin-bottom:18px}
.filter-label{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:block}
.filter-select{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius2);font-size:13px;font-family:'Nunito',sans-serif;outline:none;cursor:pointer;transition:var(--transition);-webkit-appearance:none}
.filter-select:focus{border-color:var(--accent)}
.filter-tags{display:flex;flex-wrap:wrap;gap:6px}
.filter-tag{padding:5px 12px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:var(--transition);color:var(--text2)}
.filter-tag:hover,.filter-tag.active{background:var(--accent);border-color:var(--accent);color:#fff}
.apply-btn{width:100%;background:var(--accent);border:none;color:#fff;padding:11px;border-radius:var(--radius2);font-weight:700;font-size:14px;cursor:pointer;transition:var(--transition);font-family:'Nunito',sans-serif;margin-top:8px}
.apply-btn:hover{background:var(--accent2)}
.clear-btn{width:100%;background:var(--glass);border:1px solid var(--border);color:var(--text2);padding:9px;border-radius:var(--radius2);font-weight:600;font-size:13px;cursor:pointer;transition:var(--transition);font-family:'Nunito',sans-serif;margin-top:6px}
.clear-btn:hover{border-color:var(--accent);color:var(--text)}

/* RESULTS */
.results-area{min-width:0;overflow:hidden}
.results-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.results-count{font-size:14px;color:var(--text2)}
.results-count span{color:var(--text);font-weight:700}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(120px,18vw,160px),1fr));gap:clamp(8px,1.5vw,14px);max-width:100%}
.anime-card{background:var(--card);border-radius:var(--radius2);overflow:hidden;text-decoration:none;color:var(--text);transition:var(--transition);position:relative}
.anime-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.5),var(--glow2)}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--card2)}
.card-info{padding:8px}
.card-title{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px;line-height:1.4}
.card-badges{display:flex;flex-wrap:wrap;gap:3px}
.badge{font-size:9px;font-weight:700;letter-spacing:0.5px;padding:2px 5px;border-radius:3px}
.badge-score{background:rgba(251,191,36,0.15);color:var(--gold);border:1px solid rgba(251,191,36,0.2)}
.badge-type{background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid rgba(255,255,255,0.08)}
.badge-hd{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.card-hover-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--accent);color:#fff;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:var(--transition);z-index:2}
.anime-card:hover .card-hover-play{transform:translate(-50%,-50%) scale(1)}

.load-more-btn{display:block;width:100%;max-width:300px;margin:24px auto 0;background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:12px 24px;border-radius:30px;font-weight:700;font-size:14px;cursor:pointer;transition:var(--transition);font-family:'Nunito',sans-serif}
.load-more-btn:hover{border-color:var(--accent);color:var(--accent3)}
.load-more-btn:disabled{opacity:0.4;cursor:not-allowed}

.no-results{text-align:center;padding:60px 20px;color:var(--text2)}
.no-results .icon{font-size:48px;margin-bottom:12px}
.no-results h3{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}

footer{margin-top:40px;padding:24px clamp(12px,4vw,40px);border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:12px;background:var(--bg2)}
.footer-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px}
.footer-logo span{color:var(--accent2)}
.footer-copy{font-size:12px;color:var(--text3);text-align:center}
#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:var(--radius2);font-size:13px;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;max-width:calc(100vw - 48px)}
#toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<header id="header">
  <div class="h-left">
    <button class="hamburger" id="menuBtn"><span></span><span></span><span></span></button>
  </div>
  <div class="h-center">
    <a href="index.html" class="logo">Ani<span>Verse</span></a>
  </div>
  <div class="h-right">
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="search.html" class="nav-link active">Browse</a>
      <a href="schedule.html" class="nav-link">Schedule</a>
    </nav>
    <button class="h-btn" id="searchBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</header>

<div id="sideOverlay"></div>
<nav id="sidebar">
  <div class="sidebar-head">
    <a href="index.html" class="logo">Ani<span>Verse</span></a>
    <button class="sidebar-close" id="sideClose">✕</button>
  </div>
  <div class="sidebar-nav">
    <a href="index.html" class="sidebar-link">🏠 Home</a>
    <a href="search.html" class="sidebar-link active">🔍 Browse Anime</a>
    <a href="schedule.html" class="sidebar-link">📅 Schedule</a>
    <a href="creator.html" class="sidebar-link">👨‍💻 Creator</a>
  </div>
</nav>

<main>
  <div class="search-hero">
    <h1>Browse <span>Anime</span></h1>
    <div class="search-main-box">
      <input type="text" class="search-main-input" id="mainSearchInput" placeholder="Search by title..." autocomplete="off"/>
      <button class="search-main-btn" id="mainSearchBtn">Search</button>
    </div>
  </div>

  <div class="search-layout">
    <!-- FILTERS -->
    <aside class="filter-panel">
      <div class="filter-title">🔧 Filters</div>
      <div class="filter-group">
        <label class="filter-label">Type</label>
        <select class="filter-select" id="filterType">
          <option value="">All Types</option>
          <option value="tv">TV</option>
          <option value="movie">Movie</option>
          <option value="ova">OVA</option>
          <option value="ona">ONA</option>
          <option value="special">Special</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Status</label>
        <select class="filter-select" id="filterStatus">
          <option value="">Any Status</option>
          <option value="airing">Airing</option>
          <option value="complete">Completed</option>
          <option value="upcoming">Upcoming</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Sort By</label>
        <select class="filter-select" id="filterSort">
          <option value="bypopularity">Popularity</option>
          <option value="score">Score</option>
          <option value="rank">Rank</option>
          <option value="title">Title</option>
          <option value="start_date">Start Date</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Rating</label>
        <select class="filter-select" id="filterRating">
          <option value="">Any Rating</option>
          <option value="g">G - All Ages</option>
          <option value="pg">PG - Children</option>
          <option value="pg13">PG-13</option>
          <option value="r17">R - 17+</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Genres</label>
        <div class="filter-tags" id="genreTags">
          <div class="skeleton" style="width:60px;height:28px"></div>
          <div class="skeleton" style="width:70px;height:28px"></div>
          <div class="skeleton" style="width:50px;height:28px"></div>
        </div>
      </div>
      <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
      <button class="clear-btn" onclick="clearFilters()">Clear All</button>
    </aside>

    <!-- RESULTS -->
    <div class="results-area">
      <div class="results-head">
        <div class="results-count">Showing <span id="resultCount">0</span> results</div>
      </div>
      <div class="results-grid" id="resultsGrid">
        ${Array.from({length:20},()=>`<div class="anime-card"><div class="skeleton" style="width:100%;aspect-ratio:2/3"></div><div style="padding:8px"><div class="skeleton" style="width:80%;height:12px;margin-bottom:6px"></div><div class="skeleton" style="width:50%;height:10px"></div></div></div>`).join('')}
      </div>
      <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">Load More</button>
    </div>
  </div>
</main>

<footer>
  <div class="footer-logo">Ani<span>Verse</span></div>
  <p class="footer-copy">© 2025 AniVerse. Powered by Jikan API.</p>
</footer>
<div id="toast"></div>

<script>
const API='https://api.jikan.moe/v4';
const CACHE={};
let currentPage=1;
let isLoading=false;
let hasMore=true;
let selectedGenres=[];
const urlParams=new URLSearchParams(location.search);

async function apiFetch(url,retries=3){
  if(CACHE[url]&&Date.now()-CACHE[url].t<300000)return CACHE[url].d;
  for(let i=0;i<retries;i++){
    try{
      const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),10000);
      const r=await fetch(url,{signal:ctrl.signal});clearTimeout(tid);
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const d=await r.json();CACHE[url]={d,t:Date.now()};return d;
    }catch(e){if(i<retries-1)await new Promise(r=>setTimeout(r,1200*(i+1)));else throw e;}
  }
}

function showToast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function makeCard(a){
  const title=a.title||'Unknown';
  const img=a.images?.jpg?.image_url||a.images?.webp?.image_url||'';
  const score=a.score?`<span class="badge badge-score">★ ${a.score}</span>`:'';
  const type=a.type?`<span class="badge badge-type">${a.type}</span>`:'';
  return `<a href="anime.html?id=${a.mal_id}" class="anime-card fade-in" title="${title}">
    <img class="card-img" src="${img}" alt="${title}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 2 3%22%3E%3C/svg%3E'"/>
    <div class="card-hover-play">▶</div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      <div class="card-badges"><span class="badge badge-hd">HD</span>${type}${score}</div>
    </div>
  </a>`;
}

/* ===== CORE SEARCH/FILTER FUNCTION ===== */
/* Jikan API: /anime endpoint supports q, type, status, order_by, rating, genres, page */
function buildSearchURL(page){
  const q=(document.getElementById('mainSearchInput')?.value||'').trim();
  const type=document.getElementById('filterType')?.value||'';
  const status=document.getElementById('filterStatus')?.value||'';
  const sortVal=document.getElementById('filterSort')?.value||'bypopularity';
  const rating=document.getElementById('filterRating')?.value||'';

  // Map sort values to Jikan order_by param
  const sortMap={bypopularity:'members',score:'score',rank:'rank',title:'title',start_date:'start_date'};
  const orderBy=sortMap[sortVal]||'members';

  let url=`${API}/anime?page=${page}&limit=24&sfw=true&order_by=${orderBy}&sort=desc`;
  if(q)url+=`&q=${encodeURIComponent(q)}`;
  if(type)url+=`&type=${type}`;
  if(status)url+=`&status=${status}`;
  if(rating)url+=`&rating=${rating}`;
  if(selectedGenres.length)url+=`&genres=${selectedGenres.join(',')}`;
  return url;
}

async function runSearch(append=false){
  if(isLoading)return;
  isLoading=true;
  const btn=document.getElementById('loadMoreBtn');
  const grid=document.getElementById('resultsGrid');
  const count=document.getElementById('resultCount');
  if(btn)btn.disabled=true;

  if(!append){
    currentPage=1;
    if(grid)grid.innerHTML=Array.from({length:12},()=>`
      <div class="anime-card">
        <div class="skeleton" style="width:100%;aspect-ratio:2/3"></div>
        <div style="padding:8px">
          <div class="skeleton" style="width:80%;height:12px;margin-bottom:6px"></div>
          <div class="skeleton" style="width:50%;height:10px"></div>
        </div>
      </div>`).join('');
  }

  try{
    const url=buildSearchURL(currentPage);
    const d=await apiFetch(url);
    const list=d.data||[];
    hasMore=d.pagination?.has_next_page||false;
    const total=d.pagination?.items?.total||list.length;

    if(!append&&grid)grid.innerHTML='';

    if(!list.length&&!append){
      if(grid)grid.innerHTML=`<div class="no-results" style="grid-column:1/-1">
        <div class="icon">🔍</div>
        <h3>No Results Found</h3>
        <p>Try different keywords or adjust your filters</p>
      </div>`;
      if(count)count.textContent='0';
    }else{
      if(grid)grid.insertAdjacentHTML('beforeend',list.map(makeCard).join(''));
      if(count)count.textContent=total>999?`${(total/1000).toFixed(1)}k+`:total;
    }

    if(btn){btn.disabled=false;btn.style.display=hasMore?'block':'none';}
  }catch(e){
    if(!append&&grid)grid.innerHTML=`<div class="no-results" style="grid-column:1/-1">
      <div class="icon">⚠️</div>
      <h3>Failed to Load</h3>
      <p>${e.message}</p>
      <button onclick="runSearch()" style="margin-top:16px;background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:700">Retry</button>
    </div>`;
    if(btn)btn.disabled=false;
  }
  isLoading=false;
}

function loadMore(){currentPage++;runSearch(true);}
function applyFilters(){currentPage=1;runSearch();}
function clearFilters(){
  document.getElementById('filterType').value='';
  document.getElementById('filterStatus').value='';
  document.getElementById('filterSort').value='bypopularity';
  document.getElementById('filterRating').value='';
  selectedGenres=[];
  document.querySelectorAll('.filter-tag').forEach(t=>t.classList.remove('active'));
  runSearch();
}

function toggleGenre(el,id){
  el.classList.toggle('active');
  if(el.classList.contains('active')){selectedGenres.push(id);}
  else{selectedGenres=selectedGenres.filter(g=>g!==id);}
}

// Load genres from Jikan
async function loadGenres(){
  try{
    const d=await apiFetch(`${API}/genres/anime`);
    const genres=(d.data||[]).slice(0,24);
    const tagsEl=document.getElementById('genreTags');
    if(tagsEl){
      tagsEl.innerHTML=genres.map(g=>`<span class="filter-tag" data-id="${g.mal_id}" onclick="toggleGenre(this,${g.mal_id})">${g.name}</span>`).join('');
    }
  }catch(e){
    const tagsEl=document.getElementById('genreTags');
    if(tagsEl)tagsEl.innerHTML='<span style="color:var(--text3);font-size:12px">Genres unavailable</span>';
  }
}

// Debounced search input
let srchDebounce=null;
document.getElementById('mainSearchInput')?.addEventListener('input',()=>{
  clearTimeout(srchDebounce);
  srchDebounce=setTimeout(()=>{currentPage=1;runSearch();},500);
});
document.getElementById('mainSearchInput')?.addEventListener('keydown',e=>{
  if(e.key==='Enter'){clearTimeout(srchDebounce);currentPage=1;runSearch();}
});
document.getElementById('mainSearchBtn')?.addEventListener('click',()=>{clearTimeout(srchDebounce);currentPage=1;runSearch();});

// Load more button + infinite scroll
document.getElementById('loadMoreBtn')?.addEventListener('click',loadMore);
const ioObserver=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting&&hasMore&&!isLoading)loadMore();
},{threshold:0.3});
const loadBtn=document.getElementById('loadMoreBtn');
if(loadBtn)ioObserver.observe(loadBtn);

// Sidebar
const sidebar=document.getElementById('sidebar');
const sideOverlay=document.getElementById('sideOverlay');
function openSide(){sidebar.classList.add('open');sideOverlay.classList.add('open');document.body.style.overflow='hidden';}
function closeSide(){sidebar.classList.remove('open');sideOverlay.classList.remove('open');document.body.style.overflow='';}
document.getElementById('menuBtn')?.addEventListener('click',openSide);
document.getElementById('sideClose')?.addEventListener('click',closeSide);
sideOverlay?.addEventListener('click',closeSide);

// Header search btn just focuses the main input on this page
document.getElementById('searchBtn')?.addEventListener('click',()=>{
  document.getElementById('mainSearchInput')?.focus();
  document.getElementById('mainSearchInput')?.scrollIntoView({behavior:'smooth'});
});

// Apply URL params on load
const urlQ=urlParams.get('q');
const urlStatus=urlParams.get('status');
const urlSort=urlParams.get('sort');
if(urlQ){
  const inp=document.getElementById('mainSearchInput');
  if(inp)inp.value=urlQ;
}
if(urlStatus){
  const sel=document.getElementById('filterStatus');
  if(sel)sel.value=urlStatus;
}
if(urlSort){
  const sel=document.getElementById('filterSort');
  // Map incoming sort param to our select values
  const sortRemap={byrank:'rank',bypopularity:'bypopularity',score:'score'};
  if(sel)sel.value=sortRemap[urlSort]||urlSort;
}

// Boot
loadGenres();
runSearch();
</script>
</body>
</html>
