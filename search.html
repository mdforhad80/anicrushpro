<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search for anime – find by genre, season, year, type and more.">
    <title>AnimeStream – Search Anime</title>
    <style>
        /* ---------- GLOBAL STYLES (same as index) ---------- */
        :root {
            --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a; --card: #161616;
            --accent: #8b5cf6; --accent2: #a78bfa; --accent-glow: #8b5cf644;
            --text: #e0e0e0; --text2: #aaaaaa; --text3: #777777; --border: #222222;
            --danger: #ef4444; --gold: #f59e0b; --green: #22c55e;
            --radius: 12px; --radius-sm: 8px; --radius-lg: 18px;
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
            --glass: rgba(20,20,20,0.7); --glass-border: rgba(255,255,255,0.06);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }
        button { cursor: pointer; border: none; font-family: inherit; outline: none; }
        input, select { outline: none; font-family: inherit; }

        .header { position: sticky; top: 0; z-index: 1000; background: rgba(10,10,10,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); padding: 0 clamp(12px,3vw,40px); display: flex; align-items: center; justify-content: space-between; height: 60px; transition: var(--transition); }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .hamburger { width: 36px; height: 36px; background: transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; border-radius: var(--radius-sm); transition: var(--transition); z-index: 1001; }
        .hamburger:hover { background: var(--bg3); }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--text); border-radius: 2px; transition: var(--transition); }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; }
        .logo span { -webkit-text-fill-color: #fff; font-weight: 400; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .search-trigger { width: 38px; height: 38px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; transition: var(--transition); font-size: 1.1rem; color: var(--text2); }
        .search-trigger:hover { background: var(--accent); color: #fff; box-shadow: 0 0 20px var(--accent-glow); }

        .search-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(16px); display: flex; align-items: flex-start; justify-content: center; padding-top: 15vh; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
        .search-overlay.active { opacity: 1; pointer-events: auto; }
        .search-container { width: min(650px, 90vw); position: relative; }
        .search-input-wrap { display: flex; align-items: center; background: var(--bg2); border: 2px solid var(--border); border-radius: 50px; padding: 6px 8px 6px 20px; transition: var(--transition); gap: 8px; }
        .search-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }
        .search-input-wrap input { flex: 1; background: transparent; border: none; color: #fff; font-size: 1.1rem; padding: 10px 0; min-width: 0; }
        .search-input-wrap input::placeholder { color: var(--text3); }
        .search-close { width: 38px; height: 38px; border-radius: 50%; background: var(--bg3); color: var(--text2); display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; font-size: 1rem; }
        .search-close:hover { background: var(--danger); color: #fff; }
        .search-results-dropdown { position: absolute; top: 70px; left: 0; right: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); max-height: 55vh; overflow-y: auto; box-shadow: var(--shadow); display: none; }
        .search-results-dropdown.active { display: block; }
        .search-result-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: var(--transition); border-bottom: 1px solid var(--border); }
        .search-result-item:hover { background: var(--bg3); }
        .search-result-item img { width: 42px; height: 58px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .search-result-info .title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-result-info .meta { font-size: 0.75rem; color: var(--text3); }

        .sidebar-overlay { position: fixed; inset: 0; z-index: 1500; background: rgba(0,0,0,0.7); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .sidebar-overlay.active { opacity: 1; pointer-events: auto; }
        .sidebar { position: fixed; top: 0; left: 0; z-index: 1600; width: 280px; height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .sidebar.active { transform: translateX(0); }
        .sidebar a { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: var(--radius); transition: var(--transition); font-weight: 500; font-size: 0.95rem; color: var(--text2); }
        .sidebar a:hover, .sidebar a.active-page { background: var(--bg3); color: #fff; }
        .sidebar a.active-page { background: var(--accent); color: #fff; }

        /* ---------- SEARCH PAGE SPECIFIC ---------- */
        .search-page { padding: clamp(16px,3vw,30px) clamp(12px,3vw,40px); }
        .filters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; min-width: 130px; }
        .filter-group label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 4px; }
        .filter-group select, .filter-group input { background: var(--bg2); border: 1px solid var(--border); color: #fff; padding: 8px 10px; border-radius: 8px; font-size: 0.85rem; transition: var(--transition); }
        .filter-group select:hover, .filter-group input:hover { border-color: var(--accent); }
        .filter-btn { padding: 8px 20px; background: var(--accent); color: #fff; border-radius: 20px; font-weight: 600; font-size: 0.85rem; align-self: flex-end; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .anime-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: var(--transition); cursor: pointer; }
        .anime-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 25px var(--accent-glow); }
        .anime-card .card-img { aspect-ratio: 3/4; overflow: hidden; background: var(--bg3); }
        .anime-card .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .anime-card:hover .card-img img { transform: scale(1.05); }
        .anime-card .card-info { padding: 10px; }
        .anime-card .card-info h4 { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .anime-card .card-info .meta { font-size: 0.7rem; color: var(--text3); display: flex; gap: 6px; }
        .loading-indicator { text-align: center; padding: 30px; color: var(--text3); }
        .back-to-top { position: fixed; bottom: 24px; right: 24px; width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; z-index: 900; box-shadow: 0 4px 16px var(--accent-glow); transition: var(--transition); opacity: 0; pointer-events: none; font-size: 1.2rem; }
        .back-to-top.visible { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="header-left">
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            <a href="index.html" class="logo">Anime<span>Stream</span></a>
        </div>
        <div class="header-right">
            <button class="search-trigger" id="searchTrigger">🔍</button>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <nav class="sidebar" id="sidebar">
        <a href="index.html">🏠 Home</a>
        <a href="search.html" class="active-page">🔍 Search</a>
        <a href="schedule.html">📅 Schedule</a>
        <a href="creator.html">👤 Creator</a>
    </nav>

    <div class="search-overlay" id="searchOverlay">
        <div class="search-container">
            <div class="search-input-wrap">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search anime...">
                <button class="search-close" id="searchClose">✕</button>
            </div>
            <div class="search-results-dropdown" id="searchDropdown"></div>
        </div>
    </div>

    <main class="search-page">
        <div class="filters" id="filterBar">
            <div class="filter-group">
                <label>Genre</label>
                <select id="genreFilter"><option value="">All</option></select>
            </div>
            <div class="filter-group">
                <label>Type</label>
                <select id="typeFilter">
                    <option value="">All</option><option value="tv">TV</option><option value="movie">Movie</option><option value="ova">OVA</option><option value="special">Special</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="statusFilter">
                    <option value="">All</option><option value="airing">Airing</option><option value="complete">Complete</option><option value="upcoming">Upcoming</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Sort</label>
                <select id="sortFilter">
                    <option value="score">Score</option><option value="popularity">Popularity</option><option value="title">Title</option><option value="start_date">Date</option>
                </select>
            </div>
            <button class="filter-btn" id="applyFilters">Search</button>
        </div>
        <div class="results-grid" id="resultsGrid"></div>
        <div class="loading-indicator" id="loadingIndicator" style="display:none;">Loading more...</div>
    </main>

    <button class="back-to-top" id="backToTop">↑</button>

    <script>
        (function() {
            // Shared API manager & cache (same as in index)
            const cacheManager = {
                TTL: 30*60*1000,
                get(k) { try { const i=localStorage.getItem('as_'+k); if(!i) return null; const {data,t}=JSON.parse(i); if(Date.now()-t>this.TTL){localStorage.removeItem('as_'+k);return null;} return data; } catch(e){return null;} },
                set(k,d) { try { localStorage.setItem('as_'+k, JSON.stringify({data:d, timestamp:Date.now()})); } catch(e){} }
            };
            const apiManager = {
                queue:[], inProgress:false, delay:350, maxRetries:2,
                async fetchWithRetry(url, retries=this.maxRetries) {
                    for(let i=0;i<=retries;i++){try{const r=await fetch(url); if(r.status===429){await new Promise(r=>setTimeout(r,1000*(i+1)));continue;} if(!r.ok) throw new Error(`HTTP ${r.status}`); return await r.json();}catch(e){if(i===retries)throw e; await new Promise(r=>setTimeout(r,800*(i+1)));}}
                },
                async enqueue(url, cacheKey=null) {
                    if(cacheKey){const c=cacheManager.get(cacheKey); if(c) return c;}
                    return new Promise((resolve,reject)=>{this.queue.push({url,cacheKey,resolve,reject}); this.processQueue();});
                },
                async processQueue() { if(this.inProgress||this.queue.length===0)return; this.inProgress=true; while(this.queue.length>0){const {url,cacheKey,resolve,reject}=this.queue.shift(); try{const d=await this.fetchWithRetry(url); if(cacheKey) cacheManager.set(cacheKey,d); resolve(d);}catch(e){reject(e);} await new Promise(r=>setTimeout(r,this.delay));} this.inProgress=false; }
            };

            // UI helpers
            const sidebarToggle = () => {
                const h=document.getElementById('hamburger'), s=document.getElementById('sidebar'), o=document.getElementById('sidebarOverlay');
                const close=()=>{s.classList.remove('active');o.classList.remove('active');h.classList.remove('active');document.body.style.overflow='';};
                const open=()=>{s.classList.add('active');o.classList.add('active');h.classList.add('active');document.body.style.overflow='hidden';};
                h.onclick=()=>s.classList.contains('active')?close():open();
                o.onclick=close;
            };
            sidebarToggle();

            const searchOverlay = {
                overlay: document.getElementById('searchOverlay'), input: document.getElementById('searchInput'),
                dropdown: document.getElementById('searchDropdown'), closeBtn: document.getElementById('searchClose'),
                trigger: document.getElementById('searchTrigger'), timeout: null,
                init(){
                    this.trigger.onclick=()=>{this.overlay.classList.add('active');document.body.style.overflow='hidden';setTimeout(()=>this.input.focus(),200);};
                    this.closeBtn.onclick=()=>{this.overlay.classList.remove('active');this.dropdown.classList.remove('active');this.input.value='';document.body.style.overflow='';};
                    this.input.oninput=()=>{clearTimeout(this.timeout);const q=this.input.value.trim();if(q.length<2){this.dropdown.classList.remove('active');return;} this.timeout=setTimeout(async()=>{try{const d=await apiManager.enqueue(`https://api.jikan.moe/v4/anime?q=${q}&limit=8&sfw=true`); if(d&&d.data.length){this.dropdown.innerHTML=d.data.map(a=>`<div class="search-result-item" onclick="window.location.href='anime.html?id=${a.mal_id}'"><img src="${a.images.jpg.small_image_url||''}"><div class="search-result-info"><div class="title">${a.title}</div><div class="meta">${a.type||''} ⭐${a.score||'?'} ${a.episodes||'?'}eps</div></div></div>`).join('');this.dropdown.classList.add('active');}else{this.dropdown.innerHTML='<div style="padding:16px;color:#777;">No results</div>';this.dropdown.classList.add('active');}}catch(e){this.dropdown.innerHTML='<div style="padding:16px;color:#ef4444;">Error</div>';this.dropdown.classList.add('active');}},350);};
                }
            };
            searchOverlay.init();

            // Back to top
            const backToTop = document.getElementById('backToTop');
            window.addEventListener('scroll',()=>{backToTop.classList.toggle('visible',window.scrollY>400);},{passive:true});
            backToTop.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});

            // Populate genre filter
            (async()=>{
                const genres = [
                    {id:1,name:"Action"},{id:2,name:"Adventure"},{id:4,name:"Comedy"},{id:8,name:"Drama"},
                    {id:10,name:"Fantasy"},{id:14,name:"Horror"},{id:7,name:"Mystery"},{id:22,name:"Romance"},
                    {id:24,name:"Sci-Fi"},{id:36,name:"Slice of Life"},{id:30,name:"Sports"}
                ];
                const sel = document.getElementById('genreFilter');
                genres.forEach(g=>{ const o=document.createElement('option'); o.value=g.id; o.textContent=g.name; sel.appendChild(o); });
            })();

            // Infinite scroll & filter logic
            let page=1, loading=false, hasMore=true, currentQuery='';
            const resultsGrid = document.getElementById('resultsGrid');
            const loadingIndicator = document.getElementById('loadingIndicator');

            function buildApiUrl(pageNum=1){
                const genre=document.getElementById('genreFilter').value;
                const type=document.getElementById('typeFilter').value;
                const status=document.getElementById('statusFilter').value;
                const sort=document.getElementById('sortFilter').value;
                let url = `https://api.jikan.moe/v4/anime?page=${pageNum}&limit=24&order_by=${sort}&sort=desc&sfw=true`;
                if(genre) url+=`&genres=${genre}`;
                if(type) url+=`&type=${type}`;
                if(status) url+=`&status=${status}`;
                return url;
            }

            async function fetchAndRender(reset=false){
                if(loading) return;
                if(reset){ page=1; hasMore=true; resultsGrid.innerHTML=''; }
                loading=true;
                loadingIndicator.style.display='block';
                try{
                    const url = buildApiUrl(page);
                    const data = await apiManager.enqueue(url);
                    if(!data||!data.data||data.data.length===0){ hasMore=false; loadingIndicator.textContent='No more results.'; return; }
                    const cards = data.data.map(a=>`
                        <div class="anime-card" onclick="window.location.href='anime.html?id=${a.mal_id}'">
                            <div class="card-img"><img src="${a.images.jpg.large_image_url}" alt="${a.title}" loading="lazy"></div>
                            <div class="card-info"><h4>${a.title}</h4><div class="meta">⭐${a.score||'?'} 📺${a.episodes||'?'}</div></div>
                        </div>
                    `).join('');
                    resultsGrid.insertAdjacentHTML('beforeend', cards);
                    page++;
                    if(!data.pagination||!data.pagination.has_next_page) hasMore=false;
                }catch(e){ console.error(e); loadingIndicator.textContent='Error loading.'; }
                loading=false;
                loadingIndicator.style.display='none';
            }

            // Apply filters button
            document.getElementById('applyFilters').addEventListener('click',()=>fetchAndRender(true));

            // Infinite scroll
            window.addEventListener('scroll',()=>{
                if(loading||!hasMore) return;
                const {scrollTop,scrollHeight,clientHeight}=document.documentElement;
                if(scrollTop+clientHeight >= scrollHeight-300) fetchAndRender(false);
            },{passive:true});

            // Initial load
            fetchAndRender(true);
        })();
    </script>
</body>
</html>
