<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Watch anime episodes in HD with sub and dub options.">
<meta name="theme-color" content="#050505">
<title>Watch Anime - AnimeStream</title>
<style>
/* ==================== VARIABLES & RESET ==================== */
:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --primary: #8b5cf6;
  --primary-glow: rgba(139,92,246,0.35);
  --secondary: #a78bfa;
  --text: #f3f4f6;
  --text-muted: #9ca3af;
  --border: rgba(255,255,255,0.08);
  --radius: 12px;
  --radius-lg: 16px;
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-x: hidden;
  max-width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
ul, ol { list-style: none; }

/* ==================== UTILITIES ==================== */
.glass {
  background: rgba(17,17,17,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
}
.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
.text-gradient {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ==================== HEADER ==================== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px);
  transition: var(--transition);
}
.header.scrolled {
  background: rgba(5,5,5,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.menu-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.menu-btn:hover { background: var(--surface-2); }
.menu-btn svg { width: 22px; height: 22px; stroke: var(--text); }
.logo {
  font-size: clamp(1.1rem, 2vw, 1.5rem);
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #fff; font-size: 14px;
}
.back-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.back-btn:hover { background: var(--surface-2); }
.back-btn svg { width: 20px; height: 20px; stroke: var(--text); }

/* ==================== SIDEBAR ==================== */
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(280px, 80vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 1101;
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  padding: 20px;
}
.sidebar.active { transform: translateX(0); }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.sidebar-close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.sidebar-close:hover { background: var(--surface-2); }
.sidebar-close svg { width: 20px; height: 20px; stroke: var(--text); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-muted);
  transition: var(--transition);
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  background: rgba(139,92,246,0.12);
  color: var(--primary);
}
.sidebar-nav a svg { width: 20px; height: 20px; stroke: currentColor; flex-shrink: 0; }

/* ==================== MAIN LAYOUT ==================== */
.watch-main {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
  max-width: 1600px;
  margin: 80px auto 0;
  padding: 0 clamp(12px, 3vw, 32px);
}
@media (max-width: 1024px) {
  .watch-main {
    grid-template-columns: 1fr;
    margin-top: 72px;
  }
}

/* ==================== PLAYER ==================== */
.player-section {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}
.player-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
}
.player-wrap iframe {
  width: 100%; height: 100%;
  border: none;
}
.player-loading {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  z-index: 2;
  transition: opacity 0.3s ease;
}
.player-loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--surface-3);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.player-loading p {
  margin-top: 12px;
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Theater mode */
body.theater-mode .header,
body.theater-mode .sidebar,
body.theater-mode .sidebar-overlay,
body.theater-mode .watch-sidebar,
body.theater-mode .footer {
  display: none !important;
}
body.theater-mode .watch-main {
  grid-template-columns: 1fr;
  margin-top: 0;
  padding: 0;
  max-width: 100%;
}
body.theater-mode .player-wrap {
  border-radius: 0;
  height: 100vh;
  aspect-ratio: auto;
}
body.theater-mode .player-section {
  gap: 0;
}
body.theater-mode .player-controls,
body.theater-mode .episode-section,
body.theater-mode .comments-section {
  display: none !important;
}

/* Player controls bar */
.player-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.pctrl-group {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.pctrl-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 700;
  letter-spacing: 0.5px;
}
.pctrl-btn {
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: var(--transition);
  white-space: nowrap;
}
.pctrl-btn:hover { background: var(--surface); color: var(--text); }
.pctrl-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 0 12px var(--primary-glow);
}
.pctrl-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.pctrl-icon:hover { background: var(--surface); }
.pctrl-icon svg { width: 18px; height: 18px; stroke: var(--text); }
.pctrl-spacer { flex: 1; }

/* ==================== EPISODE SECTION ==================== */
.episode-section {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.episode-section h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.episode-section h3 svg { width: 20px; height: 20px; stroke: var(--primary); }
.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 10px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}
.episode-grid::-webkit-scrollbar { width: 6px; }
.episode-grid::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
.episode-btn {
  padding: 10px;
  border-radius: 8px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-muted);
  transition: var(--transition);
  text-align: center;
}
.episode-btn:hover {
  background: rgba(139,92,246,0.15);
  border-color: var(--primary);
  color: var(--text);
}
.episode-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 0 12px var(--primary-glow);
}
.episode-btn.watched { opacity: 0.5; }

/* ==================== SIDEBAR INFO ==================== */
.watch-sidebar {
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 0;
}
@media (max-width: 1024px) {
  .watch-sidebar { display: none; }
}
.sidebar-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.sidebar-card h4 {
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--text);
}
.anime-mini {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}
.anime-mini img {
  width: 80px;
  border-radius: 8px;
  aspect-ratio: 2/3;
  object-fit: cover;
  flex-shrink: 0;
}
.anime-mini-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.anime-mini-title {
  font-size: 0.9rem;
  font-weight: 700;
  line-height: 1.3;
}
.anime-mini-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Related slider in sidebar */
.related-track {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 400px;
  overflow-y: auto;
  padding-right: 4px;
}
.related-track::-webkit-scrollbar { width: 6px; }
.related-track::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
.related-item {
  display: flex;
  gap: 10px;
  padding: 8px;
  border-radius: 8px;
  transition: var(--transition);
  cursor: pointer;
}
.related-item:hover { background: var(--surface-3); }
.related-item img {
  width: 50px;
  border-radius: 6px;
  aspect-ratio: 2/3;
  object-fit: cover;
  flex-shrink: 0;
}
.related-info { min-width: 0; }
.related-title {
  font-size: 0.8rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 2px;
}
.related-meta {
  font-size: 0.7rem;
  color: var(--text-muted);
}

/* Cusdis Comments */
.comments-section {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.comments-section h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 16px;
}
#cusdis_thread {
  min-height: 200px;
}

/* ==================== FOOTER ==================== */
.footer {
  border-top: 1px solid var(--border);
  padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 32px);
  text-align: center;
  margin-top: 40px;
}
.footer-text {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.footer-social {
  display: flex; justify-content: center; gap: 16px;
}
.footer-social a {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.footer-social a:hover {
  background: var(--primary);
  border-color: var(--primary);
  transform: translateY(-2px);
}
.footer-social a svg { width: 16px; height: 16px; stroke: var(--text-muted); }
.footer-social a:hover svg { stroke: #fff; }

/* ==================== RESPONSIVE ==================== */
@media (max-width: 640px) {
  .player-controls { gap: 8px; padding: 10px; }
  .pctrl-group { gap: 6px; }
  .pctrl-btn { padding: 6px 10px; font-size: 0.75rem; }
  .episode-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

    <a href="https://github.com" target="_blank" rel="noopener" aria-label="GitHub"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg></a>
  </div>

<!-- ==================== SCRIPTS ==================== -->
<script>
(function() {
  'use strict';

  const API_BASE = 'https://api.jikan.moe/v4';
  const CACHE_TTL = 5 * 60 * 1000;
  const RATE_DELAY = 400;

  const ApiEngine = {
    cache: {}, lastRequest: 0,
    getCacheKey(url) { return 'cache_' + url; },
    getCached(url) {
      const key = this.getCacheKey(url);
      const item = this.cache[key];
      if (!item) {
        try {
          const raw = localStorage.getItem(key);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Date.now() - parsed.time < CACHE_TTL) { this.cache[key] = parsed; return parsed.data; }
          }
        } catch(e) {}
        return null;
      }
      if (Date.now() - item.time < CACHE_TTL) return item.data;
      return null;
    },
    setCache(url, data) {
      const key = this.getCacheKey(url);
      const payload = { data, time: Date.now() };
      this.cache[key] = payload;
      try { localStorage.setItem(key, JSON.stringify(payload)); } catch(e) {}
    },
    async fetchWithTimeout(url, timeout = 10000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (e) { clearTimeout(id); throw e; }
    },
    async fetch(url, retries = 3) {
      const cached = this.getCached(url);
      if (cached) return cached;
      const now = Date.now();
      const wait = Math.max(0, this.lastRequest + RATE_DELAY - now);
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      this.lastRequest = Date.now();
      let lastError;
      for (let i = 0; i < retries; i++) {
        try {
          if (i > 0) await new Promise(r => setTimeout(r, 1200 * i));
          const response = await this.fetchWithTimeout(url);
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const json = await response.json();
          if (!json || !json.data) throw new Error('Invalid response');
          this.setCache(url, json);
          return json;
        } catch (e) { lastError = e; }
      }
      throw lastError;
    },
    async fetchSafe(url, fallbackData = null) {
      try { return await this.fetch(url); }
      catch (e) { console.warn('API fetch failed:', url, e.message); return { data: fallbackData }; }
    }
  };

  function getParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function sanitize(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getTitle(anime) {
    return sanitize(anime.title_english || anime.title || 'Unknown');
  }

  function getImage(anime) {
    if (!anime.images || !anime.images.jpg) return '';
    return anime.images.jpg.large_image_url || anime.images.jpg.image_url || '';
  }

  function getPoster(anime) {
    if (!anime.images || !anime.images.jpg) return '';
    return anime.images.jpg.image_url || anime.images.jpg.small_image_url || '';
  }

  // ==================== STATE ====================
  const state = {
    malId: getParam('id') || '1',
    currentEp: parseInt(getParam('ep') || '1', 10) || 1,
    totalEps: 12,
    isSub: true,
    isTheater: false,
    animeData: null
  };

  // ==================== PLAYER ====================
  function getStreamUrl() {
    const type = state.isSub ? 'sub' : 'dub';
    return `https://megaplay.buzz/stream/mal/${state.malId}/${state.currentEp}/${type}`;
  }

  function loadPlayer() {
    const frame = document.getElementById('playerFrame');
    const loading = document.getElementById('playerLoading');
    if (!frame) return;
    if (loading) loading.classList.remove('hidden');
    frame.src = getStreamUrl();
    frame.onload = () => {
      if (loading) loading.classList.add('hidden');
    };
    frame.onerror = () => {
      if (loading) {
        loading.innerHTML = '<p style="color:#ef4444;">Failed to load video. Try another server or episode.</p>';
      }
    };
    // Fallback hide loading after 5s regardless
    setTimeout(() => { if (loading) loading.classList.add('hidden'); }, 5000);
  }

  // ==================== EPISODES ====================
  // Chunked episode rendering for performance with 1000+ episodes
  const EP_CHUNK_SIZE = 100;
  let renderedEpCount = 0;

  function renderEpisodes() {
    const grid = document.getElementById('episodeGrid');
    if (!grid) return;
    grid.innerHTML = '';
    renderedEpCount = 0;

    // Render first chunk immediately
    renderEpisodeChunk(1, Math.min(EP_CHUNK_SIZE, state.totalEps));

    // Render remaining chunks lazily
    if (state.totalEps > EP_CHUNK_SIZE) {
      scheduleChunkRender(EP_CHUNK_SIZE + 1);
    }
  }

  function renderEpisodeChunk(start, end) {
    const grid = document.getElementById('episodeGrid');
    if (!grid) return;

    const fragment = document.createDocumentFragment();
    const actualEnd = Math.min(end, state.totalEps);

    for (let i = start; i <= actualEnd; i++) {
      const btn = document.createElement('button');
      btn.className = 'episode-btn' + (i === state.currentEp ? ' active' : '');
      btn.textContent = i;
      btn.dataset.ep = i;
      btn.addEventListener('click', () => switchEpisode(i));
      fragment.appendChild(btn);
    }

    grid.appendChild(fragment);
    renderedEpCount = actualEnd;
  }

  function scheduleChunkRender(start) {
    if (start > state.totalEps) return;
    requestAnimationFrame(() => {
      renderEpisodeChunk(start, start + EP_CHUNK_SIZE - 1);
      if (start + EP_CHUNK_SIZE <= state.totalEps) {
        // Use setTimeout to yield to browser between chunks
        setTimeout(() => scheduleChunkRender(start + EP_CHUNK_SIZE), 10);
      }
    });
  }

  function switchEpisode(ep) {
    if (ep < 1 || ep > state.totalEps) return;
    state.currentEp = ep;
    // Update URL without reload
    const url = new URL(window.location.href);
    url.searchParams.set('ep', ep);
    window.history.replaceState({}, '', url);
    loadPlayer();
    updateSidebarInfo();
    updateCusdis();

    // Update active state without full re-render
    const grid = document.getElementById('episodeGrid');
    if (grid) {
      grid.querySelectorAll('.episode-btn.active').forEach(b => b.classList.remove('active'));
      const target = grid.querySelector(`.episode-btn[data-ep="${ep}"]`);
      if (target) {
        target.classList.add('active');
        target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      } else {
        // Target not rendered yet, do a targeted render around it
        ensureEpisodeVisible(ep);
      }
    }
  }

  // Ensure a specific episode button exists in DOM, render chunks around it if needed
  function ensureEpisodeVisible(ep) {
    const grid = document.getElementById('episodeGrid');
    if (!grid) return;
    if (grid.querySelector(`.episode-btn[data-ep="${ep}"]`)) return;

    // Find which chunk contains this episode
    const chunkStart = Math.floor((ep - 1) / EP_CHUNK_SIZE) * EP_CHUNK_SIZE + 1;
    const chunkEnd = Math.min(chunkStart + EP_CHUNK_SIZE - 1, state.totalEps);

    // Check if we need to render before or after current rendered range
    renderEpisodeChunk(chunkStart, chunkEnd);

    // Now try to activate
    const target = grid.querySelector(`.episode-btn[data-ep="${ep}"]`);
    if (target) {
      target.classList.add('active');
      target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }

  function nextEpisode() { switchEpisode(state.currentEp + 1); }
  function prevEpisode() { switchEpisode(state.currentEp - 1); }

  // ==================== CONTROLS ====================
  document.getElementById('btnSub').addEventListener('click', function() {
    state.isSub = true;
    document.getElementById('btnSub').classList.add('active');
    document.getElementById('btnDub').classList.remove('active');
    loadPlayer();
  });
  document.getElementById('btnDub').addEventListener('click', function() {
    state.isSub = false;
    document.getElementById('btnDub').classList.add('active');
    document.getElementById('btnSub').classList.remove('active');
    loadPlayer();
  });
  document.getElementById('btnNext').addEventListener('click', nextEpisode);
  document.getElementById('btnPrev').addEventListener('click', prevEpisode);

  // Theater mode
  document.getElementById('btnTheater').addEventListener('click', () => {
    state.isTheater = !state.isTheater;
    document.body.classList.toggle('theater-mode', state.isTheater);
  });

  // Fullscreen
  document.getElementById('btnFullscreen').addEventListener('click', () => {
    const player = document.getElementById('playerWrap');
    if (!document.fullscreenElement) {
      player.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case 'ArrowRight': e.preventDefault(); nextEpisode(); break;
      case 'ArrowLeft': e.preventDefault(); prevEpisode(); break;
      case 'f': case 'F':
        const player = document.getElementById('playerWrap');
        if (!document.fullscreenElement) player.requestFullscreen().catch(() => {});
        else document.exitFullscreen().catch(() => {});
        break;
      case 't': case 'T':
        state.isTheater = !state.isTheater;
        document.body.classList.toggle('theater-mode', state.isTheater);
        break;
      case ' ':
        // Space handled by iframe mostly, but we can try to focus iframe
        document.getElementById('playerFrame').focus();
        break;
    }
  });

  // ==================== LOAD ANIME DATA ====================
  async function loadAnimeData() {
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${state.malId}/full`);
      const anime = (res && res.data) ? res.data : null;
      if (!anime) return;
      state.animeData = anime;

      // Fetch accurate episode count from /episodes endpoint
      await fetchEpisodeCount();

      // Update back button
      const backBtn = document.getElementById('backBtn');
      if (backBtn) backBtn.href = `anime.html?id=${state.malId}`;

      // Sidebar info
      updateSidebarInfo();

      // Related anime
      loadRelated(state.malId);

      // Render episodes
      renderEpisodes();

      // Load player
      loadPlayer();
      updateCusdis();
    } catch (e) {
      console.error(e);
      state.totalEps = state.animeData && state.animeData.episodes ? state.animeData.episodes : 12;
      renderEpisodes();
      loadPlayer();
      updateCusdis();
    }
  }

  // Fetch total episode count from Jikan /episodes with pagination
  async function fetchEpisodeCount() {
    let total = 0;
    let page = 1;
    let hasMore = true;
    const maxPages = 20; // Safety limit for API calls (20 * 100 = 2000 eps max)

    while (hasMore && page <= maxPages) {
      try {
        const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${state.malId}/episodes?page=${page}`);
        const data = (res && res.data) ? res.data : [];
        const pagination = (res && res.pagination) ? res.pagination : {};

        if (!data.length) {
          hasMore = false;
          break;
        }

        total += data.length;
        hasMore = pagination.has_next_page === true;
        page++;
      } catch (e) {
        hasMore = false;
      }
    }

    // Fallback to anime.episodes if API returned nothing
    if (total === 0 && state.animeData && state.animeData.episodes) {
      total = state.animeData.episodes;
    }
    // Ultimate fallback
    if (total === 0) total = 12;

    state.totalEps = total;
  }

  function updateSidebarInfo() {
    const mini = document.getElementById('animeMini');
    if (!mini || !state.animeData) return;
    const anime = state.animeData;
    const title = getTitle(anime);
    const img = getPoster(anime);
    const type = sanitize(anime.type || 'TV');
    const score = anime.score ? anime.score.toFixed(1) : 'N/A';
    mini.innerHTML = `
      <img src="${img}" alt="${title}">
      <div class="anime-mini-info">
        <div class="anime-mini-title clamp-2">${title}</div>
        <div class="anime-mini-meta">EP ${state.currentEp} / ${state.totalEps} &bull; ${type} &bull; ${score}</div>
      </div>
    `;
  }

  async function loadRelated(malId) {
    const track = document.getElementById('relatedTrack');
    if (!track) return;
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/recommendations`);
      const data = (res && res.data) ? res.data.slice(0, 8) : [];
      if (!data.length) {
        track.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;">No related anime found.</div>';
        return;
      }
      const enriched = await Promise.allSettled(data.map(async (rec) => {
        try {
          const detail = await ApiEngine.fetchSafe(`${API_BASE}/anime/${rec.entry.mal_id}`);
          return detail.data || rec.entry;
        } catch (e) { return rec.entry; }
      }));
      const results = enriched.map(r => r.status === 'fulfilled' ? r.value : null).filter(Boolean);
      track.innerHTML = results.map(anime => {
        const img = getPoster(anime) || '';
        const title = getTitle(anime);
        const type = sanitize(anime.type || 'TV');
        return `
          <a href="watch.html?id=${anime.mal_id}&ep=1" class="related-item">
            <img src="${img}" alt="${title}" loading="lazy">
            <div class="related-info">
              <div class="related-title clamp-2">${title}</div>
              <div class="related-meta">${type}</div>
            </div>
          </a>
        `;
      }).join('');
    } catch (e) {
      track.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;">Failed to load related anime.</div>';
    }
  }

  // ==================== CUSDIS COMMENTS ====================
  function updateCusdis() {
    const thread = document.getElementById('cusdis_thread');
    if (!thread || !state.animeData) return;

    const malId = state.malId;
    const ep = state.currentEp;
    const title = getTitle(state.animeData);

    const pageId = `anime-${malId}-ep-${ep}`;
    const pageUrl = window.location.href;
    const pageTitle = `${title} - Episode ${ep}`;

    thread.setAttribute('data-page-id', pageId);
    thread.setAttribute('data-page-url', pageUrl);
    thread.setAttribute('data-page-title', pageTitle);

    // Trigger Cusdis re-render if already loaded
    if (window.CUSDIS && window.CUSDIS.renderTo) {
      window.CUSDIS.renderTo(thread);
    }
  }

  // ==================== MOBILE NAV ====================
  const MobileNav = {
    sidebar: document.getElementById('sidebar'),
    overlay: document.getElementById('sidebarOverlay'),
    open() { this.sidebar.classList.add('active'); this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; },
    close() { this.sidebar.classList.remove('active'); this.overlay.classList.remove('active'); document.body.style.overflow = ''; },
    init() {
      document.getElementById('menuBtn').addEventListener('click', () => this.open());
      document.getElementById('sidebarClose').addEventListener('click', () => this.close());
      this.overlay.addEventListener('click', () => this.close());
    }
  };

  function initHeaderScroll() {
    const header = document.getElementById('header');
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { header.classList.toggle('scrolled', window.scrollY > 40); ticking = false; });
        ticking = true;
      }
    }, { passive: true });
  }

  // ==================== APP INIT ====================
  async function initApp() {
    initHeaderScroll();
    MobileNav.init();
    await loadAnimeData();
  }

  if (!window.__appInitialized) {
    window.__appInitialized = true;
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  }
})();
</script>
