<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream – Watch</title>
    <style>
        /* Global styles + player-specific */
        :root { /* ... */ }
        .watch-container { display: flex; flex-wrap: wrap; gap: 20px; padding: clamp(16px,3vw,30px) clamp(12px,3vw,40px); }
        .player-wrapper { flex: 1 1 700px; min-width: 0; }
        .player-wrapper iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: var(--radius); background: #000; }
        .controls { display: flex; gap: 10px; margin: 10px 0; align-items: center; }
        .controls select, .controls button { background: var(--bg2); color: #fff; border: 1px solid var(--border); padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
        .episodes-sidebar { flex: 0 0 250px; background: var(--bg2); border-radius: var(--radius); padding: 15px; max-height: 500px; overflow-y: auto; }
        .episodes-sidebar h3 { margin-bottom: 10px; }
        .ep-item { display: block; padding: 8px; margin-bottom: 4px; background: var(--bg3); border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .ep-item.active { background: var(--accent); color: #fff; }
        .ep-item:hover { background: var(--accent); }
    </style>
</head>
<body>
    <header class="header"> ... </header>
    <!-- sidebar, search overlay -->
    <main class="watch-container" id="watchRoot">
        <!-- Dynamically filled -->
    </main>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const animeId = params.get('id');
            let currentEp = parseInt(params.get('ep')) || 1;
            let subDub = 'sub'; // default
            if (!animeId) return;

            async function loadPlayer(){
                try{
                    const data = await apiManager.enqueue(`https://api.jikan.moe/v4/anime/${animeId}/full`, `anime_${animeId}`);
                    const a = data.data;
                    const totalEps = a.episodes || 12;
                    document.getElementById('watchRoot').innerHTML = `
                        <div class="player-wrapper">
                            <iframe id="videoFrame" src="https://megaplay.buzz/stream/mal/${animeId}/${currentEp}/sub" allowfullscreen></iframe>
                            <div class="controls">
                                <button id="prevEpBtn" ${currentEp<=1?'disabled':''}>◀ Prev</button>
                                <select id="epSelect"></select>
                                <button id="nextEpBtn" ${currentEp>=totalEps?'disabled':''}>Next ▶</button>
                                <select id="subDubSelect">
                                    <option value="sub" ${subDub==='sub'?'selected':''}>Sub</option>
                                    <option value="dub" ${subDub==='dub'?'selected':''}>Dub</option>
                                </select>
                            </div>
                        </div>
                        <div class="episodes-sidebar" id="epSidebar">
                            <h3>${a.title}</h3>
                            <div id="epListContainer"></div>
                        </div>
                    `;

                    // Populate episode selector & sidebar
                    const epSelect = document.getElementById('epSelect');
                    const epListContainer = document.getElementById('epListContainer');
                    for(let i=1; i<=totalEps; i++){
                        epSelect.innerHTML += `<option value="${i}" ${i===currentEp?'selected':''}>Episode ${i}</option>`;
                        epListContainer.innerHTML += `<div class="ep-item ${i===currentEp?'active':''}" data-ep="${i}">Episode ${i}</div>`;
                    }

                    // Update video source on episode/sub change
                    function updateVideo(){
                        const ep = currentEp;
                        const type = document.getElementById('subDubSelect').value;
                        document.getElementById('videoFrame').src = `https://megaplay.buzz/stream/mal/${animeId}/${ep}/${type}`;
                        // Update active state in sidebar
                        document.querySelectorAll('.ep-item').forEach(el=>el.classList.toggle('active', parseInt(el.dataset.ep)===ep));
                        document.getElementById('epSelect').value = ep;
                        document.getElementById('prevEpBtn').disabled = ep<=1;
                        document.getElementById('nextEpBtn').disabled = ep>=totalEps;
                    }

                    document.getElementById('epSelect').addEventListener('change', (e)=>{ currentEp=parseInt(e.target.value); updateVideo(); });
                    document.getElementById('subDubSelect').addEventListener('change', updateVideo);
                    document.getElementById('prevEpBtn').addEventListener('click', ()=>{ if(currentEp>1){ currentEp--; updateVideo(); } });
                    document.getElementById('nextEpBtn').addEventListener('click', ()=>{ if(currentEp<totalEps){ currentEp++; updateVideo(); } });
                    document.getElementById('epListContainer').addEventListener('click', (e)=>{
                        const item = e.target.closest('.ep-item');
                        if(item){ currentEp = parseInt(item.dataset.ep); updateVideo(); }
                    });

                }catch(e){ document.getElementById('watchRoot').innerHTML = '<p style="color:#ef4444;">Failed to load player.</p>'; }
            }
            loadPlayer();
        })();
    </script>
</body>
</html>
