<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Watch Anime - AniVerse</title>
<style>
:root {
  --bg-primary: #060610;
  --bg-secondary: #0d0d20;
  --bg-card: #111128;
  --accent: #7c3aed;
  --accent-bright: #9d5bff;
  --accent-glow: rgba(124, 58, 237, 0.4);
  --accent-secondary: #e040fb;
  --text-primary: #f0f0ff;
  --text-secondary: #9090c0;
  --text-muted: #5050a0;
  --border: rgba(124, 58, 237, 0.2);
  --border-bright: rgba(124, 58, 237, 0.5);
  --glass-border: rgba(255,255,255,0.06);
  --header-h: 64px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-glow: 0 0 20px var(--accent-glow);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; max-width: 100%; scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  max-width: 100%;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; outline: none; background: none; font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

/* HEADER */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h); z-index: 1000;
  display: flex; align-items: center;
  padding: 0 clamp(12px, 3vw, 24px); gap: 12px;
  background: rgba(6, 6, 16, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  max-width: 100%;
}
.logo { display: flex; align-items: center; gap: 8px; font-size: clamp(16px, 2.5vw, 22px); font-weight: 800; white-space: nowrap; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-secondary)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.logo span { color: var(--accent-bright); }
.header-spacer { flex: 1; }
.icon-btn { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 18px; transition: all 0.2s; flex-shrink: 0; }
.icon-btn:hover { color: var(--text-primary); background: var(--glass-border); }
.hamburger { display: flex; flex-direction: column; gap: 5px; padding: 8px; border-radius: 8px; }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--text-primary); border-radius: 2px; }

/* SIDEBAR */
#sidebar { position: fixed; top: 0; left: -280px; width: min(280px, 85vw); height: 100%; z-index: 1500; background: var(--bg-secondary); border-right: 1px solid var(--border); transition: left 0.35s; padding: 80px 20px 20px; overflow-y: auto; }
#sidebar.open { left: 0; }
#sidebar-overlay { position: fixed; inset: 0; z-index: 1400; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
#sidebar-overlay.open { opacity: 1; pointer-events: all; }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
.sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-secondary); font-size: 15px; transition: all 0.2s; }
.sidebar-nav a:hover { color: var(--text-primary); background: var(--glass-border); }

/* SEARCH OVERLAY */
#search-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(6,6,16,0.95); backdrop-filter: blur(24px); display: flex; flex-direction: column; align-items: center; padding: clamp(60px,10vh,100px) clamp(12px,5vw,40px) 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; overflow-y: auto; overflow-x: hidden; max-width: 100vw; }
#search-overlay.open { opacity: 1; pointer-events: all; }
.search-close { position: absolute; top: 16px; right: 16px; width: 44px; height: 44px; border-radius: 50%; background: var(--glass-border); color: var(--text-secondary); font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.search-close:hover { background: var(--accent); color: white; }
.search-box-wrap { width: 100%; max-width: min(700px, calc(100vw - 24px)); position: relative; margin-bottom: 24px; }
.search-input-main { width: 100%; max-width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid var(--border-bright); border-radius: 16px; padding: clamp(12px,2vw,18px) clamp(16px,3vw,24px); padding-right: 56px; font-size: clamp(16px,2.5vw,20px); color: var(--text-primary); outline: none; font-family: inherit; box-sizing: border-box; }
.search-input-main:focus { border-color: var(--accent-bright); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-input-main::placeholder { color: var(--text-muted); }
.search-go-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 10px; background: var(--accent); color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; }
#search-suggestions { width: 100%; max-width: min(700px, calc(100vw - 24px)); display: grid; grid-template-columns: repeat(auto-fill, minmax(min(160px, 45vw), 1fr)); gap: 12px; max-height: 60vh; overflow-y: auto; overflow-x: hidden; }
.sugg-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.2s; }
.sugg-card:hover { border-color: var(--accent); }
.sugg-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
.sugg-info { padding: 8px; }
.sugg-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sugg-score { font-size: 11px; color: var(--accent-bright); margin-top: 2px; }

@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover, #16163a) 50%, var(--bg-card) 75%); background-size: 800px 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }
@keyframes spin { to { transform: rotate(360deg); } }

/* WATCH LAYOUT */
.watch-wrap {
  padding-top: var(--header-h);
  max-width: 100%;
  overflow-x: hidden;
}

/* THEATER MODE */
body.theater-mode #watch-main {
  max-width: 100%;
}
body.theater-mode .watch-sidebar {
  display: none;
}
body.theater-mode .player-section {
  max-width: 100%;
}

#watch-main {
  display: grid;
  grid-template-columns: 1fr clamp(280px, 30%, 360px);
  gap: clamp(12px, 2vw, 20px);
  max-width: min(1400px, 100%);
  margin: 0 auto;
  padding: clamp(12px, 2vw, 20px);
  overflow-x: hidden;
  align-items: start;
}
@media (max-width: 1024px) {
  #watch-main { grid-template-columns: 1fr; }
  .watch-sidebar { order: 3; }
}

/* PLAYER SECTION */
.player-section {
  min-width: 0;
  max-width: 100%;
}

.player-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}

.anime-watch-title {
  font-size: clamp(14px, 2vw, 20px);
  font-weight: 700;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ep-label {
  font-size: 13px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* PLAYER BOX */
.player-box {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 30px var(--accent-glow);
  border: 1px solid var(--border-bright);
  max-width: 100%;
}

#player-iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
  background: #000;
}

.player-loading {
  position: absolute; inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-secondary);
  font-size: 14px;
  z-index: 5;
  transition: opacity 0.5s;
}
.player-loading.hidden { opacity: 0; pointer-events: none; }
.loader-ring {
  width: 48px; height: 48px;
  border: 3px solid rgba(124,58,237,0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* CONTROLS BAR */
.controls-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: clamp(8px, 1.5vw, 12px) clamp(10px, 2vw, 16px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: hidden;
  max-width: 100%;
}

.ctrl-btn {
  padding: clamp(7px, 1.2vw, 10px) clamp(12px, 2vw, 18px);
  border-radius: 8px;
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 600;
  transition: all 0.2s;
  white-space: nowrap;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.ctrl-btn:hover { background: var(--bg-card-hover, #16163a); color: var(--text-primary); border-color: var(--accent); }
.ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: var(--shadow-glow); }
.ctrl-sep { flex: 1; }

/* TYPE SWITCH */
.type-switch {
  display: flex;
  background: var(--bg-secondary);
  border-radius: 8px;
  padding: 3px;
  border: 1px solid var(--border);
}
.type-btn {
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  transition: all 0.2s;
  white-space: nowrap;
}
.type-btn.active { background: var(--accent); color: white; box-shadow: var(--shadow-glow); }

/* KEYBOARD SHORTCUTS */
.shortcuts-info {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
  padding: 0 4px;
}
.shortcut { display: flex; align-items: center; gap: 4px; }
.key { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 10px; font-family: monospace; }

/* EPISODE PANEL */
.ep-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 16px;
  overflow: hidden;
  max-width: 100%;
}
.ep-panel-header {
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.ep-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(52px, 18%), 1fr));
  gap: 6px;
  padding: 12px;
  max-height: 260px;
  overflow-y: auto;
  overflow-x: hidden;
}
.ep-num {
  aspect-ratio: 1;
  border-radius: 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 0;
}
.ep-num:hover { background: var(--bg-card-hover, #16163a); border-color: var(--accent); color: var(--text-primary); }
.ep-num.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: var(--shadow-glow); }

/* WATCH SIDEBAR */
.watch-sidebar {
  min-width: 0;
  max-width: 100%;
}

/* ANIME INFO CARD */
.anime-info-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.info-card-inner {
  display: flex;
  gap: 12px;
  padding: 16px;
  align-items: flex-start;
}
.info-poster {
  width: 80px;
  aspect-ratio: 3/4;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
}
.info-text .title { font-size: 14px; font-weight: 700; margin-bottom: 6px; word-break: break-word; }
.info-text .meta { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.info-text .score { color: #fac800; font-size: 13px; font-weight: 600; margin-top: 4px; }

/* RELATED SLIDER */
.related-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.related-title::before { content: ''; display: block; width: 3px; height: 16px; background: linear-gradient(to bottom, var(--accent), var(--accent-secondary)); border-radius: 2px; flex-shrink: 0; }
.related-track {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 400px;
  overflow-y: auto;
  overflow-x: hidden;
}
.related-card {
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  padding-right: 8px;
}
.related-card:hover { border-color: var(--accent); background: var(--bg-card-hover, #16163a); }
.related-thumb { width: 56px; height: 78px; object-fit: cover; flex-shrink: 0; }
.related-info { flex: 1; min-width: 0; }
.related-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.related-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* COMMENTS */
.comments-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 16px;
  max-width: 100%;
}
.comments-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
.comment-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  resize: none;
  outline: none;
  max-width: 100%;
  box-sizing: border-box;
  transition: border-color 0.2s;
}
.comment-input:focus { border-color: var(--accent); }
.comment-submit {
  margin-top: 8px;
  padding: 8px 20px;
  background: var(--accent);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: white;
  transition: all 0.2s;
}
.comment-submit:hover { background: var(--accent-bright); }
.comment-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
.comment-item { background: var(--bg-secondary); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
.comment-user { font-size: 12px; font-weight: 600; color: var(--accent-bright); }
.comment-text { font-size: 13px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; word-break: break-word; }

/* FOOTER */
footer { border-top: 1px solid var(--border); padding: 20px clamp(16px,3vw,32px); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; background: var(--bg-secondary); }
.footer-credits { font-size: 13px; color: var(--text-muted); }
.footer-credits span { color: var(--accent-bright); }
</style>
</head>
<body>

<header id="header">
  <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
    <button class="hamburger" id="hamburger-btn" aria-label="Open menu"><span></span><span></span><span></span></button>
    <a href="index.html" class="logo"><div class="logo-icon">⚡</div>Ani<span>Verse</span></a>
  </div>
  <div class="header-spacer"></div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <button class="icon-btn" id="search-open-btn" aria-label="Search">🔍</button>
  </div>
</header>

<div id="sidebar-overlay"></div>
<nav id="sidebar">
  <div class="sidebar-nav">
    <a href="index.html">🏠 Home</a>
    <a href="search.html">🔍 Browse</a>
    <a href="schedule.html">📅 Schedule</a>
  </div>
</nav>

<div id="search-overlay">
  <button class="search-close" id="search-close-btn">✕</button>
  <div class="search-box-wrap">
    <input type="search" class="search-input-main" id="search-input-main" placeholder="Search anime..." autocomplete="off">
    <button class="search-go-btn" id="search-go-btn">→</button>
  </div>
  <div id="search-suggestions"></div>
</div>

<div class="watch-wrap">
  <div id="watch-main">
    <!-- Player Section -->
    <div class="player-section" id="player-section">
      <div class="player-header">
        <div class="anime-watch-title" id="watch-title">Loading…</div>
        <div class="ep-label" id="ep-label">Episode —</div>
      </div>

      <div class="player-box">
        <div class="player-loading" id="player-loading">
          <div class="loader-ring"></div>
          <span>Loading stream…</span>
        </div>
        <iframe id="player-iframe" src="about:blank" allowfullscreen
          allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
          title="Anime player" scrolling="no">
        </iframe>
      </div>

      <!-- Controls -->
      <div class="controls-bar">
        <div class="type-switch">
          <button class="type-btn active" id="btn-sub" onclick="setType('sub')">SUB</button>
          <button class="type-btn" id="btn-dub" onclick="setType('dub')">DUB</button>
        </div>
        <button class="ctrl-btn" id="btn-prev" onclick="prevEp()">⟨ Prev</button>
        <button class="ctrl-btn" id="btn-next" onclick="nextEp()">Next ⟩</button>
        <div class="ctrl-sep"></div>
        <button class="ctrl-btn" id="btn-theater" onclick="toggleTheater()">⛶ Theater</button>
        <button class="ctrl-btn" id="btn-autonext" onclick="toggleAutoNext()">↻ Auto Next: OFF</button>
      </div>

      <div class="shortcuts-info">
        <span class="shortcut"><kbd class="key">←</kbd><span> Prev EP</span></span>
        <span class="shortcut"><kbd class="key">→</kbd><span> Next EP</span></span>
        <span class="shortcut"><kbd class="key">T</kbd><span> Theater</span></span>
        <span class="shortcut"><kbd class="key">F</kbd><span> Fullscreen</span></span>
      </div>

      <!-- Episode Grid -->
      <div class="ep-panel" id="ep-panel">
        <div class="ep-panel-header">
          <span>Episodes</span>
          <span id="ep-count" style="color:var(--text-muted);font-size:12px">Loading…</span>
        </div>
        <div class="ep-grid" id="ep-grid"></div>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <div class="comments-title">💬 Comments</div>
        <textarea class="comment-input" id="comment-input" rows="3" placeholder="Share your thoughts about this episode..."></textarea>
        <button class="comment-submit" id="comment-submit">Post Comment</button>
        <div class="comment-list" id="comment-list"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="watch-sidebar" id="watch-sidebar">
      <div class="anime-info-card" id="anime-info-card">
        <div class="info-card-inner">
          <div style="width:80px;aspect-ratio:3/4;background:var(--bg-secondary);border-radius:8px;" class="skeleton" id="info-poster-sk"></div>
          <div class="info-text">
            <div class="title" id="sidebar-title">Loading…</div>
            <div class="meta" id="sidebar-meta">—</div>
          </div>
        </div>
      </div>

      <div>
        <div class="related-title">Related Anime</div>
        <div class="related-track" id="related-track">
          <div style="color:var(--text-muted);font-size:13px;padding:16px 0;text-align:center">Loading…</div>
        </div>
      </div>
    </aside>
  </div>
</div>

<footer>
  <div class="footer-credits">© 2025 <span>AniVerse</span> — For entertainment purposes only.</div>
</footer>

<script>
'use strict';

const API_BASE = 'https://api.jikan.moe/v4';
const STREAM_BASE = 'https://megaplay.buzz/stream/mal';
const CACHE_TTL = 15 * 60 * 1000;

const Cache = {
  get(k) {
    try {
      const r = localStorage.getItem('av_' + k);
      if (!r) return null;
      const { ts, data } = JSON.parse(r);
      if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem('av_' + k); return null; }
      return data;
    } catch { return null; }
  },
  set(k, data) {
    try { localStorage.setItem('av_' + k, JSON.stringify({ ts: Date.now(), data })); } catch {}
  }
};

async function apiFetch(endpoint) {
  const ck = 'wf_' + endpoint;
  const cached = Cache.get(ck);
  if (cached) return cached;
  for (let i = 0; i < 3; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 1500 * i));
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 12000);
      const res = await fetch(API_BASE + endpoint, { signal: ctrl.signal });
      clearTimeout(t);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      const data = json?.data ?? null;
      if (data) Cache.set(ck, data);
      return data;
    } catch {}
  }
  return null;
}

// State
let currentId = null;
let currentEp = 1;
let totalEps = 0;
let streamType = 'sub';
let autoNext = false;
let autoNextTimer = null;

const params = new URLSearchParams(window.location.search);
currentId = params.get('id');
currentEp = parseInt(params.get('ep') || '1');

async function init() {
  if (!currentId) {
    document.getElementById('watch-title').textContent = 'No anime selected';
    return;
  }

  // Load anime data
  const [anime, recs] = await Promise.allSettled([
    apiFetch(`/anime/${currentId}/full`),
    apiFetch(`/anime/${currentId}/recommendations`)
  ]);

  const data = anime.status === 'fulfilled' ? anime.value : null;
  if (data) {
    const title = data.title_english || data.title || 'Unknown';
    document.title = `${title} EP${currentEp} - AniVerse`;
    document.getElementById('watch-title').textContent = title;
    document.getElementById('sidebar-title').textContent = title;
    document.getElementById('sidebar-meta').innerHTML = `
      ${data.type || 'TV'} · ${data.status || ''}<br>
      Score: ${data.score ? '★ ' + data.score.toFixed(1) : 'N/A'}<br>
      ${data.episodes ? data.episodes + ' Episodes' : ''}
    `;

    totalEps = parseInt(data.episodes) || 100;
    document.getElementById('ep-count').textContent = totalEps + ' Episodes';

    // Poster
    const poster = data.images?.jpg?.image_url;
    if (poster) {
      document.getElementById('info-poster-sk').outerHTML = `<img class="info-poster" src="${poster}" alt="${title}" loading="lazy">`;
    }

    buildEpGrid();
  }

  // Related
  const recData = recs.status === 'fulfilled' ? (recs.value || []) : [];
  renderRelated(recData);

  // Load stream
  loadStream();
  loadComments();
}

function buildEpGrid() {
  const grid = document.getElementById('ep-grid');
  if (!grid) return;
  const count = Math.min(totalEps || 24, 200);
  grid.innerHTML = Array.from({ length: count }, (_, i) => i + 1).map(ep =>
    `<div class="ep-num${ep === currentEp ? ' active' : ''}" onclick="goEp(${ep})">${ep}</div>`
  ).join('');
}

function goEp(ep) {
  currentEp = ep;
  const params = new URLSearchParams(window.location.search);
  params.set('ep', ep);
  window.history.replaceState(null, '', '?' + params.toString());
  loadStream();
  updateEpUI();
}

function updateEpUI() {
  document.getElementById('ep-label').textContent = `Episode ${currentEp}`;
  document.querySelectorAll('.ep-num').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === currentEp);
  });
  // Scroll active ep into view
  const activeEp = document.querySelector('.ep-num.active');
  activeEp?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function loadStream() {
  const iframe = document.getElementById('player-iframe');
  const loading = document.getElementById('player-loading');

  if (!currentId) return;

  loading?.classList.remove('hidden');
  const url = `${STREAM_BASE}/${currentId}/${currentEp}/${streamType}`;
  iframe.src = url;

  iframe.onload = () => {
    setTimeout(() => loading?.classList.add('hidden'), 500);
    // Auto-next timer (30 min fallback if stream doesn't end)
    if (autoNext) {
      clearTimeout(autoNextTimer);
      autoNextTimer = setTimeout(() => {
        if (autoNext && currentEp < totalEps) {
          goEp(currentEp + 1);
        }
      }, 24 * 60 * 1000);
    }
  };

  updateEpUI();
}

function setType(type) {
  streamType = type;
  document.getElementById('btn-sub').classList.toggle('active', type === 'sub');
  document.getElementById('btn-dub').classList.toggle('active', type === 'dub');
  loadStream();
}

function prevEp() {
  if (currentEp > 1) goEp(currentEp - 1);
}
function nextEp() {
  if (currentEp < (totalEps || 999)) goEp(currentEp + 1);
}

function toggleTheater() {
  document.body.classList.toggle('theater-mode');
  const btn = document.getElementById('btn-theater');
  btn.classList.toggle('active');
  btn.textContent = document.body.classList.contains('theater-mode') ? '⛶ Exit Theater' : '⛶ Theater';
}

function toggleAutoNext() {
  autoNext = !autoNext;
  const btn = document.getElementById('btn-autonext');
  btn.textContent = `↻ Auto Next: ${autoNext ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', autoNext);
}

function renderRelated(data) {
  const track = document.getElementById('related-track');
  if (!track) return;
  if (!data || data.length === 0) {
    track.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:16px">No related anime found.</div>';
    return;
  }
  track.innerHTML = data.slice(0, 10).map(r => {
    const entry = r.entry || {};
    const rid = entry.mal_id;
    const rt = (entry.title || 'Unknown').replace(/"/g,'&quot;');
    const img = entry.images?.jpg?.image_url || '';
    return `
      <div class="related-card" onclick="window.location.href='watch.html?id=${rid}&ep=1'" title="${rt}">
        ${img ? `<img class="related-thumb" src="${img}" alt="${rt}" loading="lazy" onerror="this.style.display='none'">` : '<div style="width:56px;height:78px;background:var(--bg-secondary);flex-shrink:0"></div>'}
        <div class="related-info">
          <div class="related-name">${rt}</div>
          <div class="related-meta">EP 1</div>
        </div>
      </div>`;
  }).join('');
}

/* COMMENTS (localStorage) */
function loadComments() {
  const key = `comments_${currentId}_${currentEp}`;
  const stored = (() => { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; } })();
  renderComments(stored);
}

function renderComments(list) {
  const el = document.getElementById('comment-list');
  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:12px">No comments yet. Be the first!</div>';
    return;
  }
  el.innerHTML = list.slice().reverse().slice(0, 20).map(c => `
    <div class="comment-item">
      <div class="comment-user">${c.user || 'Viewer'}</div>
      <div class="comment-text">${c.text || ''}</div>
    </div>
  `).join('');
}

document.getElementById('comment-submit')?.addEventListener('click', () => {
  const input = document.getElementById('comment-input');
  const text = input?.value?.trim();
  if (!text) return;
  const key = `comments_${currentId}_${currentEp}`;
  const stored = (() => { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; } })();
  stored.push({ user: 'Viewer' + Math.floor(Math.random() * 9999), text, ts: Date.now() });
  try { localStorage.setItem(key, JSON.stringify(stored)); } catch {}
  input.value = '';
  renderComments(stored);
});

/* KEYBOARD SHORTCUTS */
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') nextEp();
  else if (e.key === 'ArrowLeft') prevEp();
  else if (e.key === 't' || e.key === 'T') toggleTheater();
  else if (e.key === 'f' || e.key === 'F') {
    const iframe = document.getElementById('player-iframe');
    if (iframe?.requestFullscreen) iframe.requestFullscreen();
  }
});

/* HEADER/SIDEBAR/SEARCH */
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const hamburger = document.getElementById('hamburger-btn');
const searchOverlay = document.getElementById('search-overlay');
const searchInput = document.getElementById('search-input-main');
const searchSugg = document.getElementById('search-suggestions');

function openSidebar() { sidebar?.classList.add('open'); sidebarOverlay?.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeSidebar() { sidebar?.classList.remove('open'); sidebarOverlay?.classList.remove('open'); document.body.style.overflow = ''; }
hamburger?.addEventListener('click', () => sidebar?.classList.contains('open') ? closeSidebar() : openSidebar());
sidebarOverlay?.addEventListener('click', closeSidebar);

function openSearch() { searchOverlay?.classList.add('open'); document.body.style.overflow = 'hidden'; setTimeout(() => searchInput?.focus(), 100); }
function closeSearch() { searchOverlay?.classList.remove('open'); document.body.style.overflow = ''; if (searchInput) searchInput.value = ''; if (searchSugg) searchSugg.innerHTML = ''; }
document.getElementById('search-open-btn')?.addEventListener('click', openSearch);
document.getElementById('search-close-btn')?.addEventListener('click', closeSearch);
document.getElementById('search-go-btn')?.addEventListener('click', () => { const q = searchInput?.value?.trim(); if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`; });
searchOverlay?.addEventListener('click', e => { if (e.target === searchOverlay) closeSearch(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { if (searchOverlay?.classList.contains('open')) closeSearch(); else if (sidebar?.classList.contains('open')) closeSidebar(); } });

let st = null;
searchInput?.addEventListener('input', e => {
  clearTimeout(st);
  const q = e.target.value.trim();
  if (!q || q.length < 2) { searchSugg.innerHTML = ''; return; }
  st = setTimeout(async () => {
    const data = await apiFetch(`/anime?q=${encodeURIComponent(q)}&limit=10&sfw=true`);
    if (!data) return;
    searchSugg.innerHTML = data.map(a => {
      const aid = a.mal_id;
      const at = (a.title_english || a.title || '').replace(/"/g,'&quot;');
      const img = a.images?.jpg?.image_url || '';
      return `<div class="sugg-card" onclick="window.location.href='anime.html?id=${aid}'" tabindex="0"><img src="${img}" alt="${at}" loading="lazy" onerror="this.style.display='none'"><div class="sugg-info"><div class="sugg-title">${at}</div>${a.score?`<div class="sugg-score">★ ${a.score.toFixed(1)}</div>`:''}</div></div>`;
    }).join('');
  }, 350);
});
searchInput?.addEventListener('keydown', e => { if (e.key === 'Enter') { const q = searchInput.value.trim(); if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`; } });

document.addEventListener('DOMContentLoaded', init);
</script>
