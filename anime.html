<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
<title>Anime Details - AniVerse</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;max-width:100%;scroll-behavior:smooth}
body{overflow-x:hidden;max-width:100%;background:#0a0a0f;color:#e8e8f0;font-family:'Nunito',sans-serif;min-height:100vh}
:root{
  --bg:#0a0a0f;--bg2:#0f0f1a;--bg3:#141428;--card:#12121e;--card2:#1a1a2e;
  --accent:#7c3aed;--accent2:#a855f7;--accent3:#c084fc;--neon:#b45aff;
  --gold:#fbbf24;--red:#ef4444;--green:#22c55e;
  --text:#e8e8f0;--text2:#a0a0b8;--text3:#6b6b88;
  --border:rgba(124,58,237,0.2);--glass:rgba(255,255,255,0.04);
  --glow:0 0 20px rgba(124,58,237,0.4);--radius:12px;--radius2:8px;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);--header-h:70px;
}
::-webkit-scrollbar{width:6px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.5s ease both}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--header-h);display:flex;align-items:center;padding:0 clamp(12px,3vw,28px);gap:clamp(8px,2vw,20px);background:linear-gradient(180deg,rgba(10,10,15,0.98),rgba(10,10,15,0.85));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.h-left{display:flex;align-items:center;gap:12px;flex-shrink:0}
.hamburger{background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;display:flex;flex-direction:column;gap:5px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:var(--transition)}
.hamburger:hover span{background:var(--accent2)}
.h-center{flex:1;display:flex;justify-content:center;min-width:0}
.logo{font-family:'Rajdhani',sans-serif;font-size:clamp(20px,4vw,28px);font-weight:700;text-decoration:none;color:var(--text);letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--accent2)}
.h-right{display:flex;align-items:center;gap:clamp(6px,1.5vw,14px);flex-shrink:0}
.h-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:8px;border-radius:8px;transition:var(--transition);display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px}
.h-btn:hover{color:var(--accent2);background:var(--glass)}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;padding:6px 10px;border-radius:6px;transition:var(--transition);white-space:nowrap}
.nav-link:hover{color:var(--accent2)}
@media(max-width:768px){.nav-links{display:none}}

/* SEARCH OVERLAY */
#searchOverlay{position:fixed;inset:0;z-index:2000;background:rgba(10,10,15,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;padding:clamp(60px,10vw,100px) clamp(12px,5vw,40px) 20px;opacity:0;pointer-events:none;transition:opacity 0.3s;overflow-y:auto;overflow-x:hidden;max-width:100vw}
#searchOverlay.open{opacity:1;pointer-events:all}
.search-close{position:fixed;top:20px;right:clamp(12px,4vw,28px);background:var(--glass);border:1px solid var(--border);color:var(--text);font-size:22px;cursor:pointer;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:2001}
.search-close:hover{background:var(--accent);border-color:var(--accent)}
.search-box{width:100%;max-width:min(700px,calc(100vw - 24px));position:relative}
.search-box input{width:100%;background:var(--card2);border:2px solid var(--border);border-radius:50px;padding:16px 60px 16px 24px;font-size:clamp(14px,2.5vw,18px);font-family:'Nunito',sans-serif;color:var(--text);outline:none;transition:var(--transition)}
.search-box input:focus{border-color:var(--accent2);box-shadow:var(--glow)}
.search-box input::placeholder{color:var(--text3)}
.search-icon-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:var(--transition)}
.search-icon-btn:hover{background:var(--accent2)}
#searchResults{width:100%;max-width:min(700px,calc(100vw - 24px));margin-top:12px;overflow-x:hidden}
.search-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border-radius:var(--radius2);cursor:pointer;transition:var(--transition);text-decoration:none;color:var(--text);border:1px solid transparent;margin-bottom:8px}
.search-item:hover{border-color:var(--border);background:var(--card2)}
.search-item img{width:48px;height:68px;object-fit:cover;border-radius:6px;flex-shrink:0}
.search-item-info h4{font-size:14px;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100vw - 160px)}
.search-item-info span{font-size:12px;color:var(--text2)}
.search-msg{color:var(--text2);font-size:14px;text-align:center;padding:20px}

/* SIDEBAR */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:min(280px,85vw);background:var(--bg2);border-right:1px solid var(--border);z-index:1500;transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;overflow-x:hidden}
#sidebar.open{transform:translateX(0)}
#sideOverlay{position:fixed;inset:0;z-index:1400;background:rgba(0,0,0,0.7);opacity:0;pointer-events:none;transition:opacity 0.3s}
#sideOverlay.open{opacity:1;pointer-events:all}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.sidebar-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px;border-radius:6px}
.sidebar-nav{padding:16px 12px}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius2);color:var(--text2);text-decoration:none;font-size:14px;font-weight:600;transition:var(--transition);margin-bottom:4px}
.sidebar-link:hover,.sidebar-link.active{color:var(--text);background:var(--glass);border-left:3px solid var(--accent2)}

main{padding-top:var(--header-h);overflow-x:hidden}

/* BANNER */
.anime-banner{position:relative;width:100%;height:clamp(280px,45vw,480px);overflow:hidden;max-width:100vw}
.banner-img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:brightness(0.4)}
.banner-gradient{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,15,0.1) 0%,var(--bg) 100%),linear-gradient(90deg,var(--bg) 0%,transparent 40%)}

/* DETAIL LAYOUT */
.detail-wrap{display:flex;gap:clamp(16px,3vw,32px);padding:clamp(12px,3vw,24px) clamp(12px,3vw,32px);flex-wrap:wrap;max-width:100%;overflow-x:hidden}
.detail-left{flex-shrink:0;width:clamp(140px,22vw,200px)}
.poster-box{position:relative}
.poster-img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,0.6),var(--glow2)}
.detail-right{flex:1;min-width:0}
.detail-title{font-family:'Rajdhani',sans-serif;font-size:clamp(20px,4vw,38px);font-weight:700;line-height:1.2;margin-bottom:8px}
.detail-title-en{font-size:clamp(12px,2vw,16px);color:var(--text2);margin-bottom:14px}
.detail-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;border:1px solid var(--border);background:var(--glass);color:var(--text2)}
.tag.genre{border-color:rgba(168,85,247,0.3);color:var(--accent3);background:rgba(124,58,237,0.1)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);padding:10px 14px;min-width:0}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-val{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-val.score{color:var(--gold)}
.detail-actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;text-decoration:none;padding:clamp(9px,1.5vw,12px) clamp(16px,2.5vw,24px);border-radius:30px;font-size:clamp(12px,1.8vw,14px);font-weight:700;transition:var(--transition);border:none;cursor:pointer;white-space:nowrap}
.btn-primary:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:var(--glow)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;background:var(--card2);color:var(--text);text-decoration:none;padding:clamp(9px,1.5vw,12px) clamp(16px,2.5vw,24px);border-radius:30px;font-size:clamp(12px,1.8vw,14px);font-weight:700;transition:var(--transition);border:1px solid var(--border);cursor:pointer;white-space:nowrap}
.btn-secondary:hover{background:var(--card);transform:translateY(-2px)}
.detail-synopsis{font-size:clamp(13px,1.8vw,15px);color:var(--text2);line-height:1.8;margin-bottom:20px}

/* SECTION STYLES */
.section{padding:clamp(16px,3vw,32px);overflow:hidden;max-width:100%}
.section-title{font-family:'Rajdhani',sans-serif;font-size:clamp(16px,3vw,20px);font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:16px;letter-spacing:0.5px}
.section-title::before{content:'';display:block;width:4px;height:20px;background:linear-gradient(180deg,var(--accent2),var(--accent3));border-radius:2px}

/* EPISODE LIST */
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(44px,8vw,64px),1fr));gap:6px;max-height:320px;overflow-y:auto;overflow-x:hidden;padding-right:4px}
.ep-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius2);padding:8px 4px;font-size:13px;font-weight:700;cursor:pointer;transition:var(--transition);text-align:center;font-family:'Nunito',sans-serif;text-decoration:none;display:flex;align-items:center;justify-content:center}
.ep-btn:hover,.ep-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* CHARACTERS */
.char-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.char-grid::-webkit-scrollbar{display:none}
.char-card{flex:0 0 clamp(80px,13vw,110px);background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;transition:var(--transition)}
.char-card:hover{border-color:var(--accent);transform:translateY(-4px)}
.char-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--card2)}
.char-info{padding:6px;text-align:center}
.char-name{font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.char-role{font-size:9px;color:var(--text3)}

/* RECOMMENDATIONS */
.rec-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.rec-grid::-webkit-scrollbar{display:none}
.rec-card{flex:0 0 clamp(110px,16vw,140px);background:var(--card);border-radius:var(--radius2);overflow:hidden;text-decoration:none;color:var(--text);transition:var(--transition)}
.rec-card:hover{transform:translateY(-4px);box-shadow:var(--glow2)}
.rec-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--card2)}
.rec-title{padding:6px 8px;font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TRAILER */
.trailer-wrap{position:relative;width:100%;max-width:min(800px,100%);aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:var(--card2)}
.trailer-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* FOOTER */
footer{margin-top:40px;padding:28px clamp(12px,4vw,40px);border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:16px;background:var(--bg2)}
.footer-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px}
.footer-logo span{color:var(--accent2)}
.footer-copy{font-size:12px;color:var(--text3);text-align:center}

#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:var(--radius2);font-size:13px;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;max-width:calc(100vw - 48px)}
#toast.show{opacity:1;transform:translateY(0)}

@media(max-width:600px){
  .detail-wrap{flex-direction:column}
  .detail-left{width:clamp(140px,45vw,180px);margin:0 auto}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<header id="header">
  <div class="h-left">
    <button class="hamburger" id="menuBtn"><span></span><span></span><span></span></button>
  </div>
  <div class="h-center">
    <a href="index.html" class="logo">Ani<span>Verse</span></a>
  </div>
  <div class="h-right">
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="search.html" class="nav-link">Browse</a>
      <a href="schedule.html" class="nav-link">Schedule</a>
    </nav>
    <button class="h-btn" id="searchBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</header>

<div id="sideOverlay"></div>
<nav id="sidebar">
  <div class="sidebar-head">
    <a href="index.html" class="logo">Ani<span>Verse</span></a>
    <button class="sidebar-close" id="sideClose">✕</button>
  </div>
  <div class="sidebar-nav">
    <a href="index.html" class="sidebar-link">🏠 Home</a>
    <a href="search.html" class="sidebar-link">🔍 Browse Anime</a>
    <a href="schedule.html" class="sidebar-link">📅 Schedule</a>
    <a href="creator.html" class="sidebar-link">👨‍💻 Creator</a>
  </div>
</nav>

<div id="searchOverlay">
  <button class="search-close" id="searchClose">✕</button>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off"/>
    <button class="search-icon-btn" id="searchGo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
  <div id="searchResults"></div>
</div>

<main id="mainContent">
  <div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--text2)">Loading anime details...</div>
</main>

<footer>
  <div class="footer-logo">Ani<span>Verse</span></div>
  <p class="footer-copy">© 2025 AniVerse. Powered by Jikan API.</p>
</footer>
<div id="toast"></div>

<script>
const API='https://api.jikan.moe/v4';
const CACHE={};
const CACHE_TTL=5*60*1000;
const params=new URLSearchParams(location.search);
const ANIME_ID=params.get('id');

async function apiFetch(url,retries=3){
  if(CACHE[url]&&Date.now()-CACHE[url].t<CACHE_TTL)return CACHE[url].d;
  for(let i=0;i<retries;i++){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),10000);
      const r=await fetch(url,{signal:ctrl.signal});
      clearTimeout(tid);
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      CACHE[url]={d,t:Date.now()};
      return d;
    }catch(e){
      if(i<retries-1)await new Promise(r=>setTimeout(r,1200*(i+1)));
      else throw e;
    }
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

async function loadAnime(){
  if(!ANIME_ID){
    document.getElementById('mainContent').innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">No anime ID provided. <a href="index.html" style="color:var(--accent2)">Go Home</a></div>';
    return;
  }
  try{
    const [animeRes,charsRes,recsRes]=await Promise.allSettled([
      apiFetch(`${API}/anime/${ANIME_ID}/full`),
      apiFetch(`${API}/anime/${ANIME_ID}/characters`),
      apiFetch(`${API}/anime/${ANIME_ID}/recommendations`),
    ]);
    const anime=animeRes.status==='fulfilled'?animeRes.value?.data:null;
    const chars=charsRes.status==='fulfilled'?charsRes.value?.data||[]:[];
    const recs=recsRes.status==='fulfilled'?recsRes.value?.data||[]:[];
    if(!anime){
      document.getElementById('mainContent').innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">Failed to load anime. <a href="index.html" style="color:var(--accent2)">Go Home</a></div>';
      return;
    }
    document.title=`${anime.title} - AniVerse`;
    renderAnime(anime,chars,recs);
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div style="padding:40px;text-align:center;color:var(--text2)">Error loading anime.<br><button onclick="loadAnime()" style="margin-top:16px;background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-family:inherit">Retry</button></div>`;
  }
}

function renderAnime(a,chars,recs){
  const banner=a.images?.jpg?.large_image_url||a.images?.webp?.large_image_url||a.images?.jpg?.image_url||'';
  const poster=a.images?.jpg?.image_url||a.images?.webp?.image_url||'';
  const genres=(a.genres||[]).map(g=>`<span class="tag genre">${g.name}</span>`).join('');
  const studios=(a.studios||[]).map(s=>s.name).join(', ')||'N/A';
  const epCount=a.episodes||'?';
  const trailer=a.trailer?.embed_url||'';
  const relations=(a.relations||[]);
  const synopsis=a.synopsis||'No synopsis available.';

  document.getElementById('mainContent').innerHTML=`
    <div class="anime-banner">
      <img class="banner-img" src="${banner}" alt="${a.title}" loading="lazy" onerror="this.style.opacity=0"/>
      <div class="banner-gradient"></div>
    </div>
    <div class="detail-wrap fade-in">
      <div class="detail-left">
        <div class="poster-box">
          <img class="poster-img" src="${poster}" alt="${a.title}" loading="lazy"/>
        </div>
      </div>
      <div class="detail-right">
        <h1 class="detail-title">${a.title||'Unknown'}</h1>
        ${a.title_english&&a.title_english!==a.title?`<div class="detail-title-en">${a.title_english}</div>`:''}
        <div class="detail-tags">${genres}</div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val score">★ ${a.score||'N/A'}</div></div>
          <div class="stat-box"><div class="stat-label">Rank</div><div class="stat-val">#${a.rank||'N/A'}</div></div>
          <div class="stat-box"><div class="stat-label">Episodes</div><div class="stat-val">${epCount}</div></div>
          <div class="stat-box"><div class="stat-label">Status</div><div class="stat-val">${a.status||'N/A'}</div></div>
          <div class="stat-box"><div class="stat-label">Type</div><div class="stat-val">${a.type||'N/A'}</div></div>
          <div class="stat-box"><div class="stat-label">Studio</div><div class="stat-val">${studios}</div></div>
          <div class="stat-box"><div class="stat-label">Season</div><div class="stat-val">${a.season?a.season.charAt(0).toUpperCase()+a.season.slice(1):''} ${a.year||''}</div></div>
          <div class="stat-box"><div class="stat-label">Rating</div><div class="stat-val">${a.rating||'N/A'}</div></div>
        </div>
        <div class="detail-actions">
          <a href="watch.html?id=${a.mal_id}&ep=1" class="btn-primary">▶ Watch Now</a>
          <button class="btn-secondary" onclick="window.open('https://myanimelist.net/anime/${a.mal_id}','_blank')">MAL Page</button>
        </div>
        <p class="detail-synopsis">${synopsis}</p>
      </div>
    </div>

    <!-- EPISODES -->
    <div class="section">
      <h2 class="section-title">Episodes</h2>
      <div class="ep-grid" id="epGrid">
        ${Array.from({length:typeof epCount==='number'?epCount:12},(_,i)=>`
          <a href="watch.html?id=${a.mal_id}&ep=${i+1}" class="ep-btn" title="Episode ${i+1}">Ep ${i+1}</a>
        `).join('')}
      </div>
    </div>

    <!-- TRAILER -->
    ${trailer?`<div class="section">
      <h2 class="section-title">Trailer</h2>
      <div class="trailer-wrap">
        <iframe src="${trailer}" allowfullscreen allow="autoplay; encrypted-media" loading="lazy"></iframe>
      </div>
    </div>`:''}

    <!-- CHARACTERS -->
    ${chars.length?`<div class="section">
      <h2 class="section-title">Characters</h2>
      <div class="char-grid">
        ${chars.slice(0,20).map(c=>`
          <div class="char-card">
            <img class="char-img" src="${c.character?.images?.jpg?.image_url||''}" alt="${c.character?.name||''}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 3 4%22%3E%3C/svg%3E'"/>
            <div class="char-info">
              <div class="char-name">${c.character?.name||'Unknown'}</div>
              <div class="char-role">${c.role||''}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`:''}

    <!-- RELATIONS -->
    ${relations.length?`<div class="section">
      <h2 class="section-title">Related Anime</h2>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${relations.flatMap(r=>r.entry.filter(e=>e.type==='anime').map(e=>`
          <a href="anime.html?id=${e.mal_id}" style="padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);text-decoration:none;transition:var(--transition);white-space:nowrap" 
             onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--text)'"
             onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">
            <span style="color:var(--accent3)">${r.relation}:</span> ${e.name}
          </a>`)).join('')}
      </div>
    </div>`:''}

    <!-- RECOMMENDATIONS -->
    ${recs.length?`<div class="section">
      <h2 class="section-title">You May Also Like</h2>
      <div class="rec-grid">
        ${recs.slice(0,16).map(r=>`
          <a href="anime.html?id=${r.entry?.mal_id}" class="rec-card">
            <img class="rec-img" src="${r.entry?.images?.jpg?.image_url||''}" alt="${r.entry?.title||''}" loading="lazy"/>
            <div class="rec-title">${r.entry?.title||'Unknown'}</div>
          </a>`).join('')}
      </div>
    </div>`:''}
  `;
}

// Search
const searchOverlay=document.getElementById('searchOverlay');
const searchInput=document.getElementById('searchInput');
const searchResults=document.getElementById('searchResults');
let searchTimer=null;
function openSearch(){document.body.style.overflow='hidden';searchOverlay.classList.add('open');setTimeout(()=>searchInput?.focus(),200);}
function closeSearch(){document.body.style.overflow='';searchOverlay.classList.remove('open');if(searchInput)searchInput.value='';if(searchResults)searchResults.innerHTML='';}
document.getElementById('searchBtn')?.addEventListener('click',openSearch);
document.getElementById('searchClose')?.addEventListener('click',closeSearch);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();});
searchInput?.addEventListener('input',()=>{
  clearTimeout(searchTimer);
  const q=searchInput.value.trim();
  if(q.length<2){searchResults.innerHTML='';return;}
  searchResults.innerHTML='<div class="search-msg">Searching...</div>';
  searchTimer=setTimeout(async()=>{
    try{
      const d=await apiFetch(`${API}/anime?q=${encodeURIComponent(q)}&limit=8&sfw=true`);
      const list=d.data||[];
      if(!list.length){searchResults.innerHTML='<div class="search-msg">No results.</div>';return;}
      searchResults.innerHTML=list.map(a=>`<a href="anime.html?id=${a.mal_id}" class="search-item" onclick="closeSearch()">
        <img src="${a.images?.jpg?.image_url||''}" alt="${a.title}" onerror="this.style.display='none'"/>
        <div class="search-item-info"><h4>${a.title||'Unknown'}</h4><span>${a.type||''} ${a.score?'★'+a.score:''}</span></div>
      </a>`).join('');
    }catch(e){searchResults.innerHTML='<div class="search-msg">Search failed.</div>';}
  },400);
});
document.getElementById('searchGo')?.addEventListener('click',()=>{const q=searchInput?.value.trim();if(q)window.location.href=`search.html?q=${encodeURIComponent(q)}`;});
searchInput?.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=searchInput.value.trim();if(q)window.location.href=`search.html?q=${encodeURIComponent(q)}`;}});

// Sidebar
const sidebar=document.getElementById('sidebar');
const sideOverlay=document.getElementById('sideOverlay');
function openSide(){sidebar.classList.add('open');sideOverlay.classList.add('open');document.body.style.overflow='hidden';}
function closeSide(){sidebar.classList.remove('open');sideOverlay.classList.remove('open');document.body.style.overflow='';}
document.getElementById('menuBtn')?.addEventListener('click',openSide);
document.getElementById('sideClose')?.addEventListener('click',closeSide);
sideOverlay?.addEventListener('click',closeSide);

loadAnime();
</script>
</body>
</html>
