<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="description" content="Anime details page - AniStream" />
<meta property="og:type" content="website" />
<title>Anime Details - AniStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   GLOBAL RESET + OVERFLOW PREVENTION
   ============================================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  overflow-x: hidden;
  max-width: 100vw;
  scroll-behavior: smooth;
}

body {
  overflow-x: hidden;
  max-width: 100vw;
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  background: #0a0a0f;
  color: #e0e0f0;
  -webkit-text-size-adjust: 100%;
}

/* Every element is clamped to viewport */
img, video, iframe, embed, object {
  max-width: 100%;
  display: block;
}

/* Flex children must not overflow */
[class*="flex"] > * {
  min-width: 0;
}

/* ============================================================
   CSS VARIABLES
   ============================================================ */
:root {
  --bg-primary:    #0a0a0f;
  --bg-secondary:  #0f0f1a;
  --bg-card:       #13131f;
  --bg-glass:      rgba(255,255,255,0.04);
  --border-glass:  rgba(255,255,255,0.08);
  --purple:        #7c3aed;
  --purple-light:  #a855f7;
  --purple-glow:   rgba(124,58,237,0.35);
  --purple-dim:    rgba(124,58,237,0.15);
  --accent:        #06b6d4;
  --accent-glow:   rgba(6,182,212,0.3);
  --gold:          #f59e0b;
  --green:         #10b981;
  --red:           #ef4444;
  --text-primary:  #f0f0ff;
  --text-secondary:#a0a0c0;
  --text-muted:    #606080;
  --radius-sm:     6px;
  --radius-md:     12px;
  --radius-lg:     18px;
  --radius-xl:     24px;
  --transition:    0.3s cubic-bezier(0.4,0,0.2,1);
  --header-h:      70px;
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--purple-light); }

/* ============================================================
   HEADER
   ============================================================ */
.header {
  position: fixed;
  inset: 0 0 auto 0;
  height: var(--header-h);
  z-index: 1000;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-glass);
  display: flex;
  align-items: center;
  padding: 0 clamp(12px, 3vw, 32px);
  gap: 12px;
  width: 100%;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.hamburger {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex-shrink: 0;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--text-primary);
  border-radius: 2px;
  transition: var(--transition);
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(16px, 3vw, 22px);
  text-decoration: none;
  white-space: nowrap;
  background: linear-gradient(135deg, var(--purple-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-center { flex: 1; min-width: 0; }

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: clamp(4px, 1.5vw, 20px);
  list-style: none;
}
.header-nav a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: clamp(12px, 1.3vw, 14px);
  font-weight: 600;
  transition: color var(--transition);
  white-space: nowrap;
}
.header-nav a:hover { color: var(--purple-light); }

.icon-btn {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  color: var(--text-primary);
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
  font-size: 16px;
}
.icon-btn:hover {
  background: var(--purple-dim);
  border-color: var(--purple);
  box-shadow: 0 0 12px var(--purple-glow);
}

/* Mobile nav */
.mobile-nav {
  position: fixed;
  inset: 0 0 0 -100%;
  z-index: 2000;
  display: flex;
  transition: left var(--transition);
}
.mobile-nav.open { left: 0; }
.mobile-nav-inner {
  width: min(280px, 85vw);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-glass);
  padding: 24px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.mobile-nav-overlay {
  flex: 1;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
}
.mobile-nav a {
  display: block;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 12px 16px;
  border-radius: var(--radius-md);
  font-weight: 600;
  transition: var(--transition);
}
.mobile-nav a:hover,
.mobile-nav a.active {
  background: var(--purple-dim);
  color: var(--purple-light);
}
.mobile-nav-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
  align-self: flex-end;
  margin-bottom: 16px;
}

/* Search overlay */
.search-overlay {
  position: fixed;
  inset: 0;
  z-index: 1500;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(24px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 120px;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}
.search-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.search-box {
  width: min(640px, 90vw);
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 2px solid var(--purple);
  border-radius: var(--radius-xl);
  padding: 16px 50px 16px 20px;
  color: var(--text-primary);
  font-size: clamp(15px, 2vw, 18px);
  font-family: 'Nunito', sans-serif;
  outline: none;
  box-shadow: 0 0 30px var(--purple-glow);
}
.search-close {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
}
.search-results {
  margin-top: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  overflow: hidden;
  max-height: 400px;
  overflow-y: auto;
}
.search-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  transition: background var(--transition);
  text-decoration: none;
  color: var(--text-primary);
}
.search-item:hover { background: var(--bg-glass); }
.search-item img {
  width: 40px;
  height: 56px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}
.search-item-title {
  font-weight: 600;
  font-size: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.search-item-meta { font-size: 12px; color: var(--text-muted); }

/* ============================================================
   MAIN LAYOUT — padded below fixed header
   ============================================================ */
main {
  padding-top: var(--header-h);
  width: 100%;
  overflow-x: hidden;
}

/* ============================================================
   HERO BANNER
   ============================================================ */
.anime-banner {
  position: relative;
  width: 100%;
  height: clamp(260px, 42vw, 520px);
  overflow: hidden;
}

.banner-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: brightness(0.45);
}

.banner-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(10,10,15,0.1) 0%,
    rgba(10,10,15,0.4) 50%,
    rgba(10,10,15,1) 100%
  );
}

/* ============================================================
   DETAILS CONTENT WRAPPER
   ============================================================ */
.details-wrapper {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 clamp(12px, 3vw, 40px);
}

/* ============================================================
   ANIME HERO INFO — poster + info side by side → stacks on mobile
   ============================================================ */
.anime-hero {
  display: flex;
  gap: clamp(16px, 3vw, 36px);
  align-items: flex-end;
  margin-top: -clamp(80px, 14vw, 160px);
  position: relative;
  z-index: 10;
  flex-wrap: wrap;   /* KEY: wraps on narrow screens */
}

.anime-poster-wrap {
  flex-shrink: 0;
  width: clamp(100px, 18vw, 200px);
}

.anime-poster {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  border-radius: var(--radius-lg);
  border: 2px solid var(--purple);
  box-shadow: 0 0 30px var(--purple-glow), 0 20px 60px rgba(0,0,0,0.7);
  display: block;
}

.anime-info {
  flex: 1 1 200px;   /* can shrink below 200px without blowing out */
  min-width: 0;
  padding-bottom: 8px;
}

.anime-type-badge {
  display: inline-block;
  background: var(--purple);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.anime-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(18px, 4vw, 38px);
  font-weight: 900;
  line-height: 1.15;
  color: var(--text-primary);
  margin-bottom: 6px;
  word-break: break-word;       /* prevents title overflow */
  overflow-wrap: break-word;
}

.anime-title-jp {
  font-size: clamp(12px, 1.5vw, 15px);
  color: var(--text-muted);
  margin-bottom: 14px;
}

.anime-meta-row {
  display: flex;
  flex-wrap: wrap;   /* KEY: wraps badges on small screens */
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
}

.meta-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}
.meta-badge.score  { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }
.meta-badge.status { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
.meta-badge.eps    { background: var(--bg-glass); color: var(--text-secondary); border: 1px solid var(--border-glass); }
.meta-badge.type   { background: var(--purple-dim); color: var(--purple-light); border: 1px solid rgba(124,58,237,0.3); }

.anime-genres {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}

.genre-chip {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  color: var(--text-secondary);
  font-size: clamp(10px, 1.2vw, 12px);
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.genre-chip:hover {
  background: var(--purple-dim);
  border-color: var(--purple);
  color: var(--purple-light);
}

.anime-action-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.btn-watch {
  background: linear-gradient(135deg, var(--purple), var(--purple-light));
  color: #fff;
  border: none;
  padding: clamp(8px, 1.5vw, 12px) clamp(16px, 3vw, 28px);
  border-radius: 30px;
  font-size: clamp(13px, 1.3vw, 15px);
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition);
  box-shadow: 0 0 20px var(--purple-glow);
  white-space: nowrap;
  font-family: 'Nunito', sans-serif;
}
.btn-watch:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px var(--purple-glow);
}

.btn-secondary {
  background: var(--bg-glass);
  color: var(--text-primary);
  border: 1px solid var(--border-glass);
  padding: clamp(8px, 1.5vw, 12px) clamp(14px, 2.5vw, 22px);
  border-radius: 30px;
  font-size: clamp(13px, 1.3vw, 15px);
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition);
  backdrop-filter: blur(10px);
  white-space: nowrap;
  font-family: 'Nunito', sans-serif;
}
.btn-secondary:hover {
  background: var(--purple-dim);
  border-color: var(--purple);
}

/* ============================================================
   CONTENT SECTION — two-column → stacks on mobile
   ============================================================ */
.content-section {
  display: grid;
  grid-template-columns: 1fr clamp(200px, 28vw, 340px);
  gap: clamp(16px, 3vw, 32px);
  margin-top: clamp(24px, 4vw, 48px);
  align-items: start;
}

@media (max-width: 900px) {
  .content-section {
    grid-template-columns: 1fr;
  }
}

/* ============================================================
   TABS — horizontally scrollable, no overflow
   ============================================================ */
.tabs-bar {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border-glass);
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  scrollbar-width: none;
  -ms-overflow-style: none;
  /* prevents tabs from shrinking the page */
  width: 100%;
  max-width: 100%;
}
.tabs-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;           /* tabs never squish to nothing */
  scroll-snap-align: start;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'Nunito', sans-serif;
  font-size: clamp(13px, 1.4vw, 15px);
  font-weight: 700;
  padding: 12px clamp(10px, 2vw, 22px);
  cursor: pointer;
  position: relative;
  transition: color var(--transition);
  white-space: nowrap;
}
.tab-btn::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--purple-light);
  transform: scaleX(0);
  transition: transform var(--transition);
}
.tab-btn.active { color: var(--purple-light); }
.tab-btn.active::after { transform: scaleX(1); }
.tab-btn:hover { color: var(--text-primary); }

.tab-panel { display: none; padding-top: 24px; }
.tab-panel.active { display: block; }

/* ============================================================
   SYNOPSIS
   ============================================================ */
.synopsis-text {
  color: var(--text-secondary);
  line-height: 1.8;
  font-size: clamp(13px, 1.4vw, 15px);
  word-break: break-word;
  overflow-wrap: break-word;
}

.read-more-btn {
  background: none;
  border: none;
  color: var(--purple-light);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  display: inline-block;
}

/* ============================================================
   EPISODE LIST
   ============================================================ */
.episode-search-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
  align-items: center;
}
.episode-search {
  flex: 1 1 160px;
  min-width: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  color: var(--text-primary);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color var(--transition);
}
.episode-search:focus { border-color: var(--purple); }

.episode-range-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.range-btn {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  color: var(--text-secondary);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  font-family: 'Nunito', sans-serif;
}
.range-btn.active,
.range-btn:hover {
  background: var(--purple-dim);
  border-color: var(--purple);
  color: var(--purple-light);
}

.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(72px, 100%), 1fr));
  gap: 8px;
  max-height: 400px;
  overflow-y: auto;
  padding-right: 4px;
}

.episode-item {
  background: var(--bg-card);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-sm);
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 600;
  color: var(--text-secondary);
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.episode-item:hover,
.episode-item.active {
  background: var(--purple-dim);
  border-color: var(--purple);
  color: var(--purple-light);
  box-shadow: 0 0 8px var(--purple-glow);
}
.ep-num { font-weight: 800; }
.ep-filler {
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ============================================================
   CHARACTERS GRID
   ============================================================ */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(150px, 100%), 1fr));
  gap: clamp(10px, 2vw, 16px);
}

.char-card {
  background: var(--bg-card);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: var(--transition);
  cursor: pointer;
}
.char-card:hover {
  border-color: var(--purple);
  transform: translateY(-4px);
  box-shadow: 0 8px 24px var(--purple-glow);
}
.char-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  object-position: top;
}
.char-info {
  padding: 10px;
}
.char-name {
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.char-role {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: capitalize;
}

/* ============================================================
   RECOMMENDATIONS SLIDER
   ============================================================ */
.rec-slider-wrap {
  position: relative;
  overflow: hidden;
}
.rec-slider {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
  padding-bottom: 8px;
}
.rec-slider::-webkit-scrollbar { display: none; }
.rec-card {
  flex-shrink: 0;
  width: clamp(120px, 20vw, 160px);
  scroll-snap-align: start;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}
.rec-card img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-glass);
  transition: var(--transition);
}
.rec-card:hover img {
  border-color: var(--purple);
  box-shadow: 0 0 16px var(--purple-glow);
}
.rec-title {
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 600;
  margin-top: 6px;
  text-align: center;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ============================================================
   TRAILER
   ============================================================ */
.trailer-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border-glass);
}
.trailer-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* ============================================================
   SIDEBAR INFO PANEL
   ============================================================ */
.sidebar-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}

.info-card {
  background: var(--bg-card);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  padding: clamp(14px, 2vw, 22px);
  backdrop-filter: blur(10px);
}
.info-card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(12px, 1.3vw, 14px);
  font-weight: 700;
  color: var(--purple-light);
  margin-bottom: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border-glass);
  padding-bottom: 10px;
}

/* Info table inside the sidebar card */

  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px 12px;
  width: 100%;
}
.info-label {
  font-size: clamp(11px, 1.1vw, 13px);

.score-big {

}

/* ============================================================
   SKELETON LOADING
   ============================================================ */
.skeleton {
  background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-glass) 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);

@keyframes shimmer {

  100% { background-position: -200% 0; }

/* ============================================================
   SECTION HEADING
   ============================================================ */
.section-heading {
  font-family: 'Orbitron', sans-serif;

<script>
/* ============================================================
   UTILITIES
   ============================================================ */
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

/* URL param helper */
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

/* Safe number formatter */
function fmtNum(n) {
  if (n == null || n === 0) return '--';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
  return String(n);
}

/* Truncate text */
function truncate(str, len = 400) {
  if (!str) return 'No synopsis available.';
  return str.length > len ? str.slice(0, len) + '...' : str;
}

/* ============================================================
   CACHE (localStorage, 1-hour TTL)
   ============================================================ */
const CACHE_TTL = 60 * 60 * 1000;

function cacheGet(key) {
  try {
    const raw = localStorage.getItem('as_' + key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem('as_' + key); return null; }
    return data;
  } catch { return null; }
}

function cacheSet(key, data) {
  try { localStorage.setItem('as_' + key, JSON.stringify({ ts: Date.now(), data })); }
  catch {}
}

/* ============================================================
   FETCH WITH RETRY + TIMEOUT
   ============================================================ */
async function fetchWithRetry(url, retries = 3, delay = 1000) {
  for (let i = 0; i < retries; i++) {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 10000);
    try {
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(tid);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch (err) {
      clearTimeout(tid);
      if (i < retries - 1) await new Promise(r => setTimeout(r, delay * (i + 1)));
      else throw err;
    }
  }
}

/* Cached fetch */
async function apiFetch(path) {
  const cached = cacheGet(path);
  if (cached) return cached;
  const data = await fetchWithRetry('https://api.jikan.moe/v4' + path);
  cacheSet(path, data);
  return data;
}

/* ============================================================
   PAGE LOADER
   ============================================================ */
const pageLoader = $('#pageLoader');
function hideLoader() {
  pageLoader.classList.add('hidden');
}

/* ============================================================
   HEADER: HAMBURGER + SEARCH
   ============================================================ */
const mobileNav        = $('#mobileNav');
const mobileNavClose   = $('#mobileNavClose');
const mobileNavOverlay = $('#mobileNavOverlay');
const hamburgerBtn     = $('#hamburgerBtn');
const searchOverlay    = $('#searchOverlay');
const searchToggle     = $('#searchToggle');
const searchClose      = $('#searchClose');
const searchInput      = $('#searchInput');
const searchResults    = $('#searchResults');

hamburgerBtn.addEventListener('click', () => {
  mobileNav.classList.add('open');
  hamburgerBtn.setAttribute('aria-expanded', 'true');
});
[mobileNavClose, mobileNavOverlay].forEach(el =>
  el.addEventListener('click', () => {
    mobileNav.classList.remove('open');
    hamburgerBtn.setAttribute('aria-expanded', 'false');
  })
);

searchToggle.addEventListener('click', () => {
  searchOverlay.classList.add('open');
  searchInput.focus();
});
searchClose.addEventListener('click', () => {
  searchOverlay.classList.remove('open');
  searchResults.innerHTML = '';
  searchInput.value = '';
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    searchOverlay.classList.remove('open');
    mobileNav.classList.remove('open');
  }
});

/* Debounced live search */
let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (!q) { searchResults.innerHTML = ''; return; }
  searchTimer = setTimeout(() => doSearch(q), 360);
});

async function doSearch(q) {
  searchResults.innerHTML = '<div style="padding:16px;color:var(--text-muted);text-align:center">Searching...</div>';
  try {
    const data = await apiFetch('/anime?q=' + encodeURIComponent(q) + '&limit=8');
    if (!data?.data?.length) {
      searchResults.innerHTML = '<div style="padding:16px;color:var(--text-muted);text-align:center">No results found.</div>';
      return;
    }
    searchResults.innerHTML = data.data.map(a => `
      <a class="search-item" href="anime.html?id=${a.mal_id}">
        <img src="${a.images?.jpg?.small_image_url || ''}" alt="${a.title}" loading="lazy" />
        <div>
          <div class="search-item-title">${a.title}</div>
          <div class="search-item-meta">${a.type || 'TV'} &bull; ${a.score ? a.score + ' / 10' : 'N/A'}</div>
        </div>
      </a>`).join('');
  } catch {
    searchResults.innerHTML = '<div style="padding:16px;color:var(--text-muted);text-align:center">Search failed. Try again.</div>';
  }
}

/* ============================================================
   TABS
   ============================================================ */
const tabBtns   = $$('.tab-btn');
const tabPanels = $$('.tab-panel');

/* Lazy-load flags */
const tabLoaded = {};

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.tab;

    tabBtns.forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    tabPanels.forEach(p => p.classList.remove('active'));

    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    $('#tab-' + target).classList.add('active');

    /* Scroll the tab into view inside the scrollable bar */
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });

    /* Lazy-load per tab */
    if (!tabLoaded[target] && window._animeId) {
      tabLoaded[target] = true;
      switch (target) {
        case 'episodes':   loadEpisodes(window._animeId, window._animeEps);  break;
        case 'characters': loadCharacters(window._animeId);                  break;
        case 'relations':  loadRelations(window._animeId);                   break;
        case 'trailer':    renderTrailer(window._trailerData);               break;
        case 'recommend':  loadRecommendations(window._animeId);             break;
      }
    }
  });
});

/* ============================================================
   SKELETON HELPERS
   ============================================================ */
function skeletonCards(container, count = 6, aspect = '2/3') {
  container.innerHTML = Array(count).fill(0).map(() =>
    `<div class="skeleton" style="aspect-ratio:${aspect};border-radius:var(--radius-md);"></div>`
  ).join('');
}

/* ============================================================
   MAIN DATA LOAD
   ============================================================ */
async function init() {
  const animeId = getParam('id');
  if (!animeId) {
    renderError('No anime ID found in URL. <a href="index.html">Go Home</a>');
    hideLoader();
    return;
  }

  window._animeId = animeId;

  try {
    /* Fetch core details */
    const [detailsRes, charRes] = await Promise.allSettled([
      apiFetch('/anime/' + animeId + '/full'),
      apiFetch('/anime/' + animeId + '/characters')
    ]);

    if (detailsRes.status === 'rejected') throw new Error('Failed to load anime details');

    const anime = detailsRes.value?.data;
    if (!anime) throw new Error('Empty anime data');

    window._trailerData = anime.trailer;
    window._animeEps    = anime.episodes;

    /* Render everything */
    renderBanner(anime);
    renderHeroInfo(anime);
    renderOverview(anime);
    renderSidebar(anime);

    /* Pre-load overview tab (already visible) */
    tabLoaded['overview'] = true;

    /* Pre-cache characters for fast tab switch */
    if (charRes.status === 'fulfilled') {
      window._charData = charRes.value?.data;
    }

    hideLoader();

  } catch (err) {
    console.error('Init error:', err);
    renderError('Failed to load anime. <a href="index.html">Go Home</a>');
    hideLoader();
  }
}

/* ============================================================
   RENDER BANNER
   ============================================================ */
function renderBanner(anime) {
  const bannerBg = $('#bannerBg');
  const url = anime.trailer?.images?.maximum_image_url
           || anime.images?.jpg?.large_image_url
           || '';
  bannerBg.src = url;
  bannerBg.alt = anime.title + ' banner';
}

/* ============================================================
   RENDER HERO INFO
   ============================================================ */
function renderHeroInfo(anime) {
  /* Poster */
  const poster = $('#animePoster');
  poster.src = anime.images?.jpg?.large_image_url || '';
  poster.alt = anime.title;

  /* Type badge */
  $('#animeTypeBadge').textContent = anime.type || 'TV';

  /* Title */
  $('#animeTitle').textContent = anime.title || 'Unknown Title';
  const jpEl = $('#animeTitleJp');
  if (anime.title_japanese) {
    jpEl.textContent = anime.title_japanese;
  }

  /* Meta row */
  const metaRow = $('#animeMetaRow');
  metaRow.innerHTML = [
    anime.score        ? `<span class="meta-badge score">&#9733; ${anime.score}</span>` : '',
    anime.status       ? `<span class="meta-badge status">${anime.status}</span>` : '',
    anime.episodes     ? `<span class="meta-badge eps">${anime.episodes} eps</span>` : '',
    anime.duration     ? `<span class="meta-badge eps">${anime.duration}</span>` : '',
    anime.rating       ? `<span class="meta-badge type">${anime.rating}</span>` : '',
  ].join('');

  /* Genres */
  const genreWrap = $('#animeGenres');
  const genres = [...(anime.genres || []), ...(anime.themes || [])];
  genreWrap.innerHTML = genres.map(g =>
    `<a class="genre-chip" href="search.html?genre=${g.mal_id}">${g.name}</a>`
  ).join('');

  /* Action buttons */
  const btns = $('#animeActionBtns');
  btns.innerHTML = `
    <a class="btn-watch" href="watch.html?id=${anime.mal_id}&ep=1">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
      Watch Now
    </a>
    <a class="btn-secondary" href="https://myanimelist.net/anime/${anime.mal_id}" target="_blank" rel="noopener">
      MAL Page
    </a>
  `;
}

/* ============================================================
   RENDER OVERVIEW (synopsis)
   ============================================================ */
function renderOverview(anime) {
  const synEl = $('#synopsisText');
  const btnEl = $('#readMoreBtn');
  const full  = anime.synopsis || 'No synopsis available.';
  const short = truncate(full, 500);

  if (full.length > 500) {
    synEl.textContent = short;
    btnEl.style.display = 'inline-block';
    let expanded = false;
    btnEl.addEventListener('click', () => {
      expanded = !expanded;
      synEl.textContent = expanded ? full : short;
      btnEl.textContent = expanded ? 'Show Less' : 'Read More';
    });
  } else {
    synEl.textContent = full;
  }
}

/* ============================================================
   RENDER SIDEBAR
   ============================================================ */
function renderSidebar(anime) {
  $('#scoreBig').textContent = anime.score ?? '--';
  $('#scoreTotal').textContent = fmtNum(anime.scored_by) + ' members';
  $('#rankVal').textContent = anime.rank ? '#' + anime.rank : '--';
  $('#popVal').textContent  = anime.popularity ? '#' + anime.popularity : '--';
  $('#favVal').textContent  = fmtNum(anime.favorites);

  const rows = [
    ['Type',     anime.type],
    ['Episodes', anime.episodes],
    ['Status',   anime.status],
    ['Aired',    anime.aired?.string],
    ['Season',   anime.season ? (anime.season + ' ' + anime.year) : anime.year],
    ['Studio',   (anime.studios || []).map(s => s.name).join(', ') || null],
    ['Source',   anime.source],
    ['Duration', anime.duration],
    ['Rating',   anime.rating],
  ].filter(([, v]) => v != null && v !== '');

  $('#infoTable').innerHTML = rows.map(([l, v]) =>
    `<span class="info-label">${l}</span><span class="info-value">${v}</span>`
  ).join('');
}

/* ============================================================
   RENDER EPISODES
   ============================================================ */
async function loadEpisodes(animeId, totalEps) {
  const grid = $('#episodeGrid');
  const rangeBtns = $('#episodeRangeBtns');
  const searchEl  = $('#episodeSearch');

  /* Skeleton */
  grid.innerHTML = Array(Math.min(24, totalEps || 24)).fill(0).map(() =>
    `<div class="skeleton" style="height:56px;border-radius:var(--radius-sm);"></div>`
  ).join('');

  let allEps = [];

  try {
    /* Generate episode array from total count (Jikan episodes endpoint is paginated) */
    const count = totalEps && totalEps > 0 ? totalEps : 12;
    allEps = Array.from({ length: count }, (_, i) => ({ number: i + 1 }));
  } catch {
    grid.innerHTML = '<p style="color:var(--text-muted);padding:16px;">Could not load episodes.</p>';
    return;
  }

  /* Range buttons for long series */
  const RANGE = 100;
  let activeRange = 0;

  function buildRanges() {
    if (allEps.length <= RANGE) return;
    const ranges = [];
    for (let i = 0; i < allEps.length; i += RANGE) {
      ranges.push([i, Math.min(i + RANGE - 1, allEps.length - 1)]);
    }
    rangeBtns.innerHTML = ranges.map((r, idx) =>
      `<button class="range-btn ${idx === 0 ? 'active' : ''}" data-range="${idx}">${r[0]+1}-${r[1]+1}</button>`
    ).join('');
    $$('.range-btn', rangeBtns).forEach(btn => {
      btn.addEventListener('click', () => {
        $$('.range-btn', rangeBtns).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeRange = +btn.dataset.range;
        renderEpisodes();
      });
    });
  }

  function renderEpisodes() {
    const q = searchEl.value.trim().toLowerCase();
    let eps = allEps;
    if (allEps.length > RANGE) {
      const start = activeRange * RANGE;
      eps = allEps.slice(start, start + RANGE);
    }
    if (q) eps = allEps.filter(e => String(e.number).includes(q) || (e.title || '').toLowerCase().includes(q));
    grid.innerHTML = eps.map(ep => `
      <a class="episode-item" href="watch.html?id=${animeId}&ep=${ep.number}" title="Episode ${ep.number}">
        <span class="ep-num">${ep.number}</span>
        ${ep.filler ? '<span class="ep-filler">Filler</span>' : ''}
      </a>`).join('');
  }

  buildRanges();
  renderEpisodes();

  searchEl.addEventListener('input', () => renderEpisodes());
}

/* ============================================================
   RENDER CHARACTERS
   ============================================================ */
async function loadCharacters(animeId) {
  const grid = $('#charGrid');
  skeletonCards(grid, 12, '3/4');

  try {
    let chars = window._charData;
    if (!chars) {
      const res = await apiFetch('/anime/' + animeId + '/characters');
      chars = res?.data;
    }
    if (!chars?.length) {
      grid.innerHTML = '<p style="color:var(--text-muted);">No character data available.</p>';
      return;
    }
    grid.innerHTML = chars.slice(0, 24).map(c => `
      <div class="char-card">
        <img class="char-img" src="${c.character?.images?.jpg?.image_url || ''}"
             alt="${c.character?.name || ''}" loading="lazy" />
        <div class="char-info">
          <div class="char-name">${c.character?.name || 'Unknown'}</div>
          <div class="char-role">${c.role || 'Supporting'}</div>
        </div>
      </div>`).join('');
  } catch {
    grid.innerHTML = '<p style="color:var(--text-muted);">Could not load characters.</p>';
  }
}

/* ============================================================
   RENDER RELATIONS
   ============================================================ */
async function loadRelations(animeId) {
  const grid = $('#relationsGrid');
  grid.innerHTML = '<p style="color:var(--text-muted);">Loading relations...</p>';

  try {
    const res = await apiFetch('/anime/' + animeId + '/full');
    const relations = res?.data?.relations;
    if (!relations?.length) {
      grid.innerHTML = '<p style="color:var(--text-muted);">No relations found.</p>';
      return;
    }
    const items = [];
    relations.forEach(rel => {
      rel.entry.forEach(entry => {
        if (entry.type === 'anime') items.push({ ...entry, relation: rel.relation });
      });
    });
    if (!items.length) {
      grid.innerHTML = '<p style="color:var(--text-muted);">No related anime found.</p>';
      return;
    }
    grid.innerHTML = items.map(item => `
      <a class="relation-card" href="anime.html?id=${item.mal_id}">
        <div class="relation-text">
          <div class="relation-type">${item.relation}</div>
          <div class="relation-title">${item.name}</div>
        </div>
      </a>`).join('');
  } catch {
    grid.innerHTML = '<p style="color:var(--text-muted);">Could not load relations.</p>';
  }
}

/* ============================================================
   RENDER TRAILER
   ============================================================ */
function renderTrailer(trailer) {
  const wrap = $('#trailerContent');
  if (!trailer?.embed_url) {
    wrap.innerHTML = '<p style="color:var(--text-muted);">No trailer available.</p>';
    return;
  }
  wrap.innerHTML = `
    <div class="trailer-wrap">
      <iframe src="${trailer.embed_url}?autoplay=0"
              title="Anime Trailer"
              allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
              loading="lazy">
      </iframe>
    </div>`;
}

/* ============================================================
   RENDER RECOMMENDATIONS
   ============================================================ */
async function loadRecommendations(animeId) {
  const slider = $('#recSlider');
  for (let i = 0; i < 6; i++) {
    const sk = document.createElement('div');
    sk.className = 'skeleton';
    sk.style.cssText = 'flex-shrink:0;width:140px;aspect-ratio:2/3;border-radius:var(--radius-md)';
    slider.appendChild(sk);
  }

  try {
    const res = await apiFetch('/anime/' + animeId + '/recommendations');
    const recs = res?.data;
    if (!recs?.length) {
      slider.innerHTML = '<p style="color:var(--text-muted);">No recommendations found.</p>';
      return;
    }
    slider.innerHTML = recs.slice(0, 16).map(r => `
      <a class="rec-card" href="anime.html?id=${r.entry?.mal_id}">
        <img src="${r.entry?.images?.jpg?.large_image_url || ''}"
             alt="${r.entry?.title || ''}" loading="lazy" />
        <div class="rec-title">${r.entry?.title || 'Unknown'}</div>
      </a>`).join('');
  } catch {
    slider.innerHTML = '<p style="color:var(--text-muted);">Could not load recommendations.</p>';
  }
}

/* ============================================================
   ERROR STATE
   ============================================================ */
function renderError(msg) {
  $('#mainContent').innerHTML = `
    <div class="error-state">
      <div class="error-icon">!</div>
      <div class="error-title">Something went wrong</div>
      <p class="error-text">${msg}</p>
    </div>`;
}

/* ============================================================
   RESIZE — prevent residual overflow artifacts
   ============================================================ */
let resizeTimer = null;
const ro = new ResizeObserver(() => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    /* Nothing structural to recalculate — CSS clamp() handles it.
       This hook is here for future slider re-init if added. */
  }, 200);
});
ro.observe(document.body);

/* ============================================================
   BOOT
   ============================================================ */
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
