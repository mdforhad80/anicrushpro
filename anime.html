<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream – Anime Details</title>
    <style>
        /* Global styles + detail-specific */
        :root { /* ... */ }
        .detail-page { padding: clamp(16px,3vw,30px) clamp(12px,3vw,40px); }
        .banner { position: relative; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 20px; height: clamp(200px, 40vw, 350px); }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 70%); }
        .poster-info { display: flex; gap: 20px; margin-top: -40px; position: relative; z-index: 2; align-items: flex-end; flex-wrap: wrap; }
        .poster { width: 160px; border-radius: var(--radius); overflow: hidden; border: 3px solid var(--accent); box-shadow: var(--shadow); flex-shrink: 0; }
        .poster img { width: 100%; display: block; }
        .details { flex: 1; min-width: 250px; }
        .details h1 { font-size: 2rem; margin-bottom: 6px; }
        .details .meta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; }
        .details .meta-row span { background: var(--bg3); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        .episodes-section { margin-top: 30px; }
        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; }
        .episode-btn { background: var(--bg2); border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: var(--text2); text-align: center; cursor: pointer; transition: var(--transition); }
        .episode-btn:hover { border-color: var(--accent); color: #fff; }
        .trailer-frame { width: 100%; aspect-ratio: 16/9; border: none; border-radius: var(--radius); margin-top: 20px; }
    </style>
</head>
<body>
    <header class="header"> ... </header>
    <!-- sidebar, search overlay -->
    <main class="detail-page" id="detailRoot">
        <!-- Dynamically filled -->
    </main>
    <script>
        (function() {
            // Include cacheManager, apiManager as before
            const params = new URLSearchParams(window.location.search);
            const animeId = params.get('id');
            if (!animeId) { document.getElementById('detailRoot').innerHTML = '<p style="color:#ef4444;text-align:center;">No anime ID provided.</p>'; return; }

            async function loadAnime(){
                try{
                    const data = await apiManager.enqueue(`https://api.jikan.moe/v4/anime/${animeId}/full`, `anime_${animeId}`);
                    const a = data.data;
                    document.getElementById('detailRoot').innerHTML = `
                        <div class="banner"><img src="${a.images.jpg.large_image_url}" alt="${a.title}"><div class="banner-overlay"></div></div>
                        <div class="poster-info">
                            <div class="poster"><img src="${a.images.jpg.large_image_url}" alt="${a.title}"></div>
                            <div class="details">
                                <h1>${a.title}</h1>
                                <div class="meta-row">
                                    <span>⭐ ${a.score}</span><span>${a.type}</span><span>${a.status}</span><span>${a.episodes||'?'} eps</span>
                                </div>
                                <p>${a.synopsis||'No synopsis.'}</p>
                                <div style="margin-top:12px;">
                                    <a href="watch.html?id=${a.mal_id}&ep=1" class="btn btn-primary">▶ Watch Now</a>
                                </div>
                            </div>
                        </div>
                        <div class="episodes-section">
                            <h2>Episodes</h2>
                            <div class="episode-list" id="episodeList"></div>
                        </div>
                    `;
                    // Generate episode buttons
                    const epContainer = document.getElementById('episodeList');
                    const total = a.episodes || 0;
                    if (total > 0) {
                        for(let i=1; i<=Math.min(total, 24); i++){ // show first 24
                            epContainer.innerHTML += `<div class="episode-btn" onclick="window.location.href='watch.html?id=${a.mal_id}&ep=${i}'">Ep ${i}</div>`;
                        }
                    }
                }catch(e){ document.getElementById('detailRoot').innerHTML = '<p style="color:#ef4444;">Failed to load anime details.</p>'; }
            }
            loadAnime();
        })();
    </script>
</body>
</html>
