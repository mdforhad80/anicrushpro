<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Anime details, episodes, characters, and more.">
<title>Anime Details - AnimeStream</title>
<style>
:root {
  --bg: #0a0a0f; --bg-elevated: #12121a; --bg-card: #1a1a2e; --bg-glass: rgba(26,26,46,0.85);
  --primary: #a855f7; --primary-light: #c084fc; --primary-dark: #7e22ce; --accent: #f472b6;
  --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
  --border: rgba(168,85,247,0.15); --border-glow: rgba(168,85,247,0.3);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3); --shadow-md: 0 4px 20px rgba(0,0,0,0.4); --shadow-glow: 0 0 20px rgba(168,85,247,0.2);
  --transition-fast: 0.2s ease; --transition-normal: 0.3s ease; --transition-slow: 0.5s ease;
  --header-height: clamp(56px, 8vh, 72px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100%; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }
ul, ol { list-style: none; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 3px; }
.skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, #252545 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Header */
.header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); background: rgba(10,10,15,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(12px, 3vw, 24px); }
.header-left, .header-right { display: flex; align-items: center; gap: clamp(8px, 2vw, 16px); flex-shrink: 0; }
.header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
.logo { font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; letter-spacing: -0.5px; }
.logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }
.menu-btn, .search-btn { width: clamp(36px, 5vw, 44px); height: clamp(36px, 5vw, 44px); display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); background: var(--bg-card); border: 1px solid var(--border); color: var(--text); transition: var(--transition-fast); flex-shrink: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.menu-btn:hover, .search-btn:hover { background: var(--primary-dark); border-color: var(--primary); box-shadow: var(--shadow-glow); }
.menu-btn svg, .search-btn svg { width: clamp(18px, 2.5vw, 22px); height: clamp(18px, 2.5vw, 22px); }

/* Sidebar */
.sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1001; opacity: 0; visibility: hidden; transition: var(--transition-normal); }
.sidebar-overlay.active { opacity: 1; visibility: visible; }
.sidebar { position: fixed; top: 0; left: 0; width: min(280px, 80vw); height: 100vh; height: 100dvh; background: var(--bg-elevated); border-right: 1px solid var(--border); z-index: 1002; transform: translateX(-100%); transition: transform var(--transition-normal); overflow-y: auto; padding: var(--header-height) 0 0 0; }
.sidebar.active { transform: translateX(0); }
.sidebar-nav { padding: 16px; }
.sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-md); color: var(--text-muted); font-size: 0.95rem; transition: var(--transition-fast); margin-bottom: 4px; }
.sidebar-nav a:hover, .sidebar-nav a.active { background: var(--bg-card); color: var(--primary-light); }
.sidebar-nav svg { width: 20px; height: 20px; flex-shrink: 0; }

/* Search Overlay */
.search-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.97); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 1003; opacity: 0; visibility: hidden; transition: var(--transition-normal); display: flex; flex-direction: column; align-items: center; padding: var(--header-height) clamp(12px, 3vw, 24px) 24px; max-width: 100%; overflow-x: hidden; }
.search-overlay.active { opacity: 1; visibility: visible; }
.search-container { width: 100%; max-width: min(700px, 100%); position: relative; }
.search-input-wrap { display: flex; align-items: center; gap: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: clamp(10px, 2vw, 14px) clamp(16px, 3vw, 24px); transition: var(--transition-fast); width: 100%; }
.search-input-wrap:focus-within { border-color: var(--primary); box-shadow: var(--shadow-glow); }
.search-input-wrap svg { width: 20px; height: 20px; color: var(--text-muted); flex-shrink: 0; }
.search-input { flex: 1; background: none; border: none; color: var(--text); font-size: clamp(0.95rem, 2vw, 1.1rem); outline: none; min-width: 0; }
.search-input::placeholder { color: var(--text-dim); }
.search-close { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--bg-elevated); color: var(--text-muted); flex-shrink: 0; transition: var(--transition-fast); }
.search-close:hover { background: var(--primary-dark); color: var(--text); }
.search-results { width: 100%; max-width: min(700px, 100%); margin-top: 16px; max-height: calc(100dvh - var(--header-height) - 100px); overflow-y: auto; overflow-x: hidden; border-radius: var(--radius-lg); }
.search-suggestion { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition-fast); overflow: hidden; }
.search-suggestion:hover { background: var(--bg-card); }
.search-suggestion img { width: 40px; height: 56px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; }
.search-suggestion-info { min-width: 0; }
.search-suggestion-title { font-size: 0.9rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-suggestion-meta { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-empty, .search-loading { text-align: center; padding: 40px 20px; color: var(--text-muted); }

/* Anime Banner */
.anime-banner { position: relative; width: 100%; min-height: clamp(250px, 40vh, 450px); margin-top: var(--header-height); overflow: hidden; }
.anime-banner-bg { position: absolute; inset: 0; background-size: cover; background-position: center 20%; filter: blur(8px) brightness(0.4); }
.anime-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,10,15,0.3) 0%, var(--bg) 100%); }
.anime-banner-content { position: relative; z-index: 2; display: flex; gap: clamp(16px, 3vw, 32px); padding: clamp(20px, 4vw, 48px) clamp(16px, 4vw, 48px); max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
.anime-poster { flex: 0 0 auto; width: clamp(140px, 22vw, 220px); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); aspect-ratio: 2/3; }
.anime-poster img { width: 100%; height: 100%; object-fit: cover; }
.anime-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: flex-end; }
.anime-title { font-size: clamp(1.4rem, 3.5vw, 2.4rem); font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
.anime-meta-row { display: flex; flex-wrap: wrap; align-items: center; gap: clamp(6px, 1.2vw, 12px); margin-bottom: 16px; }
.anime-score-badge { display: flex; align-items: center; gap: 6px; background: rgba(251,191,36,0.15); color: #fbbf24; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: clamp(0.85rem, 1.3vw, 1rem); border: 1px solid rgba(251,191,36,0.3); }
.anime-score-badge svg { width: 18px; height: 18px; }
.anime-meta-item { background: var(--bg-glass); color: var(--text-muted); padding: 5px 12px; border-radius: 20px; font-size: clamp(0.75rem, 1.1vw, 0.85rem); border: 1px solid var(--border); backdrop-filter: blur(10px); }
.anime-genres { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.anime-genre-tag { background: rgba(168,85,247,0.15); color: var(--primary-light); padding: 5px 14px; border-radius: 20px; font-size: clamp(0.75rem, 1.1vw, 0.85rem); border: 1px solid var(--border); transition: var(--transition-fast); }
.anime-genre-tag:hover { background: var(--primary-dark); color: white; }
.anime-synopsis { font-size: clamp(0.85rem, 1.3vw, 0.95rem); color: var(--text-muted); line-height: 1.7; margin-bottom: 20px; max-width: 700px; }
.anime-actions { display: flex; flex-wrap: wrap; gap: 12px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: clamp(10px, 1.5vw, 14px) clamp(20px, 3vw, 28px); border-radius: var(--radius-xl); font-size: clamp(0.85rem, 1.2vw, 0.95rem); font-weight: 600; transition: var(--transition-fast); white-space: nowrap; touch-action: manipulation; }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 15px rgba(168,85,247,0.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(168,85,247,0.4); }
.btn-secondary { background: var(--bg-glass); color: var(--text); border: 1px solid var(--border); backdrop-filter: blur(10px); }
.btn-secondary:hover { background: var(--bg-card); border-color: var(--primary); }
.btn svg { width: 18px; height: 18px; }

/* Tabs */
.tabs { display: flex; gap: 8px; padding: 0 clamp(16px, 4vw, 48px); max-width: 1200px; margin: 0 auto; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; border-bottom: 1px solid var(--border); }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn { padding: 12px 20px; font-size: clamp(0.85rem, 1.2vw, 0.95rem); font-weight: 600; color: var(--text-muted); white-space: nowrap; border-bottom: 2px solid transparent; transition: var(--transition-fast); background: none; }
.tab-btn.active { color: var(--primary-light); border-bottom-color: var(--primary); }
.tab-btn:hover { color: var(--text); }

/* Tab Content */
.tab-content { display: none; padding: clamp(20px, 3vw, 32px) clamp(16px, 4vw, 48px); max-width: 1200px; margin: 0 auto; }
.tab-content.active { display: block; }

/* Episodes */
.episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(100px, 14vw, 140px), 1fr)); gap: clamp(8px, 1.5vw, 12px); }
.episode-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: clamp(10px, 1.5vw, 14px); text-align: center; cursor: pointer; transition: var(--transition-fast); }
.episode-card:hover { border-color: var(--primary); box-shadow: var(--shadow-glow); transform: translateY(-2px); }
.episode-card-num { font-size: clamp(0.85rem, 1.2vw, 0.95rem); font-weight: 700; color: var(--primary-light); margin-bottom: 4px; }
.episode-card-title { font-size: clamp(0.7rem, 1vw, 0.8rem); color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Characters */
.char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(130px, 16vw, 160px), 1fr)); gap: clamp(10px, 1.5vw, 16px); }
.char-card { background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); transition: var(--transition-fast); }
.char-card:hover { border-color: var(--primary); box-shadow: var(--shadow-glow); }
.char-card-img { aspect-ratio: 2/3; overflow: hidden; }
.char-card-img img { width: 100%; height: 100%; object-fit: cover; }
.char-card-info { padding: clamp(8px, 1.2vw, 12px); }
.char-card-name { font-size: clamp(0.78rem, 1.1vw, 0.9rem); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-card-role { font-size: clamp(0.68rem, 0.9vw, 0.78rem); color: var(--text-dim); margin-top: 2px; }

/* Recommendations */
.rec-slider { display: flex; gap: clamp(10px, 1.5vw, 16px); overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 4px 0; }
.rec-slider::-webkit-scrollbar { display: none; }
.rec-card { flex: 0 0 auto; width: clamp(140px, 18vw, 180px); scroll-snap-align: start; background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: var(--transition-fast); }
.rec-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-glow); border-color: var(--primary); }
.rec-card-img { aspect-ratio: 2/3; overflow: hidden; }
.rec-card-img img { width: 100%; height: 100%; object-fit: cover; }
.rec-card-info { padding: clamp(8px, 1.2vw, 12px); }
.rec-card-title { font-size: clamp(0.78rem, 1.1vw, 0.9rem); font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Trailer */
.trailer-wrap { position: relative; padding-bottom: 56.25%; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); background: var(--bg-card); }
.trailer-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

/* Relations */
.relation-list { display: flex; flex-direction: column; gap: 12px; }
.relation-item { display: flex; align-items: center; gap: 16px; background: var(--bg-card); border-radius: var(--radius-md); padding: 12px 16px; border: 1px solid var(--border); transition: var(--transition-fast); cursor: pointer; }
.relation-item:hover { border-color: var(--primary); }
.relation-item img { width: 48px; height: 68px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; }
.relation-item-info { min-width: 0; }
.relation-item-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.relation-item-type { font-size: 0.8rem; color: var(--text-dim); }

/* Info Grid */
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(clamp(200px, 30vw, 280px), 1fr)); gap: clamp(12px, 2vw, 20px); }
.info-item { background: var(--bg-card); border-radius: var(--radius-md); padding: clamp(12px, 2vw, 16px); border: 1px solid var(--border); }
.info-label { font-size: clamp(0.75rem, 1.1vw, 0.85rem); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.info-value { font-size: clamp(0.85rem, 1.3vw, 0.95rem); font-weight: 600; color: var(--text); }

/* Footer */
.footer { border-top: 1px solid var(--border); padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 24px); text-align: center; margin-top: clamp(20px, 4vw, 40px); }
.footer-text { font-size: clamp(0.8rem, 1.2vw, 0.9rem); color: var(--text-dim); margin-bottom: 12px; }
.footer-social { display: flex; justify-content: center; gap: 16px; }
.footer-social a { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); transition: var(--transition-fast); }
.footer-social a:hover { background: var(--primary-dark); color: var(--text); border-color: var(--primary); }
.footer-social svg { width: 18px; height: 18px; }

/* Error */
.error-fallback { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.error-fallback svg { width: 48px; height: 48px; color: var(--text-dim); margin-bottom: 12px; }

@media (max-width: 640px) {
  .anime-banner-content { flex-direction: column; align-items: center; text-align: center; }
  .anime-info { align-items: center; }
  .anime-synopsis { text-align: left; }
  .anime-actions { justify-content: center; }
  .anime-genres { justify-content: center; }
  .anime-meta-row { justify-content: center; }
}
@media (min-width: 1400px) {
  .anime-banner-content, .tab-content, .tabs { padding-left: max(48px, calc((100vw - 1200px) / 2 + 48px)); padding-right: max(48px, calc((100vw - 1200px) / 2 + 48px)); }
}
</style>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

    <a href="schedule.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>

<div class="search-overlay" id="searchOverlay">

<!-- TABS -->

<footer class="footer">
  <p class="footer-text">AnimeStream &copy; 2026. All anime data from Jikan API. For educational purposes.</p>
  <div class="footer-social">
    <a href="#" aria-label="GitHub"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a>
    <a href="#" aria-label="Twitter"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.84 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg></a>
  </div>
</footer>

<script>
const CONFIG = { API_BASE: 'https://api.jikan.moe/v4', CACHE_TTL: 5*60*1000, RETRY_ATTEMPTS: 3, RETRY_DELAY: 1000, REQUEST_TIMEOUT: 8000, DEBOUNCE_DELAY: 350 };
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));
const sleep = ms => new Promise(r => setTimeout(r, ms));
function debounce(fn, delay) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); }; }
function getCache(key) { try { const item = localStorage.getItem('animestream_' + key); if (!item) return null; const {data,ts} = JSON.parse(item); if (Date.now()-ts > CONFIG.CACHE_TTL) { localStorage.removeItem('animestream_' + key); return null; } return data; } catch { return null; } }
function setCache(key, data) { try { localStorage.setItem('animestream_' + key, JSON.stringify({data, ts: Date.now()})); } catch {} }
async function fetchWithRetry(url, options={}, attempt=1) { const controller = new AbortController(); const timeout = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT); try { const res = await fetch(url, {...options, signal: controller.signal}); clearTimeout(timeout); if (!res.ok) throw new Error(`HTTP ${res.status}`); return await res.json(); } catch(err) { clearTimeout(timeout); if (attempt < CONFIG.RETRY_ATTEMPTS) { await sleep(CONFIG.RETRY_DELAY*attempt); return fetchWithRetry(url, options, attempt+1); } throw err; } }
async function fetchJikan(endpoint, params='') { const cacheKey = endpoint+params; const cached = getCache(cacheKey); if (cached) return cached; const url = `${CONFIG.API_BASE}${endpoint}${params}`; const data = await fetchWithRetry(url); setCache(cacheKey, data); return data; }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',''':'&#39;'}[m])); }
function getImageUrl(images, fallback='') { if (!images) return fallback; return images.webp?.large_image_url || images.webp?.image_url || images.jpg?.large_image_url || images.jpg?.image_url || fallback; }

function getId() { const p = new URLSearchParams(location.search); return p.get('id'); }
let animeId = getId();
if (!animeId) { animeId = '1'; history.replaceState(null, '', '?id=1'); }

async function loadAnime() {
  try {
    const data = await fetchJikan(`/anime/${animeId}/full`);
    const anime = data?.data;
    if (!anime) throw new Error('No data');
    renderBanner(anime);
    renderEpisodes(anime);
    renderInfo(anime);
    renderTrailer(anime);
    loadCharacters();
    loadRelations();
    loadRecommendations();
  } catch (e) {
    console.error(e);
    $('#bannerContent').innerHTML = '<div class="error-fallback" style="flex:0 0 100%;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>Failed to load anime details. Please try again later.</p></div>';
  }
}

function renderBanner(anime) {
  const img = getImageUrl(anime.images);
  $('#bannerBg').style.backgroundImage = `url('${escapeHtml(img)}')`;
  const genres = (anime.genres || []).map(g => `<span class="anime-genre-tag">${escapeHtml(g.name)}</span>`).join('');
  const year = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '');
  $('#animePoster').classList.remove('skeleton');
  $('#animePoster').innerHTML = `<img src="${escapeHtml(img)}" alt="${escapeHtml(anime.title)}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22150%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2364748b%22 font-size=%2212%22%3ENo Image%3C/text%3E%3C/svg%3E'">`;
  $('#animeInfo').innerHTML = `
    <h1 class="anime-title">${escapeHtml(anime.title)}</h1>
    <div class="anime-meta-row">
      <span class="anime-score-badge"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${anime.score ? anime.score.toFixed(1) : 'N/A'}</span>
      <span class="anime-meta-item">${escapeHtml(anime.type || 'TV')}</span>
      <span class="anime-meta-item">${escapeHtml(anime.status || 'Unknown')}</span>
      ${year ? `<span class="anime-meta-item">${year}</span>` : ''}
      ${anime.episodes ? `<span class="anime-meta-item">${anime.episodes} EP</span>` : ''}
    </div>
    <div class="anime-genres">${genres}</div>
    <p class="anime-synopsis">${escapeHtml(anime.synopsis || 'No synopsis available.')}</p>
    <div class="anime-actions">
      <a href="watch.html?id=${anime.mal_id}&ep=1" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Watch Now</a>
      <a href="watch.html?id=${anime.mal_id}&ep=1&dub=1" class="btn btn-secondary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>Dub</a>
    </div>
  `;
}

function renderEpisodes(anime) {
  const grid = $('#episodesGrid');
  const eps = anime.episodes || 12;
  const title = anime.title;
  grid.innerHTML = Array.from({length: Math.min(eps, 100)}, (_, i) => `
    <div class="episode-card" onclick="location.href='watch.html?id=${anime.mal_id}&ep=${i+1}'">
      <div class="episode-card-num">EP ${i+1}</div>
      <div class="episode-card-title">${escapeHtml(title)}</div>
    </div>
  `).join('');
}

async function loadCharacters() {
  const grid = $('#charGrid');
  grid.innerHTML = Array(8).fill(0).map(() => `<div class="char-card"><div class="char-card-img skeleton" style="aspect-ratio:2/3"></div><div class="char-card-info"><div class="skeleton" style="height:14px;margin-bottom:4px;border-radius:4px"></div><div class="skeleton" style="height:10px;width:60%;border-radius:4px"></div></div></div>`).join('');
  try {
    const data = await fetchJikan(`/anime/${animeId}/characters`);
    const chars = data?.data || [];
    if (!chars.length) { grid.innerHTML = '<div class="error-fallback" style="grid-column:1/-1;"><p>No character data available.</p></div>'; return; }
    grid.innerHTML = chars.slice(0, 24).map(c => {
      const char = c.character;
      const img = getImageUrl(char?.images);
      return `<div class="char-card"><div class="char-card-img"><img src="${escapeHtml(img)}" alt="${escapeHtml(char?.name || '')}" loading="lazy" onerror="this.style.display='none'"></div><div class="char-card-info"><div class="char-card-name">${escapeHtml(char?.name || 'Unknown')}</div><div class="char-card-role">${escapeHtml(c.role || '')}</div></div></div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = '<div class="error-fallback" style="grid-column:1/-1;"><p>Failed to load characters.</p></div>';
  }
}

async function loadRelations() {
  const list = $('#relationList');
  list.innerHTML = Array(3).fill(0).map(() => `<div class="relation-item"><div class="skeleton" style="width:48px;height:68px;border-radius:8px;flex-shrink:0"></div><div class="relation-item-info" style="flex:1"><div class="skeleton" style="height:16px;margin-bottom:6px;border-radius:4px"></div><div class="skeleton" style="height:12px;width:40%;border-radius:4px"></div></div></div>`).join('');
  try {
    const data = await fetchJikan(`/anime/${animeId}/relations`);
    const rels = data?.data || [];
    if (!rels.length) { list.innerHTML = '<div class="error-fallback"><p>No relations available.</p></div>'; return; }
    let html = '';
    rels.forEach(rel => {
      (rel.entry || []).forEach(entry => {
        const img = getImageUrl(entry.images);
        html += `<div class="relation-item" onclick="location.href='anime.html?id=${entry.mal_id}'">
          <img src="${escapeHtml(img)}" alt="" loading="lazy" onerror="this.style.display='none'">
          <div class="relation-item-info">
            <div class="relation-item-title">${escapeHtml(entry.name)}</div>
            <div class="relation-item-type">${escapeHtml(rel.relation)} • ${escapeHtml(entry.type)}</div>
          </div>
        </div>`;
      });
    });
    list.innerHTML = html || '<div class="error-fallback"><p>No relations available.</p></div>';
  } catch (e) {
    list.innerHTML = '<div class="error-fallback"><p>Failed to load relations.</p></div>';
  }
}

async function loadRecommendations() {
  const slider = $('#recSlider');
  slider.innerHTML = Array(6).fill(0).map(() => `<div class="rec-card" style="flex:0 0 auto;width:clamp(140px,18vw,180px)"><div class="rec-card-img skeleton" style="aspect-ratio:2/3"></div><div class="rec-card-info"><div class="skeleton" style="height:14px;border-radius:4px"></div></div></div>`).join('');
  try {
    const data = await fetchJikan(`/anime/${animeId}/recommendations`);
    const recs = data?.data || [];
    if (!recs.length) { slider.innerHTML = '<div class="error-fallback" style="flex:0 0 100%;"><p>No recommendations available.</p></div>'; return; }
    slider.innerHTML = recs.slice(0, 15).map(r => {
      const entry = r.entry;
      const img = getImageUrl(entry.images);
      return `<div class="rec-card" onclick="location.href='anime.html?id=${entry.mal_id}'"><div class="rec-card-img"><img src="${escapeHtml(img)}" alt="${escapeHtml(entry.title)}" loading="lazy" onerror="this.style.display='none'"></div><div class="rec-card-info"><div class="rec-card-title">${escapeHtml(entry.title)}</div></div></div>`;
    }).join('');
  } catch (e) {
    slider.innerHTML = '<div class="error-fallback" style="flex:0 0 100%;"><p>Failed to load recommendations.</p></div>';
  }
}

function renderInfo(anime) {
  const year = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : 'Unknown');
  const studios = (anime.studios || []).map(s => s.name).join(', ') || 'Unknown';
  const producers = (anime.producers || []).map(p => p.name).join(', ') || 'Unknown';
  const licensors = (anime.licensors || []).map(l => l.name).join(', ') || 'Unknown';
  const source = anime.source || 'Unknown';
  const duration = anime.duration || 'Unknown';
  const rating = anime.rating || 'Unknown';
  const rank = anime.rank ? `#${anime.rank}` : 'N/A';
  const popularity = anime.popularity ? `#${anime.popularity}` : 'N/A';
  const members = anime.members ? anime.members.toLocaleString() : 'N/A';
  const favorites = anime.favorites ? anime.favorites.toLocaleString() : 'N/A';
  const season = anime.season ? `${anime.season.charAt(0).toUpperCase() + anime.season.slice(1)} ${year}` : year;

  $('#infoGrid').innerHTML = `
    <div class="info-item"><div class="info-label">Type</div><div class="info-value">${escapeHtml(anime.type || 'Unknown')}</div></div>
    <div class="info-item"><div class="info-label">Episodes</div><div class="info-value">${anime.episodes || 'Unknown'}</div></div>
    <div class="info-item"><div class="info-label">Status</div><div class="info-value">${escapeHtml(anime.status || 'Unknown')}</div></div>
    <div class="info-item"><div class="info-label">Aired</div><div class="info-value">${escapeHtml(anime.aired?.string || 'Unknown')}</div></div>
    <div class="info-item"><div class="info-label">Season</div><div class="info-value">${escapeHtml(season)}</div></div>
    <div class="info-item"><div class="info-label">Duration</div><div class="info-value">${escapeHtml(duration)}</div></div>
    <div class="info-item"><div class="info-label">Rating</div><div class="info-value">${escapeHtml(rating)}</div></div>
    <div class="info-item"><div class="info-label">Source</div><div class="info-value">${escapeHtml(source)}</div></div>
    <div class="info-item"><div class="info-label">Studios</div><div class="info-value">${escapeHtml(studios)}</div></div>
    <div class="info-item"><div class="info-label">Producers</div><div class="info-value">${escapeHtml(producers)}</div></div>
    <div class="info-item"><div class="info-label">Rank</div><div class="info-value">${escapeHtml(rank)}</div></div>
    <div class="info-item"><div class="info-label">Popularity</div><div class="info-value">${escapeHtml(popularity)}</div></div>
    <div class="info-item"><div class="info-label">Members</div><div class="info-value">${escapeHtml(members)}</div></div>
    <div class="info-item"><div class="info-label">Favorites</div><div class="info-value">${escapeHtml(favorites)}</div></div>
  `;
}

function renderTrailer(anime) {
  const wrap = $('#trailerWrap');
  const ytId = anime.trailer?.youtube_id;
  if (ytId) {
    wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${escapeHtml(ytId)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
  } else {
    wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:clamp(0.85rem,1.3vw,0.95rem);">No trailer available</div>`;
  }
}

/* Tabs */
function setupTabs() {
  $('#tabs').addEventListener('click', e => {
    if (e.target.classList.contains('tab-btn')) {
      $$('.tab-btn').forEach(b => b.classList.toggle('active', b === e.target));
      $$('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + e.target.dataset.tab));
    }
  });
}

/* Search */
let searchController = null;
async function doSearch(query) {
  const results = $('#searchResults');
  if (!results) return;
  if (!query.trim()) { results.innerHTML = ''; return; }
  if (searchController) searchController.abort();
  searchController = new AbortController();
  results.innerHTML = `<div class="search-loading"><div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:8px"></div><div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:8px"></div><div class="skeleton" style="height:60px;border-radius:8px"></div></div>`;
  try {
    const data = await fetchWithRetry(`${CONFIG.API_BASE}/anime?q=${encodeURIComponent(query)}&limit=10`, { signal: searchController.signal });
    const items = data?.data || [];
    if (!items.length) { results.innerHTML = `<div class="search-empty">No results found for "${escapeHtml(query)}"</div>`; return; }
    results.innerHTML = items.map(anime => {
      const img = getImageUrl(anime.images);
      const meta = [anime.type, anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '', anime.score ? `Score: ${anime.score}` : ''].filter(Boolean).join(' • ');
      return `<div class="search-suggestion" onclick="location.href='anime.html?id=${anime.mal_id}'"><img src="${escapeHtml(img)}" alt="" loading="lazy" onerror="this.style.display='none'"><div class="search-suggestion-info"><div class="search-suggestion-title">${escapeHtml(anime.title)}</div><div class="search-suggestion-meta">${escapeHtml(meta)}</div></div></div>`;
    }).join('');
  } catch (err) { if (err.name !== 'AbortError') results.innerHTML = `<div class="search-empty">Search failed. Please try again.</div>`; }
}
const debouncedSearch = debounce(doSearch, CONFIG.DEBOUNCE_DELAY);

function setupSearch() {
  const overlay = $('#searchOverlay');
  const input = $('#searchInput');
  const btn = $('#searchBtn');
  const close = $('#searchClose');
  if (!overlay || !input || !btn) return;
  const open = () => { overlay.classList.add('active'); document.body.style.overflow = 'hidden'; setTimeout(() => input.focus(), 100); };
  const closeFn = () => { overlay.classList.remove('active'); document.body.style.overflow = ''; input.value = ''; $('#searchResults').innerHTML = ''; };
  btn.addEventListener('click', open);
  close?.addEventListener('click', closeFn);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeFn(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('active')) closeFn(); if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); open(); } });
  input.addEventListener('input', e => debouncedSearch(e.target.value));
}

function setupSidebar() {
  const menuBtn = $('#menuBtn');
  const sidebar = $('#sidebar');
  const overlay = $('#sidebarOverlay');
  if (!menuBtn || !sidebar || !overlay) return;
  const open = () => { sidebar.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; };
  const close = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; };
  menuBtn.addEventListener('click', open);
  overlay.addEventListener('click', close);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
}

document.addEventListener('DOMContentLoaded', () => {
  setupSidebar();
  setupSearch();
  setupTabs();
  loadAnime();
}, { once: true });
</script>
</body>
