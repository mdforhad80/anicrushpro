<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Details - AnimeStream</title>
    <meta name="description" content="View anime details, synopsis, genres, and watch online.">
    <meta name="theme-color" content="#0b0b0f">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▶</text></svg>">
    <style>
        /* ===== COMPLETE CSS FROM index.html ===== */
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #121218;
            --bg-tertiary: #1a1a24;
            --purple: #8b5cf6;
            --purple-dark: #6d28d9;
            --pink: #d946ef;
            --pink-dark: #a21caf;
            --text: #f3f4f6;
            --text-secondary: #d1d5db;
            --muted: #9ca3af;
            --border: rgba(139, 92, 246, 0.15);
            --border-light: rgba(255, 255, 255, 0.06);
            --glass: rgba(18, 18, 24, 0.7);
            --glass-hover: rgba(30, 30, 42, 0.8);
            --glow-purple: 0 0 30px rgba(139, 92, 246, 0.3);
            --glow-pink: 0 0 30px rgba(217, 70, 239, 0.25);
            --glow-strong: 0 0 50px rgba(139, 92, 246, 0.5);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-display: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --header-height: 64px;
            --sidebar-width: 260px;
            --max-width: 1400px;
            --z-header: 1000;
            --z-overlay: 2000;
            --z-modal: 3000;
            --z-cursor: 9999;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 16px;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            padding-top: var(--header-height);
            padding-bottom: env(safe-area-inset-bottom, 0);
            position: relative;
        }

        /* === HEADER === */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            z-index: var(--z-header);
            background: rgba(11, 11, 15, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 16px;
        }
        .header-inner {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            gap: 12px;
        }
        .header-left {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            width: 44px;
        }
        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 8px;
            min-width: 0;
        }
        .header-right {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            width: 44px;
            justify-content: flex-end;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--purple), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
            flex-shrink: 0;
            box-shadow: var(--glow-purple);
            letter-spacing: -1px;
        }
        .logo-text {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c4b5fd, #f0abfc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            letter-spacing: -0.5px;
        }
        @media (max-width: 400px) {
            .logo-text {
                font-size: 1.1rem;
            }
            .logo-icon {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: var(--glass-hover);
            color: #fff;
            box-shadow: var(--glow-purple);
        }
        .icon-btn:active {
            transform: scale(0.9);
        }

        /* === SIDEBAR === */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: var(--z-overlay);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            height: 100dvh;
            width: var(--sidebar-width);
            max-width: 85vw;
            background: var(--bg-secondary);
            z-index: var(--z-modal);
            transform: translateX(-100%);
            transition: transform var(--transition);
            overflow-y: auto;
            padding: 20px 16px;
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all var(--transition-fast);
        }
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--glass-hover);
            color: #fff;
        }
        .sidebar-nav a.active {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            box-shadow: inset 3px 0 0 var(--purple);
        }
        .sidebar-footer {
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            font-size: 0.78rem;
            color: var(--muted);
            text-align: center;
        }

        /* === SEARCH OVERLAY === */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: rgba(11, 11, 15, 0.96);
            backdrop-filter: blur(20px);
            z-index: var(--z-modal);
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .search-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .search-overlay-inner {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .search-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            padding: 8px 16px;
            border: 2px solid transparent;
            transition: all var(--transition-fast);
        }
        .search-input-row:focus-within {
            border-color: var(--purple);
            box-shadow: var(--glow-purple);
        }
        .search-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 10px 0;
            outline: none;
            font-family: var(--font-sans);
        }
        .search-input-row input::placeholder {
            color: var(--muted);
        }
        .search-results {
            flex: 1;
            overflow-y: auto;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            color: var(--text);
        }
        .search-result-item:hover {
            background: var(--glass-hover);
        }
        .search-result-item img {
            width: 44px;
            height: 62px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg-tertiary);
        }
        .search-result-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .search-result-info .title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .search-result-info .meta {
            font-size: 0.75rem;
            color: var(--muted);
        }
        .search-no-results {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        /* === MAIN CONTENT === */
        .main-content {
            position: relative;
            z-index: 1;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 16px;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 22px;
            background: linear-gradient(180deg, var(--purple), var(--pink));
            border-radius: 4px;
        }

        /* === DETAILS PAGE === */
        .anime-banner {
            position: relative;
            border-radius: var(--radius-xl);
            overflow: hidden;
            aspect-ratio: 16/7;
            max-height: 400px;
            background: var(--bg-tertiary);
            margin-bottom: -60px;
        }
        .anime-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 25%;
        }
        .anime-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg) 5%, transparent 60%);
        }
        .anime-detail-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 24px;
            padding: 0 16px;
            flex-wrap: wrap;
        }
        .anime-poster-lg {
            width: 200px;
            flex-shrink: 0;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 3/4;
            box-shadow: var(--glow-strong);
            margin-top: -30px;
        }
        .anime-poster-lg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .anime-info-detail {
            flex: 1;
            min-width: 250px;
            padding-top: 10px;
        }
        .anime-info-detail h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .anime-info-detail .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .anime-info-detail .synopsis {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 16px;
        }
        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .meta-tag {
            background: var(--bg-tertiary);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }
        @media (max-width: 600px) {
            .anime-detail-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .anime-poster-lg {
                width: 150px;
                margin-top: -50px;
            }
            .anime-info-detail h1 {
                font-size: 1.4rem;
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 22px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
            text-decoration: none;
            font-family: var(--font-sans);
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: #fff;
            box-shadow: var(--glow-purple);
        }
        .btn-primary:hover {
            box-shadow: var(--glow-strong);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }
        .btn-outline:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
        .ep-btn {
            padding: 8px;
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all var(--transition-fast);
            text-align: center;
            font-family: var(--font-sans);
            text-decoration: none;
            display: inline-block;
        }
        .ep-btn:hover {
            background: var(--purple);
            border-color: var(--purple);
            color: #fff;
            box-shadow: var(--glow-purple);
        }
        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
            gap: 8px;
            margin: 16px 0;
        }

        .site-footer {
            text-align: center;
            padding: 30px 16px;
            color: var(--muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-light);
            margin-top: 40px;
        }
        .site-footer a {
            color: #c4b5fd;
            text-decoration: none;
        }

        .hidden {
            display: none !important;
        }
        a {
            color: inherit;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-inner">
            <div class="header-left">
                <button class="icon-btn" id="menuBtn" aria-label="Menu">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
            <div class="header-center">
                <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;">
                    <div class="logo-icon">▶</div>
                    <span class="logo-text">AnimeStream</span>
                </a>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="searchBtn" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon" style="width:32px;height:32px;font-size:0.9rem;">▶</div>
            <span class="logo-text" style="font-size:1.1rem;">AnimeStream</span>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"><span class="nav-icon">🏠</span> Home</a>
            <a href="search.html"><span class="nav-icon">🔍</span> Search</a>
            <a href="schedule.html"><span class="nav-icon">📅</span> Schedule</a>
            <a href="creator.html"><span class="nav-icon">👤</span> Creator</a>
        </nav>
        <div class="sidebar-footer">© 2026 AnimeStream<br>Powered by Jikan API</div>
    </aside>

    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-overlay-inner">
            <div class="search-input-row">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off">
                <button class="icon-btn" id="searchCloseBtn" style="font-size:1rem;">✕</button>
            </div>
            <div class="search-results" id="searchResults">
                <div class="search-no-results">Start typing to search anime...</div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div id="animeDetail"></div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p>AnimeStream — Premium Anime Streaming | Powered by <a href="https://jikan.moe" target="_blank">Jikan API</a></p>
        <p style="margin-top:4px;">This site does not host any videos. All streams are from third-party sources.</p>
    </footer>

    <script>
        const JIKAN_BASE = 'https://api.jikan.moe/v4';
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        // === SIDEBAR ===
        document.getElementById('menuBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
            document.body.style.overflow = document.getElementById('sidebar').classList.contains('active') ? 'hidden' : '';
        });
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.body.style.overflow = '';
        });

        // === SEARCH OVERLAY ===
        const searchOverlay = $('#searchOverlay');
        const searchInput = $('#searchInput');
        const searchResults = $('#searchResults');
        document.getElementById('searchBtn').addEventListener('click', () => {
            searchOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            setTimeout(() => searchInput.focus(), 200);
        });
        document.getElementById('searchCloseBtn').addEventListener('click', () => {
            searchOverlay.classList.remove('active');
            document.body.style.overflow = '';
            searchInput.value = '';
            searchResults.innerHTML = '<div class="search-no-results">Start typing to search anime...</div>';
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
                searchOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const query = searchInput.value.trim();
            if (!query) {
                searchResults.innerHTML = '<div class="search-no-results">Start typing to search anime...</div>';
                return;
            }
            searchResults.innerHTML = '<div class="search-no-results"><div class="loader-ring" style="margin:0 auto;width:30px;height:30px;border:3px solid var(--border-light);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>';
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${JIKAN_BASE}/anime?q=${encodeURIComponent(query)}&limit=12&sfw=true`);
                    const data = await res.json();
                    if (!data.data || data.data.length === 0) {
                        searchResults.innerHTML = '<div class="search-no-results">No results found.</div>';
                        return;
                    }
                    searchResults.innerHTML = data.data.map(a => `
                    <a href="anime.html?id=${a.mal_id}" class="search-result-item">
                      <img src="${a.images?.jpg?.image_url || ''}" alt="${a.title}" loading="lazy" onerror="this.style.display='none'">
                      <div class="search-result-info">
                        <span class="title">${a.title}</span>
                        <span class="meta">${a.type || ''} • ⭐ ${a.score || 'N/A'}</span>
                      </div>
                    </a>`).join('');
                } catch (e) {
                    searchResults.innerHTML = '<div class="search-no-results">Error searching.</div>';
                }
            }, 400);
        });

        // === LOAD ANIME DETAIL ===
        async function loadAnimeDetail() {
            const params = new URLSearchParams(location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('animeDetail').innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted);">No anime ID specified.</p>';
                return;
            }
            document.getElementById('animeDetail').innerHTML = '<div style="text-align:center;padding:40px;"><div class="loader-ring" style="margin:0 auto;width:50px;height:50px;border:3px solid var(--border-light);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>';

            try {
                const res = await fetch(`${JIKAN_BASE}/anime/${id}`);
                const data = await res.json();
                if (!data || !data.data) {
                    document.getElementById('animeDetail').innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted);">Anime not found.</p>';
                    return;
                }
                const a = data.data;
                const img = a.images?.jpg?.large_image_url || '';
                const title = a.title_english || a.title || 'Unknown';
                const jp = a.title_japanese || '';
                const synopsis = a.synopsis || 'No synopsis available.';
                const type = a.type || 'TV';
                const episodes = a.episodes || 0;
                const score = a.score || 'N/A';
                const status = a.status || 'Unknown';
                const genres = (a.genres || []).map(g => g.name).join(', ');
                const studios = (a.studios || []).map(s => s.name).join(', ');
                const premiered = a.aired?.prop?.from?.year || '?';
                const duration = a.duration || '?';
                const rating = a.rating || '?';
                const malLink = `https://myanimelist.net/anime/${a.mal_id}`;

                const episodeList = episodes > 0 ? Array.from({ length: Math.min(episodes, 100) }, (_, i) => i + 1)
                    .map(ep => `<a href="watch.html?id=${a.mal_id}&ep=${ep}&type=sub" class="ep-btn">${ep}</a>`).join('') : '<p style="color:var(--muted);">No episodes listed.</p>';

                document.getElementById('animeDetail').innerHTML = `
                <div class="anime-banner"><img src="${img}" alt="${title}" onerror="this.style.display='none'"></div>
                <div class="anime-detail-content">
                    <div class="anime-poster-lg"><img src="${a.images?.jpg?.large_image_url}" alt="${title}" loading="lazy" onerror="this.style.display='none'"></div>
                    <div class="anime-info-detail">
                        <h1>${title}</h1>
                        <p class="subtitle">${jp ? jp + ' • ' : ''}${type}</p>
                        <div class="meta-tags">
                            <span class="meta-tag">${type}</span>
                            <span class="meta-tag">⭐ ${score}</span>
                            <span class="meta-tag">${status}</span>
                            <span class="meta-tag">Episodes: ${episodes || '?'}</span>
                            <span class="meta-tag">Duration: ${duration}</span>
                        </div>
                        <p class="synopsis">${synopsis}</p>
                        <div class="meta-tags">
                            <span class="meta-tag">Genres: ${genres || 'N/A'}</span>
                            <span class="meta-tag">Studios: ${studios || 'N/A'}</span>
                            <span class="meta-tag">Premiered: ${premiered}</span>
                            <span class="meta-tag">Rating: ${rating}</span>
                        </div>
                        <div style="margin:20px 0;">
                            <a href="watch.html?id=${a.mal_id}&ep=1&type=sub" class="btn btn-primary">▶ Watch Now (Sub)</a>
                            <a href="watch.html?id=${a.mal_id}&ep=1&type=dub" class="btn btn-outline" style="margin-left:8px;">🔊 Watch Dub</a>
                        </div>
                        <p>Links: <a href="${malLink}" target="_blank" style="color:#c4b5fd;">MyAnimeList</a></p>
                    </div>
                </div>
                <h2 class="section-title mt-4">Episodes</h2>
                <div class="episode-grid">${episodeList}</div>
                `;
            } catch (e) {
                document.getElementById('animeDetail').innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted);">Error loading anime details.</p>';
            }
        }

        loadAnimeDetail();
        document.getElementById('loadingScreen')?.classList.add('hidden');
    </script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-ring { width: 50px; height: 50px; border: 3px solid var(--border-light); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .mt-4 { margin-top: 16px; }
    </style>
</body>
</html>
