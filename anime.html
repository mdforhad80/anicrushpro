<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Anime details, episodes, characters, and streaming links.">
<meta name="theme-color" content="#050505">
<title>Anime Details - AnimeStream</title>
<style>
/* ==================== VARIABLES & RESET ==================== */
:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --primary: #8b5cf6;
  --primary-glow: rgba(139,92,246,0.35);
  --secondary: #a78bfa;
  --text: #f3f4f6;
  --text-muted: #9ca3af;
  --border: rgba(255,255,255,0.08);
  --radius: 12px;
  --radius-lg: 16px;
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-x: hidden;
  max-width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
ul, ol { list-style: none; }

/* ==================== UTILITIES ==================== */
.glass {
  background: rgba(17,17,17,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
}
.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
.text-gradient {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.clamp-2 {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.clamp-3 {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ==================== HEADER ==================== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px);
  transition: var(--transition);
}
.header.scrolled {
  background: rgba(5,5,5,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.menu-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.menu-btn:hover { background: var(--surface-2); }
.menu-btn svg { width: 22px; height: 22px; stroke: var(--text); }
.logo {
  font-size: clamp(1.1rem, 2vw, 1.5rem);
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #fff; font-size: 14px;
}
.search-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.search-btn:hover { background: var(--surface-2); }
.search-btn svg { width: 20px; height: 20px; stroke: var(--text); }

/* ==================== SIDEBAR ==================== */
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(280px, 80vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 1101;
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  padding: 20px;
}
.sidebar.active { transform: translateX(0); }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.sidebar-close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.sidebar-close:hover { background: var(--surface-2); }
.sidebar-close svg { width: 20px; height: 20px; stroke: var(--text); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-muted);
  transition: var(--transition);
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  background: rgba(139,92,246,0.12);
  color: var(--primary);
}
.sidebar-nav a svg { width: 20px; height: 20px; stroke: currentColor; flex-shrink: 0; }

/* ==================== SEARCH OVERLAY ==================== */
.search-overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,5,0.95);
  backdrop-filter: blur(20px);
  z-index: 1200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  display: flex; flex-direction: column;
  padding: clamp(16px, 4vw, 48px);
}
.search-overlay.active { opacity: 1; pointer-events: all; }
.search-top {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
}
.search-input-wrap { flex: 1; position: relative; }
.search-input-wrap svg {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; stroke: var(--text-muted); pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 14px 16px 14px 48px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: var(--transition);
}
.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.search-close {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  background: var(--surface-2);
}
.search-close:hover { background: var(--surface-3); }
.search-close svg { width: 22px; height: 22px; stroke: var(--text); }
.search-suggestions {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  overflow-y: auto;
  padding-bottom: 40px;
}
.search-empty { text-align: center; color: var(--text-muted); padding: 48px 16px; font-size: 1rem; }

/* ==================== ANIME BANNER ==================== */
.anime-banner {
  position: relative;
  width: 100%;
  height: clamp(300px, 45vh, 550px);
  overflow: hidden;
}
.anime-banner-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center 20%;
  filter: blur(2px) brightness(0.5);
}
.anime-banner-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(5,5,5,0.3) 0%, var(--bg) 100%);
}

/* ==================== ANIME DETAILS GRID ==================== */
.anime-details {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: clamp(20px, 3vw, 40px);
  padding: 0 clamp(16px, 3vw, 32px);
  max-width: 1200px;
  margin: -120px auto 0;
  position: relative;
  z-index: 2;
}
@media (max-width: 768px) {
  .anime-details {
    grid-template-columns: 1fr;
    margin-top: -80px;
  }
}

/* Poster */
.anime-poster-wrap {
  width: clamp(160px, 22vw, 260px);
  flex-shrink: 0;
}
@media (max-width: 768px) {
  .anime-poster-wrap {
    width: min(200px, 60vw);
    margin: 0 auto;
  }
}
.anime-poster {
  width: 100%;
  aspect-ratio: 2/3;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  background: var(--surface-2);
}
.anime-poster img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.anime-actions {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 16px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 700;
  transition: var(--transition);
  white-space: nowrap;
  width: 100%;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff;
  box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--primary-glow);
}
.btn-secondary {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-secondary:hover { background: rgba(255,255,255,0.14); }

/* Info */
.anime-info {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}
.anime-title {
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  font-weight: 800;
  line-height: 1.15;
}
.anime-alt-title {
  font-size: clamp(0.85rem, 1.2vw, 1rem);
  color: var(--text-muted);
  font-weight: 500;
}
.anime-meta-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  font-size: 0.9rem;
}
.anime-score {
  display: flex; align-items: center; gap: 6px;
  background: rgba(251,191,36,0.12);
  padding: 6px 12px;
  border-radius: 8px;
  color: #fbbf24;
  font-weight: 800;
  font-size: 1rem;
}
.anime-score svg { width: 18px; height: 18px; fill: #fbbf24; }
.anime-meta-row .dot { width: 4px; height: 4px; background: var(--text-muted); border-radius: 50%; }
.anime-genres {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.anime-genre {
  padding: 5px 12px;
  background: rgba(139,92,246,0.12);
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--secondary);
}
.anime-synopsis {
  font-size: clamp(0.85rem, 1vw + 0.2rem, 1rem);
  color: var(--text-muted);
  line-height: 1.7;
  max-width: 100%;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.anime-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}
.stat-box {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  text-align: center;
}
.stat-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.stat-value {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}

/* ==================== TABS ==================== */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
  transition: var(--transition);
  flex-shrink: 0;
}
.tab-btn:hover { color: var(--text); background: var(--surface-2); }
.tab-btn.active {
  color: var(--primary);
  background: rgba(139,92,246,0.1);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.3s ease; }

/* ==================== EPISODE LIST ==================== */
#episodesList {
  max-height: 70vh;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface-3) var(--surface-2);
}
#episodesList::-webkit-scrollbar { width: 6px; }
#episodesList::-webkit-scrollbar-track { background: var(--surface-2); border-radius: 3px; }
#episodesList::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
#episodesList::-webkit-scrollbar-thumb:hover { background: var(--primary); }

.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
@media (max-width: 640px) {
  .episode-grid { grid-template-columns: 1fr; }
}
.episode-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: var(--transition);
  cursor: pointer;
}
.episode-card:hover {
  background: var(--surface-3);
  border-color: var(--primary);
  transform: translateX(4px);
}
.episode-num {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: var(--primary);
  color: #fff;
  border-radius: 10px;
  font-weight: 800;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.episode-info { flex: 1; min-width: 0; }
.episode-title {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 2px;
}
.episode-date {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.episode-play {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(139,92,246,0.15);
  color: var(--primary);
  flex-shrink: 0;
}
.episode-play svg { width: 16px; height: 16px; fill: currentColor; }

/* ==================== CHARACTER CARDS ==================== */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 16px;
}
.char-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}
.char-card:hover {
  transform: translateY(-4px);
  border-color: var(--primary);
}
.char-img {
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--surface-3);
}
.char-img img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.char-name {
  padding: 10px;
  font-size: 0.8rem;
  font-weight: 600;
  text-align: center;
  color: var(--text);
}
.char-role {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
  padding-bottom: 10px;
}

/* ==================== RELATIONS / RECOMMENDATIONS ==================== */
/* ==================== UNIVERSAL SLIDER / CAROUSEL ==================== */
.slider-wrap {
  position: relative;
  overflow: visible;
  border-radius: var(--radius-lg);
  padding: 4px 0;
}

.slider-track {
  display: flex;
  gap: clamp(10px, 1.2vw, 18px);
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 4px 4px 16px;
  touch-action: pan-x pan-y pinch-zoom;
  cursor: grab;
}
.slider-track::-webkit-scrollbar { display: none; }
.slider-track:active { cursor: grabbing; }

/* Cards snap to start for clean carousel feel */
.slider-track /* ==================== SLIDER / CAROUSEL ==================== */
.slider-wrap {
  position: relative;
  overflow: visible;
  border-radius: var(--radius-lg);
  padding: 4px 0;
}
.slider-track {
  display: flex;
  gap: clamp(10px, 1.2vw, 16px);
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 8px 4px 16px;
  touch-action: pan-x pan-y pinch-zoom;
  cursor: grab;
}
.slider-track::-webkit-scrollbar { display: none; }
.slider-track.dragging {
  scroll-behavior: auto;
  cursor: grabbing;
  scroll-snap-type: none;
  user-select: none;
}

/* Arrow buttons — visible on ALL devices */
.slider-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(10, 10, 10, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(139, 92, 246, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  opacity: 1;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  color: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  flex-shrink: 0;
  pointer-events: auto;
}
.slider-arrow:hover {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  transform: translateY(-50%) scale(1.12);
  box-shadow: 0 0 20px var(--primary-glow);
}
.slider-arrow:active {
  transform: translateY(-50%) scale(0.95);
}
.slider-arrow.prev { left: -10px; }
.slider-arrow.next { right: -10px; }
.slider-arrow svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 2.5;
  pointer-events: none;
}

/* Anime cards */
.anime-card {
  flex: 0 0 auto;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface-2);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.35s ease;
  cursor: pointer;
  will-change: transform;
}
.anime-card:hover {
  transform: scale(1.05) translateY(-4px);
  box-shadow: 0 20px 40px rgba(139,92,246,0.18);
}
.anime-card .card-img-wrap {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
  background: var(--surface-3);
}
.anime-card .card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
  pointer-events: none;
}
.anime-card:hover .card-img-wrap img { transform: scale(1.1); }
.anime-card .card-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
  pointer-events: none;
}
.anime-card .card-badges {
  position: absolute;
  top: 8px;
  left: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  z-index: 2;
  pointer-events: none;
}
.anime-card .badge {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-hd { background: #ef4444; color: #fff; }
.badge-score { background: rgba(0,0,0,0.6); color: #fbbf24; backdrop-filter: blur(4px); }
.badge-ep { background: var(--primary); color: #fff; }
.badge-type { background: rgba(255,255,255,0.15); color: #fff; }
.anime-card .card-info {
  padding: 10px 12px 14px;
}
.anime-card .card-title {
  font-size: 0.85rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
}

/* ===== RESPONSIVE CARD WIDTHS ===== */
/* Desktop: 5 cards */
@media (min-width: 1200px) {
  .slider-track .anime-card { width: calc((100% - 64px) / 5); }
}
/* Tablet: 3 cards */
@media (min-width: 769px) and (max-width: 1199px) {
  .slider-track .anime-card { width: calc((100% - 32px) / 3); }
}
/* Mobile: 2 cards */
@media (min-width: 481px) and (max-width: 768px) {
  .slider-track .anime-card { width: calc((100% - 10px) / 2); }
  .slider-arrow { width: 38px; height: 38px; }
  .slider-arrow.prev { left: 4px; }
  .slider-arrow.next { right: 4px; }
}
/* Small mobile: 1.3 cards preview effect */
@media (max-width: 480px) {
  .slider-track .anime-card { width: calc((100% - 8px) / 1.3); }
  .slider-arrow { width: 36px; height: 36px; }
  .slider-arrow.prev { left: 2px; }
  .slider-arrow.next { right: 2px; }
  .slider-wrap { padding: 4px 8px; }
}
/* Trailer */
.trailer-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface-2);
}
.trailer-wrap iframe {
  width: 100%; height: 100%;
  border: none;
}

/* ==================== GRID FALLBACK ==================== */

<!-- ==================== SCRIPTS ==================== -->
<script>
(function() {
  'use strict';

  const API_BASE = 'https://api.jikan.moe/v4';
  const CACHE_TTL = 5 * 60 * 1000;
  const RATE_DELAY = 400;

  const ApiEngine = {
    cache: {}, lastRequest: 0,
    getCacheKey(url) { return 'cache_' + url; },
    getCached(url) {
      const key = this.getCacheKey(url);
      const item = this.cache[key];
      if (!item) {
        try {
          const raw = localStorage.getItem(key);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Date.now() - parsed.time < CACHE_TTL) { this.cache[key] = parsed; return parsed.data; }
          }
        } catch(e) {}
        return null;
      }
      if (Date.now() - item.time < CACHE_TTL) return item.data;
      return null;
    },
    setCache(url, data) {
      const key = this.getCacheKey(url);
      const payload = { data, time: Date.now() };
      this.cache[key] = payload;
      try { localStorage.setItem(key, JSON.stringify(payload)); } catch(e) {}
    },
    async fetchWithTimeout(url, timeout = 10000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (e) { clearTimeout(id); throw e; }
    },
    async fetch(url, retries = 3) {
      const cached = this.getCached(url);
      if (cached) return cached;
      const now = Date.now();
      const wait = Math.max(0, this.lastRequest + RATE_DELAY - now);
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      this.lastRequest = Date.now();
      let lastError;
      for (let i = 0; i < retries; i++) {
        try {
          if (i > 0) await new Promise(r => setTimeout(r, 1200 * i));
          const response = await this.fetchWithTimeout(url);
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const json = await response.json();
          if (!json || !json.data) throw new Error('Invalid response');
          this.setCache(url, json);
          return json;
        } catch (e) { lastError = e; }
      }
      throw lastError;
    },
    async fetchSafe(url, fallbackData = null) {
      try { return await this.fetch(url); }
      catch (e) { console.warn('API fetch failed:', url, e.message); return { data: fallbackData }; }
    }
  };

  function getParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function sanitize(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getTitle(anime) {
    return sanitize(anime.title_english || anime.title || 'Unknown');
  }

  function getImage(anime) {
    if (!anime.images || !anime.images.jpg) return '';
    return anime.images.jpg.large_image_url || anime.images.jpg.image_url || '';
  }

  function getPoster(anime) {
    if (!anime.images || !anime.images.jpg) return '';
    return anime.images.jpg.image_url || anime.images.jpg.small_image_url || '';
  }

  // ==================== SLIDER ====================
  const SliderRegistry = new Map();

  function initSlider(trackId) {
    const track = document.getElementById(trackId);
    if (!track || SliderRegistry.has(trackId)) return;

    let isDown = false;
    let startX = 0;
    let scrollLeft = 0;
    let velocity = 0;
    let lastX = 0;
    let lastTime = 0;
    let rafId = null;
    let isDragging = false;

    // --- Mouse Drag (Desktop) ---
    function onMouseDown(e) {
      if (e.target.closest('.anime-card')) return;
      isDown = true;
      isDragging = false;
      startX = e.pageX;
      scrollLeft = track.scrollLeft;
      lastX = e.pageX;
      lastTime = Date.now();
      velocity = 0;
      track.style.cursor = 'grabbing';
      track.style.scrollBehavior = 'auto';
      cancelMomentum();
    }

    function onMouseMove(e) {
      if (!isDown) return;
      const dx = e.pageX - startX;
      if (Math.abs(dx) > 3) isDragging = true;
      track.scrollLeft = scrollLeft - dx;

      // Track velocity for momentum
      const now = Date.now();
      const dt = now - lastTime;
      if (dt > 0) {
        velocity = (e.pageX - lastX) / dt;
      }
      lastX = e.pageX;
      lastTime = now;
    }

    function onMouseUp() {
      if (!isDown) return;
      isDown = false;
      track.style.cursor = 'grab';
      track.style.scrollBehavior = 'smooth';
      if (isDragging && Math.abs(velocity) > 0.3) {
        applyMomentum();
      }
    }

    function onMouseLeave() {
      onMouseUp();
    }

    // --- Touch Drag (Mobile) with momentum ---
    let touchStart = 0;
    let touchScroll = 0;
    let touchLastX = 0;
    let touchLastTime = 0;
    let touchVelocity = 0;

    function onTouchStart(e) {
      const t = e.touches[0];
      touchStart = t.clientX;
      touchScroll = track.scrollLeft;
      touchLastX = t.clientX;
      touchLastTime = Date.now();
      touchVelocity = 0;
      track.style.scrollBehavior = 'auto';
      cancelMomentum();
    }

    function onTouchMove(e) {
      const t = e.touches[0];
      const dx = touchStart - t.clientX;
      track.scrollLeft = touchScroll + dx;

      const now = Date.now();
      const dt = now - touchLastTime;
      if (dt > 0) {
        touchVelocity = (t.clientX - touchLastX) / dt;
      }
      touchLastX = t.clientX;
      touchLastTime = now;
    }

    function onTouchEnd() {
      track.style.scrollBehavior = 'smooth';
      if (Math.abs(touchVelocity) > 0.3) {
        velocity = touchVelocity;
        applyMomentum();
      }
    }

    // --- Momentum / Inertia Scrolling ---
    function applyMomentum() {
      cancelMomentum();
      const friction = 0.92;
      const minVelocity = 0.1;

      function step() {
        if (Math.abs(velocity) < minVelocity) return;
        track.scrollLeft -= velocity * 16;
        velocity *= friction;
        rafId = requestAnimationFrame(step);
      }
      rafId = requestAnimationFrame(step);
    }

    function cancelMomentum() {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      velocity = 0;
    }

    // --- Wheel horizontal scroll ---
    function onWheel(e) {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        track.scrollLeft += e.deltaY;
      }
    }

    // Bind events
    track.addEventListener('mousedown', onMouseDown, { passive: true });
    track.addEventListener('mousemove', onMouseMove, { passive: true });
    track.addEventListener('mouseup', onMouseUp, { passive: true });
    track.addEventListener('mouseleave', onMouseLeave, { passive: true });
    track.addEventListener('wheel', onWheel, { passive: false });

    track.addEventListener('touchstart', onTouchStart, { passive: true });
    track.addEventListener('touchmove', onTouchMove, { passive: true });
    track.addEventListener('touchend', onTouchEnd, { passive: true });

    // Stop momentum on user interaction
    track.addEventListener('scroll', cancelMomentum, { passive: true });

    SliderRegistry.set(trackId, { track, cancelMomentum });
  }

  // --- Arrow Navigation ---
  function slideTrack(trackId, direction) {
    const track = document.getElementById(trackId);
    if (!track) return;

    const card = track.querySelector('.anime-card');
    if (!card) return;

    // Calculate how many cards fit in viewport
    const trackWidth = track.clientWidth;
    const cardWidth = card.offsetWidth;
    const gap = parseFloat(getComputedStyle(track).gap) || 16;
    const visibleCards = Math.floor((trackWidth + gap) / (cardWidth + gap));
    const scrollAmount = (cardWidth + gap) * Math.max(visibleCards, 1);

    track.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
  }

  document.querySelectorAll('.slider-arrow').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const target = btn.dataset.target;
      const direction = btn.classList.contains('prev') ? -1 : 1;
      slideTrack('slider-' + target, direction);
    });
  });

  // ==================== RENDER CARD ====================
  function renderAnimeCard(anime) {
    const malId = anime.mal_id || 0;
    const img = getImage(anime) || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
    const title = getTitle(anime);
    const score = anime.score ? anime.score.toFixed(1) : '';
    const episodes = anime.episodes || (anime.type === 'Movie' ? '1' : '?');
    const type = sanitize(anime.type || 'TV');
    return `
      <a href="anime.html?id=${malId}" class="anime-card fade-in">
        <div class="card-img-wrap">
          <img src="${img}" alt="${title}" loading="lazy">
          <div class="card-gradient"></div>
          <div class="card-badges">
            <span class="badge badge-hd">HD</span>
            ${score ? `<span class="badge badge-score">${score}</span>` : ''}
            ${episodes ? `<span class="badge badge-ep">EP ${episodes}</span>` : ''}
            <span class="badge badge-type">${type}</span>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title clamp-2">${title}</div>
        </div>
      </a>
    `;
  }

  // ==================== LOAD ANIME DETAILS ====================
  async function loadAnimeDetails() {
    const malId = getParam('id');
    if (!malId) {
      document.getElementById('animeInfo').innerHTML = '<div class="search-empty">No anime ID provided.</div>';
      return;
    }

    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/full`);
      const anime = (res && res.data) ? res.data : null;
      if (!anime) {
        document.getElementById('animeInfo').innerHTML = '<div class="search-empty">Anime not found.</div>';
        return;
      }

      // Banner
      const bannerBg = document.getElementById('bannerBg');
      const bannerImg = getImage(anime);
      if (bannerBg && bannerImg) bannerBg.style.backgroundImage = `url('${bannerImg}')`;

      // Poster
      const posterEl = document.getElementById('animePoster');
      const posterImg = getPoster(anime);
      if (posterEl && posterImg) posterEl.innerHTML = `<img src="${posterImg}" alt="${getTitle(anime)}">`;

      // Watch button
      const watchBtn = document.getElementById('watchBtn');
      if (watchBtn) watchBtn.href = `watch.html?id=${malId}&ep=1`;

      // Info
      const infoEl = document.getElementById('animeInfo');
      const title = getTitle(anime);
      const altTitle = sanitize(anime.title_japanese || '');
      const genres = (anime.genres || []).map(g => `<span class="anime-genre">${sanitize(g.name)}</span>`).join('');
      const studios = (anime.studios || []).map(s => sanitize(s.name)).join(', ') || 'Unknown';
      const score = anime.score ? anime.score.toFixed(2) : 'N/A';
      const episodes = anime.episodes || '?';
      const status = sanitize(anime.status || 'Unknown');
      const duration = sanitize(anime.duration || 'Unknown');
      const rating = sanitize(anime.rating || 'Unknown');
      const synopsis = sanitize(anime.synopsis || 'No synopsis available.');
      const year = anime.year || (anime.aired && anime.aired.from ? new Date(anime.aired.from).getFullYear() : '');
      const season = sanitize(anime.season || '') + (anime.year ? ' ' + anime.year : '');

      infoEl.innerHTML = `
        <h1 class="anime-title">${title}</h1>
        ${altTitle ? `<div class="anime-alt-title">${altTitle}</div>` : ''}
        <div class="anime-meta-row">
          <span class="anime-score">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            ${score}
          </span>
          <span class="dot"></span>
          <span>${episodes} Episodes</span>
          <span class="dot"></span>
          <span>${status}</span>
          <span class="dot"></span>
          <span>${duration}</span>
        </div>
        <div class="anime-genres">${genres}</div>
        <p class="anime-synopsis">${synopsis}</p>
        <div class="anime-stats">
          <div class="stat-box"><div class="stat-label">Type</div><div class="stat-value">${sanitize(anime.type || 'TV')}</div></div>
          <div class="stat-box"><div class="stat-label">Studio</div><div class="stat-value">${studios}</div></div>
          <div class="stat-box"><div class="stat-label">Season</div><div class="stat-value">${season || 'Unknown'}</div></div>
          <div class="stat-box"><div class="stat-label">Rating</div><div class="stat-value">${rating}</div></div>
          <div class="stat-box"><div class="stat-label">Rank</div><div class="stat-value">#${anime.rank || '?'}</div></div>
          <div class="stat-box"><div class="stat-label">Popularity</div><div class="stat-value">#${anime.popularity || '?'}</div></div>
        </div>
      `;

      // Trailer
      const trailerWrap = document.getElementById('trailerWrap');
      const trailerBtn = document.getElementById('trailerBtn');
      const trailerUrl = anime.trailer && anime.trailer.embed_url ? anime.trailer.embed_url : null;
      if (trailerUrl && trailerWrap) {
        trailerWrap.innerHTML = `<iframe src="${trailerUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
        if (trailerBtn) {
          trailerBtn.addEventListener('click', () => {
            document.querySelector('[data-tab="trailer"]').click();
            trailerWrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        }
      } else {
        if (trailerWrap) trailerWrap.innerHTML = '<div class="search-empty">No trailer available.</div>';
        if (trailerBtn) trailerBtn.style.display = 'none';
      }

      // Load other data in parallel
      loadEpisodes(malId, anime.episodes);
      loadCharacters(malId);
      loadRelations(malId);
      loadRecommendations(malId);

    } catch (e) {
      console.error(e);
      document.getElementById('animeInfo').innerHTML = '<div class="search-empty">Failed to load anime details.</div>';
    }
  }

  // Chunked episode rendering for performance with 1000+ episodes
  const EP_CHUNK_SIZE = 10000;
  let renderedEpCount = 0;

  async function loadEpisodes(malId, totalEps) {
    const container = document.getElementById('episodesList');
    if (!container) return;

    container.innerHTML = '';
    renderedEpCount = 0;

    // Try to fetch real episode data from API first
    let apiEpisodes = [];
    try {
      // Paginate through all episode pages
      let page = 1;
      let hasMore = true;
      while (hasMore && page <= 20) {
        const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/episodes?page=${page}`);
        const data = (res && res.data) ? res.data : [];
        const pagination = (res && res.pagination) ? res.pagination : {};
        if (data.length) {
          apiEpisodes = apiEpisodes.concat(data);
        }
        hasMore = pagination.has_next_page === true;
        page++;
      }
    } catch (e) {
      console.warn('Episode API failed, using generic list');
    }

    if (apiEpisodes.length > 0) {
      // Use API episode data - render all with chunked approach
      renderEpisodeChunkFromApi(malId, apiEpisodes, 0, Math.min(EP_CHUNK_SIZE, apiEpisodes.length));
      if (apiEpisodes.length > EP_CHUNK_SIZE) {
        scheduleApiChunkRender(malId, apiEpisodes, EP_CHUNK_SIZE);
      }
    } else {
      // Fallback: generate generic episode list
      const count = totalEps || 12;
      state.totalEps = count;
      renderGenericEpisodeChunk(malId, 1, Math.min(EP_CHUNK_SIZE, count));
      if (count > EP_CHUNK_SIZE) {
        scheduleGenericChunkRender(malId, EP_CHUNK_SIZE + 1, count);
      }
    }
  }

  function renderEpisodeChunkFromApi(malId, episodes, start, end) {
    const container = document.getElementById('episodesList');
    if (!container) return;
    const fragment = document.createDocumentFragment();
    const actualEnd = Math.min(end, episodes.length);

    for (let i = start; i < actualEnd; i++) {
      const ep = episodes[i];
      const epNum = ep.mal_id || ep.episode || (i + 1);
      const card = document.createElement('a');
      card.href = `watch.html?id=${malId}&ep=${epNum}`;
      card.className = 'episode-card fade-in';
      card.innerHTML = `
        <div class="episode-num">${epNum}</div>
        <div class="episode-info">
          <div class="episode-title clamp-2">${sanitize(ep.title || 'Episode ' + epNum)}</div>
          <div class="episode-date">${sanitize(ep.aired || '')}</div>
        </div>
        <div class="episode-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
      `;
      fragment.appendChild(card);
    }
    container.appendChild(fragment);
    renderedEpCount = actualEnd;
  }

  function scheduleApiChunkRender(malId, episodes, start) {
    if (start >= episodes.length) return;
    requestAnimationFrame(() => {
      renderEpisodeChunkFromApi(malId, episodes, start, start + EP_CHUNK_SIZE);
      if (start + EP_CHUNK_SIZE < episodes.length) {
        setTimeout(() => scheduleApiChunkRender(malId, episodes, start + EP_CHUNK_SIZE), 10);
      }
    });
  }

  function renderGenericEpisodeChunk(malId, start, end) {
    const container = document.getElementById('episodesList');
    if (!container) return;
    const fragment = document.createDocumentFragment();
    const actualEnd = Math.min(end, state.totalEps);

    for (let i = start; i <= actualEnd; i++) {
      const card = document.createElement('a');
      card.href = `watch.html?id=${malId}&ep=${i}`;
      card.className = 'episode-card fade-in';
      card.dataset.ep = i;
      card.innerHTML = `
        <div class="episode-num">${i}</div>
        <div class="episode-info"><div class="episode-title">Episode ${i}</div></div>
        <div class="episode-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
      `;
      fragment.appendChild(card);
    }
    container.appendChild(fragment);
    renderedEpCount = actualEnd;
  }

  function scheduleGenericChunkRender(malId, start, total) {
    if (start > total) return;
    requestAnimationFrame(() => {
      renderGenericEpisodeChunk(malId, start, Math.min(start + EP_CHUNK_SIZE - 1, total));
      if (start + EP_CHUNK_SIZE <= total) {
        setTimeout(() => scheduleGenericChunkRender(malId, start + EP_CHUNK_SIZE, total), 10);
      }
    });
  }

  async function loadCharacters(malId) {
    const container = document.getElementById('charGrid');
    if (!container) return;
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/characters`);
      const chars = (res && res.data) ? res.data.slice(0, 12) : [];
      if (!chars.length) {
        container.innerHTML = '<div class="search-empty">No character data available.</div>';
        return;
      }
      container.innerHTML = chars.map(c => {
        const char = c.character || {};
        const img = char.images && char.images.jpg ? char.images.jpg.image_url : '';
        const name = sanitize(char.name || 'Unknown');
        const role = sanitize(c.role || '');
        return `
          <div class="char-card fade-in">
            <div class="char-img"><img src="${img}" alt="${name}" loading="lazy"></div>
            <div class="char-name clamp-2">${name}</div>
            <div class="char-role">${role}</div>
          </div>
        `;
      }).join('');
    } catch (e) {
      container.innerHTML = '<div class="search-empty">Failed to load characters.</div>';
    }
  }

  async function loadRelations(malId) {
    const container = document.getElementById('slider-relations');
    if (!container) return;
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/relations`);
      const data = (res && res.data) ? res.data : [];
      let items = [];
      data.forEach(group => {
        (group.entry || []).forEach(entry => {
          if (entry.type === 'anime') items.push({ mal_id: entry.mal_id, title: entry.name, type: group.relation || 'Related' });
        });
      });
      if (!items.length) {
        container.innerHTML = '<div class="search-empty">No relations found.</div>';
        return;
      }
      // Fetch details for all items with rate limiting
      const enriched = [];
      for (const item of items) {
        try {
          const detail = await ApiEngine.fetchSafe(`${API_BASE}/anime/${item.mal_id}`);
          enriched.push(detail.data || { mal_id: item.mal_id, title: item.title, images: { jpg: { image_url: '' } }, type: 'TV', score: 0, status: item.type });
        } catch (e) {
          enriched.push({ mal_id: item.mal_id, title: item.title, images: { jpg: { image_url: '' } }, type: 'TV', score: 0, status: item.type });
        }
      }
      container.innerHTML = enriched.map(renderAnimeCard).join('');
      initSlider('slider-relations');
    } catch (e) {
      container.innerHTML = '<div class="search-empty">Failed to load relations.</div>';
    }
  }

  async function loadRecommendations(malId) {
    const container = document.getElementById('slider-recommendations');
    if (!container) return;
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/anime/${malId}/recommendations`);
      const data = (res && res.data) ? res.data.slice(0, 15) : [];
      if (!data.length) {
        container.innerHTML = '<div class="search-empty">No recommendations found.</div>';
        return;
      }
      // Fetch details sequentially with rate limiting
      const enriched = [];
      for (const rec of data) {
        try {
          const detail = await ApiEngine.fetchSafe(`${API_BASE}/anime/${rec.entry.mal_id}`);
          enriched.push(detail.data || rec.entry);
        } catch (e) { enriched.push(rec.entry); }
      }
      container.innerHTML = enriched.map(renderAnimeCard).join('');
      initSlider('slider-recommendations');
    } catch (e) {
      container.innerHTML = '<div class="search-empty">Failed to load recommendations.</div>';
    }
  }

  // ==================== TABS ====================
  function initTabs() {
    const tabs = document.getElementById('tabs');
    if (!tabs) return;
    tabs.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const panel = document.getElementById('tab-' + tabId);
        if (panel) panel.classList.add('active');
      });
    });
  }

  // ==================== SEARCH OVERLAY ====================
  const SearchOverlay = {
    overlay: document.getElementById('searchOverlay'),
    input: document.getElementById('searchInput'),
    suggestions: document.getElementById('searchSuggestions'),
    debounceTimer: null,
    open() { this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; setTimeout(() => this.input.focus(), 100); },
    close() { this.overlay.classList.remove('active'); document.body.style.overflow = ''; this.input.value = ''; this.suggestions.innerHTML = ''; },
    async search(query) {
      if (!query || query.length < 2) { this.suggestions.innerHTML = '<div class="search-empty">Type at least 2 characters to search</div>'; return; }
      this.suggestions.innerHTML = '<div class="search-empty">Searching...</div>';
      try {
        const res = await ApiEngine.fetchSafe(`${API_BASE}/anime?q=${encodeURIComponent(query)}&limit=12`);
        const data = (res && res.data) ? res.data : [];
        if (!data.length) { this.suggestions.innerHTML = '<div class="search-empty">No results found.</div>'; return; }
        this.suggestions.innerHTML = data.map(anime => renderAnimeCard(anime)).join('');
      } catch (e) { this.suggestions.innerHTML = '<div class="search-empty">Search failed. Try again.</div>'; }
    },
    init() {
      document.getElementById('searchBtn').addEventListener('click', () => this.open());
      document.getElementById('searchClose').addEventListener('click', () => this.close());
      this.overlay.addEventListener('click', (e) => { if (e.target === this.overlay) this.close(); });
      this.input.addEventListener('input', (e) => { clearTimeout(this.debounceTimer); this.debounceTimer = setTimeout(() => this.search(e.target.value.trim()), 400); });
      this.input.addEventListener('keydown', (e) => { if (e.key === 'Escape') this.close(); });
    }
  };

  // ==================== MOBILE NAV ====================
  const MobileNav = {
    sidebar: document.getElementById('sidebar'),
    overlay: document.getElementById('sidebarOverlay'),
    open() { this.sidebar.classList.add('active'); this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; },
    close() { this.sidebar.classList.remove('active'); this.overlay.classList.remove('active'); document.body.style.overflow = ''; },
    init() {
      document.getElementById('menuBtn').addEventListener('click', () => this.open());
      document.getElementById('sidebarClose').addEventListener('click', () => this.close());
      this.overlay.addEventListener('click', () => this.close());
    }
  };

  function initHeaderScroll() {
    const header = document.getElementById('header');
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { header.classList.toggle('scrolled', window.scrollY > 40); ticking = false; });
        ticking = true;
      }
    }, { passive: true });
  }

  // ==================== APP INIT ====================
  async function initApp() {
    initHeaderScroll();
    MobileNav.init();
    // SearchOverlay.init(); // Disabled — search icon now links to external search page
    initTabs();
    await loadAnimeDetails();
  }

  if (!window.__appInitialized) {
    window.__appInitialized = true;
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  }
})();
</script>
</body>
