<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anime Details - AnimeStream</title>
  <meta name="description" content="View anime details, episodes, characters, and more on AnimeStream.">
  <meta name="theme-color" content="#0a0a0f">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121f;
      --bg-card: #16162a;
      --bg-hover: #1e1e3a;
      --accent: #8b5cf6;
      --accent-light: #a78bfa;
      --accent-glow: #7c3aed;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --glass-bg: rgba(20, 20, 35, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --shadow-glow: 0 0 20px rgba(139, 92, 246, 0.3);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --transition-fast: 0.2s ease;
      --transition-normal: 0.3s ease;
      --header-height: 70px;
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    ::selection { background: rgba(139, 92, 246, 0.3); color: var(--text-primary); }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 clamp(16px, 4vw, 48px);
    }

    /* Header */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(20px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(16px, 4vw, 48px);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-left, .header-right { display: flex; align-items: center; gap: 16px; }

    .menu-toggle {
      width: 40px; height: 40px;
      display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
      border-radius: var(--radius-sm);
      transition: background var(--transition-fast);
    }
    .menu-toggle:hover { background: rgba(255,255,255,0.1); }
    .menu-toggle span { display: block; width: 22px; height: 2px; background: var(--text-primary); border-radius: 2px; }

    .logo {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo span { -webkit-text-fill-color: var(--text-primary); background: none; }

    .search-toggle, .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: all var(--transition-fast);
      color: var(--text-secondary);
    }
    .search-toggle:hover, .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

    /* Sidebar */
    .sidebar-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 1999; opacity: 0; visibility: hidden;
      transition: all var(--transition-normal);
    }
    .sidebar-backdrop.active { opacity: 1; visibility: visible; }

    .mobile-sidebar {
      position: fixed; top: 0; left: 0;
      width: min(300px, 85vw); height: 100vh;
      background: var(--bg-secondary);
      border-right: 1px solid var(--glass-border);
      z-index: 2000;
      transform: translateX(-100%);
      transition: transform var(--transition-normal);
      overflow-y: auto;
      padding: 24px;
    }
    .mobile-sidebar.active { transform: translateX(0); }

    .sidebar-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }
    .sidebar-logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 32px; background: linear-gradient(135deg, var(--accent-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-md); color: var(--text-secondary); font-weight: 500; transition: all var(--transition-fast); }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(139, 92, 246, 0.15); color: var(--accent-light); }
    .sidebar-nav svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Search Overlay */
    .search-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px);
      z-index: 3000; opacity: 0; visibility: hidden;
      transition: all var(--transition-normal);
      display: flex; flex-direction: column;
      padding: clamp(20px, 5vh, 60px) clamp(16px, 4vw, 48px);
    }
    .search-overlay.active { opacity: 1; visibility: visible; }
    .search-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; max-width: 800px; width: 100%; margin-left: auto; margin-right: auto; }
    .search-input-wrapper { flex: 1; position: relative; }
    .search-input { width: 100%; background: var(--bg-card); border: 2px solid var(--glass-border); border-radius: var(--radius-xl); padding: 16px 24px 16px 48px; color: var(--text-primary); font-size: 1.1rem; outline: none; transition: all var(--transition-normal); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
    .search-input-wrapper svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 20px; height: 20px; pointer-events: none; }
    .search-close-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.1); color: var(--text-primary); flex-shrink: 0; }
    .search-results { max-width: 800px; width: 100%; margin: 0 auto; overflow-y: auto; flex: 1; }
    .search-result { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: var(--radius-md); transition: all var(--transition-fast); margin-bottom: 8px; }
    .search-result:hover { background: var(--bg-card); }
    .search-result img { width: 60px; height: 80px; object-fit: cover; border-radius: var(--radius-sm); flex-shrink: 0; background: var(--bg-secondary); }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-info h4 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-result-info span { font-size: 0.85rem; color: var(--text-muted); }
    .search-loading, .search-empty, .search-error { text-align: center; padding: 40px; color: var(--text-secondary); }

    /* Anime Banner */
    .anime-banner {
      position: relative;
      width: 100%;
      height: 50vh;
      min-height: 300px;
      max-height: 500px;
      overflow: hidden;
      margin-top: var(--header-height);
      background: var(--bg-secondary);
    }

    .banner-bg {
      position: absolute; inset: 0;
    }
    .banner-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .banner-bg img.loaded { opacity: 1; }

    .banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, var(--bg-primary) 0%, rgba(10,10,15,0.8) 40%, rgba(10,10,15,0.4) 100%);
    }

    /* Anime Info Section */
    .anime-info-section {
      position: relative;
      margin-top: -100px;
      z-index: 10;
      padding-bottom: 40px;
    }

    .anime-info-grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 32px;
      align-items: start;
    }

    .anime-poster {
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
      aspect-ratio: 2/3;
      background: var(--bg-secondary);
    }
    .anime-poster img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .anime-poster img.loaded { opacity: 1; }

    .anime-details {
      padding-top: 20px;
    }

    .anime-title-main {
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .anime-title-jp {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .anime-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
    }

    .meta-badge.score { background: rgba(139, 92, 246, 0.2); border-color: rgba(139, 92, 246, 0.4); color: var(--accent-light); }
    .meta-badge.airing { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: var(--success); }
    .meta-badge.completed { background: rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.4); color: var(--warning); }
    .meta-badge.upcoming { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); color: #60a5fa; }

    .anime-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .genre-tag {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: var(--accent-light);
      transition: all var(--transition-fast);
    }
    .genre-tag:hover { background: rgba(139, 92, 246, 0.3); }

    .anime-synopsis {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 24px;
      max-width: 700px;
    }

    .anime-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .btn-watch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: white;
      padding: 12px 28px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.95rem;
      transition: all var(--transition-normal);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
    }
    .btn-watch:hover { background: var(--accent-glow); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139, 92, 246, 0.5); }

    .btn-trailer {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      padding: 12px 28px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.95rem;
      transition: all var(--transition-normal);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }
    .btn-trailer:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

    .anime-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      max-width: 600px;
    }

    .stat-item {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent-light);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Info Table */
    .info-table {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--glass-border);
    }

    .info-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 0.95rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Sections */
    .section {
      padding: 40px 0;
      border-top: 1px solid var(--glass-border);
    }

    .section-title {
      font-size: clamp(1.2rem, 2vw, 1.5rem);
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 10px var(--accent);
    }

    /* Episodes */
    .episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }

    .episode-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 16px 12px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .episode-card:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
    }

    .episode-number {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-light);
      margin-bottom: 4px;
    }

    .episode-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Characters */
    .characters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    .character-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all var(--transition-fast);
    }

    .character-card:hover {
      transform: translateY(-4px);
      border-color: rgba(139, 92, 246, 0.3);
    }

    .character-img {
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .character-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .character-img img.loaded { opacity: 1; }

    .character-info {
      padding: 12px;
    }
    .character-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .character-role {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Recommendations Slider */
    .slider-wrapper {
      position: relative;
      overflow: hidden;
    }

    .slider-container { overflow: hidden; position: relative; }

    .slider-track {
      display: flex;
      gap: 16px;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: grab;
      will-change: transform;
      padding: 8px 0;
    }
    .slider-track:active { cursor: grabbing; }

    .slide {
      flex: 0 0 auto;
      user-select: none;
    }

    .slider-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(255,255,255,0.1);
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition-normal);
      backdrop-filter: blur(10px);
      color: white;
    }
    .slider-arrow:hover { background: var(--accent); border-color: var(--accent); }
    .slider-arrow.prev { left: 0; }
    .slider-arrow.next { right: 0; }
    .slider-arrow.disabled { opacity: 0.3; pointer-events: none; }

    /* Anime Cards (reused from index) */
    .anime-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg-card);
      transition: all var(--transition-normal);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
      width: 180px;
    }
    .anime-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(139, 92, 246, 0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(139, 92, 246, 0.1);
    }
    .card-poster { position: relative; aspect-ratio: 2/3; overflow: hidden; background: var(--bg-secondary); }
    .card-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .anime-card:hover .card-poster img { transform: scale(1.1); }
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(10, 10, 15, 0.7);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity var(--transition-normal);
    }
    .anime-card:hover .card-overlay { opacity: 1; }
    .card-play {
      width: 56px; height: 56px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transform: scale(0.8);
      transition: all var(--transition-normal);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.5);
    }
    .anime-card:hover .card-play { transform: scale(1); }
    .card-play svg { width: 24px; height: 24px; fill: white; margin-left: 3px; }
    .card-badges {
      position: absolute; top: 8px; left: 8px; right: 8px;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px;
      pointer-events: none;
    }
    .badge-score {
      background: rgba(139, 92, 246, 0.9); color: white;
      padding: 3px 8px; border-radius: var(--radius-sm);
      font-size: 0.75rem; font-weight: 700;
    }
    .badge-ep {
      background: rgba(0,0,0,0.7); color: white;
      padding: 3px 8px; border-radius: var(--radius-sm);
      font-size: 0.75rem;
    }
    .badge-hd {
      background: rgba(16, 185, 129, 0.9); color: white;
      padding: 3px 8px; border-radius: var(--radius-sm);
      font-size: 0.75rem; font-weight: 600;
    }
    .card-info { padding: 12px; }
    .card-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text-primary); }
    .card-meta { display: flex; gap: 8px; font-size: 0.8rem; color: var(--text-muted); }

    /* Skeleton */
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1a1a2e 25%, #252542 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: var(--radius-md);
    }

    /* Trailer Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
      z-index: 4000; opacity: 0; visibility: hidden;
      transition: all var(--transition-normal);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content {
      width: 100%; max-width: 900px;
      aspect-ratio: 16/9;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
    }
    .modal-content iframe {
      width: 100%; height: 100%; border: none;
    }
    .modal-close {
      position: absolute; top: -40px; right: 0;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white;
      z-index: 10;
    }

    /* Empty/Error */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--glass-border);
      padding: clamp(24px, 4vw, 40px) clamp(16px, 4vw, 48px);
      margin-top: 40px;
      text-align: center;
    }
    .footer-content { max-width: 600px; margin: 0 auto; }
    .footer-credits { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; }
    .footer-copy { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 16px; }
    .footer-social { display: flex; justify-content: center; gap: 16px; }
    .footer-social a {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }

  <script>
    // ============================================
    // API UTILITIES
    // ============================================
    const CACHE_PREFIX = 'as_cache_';
    const CACHE_TTL = 30 * 60 * 1000;

    function getCache(key) {
      try {
        const item = localStorage.getItem(CACHE_PREFIX + key);
        if (!item) return null;
        const parsed = JSON.parse(item);
        if (Date.now() - parsed.timestamp > parsed.ttl) {
          localStorage.removeItem(CACHE_PREFIX + key);
          return null;
        }
        return parsed.data;
      } catch (e) { return null; }
    }

    function setCache(key, data, ttl = CACHE_TTL) {
      try {
        localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({ data, timestamp: Date.now(), ttl }));
      } catch (e) { console.warn('Cache save failed:', e); }
    }

    async function fetchWithRetry(url, options = {}, retries = 3, backoff = 1000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        clearTimeout(timeoutId);
        if (retries > 0) {
          await new Promise(r => setTimeout(r, backoff));
          return fetchWithRetry(url, options, retries - 1, backoff * 2);
        }
        throw error;
      }
    }

    let lastRequestTime = 0;
    async function rateLimitedFetch(url) {
      const now = Date.now();
      const elapsed = now - lastRequestTime;
      if (elapsed < 400) await new Promise(r => setTimeout(r, 400 - elapsed));
      lastRequestTime = Date.now();
      return fetchWithRetry(url);
    }

    async function fetchJikan(endpoint, cacheKey = null, cacheTtl = CACHE_TTL) {
      const url = `https://api.jikan.moe/v4${endpoint}`;
      if (cacheKey) {
        const cached = getCache(cacheKey);
        if (cached) return cached;
      }
      const data = await rateLimitedFetch(url);
      if (cacheKey && data) setCache(cacheKey, data, cacheTtl);
      return data;
    }

    // ============================================
    // URL PARAMS
    // ============================================
    function getUrlParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    const animeId = getUrlParam('id');
    if (!animeId) {
      window.location.href = './index.html';
    }

    // ============================================
    // UNIVERSAL SLIDER (simplified for this page)
    // ============================================
    class UniversalSlider {
      constructor(wrapperSelector, options = {}) {
        this.wrapper = document.querySelector(wrapperSelector);
        if (!this.wrapper || this.wrapper.dataset.sliderInit === 'true') return;
        this.wrapper.dataset.sliderInit = 'true';
        this.container = this.wrapper.querySelector('.slider-container');
        this.track = this.wrapper.querySelector('.slider-track');
        this.prevBtn = this.wrapper.querySelector('.slider-arrow.prev');
        this.nextBtn = this.wrapper.querySelector('.slider-arrow.next');
        this.options = { slidesToShow: options.slidesToShow || 6, slidesToScroll: options.slidesToScroll || 3, gap: options.gap || 16, ...options };
        this.currentIndex = 0;
        this.slideWidth = 0;
        this.totalSlides = 0;
        this.maxIndex = 0;
        this.init();
      }

      init() {
        this.bindEvents();
        this.calculateDimensions();
        this.updateArrows();
        this.resizeObserver = new ResizeObserver(() => {
          requestAnimationFrame(() => {
            this.calculateDimensions();
            this.goTo(this.currentIndex, false);
          });
        });
        this.resizeObserver.observe(this.wrapper);
      }

      bindEvents() {
        if (this.prevBtn) this.prevBtn.addEventListener('click', () => this.prev());
        if (this.nextBtn) this.nextBtn.addEventListener('click', () => this.next());
        let isDragging = false, startX = 0, scrollStart = 0;
        this.track.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; scrollStart = this.currentIndex; this.track.style.transition = 'none'; this.track.style.cursor = 'grabbing'; });
        this.track.addEventListener('mousemove', (e) => { if (!isDragging) return; const diff = startX - e.clientX; const slideFullWidth = this.slideWidth + this.options.gap; const newIndex = scrollStart + (diff / slideFullWidth); this.track.style.transform = `translateX(${-newIndex * slideFullWidth}px)`; });
        this.track.addEventListener('mouseup', () => { if (!isDragging) return; isDragging = false; this.track.style.cursor = 'grab'; const transform = getComputedStyle(this.track).transform; if (transform === 'none') return; const matrix = new DOMMatrix(transform); const currentX = Math.abs(matrix.m41); const slideFullWidth = this.slideWidth + this.options.gap; this.goTo(Math.round(currentX / slideFullWidth)); });
        this.track.addEventListener('mouseleave', () => { if (isDragging) { isDragging = false; this.track.style.cursor = 'grab'; this.goTo(this.currentIndex); } });
      }

      calculateDimensions() {
        const wrapperWidth = this.wrapper.clientWidth - 88;
        let slidesToShow = this.options.slidesToShow;
        const w = window.innerWidth;
        if (w < 480) slidesToShow = 2.2;
        else if (w < 640) slidesToShow = 2.5;
        else if (w < 768) slidesToShow = 3;
        else if (w < 1024) slidesToShow = 4;
        else if (w < 1280) slidesToShow = 5;
        else slidesToShow = 6;
        this.slideWidth = (wrapperWidth - (this.options.gap * (Math.floor(slidesToShow) - 1))) / slidesToShow;
        this.totalSlides = this.track.querySelectorAll('.slide').length;
        this.maxIndex = Math.max(0, this.totalSlides - Math.floor(slidesToShow));
        this.track.querySelectorAll('.slide').forEach(slide => { slide.style.flex = `0 0 ${this.slideWidth}px`; slide.style.maxWidth = `${this.slideWidth}px`; });
      }

      goTo(index, animate = true) {
        if (this.totalSlides === 0) return;
        if (index < 0) index = 0;
        if (index > this.maxIndex) index = this.maxIndex;
        this.currentIndex = index;
        const translateX = -index * (this.slideWidth + this.options.gap);
        this.track.style.transition = animate ? 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)' : 'none';
        this.track.style.transform = `translateX(${translateX}px)`;
        this.updateArrows();
      }

      next() { this.goTo(Math.min(this.currentIndex + this.options.slidesToScroll, this.maxIndex)); }
      prev() { this.goTo(Math.max(this.currentIndex - this.options.slidesToScroll, 0)); }

      updateArrows() {
        if (this.prevBtn) this.prevBtn.classList.toggle('disabled', this.currentIndex <= 0);
        if (this.nextBtn) this.nextBtn.classList.toggle('disabled', this.currentIndex >= this.maxIndex || this.totalSlides <= 1);
      }

      addSlides(slideElements) {
        slideElements.forEach(el => this.track.appendChild(el));
        this.totalSlides = this.track.querySelectorAll('.slide').length;
        this.calculateDimensions();
        this.updateArrows();
      }

      destroy() {
        if (this.resizeObserver) this.resizeObserver.disconnect();
        this.wrapper.dataset.sliderInit = 'false';
      }
    }

    // ============================================
    // PAGE LOAD
    // ============================================
    async function loadAnimeDetails() {
      try {
        const cacheKey = `anime_${animeId}`;
        let data = getCache(cacheKey);

        if (!data) {
          const response = await fetchJikan(`/anime/${animeId}`, cacheKey);
          data = response?.data;
        }

        if (!data) {
          document.getElementById('anime-info').innerHTML = '<div class="empty-state">Anime not found</div>';
          return;
        }

        renderAnimeInfo(data);
        loadEpisodes(data.mal_id, data.episodes);
        loadCharacters(data.mal_id);
        loadRecommendations(data.mal_id);

        // Update page title
        document.title = `${data.title_english || data.title} - AnimeStream`;
      } catch (error) {
        console.error('Failed to load anime:', error);
        document.getElementById('anime-info').innerHTML = '<div class="empty-state">Failed to load anime details. <button onclick="loadAnimeDetails()" style="margin-top:12px;padding:8px 20px;background:var(--accent);color:white;border-radius:var(--radius-md);">Retry</button></div>';
      }
    }

    function renderAnimeInfo(anime) {
      const bannerBg = document.getElementById('banner-bg');
      const image = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
      bannerBg.innerHTML = `<img src="${image}" alt="${anime.title}" class="loaded">`;

      const score = anime.score ? anime.score.toFixed(1) : 'N/A';
      const status = anime.status || 'Unknown';
      const statusClass = status.toLowerCase().includes('airing') ? 'airing' : status.toLowerCase().includes('complete') ? 'completed' : 'upcoming';
      const genres = (anime.genres || []).map(g => `<span class="genre-tag">${g.name}</span>`).join('');
      const studios = (anime.studios || []).map(s => s.name).join(', ') || 'Unknown';
      const producers = (anime.producers || []).map(p => p.name).join(', ') || 'Unknown';
      const licensors = (anime.licensors || []).map(l => l.name).join(', ') || 'Unknown';
      const aired = anime.aired?.string || 'Unknown';
      const duration = anime.duration || 'Unknown';
      const rating = anime.rating || 'Unknown';
      const rank = anime.rank ? `#${anime.rank}` : 'N/A';
      const popularity = anime.popularity ? `#${anime.popularity}` : 'N/A';
      const members = anime.members ? anime.members.toLocaleString() : 'N/A';
      const favorites = anime.favorites ? anime.favorites.toLocaleString() : 'N/A';
      const source = anime.source || 'Unknown';
      const episodes = anime.episodes || '?';

      const trailerUrl = anime.trailer?.embed_url || anime.trailer?.url || '';

      document.getElementById('anime-info').innerHTML = `
        <div class="anime-poster">
          <img src="${anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url}" alt="${anime.title}" class="loaded">
        </div>
        <div class="anime-details">
          <h1 class="anime-title-main">${anime.title_english || anime.title}</h1>
          ${anime.title_japanese ? `<p class="anime-title-jp">${anime.title_japanese}</p>` : ''}
          <div class="anime-meta-row">
            <span class="meta-badge score">★ ${score}</span>
            <span class="meta-badge ${statusClass}">${status}</span>
            <span class="meta-badge">${anime.type || 'TV'}</span>
            <span class="meta-badge">${episodes} EP</span>
          </div>
          <div class="anime-genres">${genres}</div>
          <p class="anime-synopsis">${anime.synopsis || 'No synopsis available.'}</p>
          <div class="anime-actions">
            <a href="./watch.html?id=${anime.mal_id}&ep=1" class="btn-watch">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              Watch Now
            </a>
            ${trailerUrl ? `<button class="btn-trailer" id="trailer-btn" data-url="${trailerUrl}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Trailer
            </button>` : ''}
          </div>
          <div class="anime-stats">
            <div class="stat-item"><div class="stat-value">${rank}</div><div class="stat-label">Rank</div></div>
            <div class="stat-item"><div class="stat-value">${popularity}</div><div class="stat-label">Popularity</div></div>
            <div class="stat-item"><div class="stat-value">${members}</div><div class="stat-label">Members</div></div>
            <div class="stat-item"><div class="stat-value">${favorites}</div><div class="stat-label">Favorites</div></div>
          </div>
          <div class="info-table">
            <div class="info-row"><span class="info-label">Aired</span><span class="info-value">${aired}</span></div>
            <div class="info-row"><span class="info-label">Duration</span><span class="info-value">${duration}</span></div>
            <div class="info-row"><span class="info-label">Rating</span><span class="info-value">${rating}</span></div>
            <div class="info-row"><span class="info-label">Source</span><span class="info-value">${source}</span></div>
            <div class="info-row"><span class="info-label">Studios</span><span class="info-value">${studios}</span></div>
            <div class="info-row"><span class="info-label">Producers</span><span class="info-value">${producers}</span></div>
          </div>
        </div>
      `;

      // Trailer button
      const trailerBtn = document.getElementById('trailer-btn');
      if (trailerBtn) {
        trailerBtn.addEventListener('click', () => {
          const modal = document.getElementById('trailer-modal');
          const iframe = document.getElementById('trailer-iframe');
          iframe.src = trailerBtn.dataset.url;
          modal.classList.add('active');
          document.body.style.overflow = 'hidden';
        });
      }
    }

    async function loadEpisodes(id, totalEpisodes) {
      const grid = document.getElementById('episodes-grid');
      const total = totalEpisodes || 24;

      // Generate episode cards (since Jikan episodes endpoint is often limited)
      grid.innerHTML = '';
      for (let i = 1; i <= Math.min(total, 100); i++) {
        const card = document.createElement('a');
        card.href = `./watch.html?id=${id}&ep=${i}`;
        card.className = 'episode-card';
        card.innerHTML = `<div class="episode-number">${i}</div><div class="episode-label">EP</div>`;
        grid.appendChild(card);
      }

      // Try to fetch real episode data
      try {
        const data = await fetchJikan(`/anime/${id}/episodes`, `episodes_${id}`, 60 * 60 * 1000);
        const episodes = data?.data || [];
        if (episodes.length > 0) {
          grid.innerHTML = '';
          episodes.forEach(ep => {
            const card = document.createElement('a');
            card.href = `./watch.html?id=${id}&ep=${ep.mal_id}`;
            card.className = 'episode-card';
            card.title = ep.title || `Episode ${ep.mal_id}`;
            card.innerHTML = `<div class="episode-number">${ep.mal_id}</div><div class="episode-label" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;">${ep.title || 'EP'}</div>`;
            grid.appendChild(card);
          });
        }
      } catch (e) {
        console.log('Episode fetch failed, using generated list');
      }
    }

    async function loadCharacters(id) {
      const grid = document.getElementById('characters-grid');
      try {
        const data = await fetchJikan(`/anime/${id}/characters`, `chars_${id}`);
        const chars = data?.data || [];

        if (chars.length === 0) {
          grid.innerHTML = '<div class="empty-state">No character data available</div>';
          return;
        }

        grid.innerHTML = chars.slice(0, 12).map(char => {
          const c = char.character;
          return `
            <div class="character-card">
              <div class="character-img">
                <img src="${c.images?.jpg?.image_url || ''}" alt="${c.name}" loading="lazy" class="loaded">
              </div>
              <div class="character-info">
                <div class="character-name">${c.name}</div>
                <div class="character-role">${char.role || 'Supporting'}</div>
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        grid.innerHTML = '<div class="empty-state">Failed to load characters</div>';
      }
    }

    async function loadRecommendations(id) {
      const track = document.getElementById('rec-track');
      try {
        const data = await fetchJikan(`/anime/${id}/recommendations`, `recs_${id}`);
        const recs = data?.data || [];

        if (recs.length === 0) {
          document.getElementById('recommendations-section').style.display = 'none';
          return;
        }

        track.innerHTML = '';
        const slides = recs.slice(0, 12).map(rec => {
          const anime = rec.entry;
          const div = document.createElement('div');
          div.className = 'slide';
          div.innerHTML = `
            <div class="anime-card" data-id="${anime.mal_id}" style="width:180px;">
              <div class="card-poster">
                <img src="${anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url}" alt="${anime.title}" loading="lazy">
                <div class="card-overlay"><div class="card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
              </div>
              <div class="card-info">
                <h4 class="card-title">${anime.title}</h4>
              </div>
            </div>
          `;
          return div;
        });

        requestAnimationFrame(() => {
          const slider = new UniversalSlider('#rec-wrapper', { slidesToShow: 6, slidesToScroll: 3, gap: 16 });
          slider.addSlides(slides);
        });
      } catch (error) {
        document.getElementById('recommendations-section').style.display = 'none';
      }
    }

    // ============================================
    // UI COMPONENTS
    // ============================================
    class SearchOverlay {
      constructor() {
        this.overlay = document.getElementById('search-overlay');
        this.input = document.getElementById('search-input');
        this.results = document.getElementById('search-results');
        this.openBtn = document.getElementById('search-toggle');
        this.closeBtn = document.getElementById('search-close');
        this.debounceTimer = null;
        this.init();
      }
      init() {
        this.openBtn.addEventListener('click', () => this.open());
        this.closeBtn.addEventListener('click', () => this.close());
        document.addEventListener('keydown', (e) => {
          if (e.key === '/' && !this.isOpen() && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); this.open(); }
          if (e.key === 'Escape' && this.isOpen()) this.close();
        });
        this.input.addEventListener('input', (e) => {
          clearTimeout(this.debounceTimer);
          this.debounceTimer = setTimeout(() => this.search(e.target.value), 300);
        });
      }
      isOpen() { return this.overlay.classList.contains('active'); }
      open() { this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; setTimeout(() => this.input.focus(), 100); }
      close() { this.overlay.classList.remove('active'); document.body.style.overflow = ''; this.input.value = ''; this.results.innerHTML = ''; }
      async search(query) {
        if (!query || query.length < 2) { this.results.innerHTML = ''; return; }
        this.results.innerHTML = '<div class="search-loading">Searching...</div>';
        try {
          const data = await fetchJikan(`/anime?q=${encodeURIComponent(query)}&limit=8&order_by=popularity&sort=asc`, null, 0);
          const items = data?.data || [];
          if (items.length === 0) { this.results.innerHTML = '<div class="search-empty">No results found</div>'; return; }
          this.results.innerHTML = items.map(anime => `
            <a href="./anime.html?id=${anime.mal_id}" class="search-result">
              <img src="${anime.images?.jpg?.small_image_url || ''}" alt="${anime.title}" loading="lazy">
              <div class="search-result-info"><h4>${anime.title_english || anime.title}</h4><span>${anime.type || 'TV'} • ${anime.score ? anime.score + ' ★' : 'N/A'}</span></div>
            </a>
          `).join('');
        } catch (error) { this.results.innerHTML = '<div class="search-error">Search failed. Please try again.</div>'; }
      }
    }

    class MobileSidebar {
      constructor() {
        this.sidebar = document.getElementById('mobile-sidebar');
        this.toggle = document.getElementById('menu-toggle');
        this.close = document.getElementById('sidebar-close');
        this.backdrop = document.getElementById('sidebar-backdrop');
        this.init();
      }
      init() {
        this.toggle.addEventListener('click', () => this.open());
        this.close.addEventListener('click', () => this.closeSidebar());
        this.backdrop.addEventListener('click', () => this.closeSidebar());
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && this.isOpen()) this.closeSidebar(); });
      }
      isOpen() { return this.sidebar.classList.contains('active'); }
      open() { this.sidebar.classList.add('active'); this.backdrop.classList.add('active'); document.body.style.overflow = 'hidden'; }
      closeSidebar() { this.sidebar.classList.remove('active'); this.backdrop.classList.remove('active'); document.body.style.overflow = ''; }
    }

    // Trailer modal close
    document.getElementById('modal-close').addEventListener('click', () => {
      const modal = document.getElementById('trailer-modal');
      const iframe = document.getElementById('trailer-iframe');
      modal.classList.remove('active');
      iframe.src = '';
      document.body.style.overflow = '';
    });

    document.getElementById('trailer-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById('modal-close').click();
      }
    });

    // Card clicks
    document.addEventListener('click', (e) => {
      const card = e.target.closest('.anime-card');
      if (!card) return;
      const playBtn = e.target.closest('.card-play');
      if (playBtn) { e.stopPropagation(); const id = card.dataset.id; if (id) window.location.href = `./watch.html?id=${id}&ep=1`; return; }
      const id = card.dataset.id;
      if (id) window.location.href = `./anime.html?id=${id}`;
    });

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      new SearchOverlay();
      new MobileSidebar();
      loadAnimeDetails();
    });
  </script>
</body>
