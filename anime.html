<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Anime Details - AniVerse</title>
<meta name="description" content="Anime details, episodes, characters and more.">
<style>
:root {
  --bg-primary: #060610;
  --bg-secondary: #0d0d20;
  --bg-card: #111128;
  --bg-card-hover: #16163a;
  --accent: #7c3aed;
  --accent-bright: #9d5bff;
  --accent-glow: rgba(124, 58, 237, 0.4);
  --accent-secondary: #e040fb;
  --text-primary: #f0f0ff;
  --text-secondary: #9090c0;
  --text-muted: #5050a0;
  --border: rgba(124, 58, 237, 0.2);
  --border-bright: rgba(124, 58, 237, 0.5);
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.06);
  --header-h: 64px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-card: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px var(--accent-glow);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; max-width: 100%; scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  max-width: 100%;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; outline: none; background: none; font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

/* HEADER */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h); z-index: 1000;
  display: flex; align-items: center;
  padding: 0 clamp(12px, 3vw, 24px); gap: 12px;
  background: rgba(6, 6, 16, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  max-width: 100%;
}
.logo { display: flex; align-items: center; gap: 8px; font-size: clamp(16px, 2.5vw, 22px); font-weight: 800; white-space: nowrap; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-secondary)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.logo span { color: var(--accent-bright); }
.header-spacer { flex: 1; }
.icon-btn { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 18px; transition: all 0.2s; flex-shrink: 0; }
.icon-btn:hover { color: var(--text-primary); background: var(--glass-border); }
.hamburger { display: flex; flex-direction: column; gap: 5px; padding: 8px; border-radius: 8px; transition: background 0.2s; }
.hamburger:hover { background: var(--glass-border); }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--text-primary); border-radius: 2px; }
.header-nav { display: flex; align-items: center; gap: clamp(4px, 1.5vw, 20px); margin-left: clamp(8px, 2vw, 24px); }
.header-nav a { font-size: clamp(12px, 1.2vw, 14px); color: var(--text-secondary); font-weight: 500; padding: 4px 8px; border-radius: 6px; transition: color 0.2s; white-space: nowrap; }
.header-nav a:hover { color: var(--text-primary); }
@media(max-width:768px) { .header-nav { display: none; } }

/* SIDEBAR */
#sidebar { position: fixed; top: 0; left: -280px; width: min(280px, 85vw); height: 100%; z-index: 1500; background: var(--bg-secondary); border-right: 1px solid var(--border); transition: left 0.35s; padding: 80px 20px 20px; overflow-y: auto; }
#sidebar.open { left: 0; }
#sidebar-overlay { position: fixed; inset: 0; z-index: 1400; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
#sidebar-overlay.open { opacity: 1; pointer-events: all; }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
.sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-secondary); font-size: 15px; transition: all 0.2s; }
.sidebar-nav a:hover { color: var(--text-primary); background: var(--glass-border); }

/* SEARCH OVERLAY */
#search-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(6,6,16,0.95); backdrop-filter: blur(24px); display: flex; flex-direction: column; align-items: center; padding: clamp(60px,10vh,100px) clamp(12px,5vw,40px) 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; overflow-y: auto; overflow-x: hidden; max-width: 100vw; }
#search-overlay.open { opacity: 1; pointer-events: all; }
.search-close { position: absolute; top: 16px; right: 16px; width: 44px; height: 44px; border-radius: 50%; background: var(--glass-border); color: var(--text-secondary); font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.search-close:hover { background: var(--accent); color: white; }
.search-box-wrap { width: 100%; max-width: min(700px, calc(100vw - 24px)); position: relative; margin-bottom: 24px; }
.search-input-main { width: 100%; max-width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid var(--border-bright); border-radius: 16px; padding: clamp(12px,2vw,18px) clamp(16px,3vw,24px); padding-right: 56px; font-size: clamp(16px,2.5vw,20px); color: var(--text-primary); outline: none; font-family: inherit; box-sizing: border-box; }
.search-input-main:focus { border-color: var(--accent-bright); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-input-main::placeholder { color: var(--text-muted); }
.search-go-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 10px; background: var(--accent); color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.search-go-btn:hover { background: var(--accent-bright); }
#search-suggestions { width: 100%; max-width: min(700px, calc(100vw - 24px)); display: grid; grid-template-columns: repeat(auto-fill, minmax(min(160px, 45vw), 1fr)); gap: 12px; max-height: 60vh; overflow-y: auto; overflow-x: hidden; }
.sugg-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.2s; }
.sugg-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.sugg-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
.sugg-info { padding: 8px; }
.sugg-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sugg-score { font-size: 11px; color: var(--accent-bright); margin-top: 2px; }

/* SKELETON */
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%); background-size: 800px 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }

/* MAIN WRAPPER */
.page-wrap { max-width: 100%; overflow-x: hidden; }

/* BANNER */
.detail-banner {
  position: relative;
  width: 100%;
  height: clamp(200px, 35vw, 420px);
  overflow: hidden;
  margin-top: var(--header-h);
}
.banner-img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 20%;
  filter: brightness(0.4);
}
.banner-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, var(--bg-primary) 0%, rgba(6,6,16,0.3) 60%, transparent 100%);
}
.banner-skeleton { width: 100%; height: 100%; }

/* DETAIL MAIN */
.detail-main {
  padding: clamp(16px, 3vw, 40px);
  max-width: min(1200px, 100%);
  margin: 0 auto;
  overflow-x: hidden;
}

/* TOP SECTION — poster + info */
.detail-top {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(16px, 3vw, 36px);
  margin-top: clamp(-80px, -8vw, -120px);
  position: relative;
  z-index: 2;
  align-items: flex-end;
}

.detail-poster-wrap {
  flex: 0 0 clamp(120px, 18vw, 200px);
  width: clamp(120px, 18vw, 200px);
  max-width: 200px;
}
.detail-poster {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  border-radius: var(--radius);
  box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 30px var(--accent-glow);
  border: 2px solid var(--border-bright);
}
.poster-skeleton { width: 100%; aspect-ratio: 3/4; }

.detail-info {
  flex: 1;
  min-width: 0;
  padding-bottom: 8px;
}
.detail-title {
  font-size: clamp(20px, 4vw, 40px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.5px;
  word-break: break-word;
  margin-bottom: 8px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.detail-alt-title {
  font-size: clamp(12px, 1.5vw, 15px);
  color: var(--text-secondary);
  margin-bottom: 16px;
  word-break: break-word;
}

.detail-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 600;
  white-space: nowrap;
}
.sc-score { background: rgba(250,200,0,0.15); color: #fac800; border: 1px solid rgba(250,200,0,0.3); }
.sc-rank { background: rgba(64,224,208,0.1); color: #40e0d0; border: 1px solid rgba(64,224,208,0.3); }
.sc-type { background: rgba(124,58,237,0.15); color: var(--accent-bright); border: 1px solid var(--border-bright); }
.sc-status { background: rgba(50,205,50,0.1); color: #32cd32; border: 1px solid rgba(50,205,50,0.3); }
.sc-year { background: var(--glass-border); color: var(--text-secondary); border: 1px solid var(--border); }

.genres-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}
.genre-tag {
  padding: 4px 12px;
  background: rgba(124,58,237,0.1);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.genre-tag:hover { background: var(--accent); border-color: var(--accent); color: white; }

.action-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: clamp(10px,1.5vw,14px) clamp(20px,3vw,28px);
  background: linear-gradient(135deg, var(--accent), #5b1fd4);
  border-radius: 50px;
  font-size: clamp(13px,1.3vw,15px);
  font-weight: 700; color: white;
  transition: all 0.3s;
  box-shadow: 0 4px 20px var(--accent-glow);
  white-space: nowrap;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: clamp(10px,1.5vw,14px) clamp(20px,3vw,28px);
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 50px;
  font-size: clamp(13px,1.3vw,15px);
  font-weight: 600; color: var(--text-primary);
  transition: all 0.3s;
  white-space: nowrap;
}
.btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

/* DETAIL BODY */
.detail-body {
  display: grid;
  grid-template-columns: 1fr clamp(220px, 28%, 320px);
  gap: clamp(16px, 3vw, 32px);
  margin-top: clamp(24px, 4vw, 40px);
  overflow-x: hidden;
  max-width: 100%;
}
@media (max-width: 900px) {
  .detail-body { grid-template-columns: 1fr; }
}

/* SYNOPSIS */
.section-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: clamp(16px, 2.5vw, 24px);
  margin-bottom: clamp(16px, 2vw, 24px);
  overflow: hidden;
  max-width: 100%;
}
.block-title {
  font-size: clamp(14px, 1.8vw, 18px);
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.block-title::before {
  content: '';
  display: block;
  width: 3px; height: 18px;
  background: linear-gradient(to bottom, var(--accent), var(--accent-secondary));
  border-radius: 2px;
  flex-shrink: 0;
}

.synopsis-text {
  font-size: clamp(13px, 1.4vw, 15px);
  color: var(--text-secondary);
  line-height: 1.7;
  word-break: break-word;
}
.synopsis-text.clamped {
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.read-more-btn {
  color: var(--accent-bright);
  font-size: 13px;
  font-weight: 600;
  margin-top: 8px;
  padding: 0;
  background: none;
  cursor: pointer;
  border: none;
}
.read-more-btn:hover { text-decoration: underline; }

/* TRAILER */
.trailer-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--radius);
  overflow: hidden;
  background: #000;
  max-width: 100%;
}
.trailer-wrap iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
}

/* EPISODES */
.episode-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(60px, 18%), 1fr));
  gap: 8px;
  max-height: 300px;
  overflow-y: auto;
  overflow-x: hidden;
}
.ep-btn {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 0;
}
.ep-btn:hover, .ep-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: var(--shadow-glow);
}

/* INFO TABLE */
.info-table {
  width: 100%;
  border-collapse: collapse;
  overflow: hidden;
}
.info-table tr { border-bottom: 1px solid var(--border); }
.info-table tr:last-child { border-bottom: none; }
.info-table td {
  padding: 8px 4px;
  font-size: clamp(12px, 1.3vw, 14px);
  vertical-align: top;
}
.info-table td:first-child {
  color: var(--text-muted);
  font-weight: 600;
  width: 40%;
  white-space: nowrap;
  padding-right: 12px;
}
.info-table td:last-child {
  color: var(--text-secondary);
  word-break: break-word;
}

/* CHARACTERS */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(140px, 42vw), 1fr));
  gap: 12px;
  max-width: 100%;
  overflow-x: hidden;
}
.char-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: all 0.2s;
}
.char-card:hover { border-color: var(--accent); transform: translateY(-3px); }
.char-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; }
.char-name { padding: 8px; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-role { font-size: 10px; color: var(--text-muted); padding: 0 8px 8px; }

/* RECOMMENDATION SLIDER */
.rec-track {
  display: flex; gap: 12px;
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
  max-width: 100%;
}
.rec-track::-webkit-scrollbar { display: none; }
.rec-card {
  flex: 0 0 clamp(110px, 13vw, 150px);
  width: clamp(110px, 13vw, 150px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  max-width: 150px;
}
.rec-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--shadow-glow); }
.rec-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
.rec-card-title { padding: 8px; font-size: 11px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* FOOTER */
footer { border-top: 1px solid var(--border); padding: 24px clamp(16px,3vw,32px); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; background: var(--bg-secondary); }
.footer-credits { font-size: 13px; color: var(--text-muted); }
.footer-credits span { color: var(--accent-bright); }
.footer-socials { display: flex; gap: 12px; }
.footer-socials a { width: 36px; height: 36px; border-radius: 8px; background: var(--glass-border); border: 1px solid var(--border); color: var(--text-secondary); font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.footer-socials a:hover { background: var(--accent); color: white; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.5s ease forwards; }

/* LOADING STATE */
#detail-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
  color: var(--text-muted);
}
.spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
  gap: 16px;
  color: var(--text-muted);
  text-align: center;
  padding: 40px 20px;
}
.error-page h2 { font-size: 24px; color: var(--text-primary); }
.error-page p { font-size: 14px; max-width: 400px; }
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
    <button class="hamburger" id="hamburger-btn" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="logo">
      <div class="logo-icon">⚡</div>Ani<span>Verse</span>
    </a>
  </div>
  <nav class="header-nav">
    <a href="index.html">Home</a>
    <a href="search.html">Browse</a>
    <a href="schedule.html">Schedule</a>
  </nav>
  <div class="header-spacer"></div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <button class="icon-btn" id="search-open-btn" aria-label="Search">🔍</button>
  </div>
</header>

<div id="sidebar-overlay"></div>
<nav id="sidebar">
  <div class="sidebar-nav">
    <a href="index.html">🏠 Home</a>
    <a href="search.html">🔍 Browse</a>
    <a href="schedule.html">📅 Schedule</a>
    <a href="creator.html">👤 About</a>
  </div>

  <button class="search-close" id="search-close-btn">✕</button>
  <div class="search-box-wrap">
    <input type="search" class="search-input-main" id="search-input-main" placeholder="Search anime..." autocomplete="off">
    <button class="search-go-btn" id="search-go-btn">→</button>
  </div>

    <div class="spinner"></div>
    <span>Loading anime details…</span>
  </div>
</div>

<footer>
  <div class="footer-credits">© 2025 <span>AniVerse</span> — Powered by Jikan API.</div>
  <div class="footer-socials">
    <a href="creator.html">✦</a>
    <a href="https://github.com" target="_blank" rel="noopener">⌥</a>
  </div>
</footer>

<script>
'use strict';

const API_BASE = 'https://api.jikan.moe/v4';
const CACHE_TTL = 15 * 60 * 1000;

const Cache = {
  get(key) {
    try {
      const raw = localStorage.getItem('av_' + key);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem('av_' + key); return null; }
      return data;
    } catch { return null; }
  },
  set(key, data) {
    try { localStorage.setItem('av_' + key, JSON.stringify({ ts: Date.now(), data })); } catch {}
  }
};

async function apiFetch(endpoint) {
  const key = 'anf_' + endpoint;
  const cached = Cache.get(key);
  if (cached) return cached;
  let lastErr;
  for (let i = 0; i < 3; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 1500 * i));
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 12000);
      const res = await fetch(API_BASE + endpoint, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      const data = json?.data ?? json ?? null;
      if (data) Cache.set(key, data);
      return data;
    } catch (e) { lastErr = e; }
  }
  return null;
}

function getIdFromURL() {
  return new URLSearchParams(window.location.search).get('id');
}

async function loadAnimeDetail() {
  const id = getIdFromURL();
  const wrap = document.getElementById('page-wrap');

  if (!id) {
    wrap.innerHTML = `<div class="error-page"><h2>No Anime Found</h2><p>Invalid or missing anime ID.</p><a href="index.html" class="btn-primary" style="margin-top:16px">← Back Home</a></div>`;
    return;
  }

  // Fetch in parallel
  const [anime, chars, recs] = await Promise.allSettled([
    apiFetch(`/anime/${id}/full`),
    apiFetch(`/anime/${id}/characters`),
    apiFetch(`/anime/${id}/recommendations`)
  ]);

  const data = anime.status === 'fulfilled' ? anime.value : null;

  if (!data) {
    wrap.innerHTML = `<div class="error-page"><h2>Failed to Load</h2><p>Could not load anime details. Please try again.</p><a href="index.html" class="btn-primary" style="margin-top:16px">← Back Home</a></div>`;
    return;
  }

  document.title = `${data.title_english || data.title || 'Anime'} - AniVerse`;

  const charData = chars.status === 'fulfilled' ? (chars.value || []) : [];
  const recData = recs.status === 'fulfilled' ? (recs.value || []) : [];

  const banner = data.images?.jpg?.large_image_url || data.images?.jpg?.image_url || '';
  const poster = data.images?.jpg?.large_image_url || data.images?.jpg?.image_url || '';
  const title = data.title_english || data.title || 'Unknown';
  const altTitle = data.title !== data.title_english ? (data.title || '') : '';
  const synopsis = data.synopsis || 'No synopsis available.';
  const score = data.score ? `★ ${data.score.toFixed(1)}` : 'N/A';
  const rank = data.rank ? `#${data.rank}` : 'N/A';
  const type = data.type || 'TV';
  const status = data.status || 'Unknown';
  const episodes = data.episodes || '?';
  const year = data.year || (data.aired?.from ? new Date(data.aired.from).getFullYear() : '');
  const genres = (data.genres || []).map(g => g.name);
  const studios = (data.studios || []).map(s => s.name).join(', ') || 'N/A';
  const duration = data.duration || 'N/A';
  const rating = data.rating || 'N/A';
  const source = data.source || 'N/A';
  const popularity = data.popularity ? `#${data.popularity}` : 'N/A';
  const airedStr = data.aired?.string || 'N/A';
  const trailerYt = data.trailer?.youtube_id;
  const totalEps = parseInt(data.episodes) || 0;

  // Build episode buttons
  const epBtns = totalEps > 0
    ? Array.from({ length: Math.min(totalEps, 200) }, (_, i) => i + 1).map(ep =>
        `<button class="ep-btn" data-ep="${ep}" onclick="goWatch(${id},${ep})">${ep}</button>`
      ).join('')
    : `<div style="color:var(--text-muted);font-size:13px;padding:12px 0">Episode list not available</div>`;

  // Characters
  const charCards = charData.slice(0, 12).map(c => {
    const ch = c.character || {};
    const img = ch.images?.jpg?.image_url || ch.images?.webp?.image_url || '';
    const name = ch.name || 'Unknown';
    const role = c.role || '';
    return `
      <div class="char-card">
        ${img ? `<img class="char-img" src="${img}" alt="${name}" loading="lazy" onerror="this.style.display='none'">` : '<div style="aspect-ratio:3/4;background:var(--bg-card)"></div>'}
        <div class="char-name">${name}</div>
        <div class="char-role">${role}</div>
      </div>`;
  }).join('');

  // Recommendations
  const recCards = recData.slice(0, 16).map(r => {
    const entry = r.entry || {};
    const rid = entry.mal_id || 0;
    const rtitle = (entry.title || 'Unknown').replace(/"/g,'&quot;');
    const rimg = entry.images?.jpg?.image_url || '';
    return `
      <div class="rec-card" onclick="goAnime(${rid})" title="${rtitle}">
        ${rimg ? `<img src="${rimg}" alt="${rtitle}" loading="lazy" onerror="this.style.display='none'">` : ''}
        <div class="rec-card-title">${rtitle}</div>
      </div>`;
  }).join('');

  wrap.innerHTML = `
    <section class="detail-banner">
      ${banner ? `<img class="banner-img" src="${banner}" alt="${title}" loading="lazy">` : `<div class="banner-img" style="background:var(--bg-secondary)"></div>`}
      <div class="banner-overlay"></div>
    </section>

    <div class="detail-main fade-in">
      <div class="detail-top">
        <div class="detail-poster-wrap">
          ${poster ? `<img class="detail-poster" src="${poster}" alt="${title}">` : ''}
        </div>
        <div class="detail-info">
          <h1 class="detail-title">${title}</h1>
          ${altTitle ? `<div class="detail-alt-title">${altTitle}</div>` : ''}
          <div class="detail-stats">
            <span class="stat-chip sc-score">${score}</span>
            <span class="stat-chip sc-rank">Rank ${rank}</span>
            <span class="stat-chip sc-type">${type}</span>
            <span class="stat-chip sc-status">${status}</span>
            ${year ? `<span class="stat-chip sc-year">${year}</span>` : ''}
          </div>
          <div class="genres-row">
            ${genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
          </div>
          <div class="action-btns">
            <a class="btn-primary" href="watch.html?id=${id}&ep=1">▶ Watch EP 1</a>
            <a class="btn-secondary" href="search.html?filter=bypopularity">Browse More</a>
          </div>
        </div>
      </div>

      <div class="detail-body">
        <!-- LEFT COLUMN -->
        <div>
          <!-- Synopsis -->
          <div class="section-block">
            <div class="block-title">Synopsis</div>
            <div class="synopsis-text clamped" id="synopsis-text">${synopsis}</div>
            <button class="read-more-btn" id="read-more-btn">Read More ▾</button>
          </div>

          <!-- Episodes -->
          <div class="section-block">
            <div class="block-title">Episodes <span style="color:var(--text-muted);font-weight:400;font-size:13px">(${episodes} total)</span></div>
            <div class="episode-list" id="ep-list">${epBtns}</div>
          </div>

          <!-- Characters -->
          ${charCards ? `
          <div class="section-block">
            <div class="block-title">Characters</div>
            <div class="char-grid">${charCards}</div>
          </div>` : ''}

          <!-- Recommendations -->
          ${recCards ? `
          <div class="section-block">
            <div class="block-title">Recommendations</div>
            <div class="rec-track">${recCards}</div>
          </div>` : ''}

          <!-- Trailer -->
          ${trailerYt ? `
          <div class="section-block">
            <div class="block-title">Trailer</div>
            <div class="trailer-wrap">
              <iframe src="https://www.youtube.com/embed/${trailerYt}" allowfullscreen allow="autoplay; encrypted-media" title="Anime trailer" loading="lazy"></iframe>
            </div>
          </div>` : ''}
        </div>

        <!-- RIGHT COLUMN — Info -->
        <div>
          <div class="section-block">
            <div class="block-title">Information</div>
            <table class="info-table">
              <tr><td>Type</td><td>${type}</td></tr>
              <tr><td>Episodes</td><td>${episodes}</td></tr>
              <tr><td>Status</td><td>${status}</td></tr>
              <tr><td>Aired</td><td>${airedStr}</td></tr>
              <tr><td>Studios</td><td>${studios}</td></tr>
              <tr><td>Source</td><td>${source}</td></tr>
              <tr><td>Duration</td><td>${duration}</td></tr>
              <tr><td>Rating</td><td>${rating}</td></tr>
              <tr><td>Score</td><td>${score}</td></tr>
              <tr><td>Rank</td><td>${rank}</td></tr>
              <tr><td>Popularity</td><td>${popularity}</td></tr>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;

  // Synopsis toggle
  const synEl = document.getElementById('synopsis-text');
  const rmBtn = document.getElementById('read-more-btn');
  if (rmBtn && synEl) {
    rmBtn.addEventListener('click', () => {
      const expanded = synEl.classList.toggle('clamped');
      rmBtn.textContent = expanded ? 'Read Less ▴' : 'Read More ▾';
      // Toggle direction was backwards, fix:
      if (!synEl.classList.contains('clamped')) {
        rmBtn.textContent = 'Read Less ▴';
      } else {
        rmBtn.textContent = 'Read More ▾';
      }
    });
  }
}

function goWatch(id, ep) {
  window.location.href = `watch.html?id=${id}&ep=${ep}`;
}
function goAnime(id) {
  window.location.href = `anime.html?id=${id}`;
}

// Header/sidebar/search — shared logic
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const hamburger = document.getElementById('hamburger-btn');
const searchOverlay = document.getElementById('search-overlay');
const searchInput = document.getElementById('search-input-main');
const searchSugg = document.getElementById('search-suggestions');

function openSidebar() { sidebar?.classList.add('open'); sidebarOverlay?.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeSidebar() { sidebar?.classList.remove('open'); sidebarOverlay?.classList.remove('open'); document.body.style.overflow = ''; }
hamburger?.addEventListener('click', () => sidebar?.classList.contains('open') ? closeSidebar() : openSidebar());
sidebarOverlay?.addEventListener('click', closeSidebar);

function openSearch() { searchOverlay?.classList.add('open'); document.body.style.overflow = 'hidden'; setTimeout(() => searchInput?.focus(), 100); }
function closeSearch() { searchOverlay?.classList.remove('open'); document.body.style.overflow = ''; if (searchInput) searchInput.value = ''; if (searchSugg) searchSugg.innerHTML = ''; }
document.getElementById('search-open-btn')?.addEventListener('click', openSearch);
document.getElementById('search-close-btn')?.addEventListener('click', closeSearch);
document.getElementById('search-go-btn')?.addEventListener('click', () => { const q = searchInput?.value?.trim(); if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`; });
searchOverlay?.addEventListener('click', e => { if (e.target === searchOverlay) closeSearch(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { if (searchOverlay?.classList.contains('open')) closeSearch(); else if (sidebar?.classList.contains('open')) closeSidebar(); }
});

let st = null;
searchInput?.addEventListener('input', e => {
  clearTimeout(st);
  const q = e.target.value.trim();
  if (!q || q.length < 2) { searchSugg.innerHTML = ''; return; }
  st = setTimeout(async () => {
    const data = await apiFetch(`/anime?q=${encodeURIComponent(q)}&limit=10&sfw=true`);
    if (!data) return;
    searchSugg.innerHTML = data.map(a => {
      const aid = a.mal_id;
      const at = (a.title_english || a.title || '').replace(/"/g,'&quot;');
      const img = a.images?.jpg?.image_url || '';
      return `<div class="sugg-card" onclick="window.location.href='anime.html?id=${aid}'" tabindex="0"><img src="${img}" alt="${at}" loading="lazy" onerror="this.style.display='none'"><div class="sugg-info"><div class="sugg-title">${at}</div>${a.score ? `<div class="sugg-score">★ ${a.score.toFixed(1)}</div>` : ''}</div></div>`;
    }).join('');
  }, 350);
});
searchInput?.addEventListener('keydown', e => { if (e.key === 'Enter') { const q = searchInput.value.trim(); if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`; } });

document.addEventListener('DOMContentLoaded', loadAnimeDetail);
</script>
</body>
</html>
