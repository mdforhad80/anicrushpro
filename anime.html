<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anime Details - Watch complete information about your favorite anime">
    <title>Anime Details - AnimeHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0a0e27;
            --secondary-bg: #1a1f3a;
            --tertiary-bg: #252d47;
            --primary-color: #7c3aed;
            --secondary-color: #a855f7;
            --accent-color: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #b0b3c1;
            --border-color: #2d3748;
            --success-color: #10b981;
            --error-color: #ef4444;
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ==================== HEADER ==================== */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95) 0%, rgba(26, 31, 58, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .header-container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 0 clamp(1rem, 5vw, 3rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav-right {
            display: flex;
            gap: 1.5rem;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .icon-btn:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        /* ==================== ANIME DETAILS SECTION ==================== */
        .details-banner {
            position: relative;
            height: 400px;
            margin-top: 4rem;
            overflow: hidden;
        }

        .banner-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) contrast(1.2);
        }

        .banner-overlay {
            position: relative;
            z-index: 2;
            height: 100%;
            background: linear-gradient(135deg, transparent 0%, rgba(10, 14, 39, 0.95) 100%);
            display: flex;
            align-items: flex-end;
            padding: clamp(2rem, 5vw, 4rem);
        }

        .anime-header {
            display: flex;
            gap: clamp(1.5rem, 5vw, 3rem);
            max-width: 1920px;
            width: 100%;
            margin: 0 auto;
        }

        .anime-poster {
            width: clamp(120px, 20vw, 250px);
            aspect-ratio: 2/3;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4);
        }

        .anime-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 1rem;
        }

        .anime-title {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
        }

        .anime-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: var(--secondary-bg);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 600;
            font-size: 1rem;
        }

        /* ==================== DETAILS CONTENT ==================== */
        .details-container {
            max-width: 1920px;
            margin: 0 auto;
            padding: clamp(2rem, 5vw, 4rem);
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 3rem;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .content-section {
            border-radius: 12px;
            background: var(--secondary-bg);
            padding: clamp(1.5rem, 3vw, 2.5rem);
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .section-text {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* ==================== TABS ==================== */
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ==================== GENRES & METADATA ==================== */
        .genres-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .genre-tag {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* ==================== CHARACTERS ==================== */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .character-card {
            background: var(--tertiary-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all var(--transition-normal);
        }

        .character-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .character-image {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
        }

        .character-info {
            padding: 1rem;
        }

        .character-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .character-role {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ==================== EPISODES ==================== */
        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .episode-item {
            background: var(--tertiary-bg);
            padding: 1rem;
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid var(--border-color);
        }

        .episode-item:hover {
            background: var(--primary-color);
            color: white;
        }

        .episode-number {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .episode-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .episode-item:hover .episode-title {
            color: rgba(255, 255, 255, 0.8);
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-widget {
            background: var(--secondary-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .widget-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: inline-block;
            text-align: center;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-secondary {
            background: var(--tertiary-bg);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background: var(--primary-color);
            color: white;
        }

        /* ==================== SKELETON ==================== */
        .skeleton {
            background: linear-gradient(90deg, var(--secondary-bg) 0%, var(--tertiary-bg) 50%, var(--secondary-bg) 100%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ==================== FOOTER ==================== */
        footer {
            background: var(--secondary-bg);
            border-top: 1px solid var(--border-color);
            padding: clamp(2rem, 5vw, 3rem);
            text-align: center;
            margin-top: 4rem;
        }

        .footer-text {
            color: var(--text-secondary);
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 1024px) {
            .details-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                flex-direction: row;
                grid-column: 1 / -1;
            }

            .sidebar-widget {
                flex: 1;
            }
        }

        @media (max-width: 768px) {
            .anime-header {
                flex-direction: column;
            }

            .anime-poster {
                width: 150px;
            }

            .details-banner {
                height: 300px;
                margin-top: 3.5rem;
            }

            .tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        @media (max-width: 480px) {
            .anime-stats {
                gap: 0.5rem;
            }

            .stat-badge {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .tabs {
                gap: 0;
            }

            .tab-btn {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }

            .characters-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">AnimeHub</div>
            <div class="nav-right">
                <button class="icon-btn" onclick="window.location.href='search.html'">🔍</button>
                <button class="icon-btn" onclick="goBack()">← Back</button>
            </div>
        </div>
    </header>

    <!-- DETAILS BANNER -->
    <section class="details-banner">
        <div class="banner-bg" id="bannerBg"></div>
        <div class="banner-overlay">
            <div class="anime-header">
                <img class="anime-poster" id="animePoster" src="" alt="Anime Poster" loading="lazy">
                <div class="anime-info">
                    <h1 class="anime-title" id="animeTitle">Loading...</h1>
                    <div class="anime-stats" id="animeStats">
                        <div class="stat-badge skeleton" style="width: 100px; height: 50px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- DETAILS CONTENT -->
    <div class="details-container">
        <div class="main-content">
            <!-- SYNOPSIS -->
            <section class="content-section">
                <h2 class="section-title">Synopsis</h2>
                <p class="section-text" id="synopsis">Loading...</p>
            </section>

            <!-- TABS SECTION -->
            <section class="content-section">
                <div class="tabs" id="tabs">
                    <button class="tab-btn active" onclick="switchTab('info')">Information</button>
                    <button class="tab-btn" onclick="switchTab('characters')">Characters</button>
                    <button class="tab-btn" onclick="switchTab('episodes')">Episodes</button>
                    <button class="tab-btn" onclick="switchTab('recommendations')">Recommendations</button>
                </div>

                <!-- INFO TAB -->
                <div class="tab-content active" id="tab-info">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
                        <div>
                            <h3 style="color: var(--primary-color); margin-bottom: 0.5rem;">Status</h3>
                            <p id="status">Loading...</p>
                        </div>
                        <div>
                            <h3 style="color: var(--primary-color); margin-bottom: 0.5rem;">Episodes</h3>
                            <p id="episodes">Loading...</p>
                        </div>
                        <div>
                            <h3 style="color: var(--primary-color); margin-bottom: 0.5rem;">Studio</h3>
                            <p id="studio">Loading...</p>
                        </div>
                        <div>
                            <h3 style="color: var(--primary-color); margin-bottom: 0.5rem;">Source</h3>
                            <p id="source">Loading...</p>
                        </div>
                        <div>
                            <h3 style="color: var(--primary-color); margin-bottom: 0.5rem;">Season</h3>
                            <p id="season">Loading...</p>
                        </div>
                        <div>
                            <h3 style="color: var(--primary-color); margin-bottom: 0.5rem;">Rating</h3>
                            <p id="rating">Loading...</p>
                        </div>
                    </div>
                    <div style="margin-top: 2rem;">
                        <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Genres</h3>
                        <div class="genres-list" id="genres">
                            <div class="skeleton" style="width: 80px; height: 36px; border-radius: 20px;"></div>
                        </div>
                    </div>
                </div>

                <!-- CHARACTERS TAB -->
                <div class="tab-content" id="tab-characters">
                    <div class="characters-grid" id="charactersGrid">
                        <div class="skeleton" style="height: 300px; border-radius: 12px;"></div>
                    </div>
                </div>

                <!-- EPISODES TAB -->
                <div class="tab-content" id="tab-episodes">
                    <div class="episodes-list" id="episodesList">
                        <div class="skeleton" style="height: 60px; border-radius: 8px;"></div>
                    </div>
                </div>

                <!-- RECOMMENDATIONS TAB -->
                <div class="tab-content" id="tab-recommendations">
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem;" id="recommendationsGrid">
                        <div class="skeleton" style="height: 270px; border-radius: 12px;"></div>
                    </div>
                </div>
            </section>
        </div>

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <!-- QUICK ACTION -->
            <div class="sidebar-widget">
                <button class="btn btn-primary" id="watchBtn" onclick="watchAnime()">▶ Watch Now</button>
                <button class="btn btn-secondary" style="margin-top: 0.75rem;" onclick="addToFavorite()">❤ Add to Favorite</button>
            </div>

            <!-- STATS -->
            <div class="sidebar-widget">
                <h3 class="widget-title">Stats</h3>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div>
                        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem;">Score</p>
                        <p style="font-weight: 600; font-size: 1.2rem;" id="scoreDisplay">0.0</p>
                    </div>
                    <div>
                        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem;">Ranked</p>
                        <p style="font-weight: 600; font-size: 1.2rem;" id="rankDisplay">#-</p>
                    </div>
                    <div>
                        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem;">Members</p>
                        <p style="font-weight: 600; font-size: 1.2rem;" id="membersDisplay">0</p>
                    </div>
                </div>
            </div>

            <!-- SHARE -->
            <div class="sidebar-widget">
                <h3 class="widget-title">Share</h3>
                <div style="display: flex; gap: 0.75rem; justify-content: center;">
                    <button class="icon-btn" onclick="shareAnime('twitter')" style="flex: 1;">𝕏</button>
                    <button class="icon-btn" onclick="shareAnime('facebook')" style="flex: 1;">f</button>
                    <button class="icon-btn" onclick="shareAnime('copy')" style="flex: 1;">📋</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- FOOTER -->
    <footer>
        <p class="footer-text">© 2024 AnimeHub. All rights reserved.</p>
    </footer>

    <script>
        const CONFIG = {
            API_BASE: 'https://api.jikan.moe/v4',
            CACHE_DURATION: 3600000,
        };

        let currentAnimeId = null;
        let currentAnimeData = null;

        const CacheManager = {
            set(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify({
                        data,
                        timestamp: Date.now()
                    }));
                } catch (e) {
                    console.warn('Cache failed');
                }
            },

            get(key) {
                try {
                    const item = localStorage.getItem(key);
                    if (!item) return null;
                    const { data, timestamp } = JSON.parse(item);
                    if (Date.now() - timestamp > CONFIG.CACHE_DURATION) {
                        localStorage.removeItem(key);
                        return null;
                    }
                    return data;
                } catch (e) {
                    return null;
                }
            }
        };

        async function fetchAnimeData(id) {
            const cacheKey = `anime_${id}`;
            const cached = CacheManager.get(cacheKey);
            if (cached) return cached;

            try {
                const response = await fetch(`${CONFIG.API_BASE}/anime/${id}/full`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                CacheManager.set(cacheKey, data.data);
                return data.data;
            } catch (error) {
                console.error('Fetch failed:', error);
                return null;
            }
        }

        async function initPage() {
            const params = new URLSearchParams(window.location.search);
            currentAnimeId = params.get('id');

            if (!currentAnimeId) {
                goBack();
                return;
            }

            currentAnimeData = await fetchAnimeData(currentAnimeId);

            if (!currentAnimeData) {
                document.querySelector('.main-content').innerHTML = '<p style="text-align: center; padding: 2rem; color: var(--text-secondary);">Anime not found</p>';
                return;
            }

            renderAnimeDetails();
        }

        function renderAnimeDetails() {
            const anime = currentAnimeData;

            document.getElementById('bannerBg').style.backgroundImage = `url('${anime.images?.jpg?.large_image_url || ''}')`;
            document.getElementById('animePoster').src = anime.images?.jpg?.image_url || '';
            document.getElementById('animePoster').alt = anime.title || 'Anime';
            document.getElementById('animeTitle').textContent = anime.title || 'Unknown';

            document.getElementById('synopsis').textContent = anime.synopsis || 'No synopsis available';
            document.getElementById('status').textContent = anime.status || 'Unknown';
            document.getElementById('episodes').textContent = anime.episodes || 'Unknown';
            document.getElementById('studio').textContent = anime.studios?.[0]?.name || 'Unknown';
            document.getElementById('source').textContent = anime.source || 'Unknown';
            document.getElementById('season').textContent = `${anime.season || ''} ${anime.year || ''}`.trim() || 'Unknown';
            document.getElementById('rating').textContent = anime.rating || 'Unknown';

            document.getElementById('scoreDisplay').textContent = anime.score?.toFixed(1) || 'N/A';
            document.getElementById('rankDisplay').textContent = anime.rank ? `#${anime.rank}` : '#-';
            document.getElementById('membersDisplay').textContent = anime.members?.toLocaleString() || '0';

            const genresHtml = (anime.genres || []).map(g => 
                `<div class="genre-tag">${g.name}</div>`
            ).join('');
            document.getElementById('genres').innerHTML = genresHtml || '<p style="color: var(--text-secondary);">No genres</p>';

            renderCharacters(anime);
            renderRecommendations(anime);
        }

        async function renderCharacters(anime) {
            const charactersGrid = document.getElementById('charactersGrid');
            
            try {
                const response = await fetch(`${CONFIG.API_BASE}/anime/${anime.mal_id}/characters`);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                const characters = (data.data || []).slice(0, 12);

                if (characters.length === 0) {
                    charactersGrid.innerHTML = '<p style="grid-column: 1 / -1; color: var(--text-secondary);">No characters found</p>';
                    return;
                }

                charactersGrid.innerHTML = characters.map(char => `
                    <div class="character-card">
                        <img class="character-image" src="${char.character?.images?.jpg?.image_url || ''}" alt="${char.character?.name || ''}" loading="lazy">
                        <div class="character-info">
                            <div class="character-name">${char.character?.name || 'Unknown'}</div>
                            <div class="character-role">${char.role || ''}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                charactersGrid.innerHTML = '<p style="grid-column: 1 / -1; color: var(--text-secondary);">Failed to load characters</p>';
            }
        }

        async function renderRecommendations(anime) {
            const grid = document.getElementById('recommendationsGrid');
            
            try {
                const response = await fetch(`${CONFIG.API_BASE}/anime/${anime.mal_id}/recommendations`);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                const recommendations = (data.data || []).slice(0, 12);

                if (recommendations.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1 / -1; color: var(--text-secondary);">No recommendations</p>';
                    return;
                }

                grid.innerHTML = recommendations.map(rec => `
                    <div class="anime-card" onclick="goToAnime(${rec.entry?.mal_id})" style="cursor: pointer;">
                        <img style="width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 12px;" 
                             src="${rec.entry?.images?.jpg?.image_url || ''}" 
                             alt="${rec.entry?.title || ''}" 
                             loading="lazy">
                        <p style="margin-top: 0.5rem; font-size: 0.9rem; text-align: center;">${rec.entry?.title || 'Unknown'}</p>
                    </div>
                `).join('');
            } catch (error) {
                grid.innerHTML = '<p style="grid-column: 1 / -1; color: var(--text-secondary);">Failed to load recommendations</p>';
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function watchAnime() {
            if (currentAnimeId) {
                window.location.href = `watch.html?id=${currentAnimeId}&ep=1`;
            }
        }

        function addToFavorite() {
            let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            if (!favorites.includes(currentAnimeId)) {
                favorites.push(currentAnimeId);
                localStorage.setItem('favorites', JSON.stringify(favorites));
                alert('Added to favorites!');
            } else {
                alert('Already in favorites');
            }
        }

        function shareAnime(platform) {
            const url = window.location.href;
            const title = currentAnimeData?.title || 'Check out this anime';

            if (platform === 'twitter') {
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`);
            } else if (platform === 'facebook') {
                window.open(`https://facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`);
            } else if (platform === 'copy') {
                navigator.clipboard.writeText(url);
                alert('Link copied to clipboard!');
            }
        }

        function goToAnime(id) {
            window.location.href = `anime.html?id=${id}`;
        }

        function goBack() {
            window.history.back();
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
