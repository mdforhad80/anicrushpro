<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Anime Streaming - Watch HD anime online with sub and dub. Fast, free, and cinematic experience.">
    <meta name="theme-color" content="#0b0b0f">
    <meta property="og:title" content="AnimeStream - Premium Anime Streaming">
    <meta property="og:description" content="Watch HD anime online. Sub & Dub available. Cinematic streaming experience.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://anistream.pages.dev/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AnimeStream - Premium Anime Streaming">
    <title>AnimeStream - Watch HD Anime Online | Sub & Dub</title>
    <link rel="manifest" href="data:application/json,{}">
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #121218;
            --bg-tertiary: #1a1a24;
            --purple: #8b5cf6;
            --pink: #d946ef;
            --purple-dark: #6d28d9;
            --pink-dark: #a21caf;
            --text: #f3f4f6;
            --text-secondary: #d1d5db;
            --muted: #9ca3af;
            --muted-dark: #6b7280;
            --border: #1f1f2e;
            --card-bg: rgba(26, 26, 36, 0.7);
            --glass-bg: rgba(18, 18, 24, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glow-purple: 0 0 20px rgba(139, 92, 246, 0.3), 0 0 40px rgba(139, 92, 246, 0.1);
            --glow-pink: 0 0 20px rgba(217, 70, 239, 0.3), 0 0 40px rgba(217, 70, 239, 0.1);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --navbar-height: 64px;
            --mobile-nav-height: 60px;
            --sidebar-width: 260px;
            --max-width: 1400px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            font-size: 16px;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: default;
        }

        /* Custom Cursor Glow */
        .cursor-glow {
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, rgba(217, 70, 239, 0.03) 30%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            will-change: left, top;
        }
        @media (max-width: 768px) {
            .cursor-glow {
                display: none;
            }
        }

        /* Floating Particles */
        .particles-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-ring {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--border);
            border-top-color: var(--purple);
            animation: spin 0.8s linear infinite;
        }
        .loader-inner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: var(--pink);
            animation: spin 1.2s linear infinite reverse;
            position: absolute;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loader-logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 20px;
            letter-spacing: -1px;
        }

        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: var(--navbar-height);
            background: rgba(11, 11, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            transition: all var(--transition);
        }
        .navbar.scrolled {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            background: rgba(11, 11, 15, 0.95);
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            z-index: 1001;
        }
        .nav-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            z-index: 1001;
        }
        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            white-space: nowrap;
            cursor: pointer;
        }
        .nav-logo-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--purple), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: var(--glow-purple);
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            font-size: 1.2rem;
            position: relative;
        }
        .nav-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            box-shadow: var(--glow-purple);
            color: #fff;
        }
        .nav-btn:active {
            transform: scale(0.9);
        }
        @media (max-width: 768px) {
            .navbar {
                height: var(--mobile-nav-height);
                padding: 0 12px;
                gap: 10px;
            }
            .nav-logo {
                font-size: 1.2rem;
            }
            .nav-logo-icon {
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
            .nav-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
        }

        /* SIDEBAR */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition);
        }
        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            z-index: 2001;
            transform: translateX(-100%);
            transition: transform var(--transition);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass-border);
            overflow-y: auto;
            padding: 20px 0;
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 12px;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            color: var(--muted);
            text-decoration: none;
            transition: all var(--transition-fast);
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(139, 92, 246, 0.15);
            color: #fff;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.1);
        }
        .sidebar-link .icon {
            font-size: 1.3rem;
            width: 24px;
            text-align: center;
        }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            margin-top: auto;
            font-size: 0.8rem;
            color: var(--muted-dark);
        }

        /* SEARCH OVERLAY */
        .search-overlay {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(11, 11, 15, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition);
        }
        .search-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .search-overlay-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .search-overlay-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            color: var(--text);
            font-size: 1.1rem;
            outline: none;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
        }
        .search-overlay-input:focus {
            border-color: var(--purple);
            box-shadow: var(--glow-purple);
            background: rgba(255, 255, 255, 0.08);
        }
        .search-overlay-close {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }
        .search-overlay-close:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            align-content: start;
        }
        @media (max-width: 480px) {
            .search-results {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
                padding: 12px;
            }
        }

        /* MAIN CONTENT */
        .main-content {
            position: relative;
            z-index: 1;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px 60px;
            min-height: 80vh;
        }
        @media (max-width: 768px) {
            .main-content {
                padding: 0 12px 80px;
            }
        }

        /* HERO SECTION */
        .hero-section {
            position: relative;
            border-radius: var(--radius-xl);
            overflow: hidden;
            margin: 24px 0;
            min-height: 420px;
            display: flex;
            align-items: flex-end;
            background: var(--bg-tertiary);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        @media (max-width: 768px) {
            .hero-section {
                min-height: 320px;
                border-radius: var(--radius-lg);
                margin: 16px 0;
            }
        }
        @media (max-width: 480px) {
            .hero-section {
                min-height: 260px;
                border-radius: var(--radius);
            }
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            transition: opacity 1s;
        }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(11, 11, 15, 0.95) 0%, rgba(11, 11, 15, 0.5) 40%, rgba(11, 11, 15, 0.2) 70%, rgba(11, 11, 15, 0.05) 100%);
        }
        .hero-content {
            position: relative;
            z-index: 2;
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }
        @media (max-width: 768px) {
            .hero-content {
                padding: 24px 20px;
            }
        }
        .hero-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.5);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
        }
        .hero-title {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
            margin-bottom: 8px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
        }
        @media (max-width: 768px) {
            .hero-title {
                font-size: 1.6rem;
            }
        }
        .hero-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
            text-decoration: none;
            font-family: var(--font-sans);
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--purple), var(--pink));
            color: #fff;
            box-shadow: var(--glow-purple);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5), 0 0 50px rgba(217, 70, 239, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.82rem;
            border-radius: 40px;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* SECTION HEADERS */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 32px 0 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title .accent {
            width: 4px;
            height: 24px;
            border-radius: 4px;
            background: linear-gradient(180deg, var(--purple), var(--pink));
            box-shadow: var(--glow-purple);
        }
        .section-link {
            color: var(--purple);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color var(--transition-fast);
            cursor: pointer;
        }
        .section-link:hover {
            color: var(--pink);
        }

        /* ANIME CARDS GRID */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 18px;
        }
        @media (max-width: 600px) {
            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
        }
        @media (max-width: 380px) {
            .anime-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
        }
        .anime-card {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all var(--transition);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
        }
        .anime-card:hover {
            transform: translateY(-6px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: var(--glow-purple), 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 5;
        }
        .anime-card-img-wrap {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: var(--bg-tertiary);
        }
        .anime-card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
            loading: lazy;
        }
        .anime-card:hover .anime-card-img {
            transform: scale(1.08);
        }
        .anime-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(11, 11, 15, 0.8) 0%, transparent 50%);
            opacity: 0;
            transition: opacity var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .anime-card:hover .anime-card-overlay {
            opacity: 1;
        }
        .anime-card-play {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.8);
            border: 2px solid #fff;
            color: #fff;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }
        .anime-card:hover .anime-card-play {
            transform: scale(1.1);
            background: var(--purple);
        }
        .anime-card-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #fff;
            letter-spacing: 0.5px;
            z-index: 3;
        }
        .anime-card-ep {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(139, 92, 246, 0.8);
            backdrop-filter: blur(8px);
            color: #fff;
            z-index: 3;
        }
        .anime-card-info {
            padding: 12px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .anime-card-title {
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: -0.2px;
        }
        .anime-card-meta {
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .anime-card-rating {
            color: #fbbf24;
            font-weight: 600;
            font-size: 0.78rem;
        }

        /* SKELETON */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, #222230 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        .skeleton-img {
            aspect-ratio: 3/4;
            width: 100%;
            border-radius: var(--radius);
        }
        .skeleton-text {
            height: 16px;
            width: 80%;
            margin: 8px 0;
        }
        .skeleton-text-sm {
            height: 12px;
            width: 50%;
        }

        /* HORIZONTAL SCROLL */
        .scroll-row {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .scroll-row::-webkit-scrollbar {
            height: 4px;
        }
        .scroll-row::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-row::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .scroll-row .anime-card {
            flex: 0 0 170px;
            scroll-snap-align: start;
        }
        @media (max-width: 600px) {
            .scroll-row .anime-card {

    </style>
    <link rel="preconnect" href="https://api.jikan.moe">
    <link rel="dns-prefetch" href="https://api.jikan.moe">

</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div style="position:relative;display:flex;align-items:center;justify-content:center;">
            <div class="loader-ring"></div>
            <div class="loader-inner"></div>
        </div>
        <div class="loader-logo">AnimeStream</div>
    </div>

    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="nav-logo-icon">🎬</div>
                <span class="nav-logo">AnimeStream</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <button class="sidebar-link active" data-page="home" onclick="navigateTo('home')">
                <span class="icon">🏠</span> Home
            </button>
            <button class="sidebar-link" data-page="schedule" onclick="navigateTo('schedule')">
                <span class="icon">📅</span> Schedule
            </button>
            <button class="sidebar-link" data-page="search" onclick="openSearchOverlay()">
                <span class="icon">🔍</span> Search
            </button>
            <button class="sidebar-link" data-page="creator" onclick="navigateTo('creator')">
                <span class="icon">👤</span> Creator
            </button>
        </nav>
        <div class="sidebar-footer">
            <p>© 2026 AnimeStream</p>
            <p style="font-size:0.7rem;">Powered by Jikan API</p>
        </div>
    </aside>

    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-overlay-header">
            <input type="text" class="search-overlay-input" id="searchOverlayInput"
            placeholder="Search anime... (e.g., Naruto, Attack on Titan)"
            autocomplete="off">
            <button class="search-overlay-close" onclick="closeSearchOverlay()" aria-label="Close search">✕</button>
        </div>
        <div class="search-results" id="searchResults">
            <div class="no-results">Start typing to search anime...</div>
        </div>
    </div>

    <!-- Navbar -->
    <header class="navbar" id="navbar">
        <div class="nav-left">
            <button class="nav-btn" onclick="toggleSidebar()" aria-label="Menu" title="Menu">☰</button>
        </div>
        <div class="nav-center">
            <div class="nav-logo-icon">🎬</div>
            <a class="nav-logo" onclick="navigateTo('home')" style="cursor:pointer;">AnimeStream</a>
        </div>
        <div class="nav-right">
            <button class="nav-btn" onclick="openSearchOverlay()" aria-label="Search" title="Search">🔍</button>
        </div>
    </header>

    <!-- Mobile Bottom Nav -->
    <nav class="mobile-bottom-nav" id="mobileBottomNav">
        <button class="mobile-nav-item active" data-page="home" onclick="navigateTo('home')">
            <span class="icon">🏠</span> Home
        </button>
        <button class="mobile-nav-item" data-page="schedule" onclick="navigateTo('schedule')">
            <span class="icon">📅</span> Schedule
        </button>
        <button class="mobile-nav-item" onclick="openSearchOverlay()">
            <span class="icon">🔍</span> Search
        </button>
        <button class="mobile-nav-item" data-page="creator" onclick="navigateTo('creator')">
            <span class="icon">👤</span> Creator
        </button>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Dynamically rendered -->
    </main>

    <!-- Footer -->
    <footer class="site-footer" id="siteFooter">
        <p>AnimeStream &copy; 2026 — Built with ❤️ for anime fans</p>
        <p style="margin-top:4px;">
            <a href="https://github.com" target="_blank" rel="noopener">GitHub</a> ·
            <a href="#" onclick="navigateTo('creator')">Creator</a> ·
            <a href="https://myanimelist.net" target="_blank" rel="noopener">MyAnimeList</a>
        </p>
    </footer>

    <script>
        // ==================== GLOBAL STATE ====================
        const JIKAN_BASE = 'https://api.jikan.moe/v4';
        const STREAM_BASE = 'https://megaplay.buzz/stream/mal';
        let currentPage = 'home';
        let searchDebounceTimer = null;
        let watchHistory = JSON.parse(localStorage.getItem('animeStream_history') || '[]');
        let continueWatching = JSON.parse(localStorage.getItem('animeStream_continue') || '[]');
        const DEFAULT_MAL_IDS = [5114, 16498, 30276, 40028, 38000, 41467, 21, 1735, 269, 32281,
            38524, 40591, 40748, 42249, 41025, 1535, 9253, 28851
        ];

        // ==================== DOM REFS ====================
        const mainContent = document.getElementById('mainContent');
        const loadingScreen = document.getElementById('loading-screen');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const searchOverlay = document.getElementById('searchOverlay');
        const searchOverlayInput = document.getElementById('searchOverlayInput');
        const searchResults = document.getElementById('searchResults');
        const toast = document.getElementById('toast');
        const cursorGlow = document.getElementById('cursorGlow');
        const particlesContainer = document.getElementById('particlesContainer');
        const navbar = document.getElementById('navbar');
        const mobileBottomNav = document.getElementById('mobileBottomNav');

        // ==================== INITIALIZATION ====================
        function init() {
            createParticles();
            setupCursorGlow();
            setupScrollListener();
            setupSearchListeners();
            handleRoute();
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
            }, 800);
        }

        function createParticles() {
            const colors = ['#8b5cf6', '#d946ef', '#a78bfa', '#c084fc', '#e879f9'];
            for (let i = 0; i < 35; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDuration = (Math.random() * 15 + 8) + 's';
                particle.style.animationDelay = (Math.random() * 12) + 's';
                particle.style.boxShadow = `0 0 ${size*3}px ${particle.style.background}`;
                particlesContainer.appendChild(particle);
            }
        }

        function setupCursorGlow() {
            if (window.innerWidth <= 768) return;
            document.addEventListener('mousemove', (e) => {
                cursorGlow.style.left = e.clientX + 'px';
                cursorGlow.style.top = e.clientY + 'px';
                cursorGlow.style.opacity = '1';
            });
            document.addEventListener('mouseleave', () => {
                cursorGlow.style.opacity = '0';
            });
        }

        function setupScrollListener() {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        }

        function setupSearchListeners() {
            searchOverlayInput.addEventListener('input', () => {
                clearTimeout(searchDebounceTimer);
                const query = searchOverlayInput.value.trim();
                if (!query) {
                    searchResults.innerHTML = '<div class="no-results">Start typing to search anime...</div>';
                    return;
                }
                searchDebounceTimer = setTimeout(() => performSearch(query), 400);
            });
            searchOverlayInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeSearchOverlay();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && !searchOverlay.classList.contains('active') && document.activeElement ===
                    document.body) {
                    e.preventDefault();
                    openSearchOverlay();
                }
                if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
                    closeSearchOverlay();
                }
            });
        }

        // ==================== ROUTING ====================
        function handleRoute() {
            const path = window.location.pathname;
            const params = new URLSearchParams(window.location.search);

            if (path.includes('watch.html') || params.has('ep')) {
                const id = params.get('id');
                const ep = params.get('ep') || '1';
                const type = params.get('type') || 'sub';
                if (id) {
                    currentPage = 'watch';
                    renderWatchPage(id, ep, type);
                    return;
                }
            }
            if (path.includes('anime.html') || (params.has('id') && !params.has('ep'))) {
                const id = params.get('id');
                if (id) {
                    currentPage = 'anime';
                    renderAnimeDetailPage(id);
                    return;
                }
            }
            if (path.includes('search.html')) {
                currentPage = 'search';
                renderSearchPage(params.get('q') || '');
                return;
            }
            if (path.includes('creator.html')) {
                currentPage = 'creator';
                renderCreatorPage();
                return;
            }
            if (path.includes('schedule.html')) {
                currentPage = 'schedule';
                renderSchedulePage();
                return;
            }

            // Default: Home
            currentPage = 'home';
            renderHomePage();
        }

        function navigateTo(page, data = {}) {
            closeSidebar();
            closeSearchOverlay();
            currentPage = page;

            // Update active states
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.mobile-nav-item').forEach(l => l.classList.remove('active'));
            const sidebarLink = document.querySelector(`.sidebar-link[data-page="${page}"]`);
            const mobileLink = document.querySelector(`.mobile-nav-item[data-page="${page}"]`);
            if (sidebarLink) sidebarLink.classList.add('active');
            if (mobileLink) mobileLink.classList.add('active');

            switch (page) {
                case 'home':
                    window.history.pushState({}, '', '/');
                    renderHomePage();
                    break;
                case 'schedule':
                    window.history.pushState({}, '', '/schedule.html');
                    renderSchedulePage();
                    break;
                case 'creator':
                    window.history.pushState({}, '', '/creator.html');
                    renderCreatorPage();
                    break;
                case 'anime':
                    window.history.pushState({}, '', `/anime.html?id=${data.id}`);
                    renderAnimeDetailPage(data.id);
                    break;
                case 'watch':
                    window.history.pushState({}, '',
                        `/watch.html?id=${data.id}&ep=${data.ep||1}&type=${data.type||'sub'}`);
                    renderWatchPage(data.id, data.ep || '1', data.type || 'sub');
                    break;
                default:
                    renderHomePage();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('popstate', handleRoute);

        // ==================== SIDEBAR ====================
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        }

        function closeSidebar() {
            sidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        sidebarOverlay.addEventListener('click', closeSidebar);

        // ==================== SEARCH OVERLAY ====================
        function openSearchOverlay() {
            searchOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            setTimeout(() => searchOverlayInput.focus(), 300);
        }

        function closeSearchOverlay() {
            searchOverlay.classList.remove('active');
            document.body.style.overflow = '';
            searchOverlayInput.value = '';
            searchResults.innerHTML = '<div class="no-results">Start typing to search anime...</div>';
        }

        async function performSearch(query) {
            searchResults.innerHTML =
                '<div style="grid-column:1/-1;text-align:center;padding:40px;"><div class="loader-ring" style="margin:0 auto;"></div></div>';
            try {
                const res = await fetch(`${JIKAN_BASE}/anime?q=${encodeURIComponent(query)}&limit=20&sfw=true`);
                const data = await res.json();
                if (!data.data || data.data.length === 0) {
                    searchResults.innerHTML = '<div class="no-results" style="grid-column:1/-1;">No results found for "' +
                        query + '"</div>';
                    return;
                }
                searchResults.innerHTML = data.data.map(anime => createAnimeCardHTML(anime, true)).join('');
                // Attach click handlers
                searchResults.querySelectorAll('.anime-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const malId = this.dataset.malId;
                        closeSearchOverlay();
                        navigateTo('anime', { id: malId });
                    });
                });
            } catch (err) {
                searchResults.innerHTML =
                    '<div class="no-results" style="grid-column:1/-1;">Search failed. Please try again.</div>';
            }
        }

        // ==================== API HELPERS ====================
        async function fetchJikan(endpoint) {
            try {
                const res = await fetch(`${JIKAN_BASE}${endpoint}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error('Jikan API error:', err);
                return null;
            }
        }

        function getStreamUrl(malId, ep, type = 'sub') {
            return `${STREAM_BASE}/${malId}/${ep}/${type}`;
        }

        // ==================== ANIME CARD HTML ====================
        function createAnimeCardHTML(anime, isSearchResult = false) {
            const malId = anime.mal_id;
            const title = anime.title_english || anime.title;
            const image = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';
            const rating = anime.score || 'N/A';
            const type = anime.type || 'TV';
            const episodes = anime.episodes || '?';
            const status = anime.status || 'Unknown';
            const badgeText = status === 'Currently Airing' ? 'AIRING' : type;
            const badgeStyle = status === 'Currently Airing' ?
                'background:rgba(34,197,94,0.8);' : 'background:rgba(0,0,0,0.7);';

            return `
            <div class="anime-card" data-mal-id="${malId}" role="button" tabindex="0" aria-label="${title}">
              <div class="anime-card-img-wrap">
                <img class="anime-card-img" src="${image}" alt="${title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22><rect fill=%22%231a1a24%22 width=%22300%22 height=%22400%22/><text fill=%22%239ca3af%22 x=%22150%22 y=%22200%22 text-anchor=%22middle%22 font-size=%2214%22>No Image</text></svg>'">
                <div class="anime-card-overlay">
                  <div class="anime-card-play">▶</div>
                </div>
                <span class="anime-card-badge" style="${badgeStyle}">${badgeText}</span>
                ${episodes !== '?' && episodes !== 0 ? `<span class="anime-card-ep">${episodes} EP</span>` : ''}
              </div>
              <div class="anime-card-info">
                <div class="anime-card-title" title="${title}">${title}</div>
                <div class="anime-card-meta">
                  <span>${type}</span>
                  ${rating !== 'N/A' ? `<span class="anime-card-rating">★ ${rating}</span>` : ''}
                </div>
              </div>
            </div>`;
        }

        function createSkeletonCards(count = 8) {
            let html = '';
            for (let i = 0; i < count; i++) {
                html += `
                <div class="anime-card" style="pointer-events:none;">
                  <div class="skeleton skeleton-img"></div>
                  <div style="padding:12px 14px;">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text-sm"></div>
                  </div>
                </div>`;
            }
            return html;
        }

        // ==================== HOME PAGE ====================
        async function renderHomePage() {
            mainContent.innerHTML = `
            <!-- Hero Section -->
            <div class="hero-section" id="heroSection">
              <div class="hero-bg" id="heroBg" style="background-image:url('');"></div>
              <div class="hero-overlay"></div>
              <div class="hero-content" id="heroContent">
                <div class="hero-badge">🔥 Trending Now</div>
                <h1 class="hero-title" id="heroTitle">Loading...</h1>
                <div class="hero-meta" id="heroMeta"></div>
                <div class="hero-actions">
                  <button class="btn btn-primary" id="heroWatchBtn">▶ Watch Now</button>
                  <button class="btn btn-secondary" id="heroDetailBtn">ℹ More Info</button>
                </div>
              </div>
            </div>

                title: window._currentWatchInfo?.title || `Anime #${malId}`,
                image: window._currentWatchInfo?.image || ''
            };
            watchHistory = watchHistory.filter(h => h.malId !== entry.malId);
            watchHistory.unshift(entry);

            localStorage.setItem('animeStream_history', JSON.stringify(watchHistory));

            const entry = {

                type,

            };

            localStorage.setItem('animeStream_continue', JSON.stringify(continueWatching));
        }

                <p style="margin:8px 0;"><strong>📋 MAL:</strong> <a href="https://myanimelist.net" target="_blank" rel="noopener" style="color:var(--purple);">MyAnimeList</a></p>
              </div>
              <p style="color:var(--muted-dark);font-size:0.85rem;">Built with pure HTML, CSS & JavaScript<br>Deployed on Cloudflare Pages / GitHub Pages</p>
              <button class="btn btn-primary" style="margin-top:16px;" onclick="navigateTo('home')">🏠 Back to Home</button>
            </div>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== TOAST ====================
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')
                return;
            if (e.key === 'f' && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    const player = document.getElementById('animePlayer');
                    if (player && currentPage === 'watch') {
                        player.requestFullscreen().catch(() => {});
                    }
                }
            }
            if (e.key === 't' && currentPage === 'watch') {
                toggleTheaterMode();
            }
            if (e.key === 'n' && currentPage === 'watch' && !e.ctrlKey) {
                const nextBtn = document.getElementById('nextEpBtn');
                if (nextBtn && !nextBtn.disabled) nextBtn.click();
            }
        });

        // ==================== SERVICE WORKER (PWA) ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
              const CACHE = 'anime-stream-v1';
              self.addEventListener('fetch', e => {
                e.respondWith(
                  caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                    if(res.ok && e.request.method === 'GET'){
                      const clone = res.clone();
                      caches.open(CACHE).then(c => c.put(e.request, clone));
                    }
                    return res;
                  }))
                );
              });
            `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(() => {});
            });
        }

        // ==================== START ====================
        init();
        console.log('%c🎬 AnimeStream Ready %c| %cPremium Anime Streaming',
            'color:#d946ef;font-size:1.2rem;',
            '',
            'color:#8b5cf6;');
        console.log('%c💡 Tips: Press / to search | Press F for fullscreen | Press T for theater mode',
            'color:#9ca3af;');
    </script>
</body>
