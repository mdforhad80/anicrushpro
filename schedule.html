<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anime airing schedule by day of the week.">
    <title>AnimeStream – Schedule</title>
    <style>
        /* Same global styles as before, plus schedule-specific */
        :root { /* ... same variables ... */ }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); }
        .header { /* same as index */ }
        /* ... copy header, sidebar, search overlay styles ... (see previous pages) */
        /* For brevity, assume all global styles are included */
        .schedule-page { padding: clamp(16px,3vw,30px) clamp(12px,3vw,40px); }
        .day-tabs { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 6px; }
        .day-tab { padding: 8px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-size: 0.85rem; cursor: pointer; white-space: nowrap; transition: var(--transition); }
        .day-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 16px; }
        .anime-card { /* same card style as search */ }
        .loading-text { text-align:center; padding:30px; color:var(--text3); }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="header-left">
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            <a href="index.html" class="logo">Anime<span>Stream</span></a>
        </div>
        <div class="header-right">
            <button class="search-trigger" id="searchTrigger">🔍</button>
        </div>
    </header>
    <!-- Sidebar & search overlay identical to previous -->
    <main class="schedule-page">
        <div class="day-tabs" id="dayTabs">
            <button class="day-tab active" data-day="monday">Monday</button>
            <button class="day-tab" data-day="tuesday">Tuesday</button>
            <button class="day-tab" data-day="wednesday">Wednesday</button>
            <button class="day-tab" data-day="thursday">Thursday</button>
            <button class="day-tab" data-day="friday">Friday</button>
            <button class="day-tab" data-day="saturday">Saturday</button>
            <button class="day-tab" data-day="sunday">Sunday</button>
        </div>
        <div class="schedule-grid" id="scheduleGrid"></div>
        <div class="loading-text" id="loadingMsg">Loading...</div>
    </main>

    <script>
        (function() {
            // Include cacheManager & apiManager (same as before)
            const cacheManager = {
                TTL:30*60*1000, get(k){try{const i=localStorage.getItem('as_'+k);if(!i)return null;const{data,t}=JSON.parse(i);if(Date.now()-t>this.TTL){localStorage.removeItem('as_'+k);return null;}return data;}catch(e){return null;}}, set(k,d){try{localStorage.setItem('as_'+k,JSON.stringify({data:d,timestamp:Date.now()}));}catch(e){}}
            };
            const apiManager = {
                queue:[],inProgress:false,delay:350,
                async fetchWithRetry(url,r=2){for(let i=0;i<=r;i++){try{const res=await fetch(url);if(res.status===429){await new Promise(r=>setTimeout(r,1000*(i+1)));continue;}if(!res.ok)throw new Error(`HTTP ${res.status}`);return await res.json();}catch(e){if(i===r)throw e;await new Promise(r=>setTimeout(r,800*(i+1)));}}},
                async enqueue(url,ck=null){if(ck){const c=cacheManager.get(ck);if(c)return c;}return new Promise((resolve,reject)=>{this.queue.push({url,ck,resolve,reject});this.processQueue();});},
                async processQueue(){if(this.inProgress||this.queue.length===0)return;this.inProgress=true;while(this.queue.length>0){const{url,ck,resolve,reject}=this.queue.shift();try{const d=await this.fetchWithRetry(url);if(ck)cacheManager.set(ck,d);resolve(d);}catch(e){reject(e);}await new Promise(r=>setTimeout(r,this.delay));}this.inProgress=false;}
            };

            // UI (sidebar, search overlay, back to top) — same initialization code, omitted for brevity
            // ... (implement similar to search.html)

            const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
            let currentDay = 'monday';

            const grid = document.getElementById('scheduleGrid');
            const loadingMsg = document.getElementById('loadingMsg');

            async function loadDay(day){
                grid.innerHTML = ''; loadingMsg.style.display='block';
                try{
                    const data = await apiManager.enqueue(`https://api.jikan.moe/v4/schedules?filter=${day}&limit=20&sfw=true`, `schedule_${day}`);
                    if(data && data.data && data.data.length){
                        const cards = data.data.map(a=>`
                            <div class="anime-card" onclick="window.location.href='anime.html?id=${a.mal_id}'">
                                <div class="card-img"><img src="${a.images.jpg.large_image_url}" alt="${a.title}" loading="lazy"></div>
                                <div class="card-info"><h4>${a.title}</h4><div class="meta">⭐${a.score||'?'} 📺${a.episodes||'?'}</div></div>
                            </div>
                        `).join('');
                        grid.innerHTML = cards;
                    } else {
                        grid.innerHTML = '<div style="padding:20px;color:#777;">No anime found for this day.</div>';
                    }
                }catch(e){ grid.innerHTML = '<div style="padding:20px;color:#ef4444;">Failed to load schedule.</div>'; }
                loadingMsg.style.display='none';
            }

            // Tab switching
            document.getElementById('dayTabs').addEventListener('click', (e)=>{
                const tab = e.target.closest('.day-tab');
                if(!tab) return;
                document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                currentDay = tab.dataset.day;
                loadDay(currentDay);
            });

            loadDay('monday');
        })();
    </script>
</body>
</html>
