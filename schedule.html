<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Weekly anime airing schedule. Find what airs today.">
<meta name="theme-color" content="#050505">
<title>Schedule - AnimeStream</title>
<style>
/* ==================== VARIABLES & RESET ==================== */
:root {
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --primary: #8b5cf6;
  --primary-glow: rgba(139,92,246,0.35);
  --secondary: #a78bfa;
  --text: #f3f4f6;
  --text-muted: #9ca3af;
  --border: rgba(255,255,255,0.08);
  --radius: 12px;
  --radius-lg: 16px;
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-x: hidden;
  max-width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
ul, ol { list-style: none; }

/* ==================== UTILITIES ==================== */
.glass {
  background: rgba(17,17,17,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
}
.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }
.text-gradient {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ==================== HEADER ==================== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(12px, 3vw, 32px);
  transition: var(--transition);
}
.header.scrolled {
  background: rgba(5,5,5,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.menu-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  transition: var(--transition);
}
.menu-btn:hover { background: var(--surface-2); }
.menu-btn svg { width: 22px; height: 22px; stroke: var(--text); }
.logo {
  font-size: clamp(1.1rem, 2vw, 1.5rem);
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #fff; font-size: 14px;
}

/* ==================== SIDEBAR ==================== */
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.sidebar-overlay.active { opacity: 1; pointer-events: all; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(280px, 80vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 1101;
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  padding: 20px;
}
.sidebar.active { transform: translateX(0); }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.sidebar-close {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.sidebar-close:hover { background: var(--surface-2); }
.sidebar-close svg { width: 20px; height: 20px; stroke: var(--text); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-muted);
  transition: var(--transition);
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  background: rgba(139,92,246,0.12);
  color: var(--primary);
}
.sidebar-nav a svg { width: 20px; height: 20px; stroke: currentColor; flex-shrink: 0; }

/* ==================== SCHEDULE PAGE ==================== */
.schedule-page {
  max-width: 1200px;
  margin: 80px auto 0;
  padding: clamp(24px, 4vw, 48px) clamp(16px, 3vw, 32px);
}
.schedule-title {
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  font-weight: 800;
  margin-bottom: 24px;
  text-align: center;
}

/* Day Tabs */
.day-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 4px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 20px;
  border-radius: var(--radius) var(--radius) 0 0;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-muted);
  white-space: nowrap;
  transition: var(--transition);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  min-width: 80px;
}
.day-tab:hover { color: var(--text); background: var(--surface-2); }
.day-tab.active {
  color: var(--primary);
  background: rgba(139,92,246,0.08);
  border-bottom-color: var(--primary);
}
.day-tab .day-name { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.day-tab .day-num { font-size: 1.1rem; }

/* Schedule Grid */
.schedule-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.schedule-card {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 16px;
  align-items: center;
  padding: 14px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: var(--transition);
}
.schedule-card:hover {
  background: var(--surface-3);
  border-color: var(--primary);
  transform: translateX(4px);
}
.schedule-time {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--primary);
  text-align: center;
}
.schedule-info {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}
.schedule-thumb {
  width: 60px;
  aspect-ratio: 2/3;
  border-radius: 6px;
  overflow: hidden;
  background: var(--surface-3);
  flex-shrink: 0;
}
.schedule-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.schedule-text {
  min-width: 0;
}
.schedule-name {
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 4px;
  line-height: 1.3;
}
.schedule-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.schedule-action {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.schedule-btn {
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 0.75rem;
  font-weight: 700;
  background: var(--primary);
  color: #fff;
  transition: var(--transition);
  white-space: nowrap;
}
.schedule-btn:hover { background: #7c3aed; }
.schedule-btn.secondary {
  background: var(--surface-3);
  color: var(--text);
  border: 1px solid var(--border);
}
.schedule-btn.secondary:hover { background: var(--surface); }

/* Empty state */
.schedule-empty {
  text-align: center;
  padding: 64px 16px;
  color: var(--text-muted);
  font-size: 1rem;
}

/* ==================== FOOTER ==================== */
.footer {
  border-top: 1px solid var(--border);
  padding: clamp(24px, 4vw, 40px) clamp(16px, 3vw, 32px);
  text-align: center;
  margin-top: 40px;
}
.footer-text {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.footer-social {
  display: flex; justify-content: center; gap: 16px;
}
.footer-social a {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.footer-social a:hover {
  background: var(--primary);
  border-color: var(--primary);
  transform: translateY(-2px);
}
.footer-social a svg { width: 16px; height: 16px; stroke: var(--text-muted); }
.footer-social a:hover svg { stroke: #fff; }

/* ==================== RESPONSIVE ==================== */
@media (max-width: 640px) {
  .schedule-card {
    grid-template-columns: 60px 1fr;
    gap: 12px;
  }
  .schedule-action {
    grid-column: 1 / -1;
    justify-content: flex-end;
  }
  .schedule-thumb { width: 50px; }
  .day-tab { padding: 10px 14px; min-width: 70px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<!-- ==================== SCRIPTS ==================== -->
<script>
(function() {
  'use strict';

  const API_BASE = 'https://api.jikan.moe/v4';
  const CACHE_TTL = 5 * 60 * 1000;
  const RATE_DELAY = 400;

  const ApiEngine = {
    cache: {}, lastRequest: 0,
    getCacheKey(url) { return 'cache_' + url; },
    getCached(url) {
      const key = this.getCacheKey(url);
      const item = this.cache[key];
      if (!item) {
        try {
          const raw = localStorage.getItem(key);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Date.now() - parsed.time < CACHE_TTL) { this.cache[key] = parsed; return parsed.data; }
          }
        } catch(e) {}
        return null;
      }
      if (Date.now() - item.time < CACHE_TTL) return item.data;
      return null;
    },
    setCache(url, data) {
      const key = this.getCacheKey(url);
      const payload = { data, time: Date.now() };
      this.cache[key] = payload;
      try { localStorage.setItem(key, JSON.stringify(payload)); } catch(e) {}
    },
    async fetchWithTimeout(url, timeout = 10000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        return response;
      } catch (e) { clearTimeout(id); throw e; }
    },
    async fetch(url, retries = 3) {
      const cached = this.getCached(url);
      if (cached) return cached;
      const now = Date.now();
      const wait = Math.max(0, this.lastRequest + RATE_DELAY - now);
      if (wait > 0) await new Promise(r => setTimeout(r, wait));
      this.lastRequest = Date.now();
      let lastError;
      for (let i = 0; i < retries; i++) {
        try {
          if (i > 0) await new Promise(r => setTimeout(r, 1200 * i));
          const response = await this.fetchWithTimeout(url);
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const json = await response.json();
          if (!json || !json.data) throw new Error('Invalid response');
          this.setCache(url, json);
          return json;
        } catch (e) { lastError = e; }
      }
      throw lastError;
    },
    async fetchSafe(url, fallbackData = null) {
      try { return await this.fetch(url); }
      catch (e) { console.warn('API fetch failed:', url, e.message); return { data: fallbackData }; }
    }
  };

  function sanitize(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getTitle(anime) {
    return sanitize(anime.title_english || anime.title || 'Unknown');
  }

  function getImage(anime) {
    if (!anime.images || !anime.images.jpg) return '';
    return anime.images.jpg.image_url || anime.images.jpg.small_image_url || '';
  }

  // ==================== DAYS ====================
  const DAYS = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
  const DAY_LABELS = { monday: 'Mon', tuesday: 'Tue', wednesday: 'Wed', thursday: 'Thu', friday: 'Fri', saturday: 'Sat', sunday: 'Sun' };
  let currentDay = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];

  // ==================== TABS ====================
  function renderTabs() {
    const container = document.getElementById('dayTabs');
    if (!container) return;
    container.innerHTML = '';
    DAYS.forEach(day => {
      const tab = document.createElement('button');
      tab.className = 'day-tab' + (day === currentDay ? ' active' : '');
      tab.innerHTML = `<span class="day-name">${DAY_LABELS[day]}</span>`;
      tab.addEventListener('click', () => {
        currentDay = day;
        renderTabs();
        loadSchedule(day);
      });
      container.appendChild(tab);
    });
    // Scroll active into view
    const active = container.querySelector('.day-tab.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  // ==================== LOAD SCHEDULE ====================
  async function loadSchedule(day) {
    const grid = document.getElementById('scheduleGrid');
    if (!grid) return;
    grid.innerHTML = '<div class="skeleton" style="height:80px;"></div><div class="skeleton" style="height:80px;"></div><div class="skeleton" style="height:80px;"></div>';
    try {
      const res = await ApiEngine.fetchSafe(`${API_BASE}/schedules?filter=${day}&limit=25`);
      const data = (res && res.data) ? res.data : [];
      grid.innerHTML = '';
      if (!data.length) {
        grid.innerHTML = '<div class="schedule-empty">No anime scheduled for this day.</div>';
        return;
      }
      data.forEach(item => {
        const anime = item;
        const malId = anime.mal_id || 0;
        const img = getImage(anime) || '';
        const title = getTitle(anime);
        const time = sanitize(anime.broadcast && anime.broadcast.time ? anime.broadcast.time : 'TBA');
        const type = sanitize(anime.type || 'TV');
        const episodes = anime.episodes || '?';
        const score = anime.score ? anime.score.toFixed(1) : '';
        const card = document.createElement('div');
        card.className = 'schedule-card fade-in';
        card.innerHTML = `
          <div class="schedule-time">${time}</div>
          <div class="schedule-info">
            <div class="schedule-thumb"><img src="${img}" alt="${title}" loading="lazy"></div>
            <div class="schedule-text">
              <div class="schedule-name clamp-2">${title}</div>
              <div class="schedule-meta">${type} &bull; ${episodes} EP &bull; Score: ${score || 'N/A'}</div>
            </div>
          </div>
          <div class="schedule-action">
            <a href="watch.html?id=${malId}&ep=1" class="schedule-btn">Watch</a>
            <a href="anime.html?id=${malId}" class="schedule-btn secondary">Details</a>
          </div>
        `;
        grid.appendChild(card);
      });
    } catch (e) {
      grid.innerHTML = '<div class="schedule-empty">Failed to load schedule. Please refresh.</div>';
    }
  }

  // ==================== MOBILE NAV ====================
  const MobileNav = {
    sidebar: document.getElementById('sidebar'),
    overlay: document.getElementById('sidebarOverlay'),
    open() { this.sidebar.classList.add('active'); this.overlay.classList.add('active'); document.body.style.overflow = 'hidden'; },
    close() { this.sidebar.classList.remove('active'); this.overlay.classList.remove('active'); document.body.style.overflow = ''; },
    init() {
      document.getElementById('menuBtn').addEventListener('click', () => this.open());
      document.getElementById('sidebarClose').addEventListener('click', () => this.close());
      this.overlay.addEventListener('click', () => this.close());
    }
  };

  function initHeaderScroll() {
    const header = document.getElementById('header');
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { header.classList.toggle('scrolled', window.scrollY > 40); ticking = false; });
        ticking = true;
      }
    }, { passive: true });
  }

  // ==================== APP INIT ====================
  async function initApp() {
    initHeaderScroll();
    MobileNav.init();
    renderTabs();
    await loadSchedule(currentDay);
  }

  if (!window.__appInitialized) {
    window.__appInitialized = true;
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  }
})();
</script>
